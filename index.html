03C\u003Ccolour primary>>;\\n\\toutline-offset: -2px;\\n\\tborder-radius: 0.25em;\\n}\\n\\n/*\\n** Button default styles. Makes them look consistent for all browsers\\n*/\\nhtml button {\\n\\tline-height: 1.2;\\n\\tcolor: \u003C\u003Ccolour button-foreground>>;\\n\\tfill: \u003C\u003Ccolour button-foreground>>;\\n\\tbackground: \u003C\u003Ccolour button-background>>;\\n\\tborder-color: \u003C\u003Ccolour button-border>>;\\n\\tcursor: pointer;\\n}\\n\\nbutton:disabled {\\n\\tcursor: default;\\n\\tcolor: \u003C\u003Ccolour muted-foreground>>;\\n}\\n\\nbutton:disabled svg {\\n\\tfill: \u003C\u003Ccolour muted-foreground>>;\\n}\\n\\n/*\\n** Basic element styles\\n*/\\n\\nhtml, body {\\n\\tfont-family: {{$:/themes/tiddlywiki/vanilla/settings/fontfamily}};\\n\\ttext-rendering: optimizeLegibility; /* Enables kerning and ligatures etc. */\\n\\t-webkit-font-smoothing: antialiased;\\n\\t-moz-osx-font-smoothing: grayscale;\\n}\\n\\nhtml:-webkit-full-screen {\\n\\tbackground-color: \u003C\u003Ccolour page-background>>;\\n}\\n\\nbody.tc-body {\\n\\tfont-size: {{$:/themes/tiddlywiki/vanilla/metrics/fontsize}};\\n\\tline-height: {{$:/themes/tiddlywiki/vanilla/metrics/lineheight}};\\n\\tword-wrap: break-word;\\n\\t\u003C\u003Ccustom-background-datauri>>\\n\\tcolor: \u003C\u003Ccolour foreground>>;\\n\\tbackground-color: \u003C\u003Ccolour page-background>>;\\n\\tfill: \u003C\u003Ccolour foreground>>;\\n}\\n\\n\u003C\u003Cif-background-attachment \\\"\\\"\\\"\\n\\nbody.tc-body {\\n\\tbackground-color: transparent;\\n}\\n\\n\\\"\\\"\\\">>\\n\\n/**\\n * Correct the font size and margin on `h1` elements within `section` and\\n * `article` contexts in Chrome, Firefox, and Safari.\\n */\\n\\nh1 {\\n\\tfont-size: 2em;\\n}\\n\\nh1, h2, h3, h4, h5, h6 {\\n\\tline-height: 1.2;\\n\\tfont-weight: normal;\\n}\\n\\npre {\\n\\tdisplay: block;\\n\\tmargin-top: 1em;\\n\\tmargin-bottom: 1em;\\n\\tword-break: normal;\\n\\tword-wrap: break-word;\\n\\twhite-space: {{$:/themes/tiddlywiki/vanilla/options/codewrapping}};\\n\\tbackground-color: \u003C\u003Ccolour pre-background>>;\\n\\tborder: 1px solid \u003C\u003Ccolour pre-border>>;\\n\\tpadding: 0 3px 2px;\\n\\tborder-radius: 3px;\\n\\tfont-family: {{$:/themes/tiddlywiki/vanilla/settings/codefontfamily}};\\n}\\n\\ncode {\\n\\tcolor: \u003C\u003Ccolour code-foreground>>;\\n\\tbackground-color: \u003C\u003Ccolour code-background>>;\\n\\tborder: 1px solid \u003C\u003Ccolour code-border>>;\\n\\twhite-space: pre-wrap;\\n\\tpadding: 0 3px 2px;\\n\\tborder-radius: 3px;\\n\\tfont-family: {{$:/themes/tiddlywiki/vanilla/settings/codefontfamily}};\\n}\\n\\nblockquote {\\n\\tborder-inline-start: 5px solid \u003C\u003Ccolour blockquote-bar>>;\\n\\t\u003C\u003Cmargin-start 25px>>\\n\\t\u003C\u003Cpadding-start 10px>>\\n\\tquotes: \\\"\\\\201C\\\"\\\"\\\\201D\\\"\\\"\\\\2018\\\"\\\"\\\\2019\\\";\\n}\\n\\nblockquote > div {\\n\\tmargin-top: 1em;\\n\\tmargin-bottom: 1em;\\n}\\n\\nblockquote.tc-big-quote {\\n\\tfont-family: Georgia, serif;\\n\\tposition: relative;\\n\\tbackground: \u003C\u003Ccolour pre-background>>;\\n\\tborder-inline-start: none;\\n\\t\u003C\u003Cmargin-inline 50px>>\\n\\tpadding: 10px;\\n\\tborder-radius: 8px;\\n}\\n\\nblockquote.tc-big-quote cite:before {\\n\\tcontent: \\\"\\\\2014 \\\\2009\\\";\\n}\\n\\nblockquote.tc-big-quote:before {\\n\\tfont-family: Georgia, serif;\\n\\tcolor: \u003C\u003Ccolour blockquote-bar>>;\\n\\tcontent: open-quote;\\n\\tfont-size: 8em;\\n\\tline-height: 0.1em;\\n\\tmargin-right: 0.25em;\\n\\tvertical-align: -0.4em;\\n\\tposition: absolute;\\n\\tleft: -50px;\\n\\ttop: 42px;\\n}\\n\\nblockquote.tc-big-quote:after {\\n\\tfont-family: Georgia, serif;\\n\\tcolor: \u003C\u003Ccolour blockquote-bar>>;\\n\\tcontent: close-quote;\\n\\tfont-size: 8em;\\n\\tline-height: 0.1em;\\n\\tmargin-right: 0.25em;\\n\\tvertical-align: -0.4em;\\n\\tposition: absolute;\\n\\tright: -80px;\\n\\tbottom: -20px;\\n}\\n\\ndl dt {\\n\\tfont-weight: bold;\\n\\tmargin-top: 6px;\\n}\\n\\ntextarea,\\ninput[type=text diff-delete-foreground>>;\\n\\tborder-top-left-radius: 4px;\\n\\tborder-top-right-radius: 4px;\\n\\tpadding: 4px;\\n}\\n\\n.tc-test-case-result-fail-body {\\n\\tpadding: 4px;\\n}\\n\\n.tc-test-case-source > pre {\\n\\theight: 100%;\\n}\\n\\n.tc-test-case-narrative {\\n\\tpadding: 0.5em;\\n}\\n\\n.tc-test-case-panes {\\n\\tdisplay: flex;\\n\\talign-items: stretch;\\n\\tflex-wrap: wrap;\\n\\tpadding: 0.5em;\\n\\tborder-bottom-left-radius: 6px;\\n\\tborder-bottom-right-radius: 6px;\\n}\\n\\n.tc-test-case-source {\\n\\tflex: 1 0 49%;\\n\\tmin-width: 250px;\\n}\\n\\n.tc-test-case-source .tc-tab-content {\\n\\tbackground: inherit;\\n\\tmargin: 0;\\n}\\n\\n.tc-test-case-source .tc-tab-content .tc-field-table {\\n\\tbackground: \u003C\u003Ccolour background>>;\\n}\\n\\n.tc-test-case-source .tc-field-table {\\n\\twidth: 100%;\\n}\\n\\n.tc-test-case-source table.tc-field-table {\\n\\tmargin: 0;\\n}\\n\\n.tc-test-case-source .tc-tiddler-frame .tc-edit-texteditor {\\n\\tmargin: 0;\\n}\\n\\n.tc-test-case-divider {\\n\\tflex: 0 0 1.5%;\\n}\\n\\n.tc-test-case-source .tc-tab-buttons {\\n\\tpadding-top: 0;\\n}\\n\\n.tc-test-case-footer-toolbar {\\n\\tdisplay: flex;\\n\\tjustify-content: flex-end;\\n}\\n\\n.tc-test-case-output {\\n\\tbox-shadow: inset 2px 2px 10px 0px \u003C\u003Ccolour muted-foreground>>;\\n\\tbackground: \u003C\u003Ccolour background>>;\\n\\tborder-radius: 4px;\\n\\tborder: 1px solid \u003C\u003Ccolour muted-foreground>>;\\n\\tflex: 1 0 49%;\\n\\tmin-width: 250px;\\n\\tpadding: 0.25em 1em;\\n}\\n\\n/*\\n** Flexbox utility classes\\n*/\\n\\n.tc-flex {\\n\\tdisplay: -webkit-flex;\\n\\tdisplay: flex;\\n}\\n\\n.tc-flex-column {\\n\\tflex-direction: column;\\n}\\n\\n.tc-flex-row {\\n\\tflex-direction: row;\\n}\\n\\n.tc-flex-grow-1 {\\n\\tflex-grow: 1;\\n}\\n\\n.tc-flex-grow-2 {\\n\\tflex-grow: 2;\\n}\\n\\n/*\\n** Other utility classes\\n*/\\n\\n/* Horizontal gaps */\\n\\n.tc-tiny-gap {\\n\\tmargin-left: .25em;\\n\\tmargin-right: .25em;\\n}\\n\\n.tc-tiny-gap-left {\\n\\t\u003C\u003Cmargin-start \\\".25em\\\">>\\n}\\n\\n.tc-tiny-gap-right {\\n\\t\u003C\u003Cmargin-end \\\".25em\\\">>\\n}\\n\\n.tc-small-gap {\\n\\tmargin-left: .5em;\\n\\tmargin-right: .5em;\\n}\\n\\n.tc-small-gap-left {\\n\\t\u003C\u003Cmargin-start \\\".5em\\\">>\\n}\\n\\n.tc-small-gap-right {\\n\\t\u003C\u003Cmargin-end \\\".5em\\\">>\\n}\\n\\n.tc-big-gap {\\n\\tmargin-left: 1em;\\n\\tmargin-right: 1em;\\n}\\n\\n.tc-big-gap-left {\\n\\t\u003C\u003Cmargin-start 1em>>\\n}\\n\\n.tc-big-gap-right {\\n\\t\u003C\u003Cmargin-end 1em>>\\n}\\n\\n.tc-word-break {\\n\\tword-break: break-all;\\n}\\n\\n/* Vertical gaps */\\n\\n.tc-tiny-v-gap-bottom {\\n\\tmargin-bottom: 3px;\\n}\\n\\n/* TODO: Remove the following rule once 2020 baseline is supported */\\n@supports not (border-inline-start: 1px solid #000000) {\\n\\tblockquote {\\n\\t\\tborder-left: 5px solid \u003C\u003Ccolour blockquote-bar>>;\\n\\t}\\n\\n\\tblockquote.tc-big-quote {\\n\\t\\tborder-left: none;\\n\\t}\\n\\n\\t.tc-tab-buttons.tc-vertical button {\\n\\t\\tborder-left: 1px solid \u003C\u003Ccolour tab-border>>;\\n\\t\\tborder-right: none;\\n\\t}\\n\\n\\t.tc-tab-buttons.tc-vertical button.tc-tab-selected {\\n\\t\\tborder-right: 1px solid \u003C\u003Ccolour tab-background-selected>>;\\n\\t}\\n\\n\\t.tc-tab-content.tc-vertical {\\n\\t\\tborder-left: 1px solid \u003C\u003Ccolour tab-border>>;\\n\\t}\\n}\\n\\n/* TODO: Remove the following rule once 2021 baseline is supported */\\n@supports not (border-start-start-radius: 0px) {\\n\\t.tc-tab-buttons.tc-vertical button {\\n\\t\\tborder-top-left-radius: 2px;\\n\\t\\tborder-bottom-left-radius: 2px;\\n\\t\\tborder-top-right-radius: 0;\\n\\t\\tborder-bottom-right-radius: 0;\\n\\t}\\n}\\n\\n/* TODO: Remove the following rule once 2021 baseline is supported */\\n@supports not (inset-inline-start: 0) {\\n\\t.tc-tiddler-info-controls {\\n\\t\\tright: 0;\\n\\t}\\n\\n\\t.tc-alert-toolbar {\\n\\t\\tright: 7px;\\n\\t}\\n}\\n\\n/* TODO: Remove the following rule once 2023 baseline is supported */\\n@supports not (float: inline-end) {\\n\\t.tc-test-case-toolbar {\\n\\t\\tfloat: right;\\n\\t}\\n\\n\\t.tc-tiddler-frame .tc-tiddler-controls {\\n\\t\\tfloat: right;\\n\\t}\\n}\"},\"$:/themes/tiddlywiki/vanilla/metrics/bodyfontsize\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/bodyfontsize\",\"text\":\"15px\"},\"$:/themes/tiddlywiki/vanilla/metrics/bodylineheight\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/bodylineheight\",\"text\":\"22px\"},\"$:/themes/tiddlywiki/vanilla/metrics/fontsize\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/fontsize\",\"text\":\"14px\"},\"$:/themes/tiddlywiki/vanilla/metrics/lineheight\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/lineheight\",\"text\":\"20px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storyleft\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storyleft\",\"text\":\"0px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storytop\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storytop\",\"text\":\"0px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storyright\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storyright\",\"text\":\"770px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storywidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storywidth\",\"text\":\"770px\"},\"$:/themes/tiddlywiki/vanilla/metrics/tiddlerwidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/tiddlerwidth\",\"text\":\"686px\"},\"$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint\",\"text\":\"960px\"},\"$:/themes/tiddlywiki/vanilla/metrics/sidebarwidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/sidebarwidth\",\"text\":\"350px\"},\"$:/themes/tiddlywiki/vanilla/options/stickytitles\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/stickytitles\",\"text\":\"no\"},\"$:/themes/tiddlywiki/vanilla/options/sidebarlayout\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/sidebarlayout\",\"text\":\"fluid-fixed\"},\"$:/themes/tiddlywiki/vanilla/options/codewrapping\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/codewrapping\",\"text\":\"pre-wrap\"},\"$:/themes/tiddlywiki/vanilla/reset\":{\"title\":\"$:/themes/tiddlywiki/vanilla/reset\",\"type\":\"text/css\",\"text\":\"/*! modern-normalize v2.0.0 | MIT License | https://github.com/sindresorhus/modern-normalize */\\n\\n/*\\nDocument\\n========\\n*/\\n\\n/**\\nUse a better box model (opinionated).\\n*/\\n\\n*,\\n::before,\\n::after {\\n\\tbox-sizing: border-box;\\n}\\n\\nhtml {\\n\\t/* Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3) */\\n\\tfont-family:\\n\\t\\tsystem-ui,\\n\\t\\t'Segoe UI',\\n\\t\\tRoboto,\\n\\t\\tHelvetica,\\n\\t\\tArial,\\n\\t\\tsans-serif,\\n\\t\\t'Apple Color Emoji',\\n\\t\\t'Segoe UI Emoji';\\n\\tline-height: 1.15; /* 1. Correct the line height in all browsers. */\\n\\t-webkit-text-size-adjust: 100%; /* 2. Prevent adjustments of font size after orientation changes in iOS. */\\n\\t-moz-tab-size: 4; /* 3. Use a more readable tab size (opinionated). */\\n\\ttab-size: 4; /* 3 */\\n}\\n\\n/*\\nSections\\n========\\n*/\\n\\nbody {\\n\\tmargin: 0; /* Remove the margin in all browsers. */\\n}\\n\\n/*\\nGrouping content\\n================\\n*/\\n\\n/**\\n1. Add the correct height in Firefox.\\n2. Correct the inheritance of border color in Firefox. (https://bugzilla.mozilla.org/show_bug.cgi?id=190655)\\n*/\\n\\nhr {\\n\\theight: 0; /* 1 */\\n\\tcolor: inherit; /* 2 */\\n}\\n\\n/*\\nText-level semantics\\n====================\\n*/\\n\\n/**\\nAdd the correct text decoration in Chrome, Edge, and Safari.\\n*/\\n\\nabbr[title] {\\n\\ttext-decoration: underline dotted;\\n}\\n\\n/**\\nAdd the correct font weight in Edge and Safari.\\n*/\\n\\nb,\\nstrong {\\n\\tfont-weight: bolder;\\n}\\n\\n/**\\n1. Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3)\\n2. Correct the odd 'em' font sizing in all browsers.\\n*/\\n\\ncode,\\nkbd,\\nsamp,\\npre {\\n\\tfont-family:\\n\\t\\tui-monospace,\\n\\t\\tSFMono-Regular,\\n\\t\\tConsolas,\\n\\t\\t'Liberation Mono',\\n\\t\\tMenlo,\\n\\t\\tmonospace; /* 1 */\\n\\tfont-size: 1em; /* 2 */\\n}\\n\\n/**\\nAdd the correct font size in all browsers.\\n*/\\n\\nsmall {\\n\\tfont-size: 80%;\\n}\\n\\n/**\\nPrevent 'sub' and 'sup' elements from affecting the line height in all browsers.\\n*/\\n\\nsub,\\nsup {\\n\\tfont-size: 75%;\\n\\tline-height: 0;\\n\\tposition: relative;\\n\\tvertical-align: baseline;\\n}\\n\\nsub {\\n\\tbottom: -0.25em;\\n}\\n\\nsup {\\n\\ttop: -0.5em;\\n}\\n\\n/*\\nTabular data\\n============\\n*/\\n\\n/**\\n1. Remove text indentation from table contents in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=999088, https://bugs.webkit.org/show_bug.cgi?id=201297)\\n2. Correct table border color inheritance in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=935729, https://bugs.webkit.org/show_bug.cgi?id=195016)\\n*/\\n\\ntable {\\n\\ttext-indent: 0; /* 1 */\\n\\tborder-color: inherit; /* 2 */\\n}\\n\\n/*\\nForms\\n=====\\n*/\\n\\n/**\\n1. Change the font styles in all browsers.\\n2. Remove the margin in Firefox and Safari.\\n*/\\n\\nbutton,\\ninput,\\noptgroup,\\nselect,\\ntextarea {\\n\\tfont-family: inherit; /* 1 */\\n\\tfont-size: 100%; /* 1 */\\n\\tline-height: 1.15; /* 1 */\\n\\tmargin: 0; /* 2 */\\n}\\n\\n/**\\nRemove the inheritance of text transform in Edge and Firefox.\\n*/\\n\\nbutton,\\nselect {\\n\\ttext-transform: none;\\n}\\n\\n/**\\nCorrect the inability to style clickable types in iOS and Safari.\\n*/\\n\\nbutton,\\n[type='button'],\\n[type='reset'],\\n[type='submit'] {\\n\\t-webkit-appearance: button;\\n}\\n\\n/**\\nRemove the inner border and padding in Firefox.\\n*/\\n\\n::-moz-focus-inner {\\n\\tborder-style: none;\\n\\tpadding: 0;\\n}\\n\\n/**\\nRestore the focus styles unset by the previous rule.\\n*/\\n\\n:-moz-focusring {\\n\\toutline: 1px dotted ButtonText;\\n}\\n\\n/**\\nRemove the additional ':invalid' styles in Firefox.\\nSee: https://github.com/mozilla/gecko-dev/blob/2f9eacd9d3d995c937b4251a5557d95d494c9be1/layout/style/res/forms.css#L728-L737\\n*/\\n\\n:-moz-ui-invalid {\\n\\tbox-shadow: none;\\n}\\n\\n/**\\nRemove the padding so developers are not caught out when they zero out 'fieldset' elements in all browsers.\\n*/\\n\\nlegend {\\n\\tpadding: 0;\\n}\\n\\n/**\\nAdd the correct vertical alignment in Chrome and Firefox.\\n*/\\n\\nprogress {\\n\\tvertical-align: baseline;\\n}\\n\\n/**\\nCorrect the cursor style of increment and decrement buttons in Safari.\\n*/\\n\\n::-webkit-inner-spin-button,\\n::-webkit-outer-spin-button {\\n\\theight: auto;\\n}\\n\\n/**\\n1. Correct the odd appearance in Chrome and Safari.\\n2. Correct the outline style in Safari.\\n*/\\n\\n[type='search'] {\\n\\t-webkit-appearance: textfield; /* 1 */\\n\\toutline-offset: -2px; /* 2 */\\n}\\n\\n/**\\nRemove the inner padding in Chrome and Safari on macOS.\\n*/\\n\\n::-webkit-search-decoration {\\n\\t-webkit-appearance: none;\\n}\\n\\n/**\\n1. Correct the inability to style clickable types in iOS and Safari.\\n2. Change font properties to 'inherit' in Safari.\\n*/\\n\\n::-webkit-file-upload-button {\\n\\t-webkit-appearance: button; /* 1 */\\n\\tfont: inherit; /* 2 */\\n}\\n\\n/*\\nInteractive\\n===========\\n*/\\n\\n/*\\nAdd the correct display in Chrome and Safari.\\n*/\\n\\nsummary {\\n\\tdisplay: list-item;\\n}\\n\"},\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\",\"text\":\"-apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", \\\"Noto Sans\\\", sans-serif, Helvetica, Arial, \\\"Apple Color Emoji\\\", \\\"Segoe UI Emoji\\\"\"},\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\",\"text\":\"ui-monospace, \\\"SFMono-Regular\\\", \\\"SF Mono\\\", Menlo, Consolas, \\\"Liberation Mono\\\", monospace\"},\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\",\"text\":\"fixed\"},\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\",\"text\":\"auto\"},\"$:/themes/tiddlywiki/vanilla/sticky\":{\"title\":\"$:/themes/tiddlywiki/vanilla/sticky\",\"code-body\":\"yes\",\"text\":\"\u003C$reveal state=\\\"$:/themes/tiddlywiki/vanilla/options/stickytitles\\\" type=\\\"match\\\" text=\\\"yes\\\">\\n``\\n.tc-tiddler-title {\\n\\tposition: -webkit-sticky;\\n\\tposition: -moz-sticky;\\n\\tposition: -o-sticky;\\n\\tposition: -ms-sticky;\\n\\tposition: sticky;\\n\\ttop: 0px;\\n\\tbackground: ``\u003C\u003Ccolour tiddler-background>>``;\\n\\tz-index: 500;\\n}\\n\\n``\\n\u003C$list filter=\\\"[range[100]]\\\">\\n`.tc-story-river .tc-tiddler-frame:nth-child(100n+`\u003C$text text=\u003C\u003CcurrentTiddler>>/>`) {\\nz-index: `\u003C$text text={{{ [[200]subtract\u003CcurrentTiddler>] }}}/>`;\\n}\\n`\\n\u003C/$list>\\n\u003C/$reveal>\\n\"}}}"},

{"created":"20260711125205801","text":"//A popular legend says aarakocra are not native to the Material Plane. They hail from a world beyond: the boundless vistas of the Elemental Plane of Air.//\n\n//From below, aarakocra look much like large birds.\nOnly when they descend to roost upon a branch or\nwalk across the ground does their humanoid\nappearance reveal itself. Standing upright, aarakocra\nmight reach 5 feet tall, with long, narrow legs that\ntaper to sharp talons.//\n\n//Their plumage can be brightly colored or more\nsubdued, their feathers ranging from dazzling reds\nand eye-catching yellows to muted palettes of brown\nor gray. Their heads can resemble that of a parrot,\neagle, owl, quail, raven, or any other bird.//\n\n! Aarakocra Traits\n\n!! Avian Feet (–2 Points)\nYour base speed reduces to 25 feet.\n\n!! Flight (7 Points)\nYou have a flying speed of 20 feet. To use this speed,\nyou can’t be wearing medium or heavy armor.\nIf you already have a flying speed inherited from\nyour other birth parent, increase your flying speed to\n50 feet.\n\n!! Short-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively short.\n\n!! Superior Flight (16 Points)\nYou have a flying speed of 50 feet. To use this speed,\nyou can’t be wearing medium or heavy armor.\n\n!! Talons (1 Point)\nYour talons are natural weapons, which you can use\nto make unarmed strikes. If you hit with them, you\ndeal slashing damage equal to 1d4 + your Strength\nmodifier, instead of the bludgeoning damage normal\nfor an unarmed strike.","tags":"Parentage [[Elf & Orc 1]]","title":"Aarakocra Parentage","modified":"20260711130249921"},
{"created":"20260709194547362","text":"You have spent your life in the service of a temple to a specific god or pantheon of gods. You act as an intermediary between the realm of the holy and the mortal world, performing sacred rites and offering sacrifices in order to conduct worshipers into the presence of the divine. You are not necessarily a cleric — performing sacred rites is not the same thing as channeling divine power.\n\nChoose a god, a pantheon of gods, or some other quasi-divine being, and work with your DM to detail the nature of your religious service. Were you a lesser functionary in a temple, raised from childhood to assist the priests in the sacred rites? Or were you a high priest who suddenly experienced a call to serve your god in a different way? Perhaps you were the leader of a small cult outside of any established temple structure, or even an occult group that served a fiendish master that you now deny.\n\n''Skill Proficiencies:'' Insight, Religion\n\n''Languages:'' Two of your choice\n\n''Equipment:'' A [[holy symbol|Adventuring Gear]] (a gift to you when you entered the priesthood), a prayer book or prayer wheel, 5 sticks of incense, [[vestments|Adventuring Gear]], a set of [[common clothes|Adventuring Gear]], and a pouch containing 15 gp\n\n!! Feature: Shelter of the Faithful\n\nAs an acolyte, you command the respect of those who share your faith, and you can perform the religious ceremonies of your deity. You and your adventuring companions can expect to receive free healing and care at a temple, shrine, or other established presence of your faith, though you must provide any material components needed for spells. Those who share your religion will support you (but only you) at a modest lifestyle.\n\nYou might also have ties to a specific temple dedicated to your chosen deity or pantheon, and you have a residence there. This could be the temple where you used to serve, if you remain on good terms with it, or a temple where you have found a new home. While near your temple, you can call upon the priests for assistance, provided the assistance you ask for is not hazardous and you remain in good standing with your temple.\n\n!! Suggested Characteristics\n\nAcolytes are shaped by their experience in temples or other religious communities. Their study of the history and tenets of their faith and their relationships to temples, shrines, or hierarchies affect their mannerisms and ideals. Their flaws might be some hidden hypocrisy or heretical idea, or an ideal or bond taken to an extreme.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I idolize a particular hero of my faith, and constantly refer to that person’s deeds and example. |\n| 2 |I can find common ground between the fiercest enemies, empathizing with them and always working toward peace. |\n| 3 |I see omens in every event and action. The gods try to speak to us, we just need to listen. |\n| 4 |Nothing can shake my optimistic attitude. |\n| 5 |I quote (or misquote) sacred texts and proverbs in almost every situation. |\n| 6 |I am tolerant (or intolerant) of other faiths and respect (or condemn) the worship of other gods. |\n| 7 |I’ve enjoyed fine food, drink, and high society among my temple’s elite. Rough living grates on me. |\n| 8 |I’ve spent so long in the temple that I have little practical experience dealing with people in the outside world. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Tradition.'' The ancient traditions of worship and sacrifice must be preserved and upheld. (Lawful) |\n| 2 |''Charity.'' I always try to help those in need, no matter what the personal cost. (Good) |\n| 3 |''Change.'' We must help bring about the changes the gods are constantly working in the world. (Chaotic) |\n| 4 |''Power.'' I hope to one day rise to the top of my faith’s religious hierarchy. (Lawful) |\n| 5 |''Faith.'' I trust that my deity will guide my actions. I have faith that if I work hard, things will go well. (Lawful) |\n| 6 |''Aspiration.'' I seek to prove myself worthy of my god’s favor by matching my actions against his or her teachings. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |I would die to recover an ancient relic of my faith that was lost long ago. |\n| 2 |I will someday get revenge on the corrupt temple hierarchy who branded me a heretic. |\n| 3 |I owe my life to the priest who took me in when my parents died. |\n| 4 |Everything I do is for the common people. |\n| 5 |I will do anything to protect the temple where I served. |\n| 6 |I seek to preserve a sacred text that my enemies consider heretical and seek to destroy. |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |I judge others harshly, and myself even more severely. |\n| 2 |I put too much trust in those who wield power within my temple’s hierarchy. |\n| 3 |My piety sometimes leads me to blindly trust those that profess faith in my god. |\n| 4 |I am inflexible in my thinking. |\n| 5 |I am suspicious of strangers and expect the worst of them. |\n| 6 |Once I pick a goal, I become obsessed with it to the detriment of everything else in my life. |","tags":"[[Player's Handbook]] Background","title":"Acolyte","modified":"20260709195249940"},
{"created":"20260708155938095","text":"!!! Ammunition\n\n|noborder alternate|k\n|!Item |\u003C|!Cost|!Weight|\n| |Arrows (20) | 1 gp | 1 lb. |\n| |Blowgun needles (50) | 1 gp | 1 lb. |\n| |Crossbow bolts (20) | 1 gp | 1 1/2 lb. |\n| |Sling bullets (20) | 4 cp | 1 1/2 lb. |\n\n!!! Spellcasting Focus\n\n|noborder alternate|k\n|!Item |\u003C|!Cost|!Weight|\n|//Arcane Focus// |\u003C|\u003C|\u003C|\n| |Crystal | 10 gp | 1 lb. |\n| |Orb | 20 gp | 3 lb. |\n| |Rod | 10 gp | 2 lb. |\n| |Staff | 5 gp | 4 lb. |\n| |Wand | 10 gp | 1 lb. |\n|//Druidic Focus// |\u003C|\u003C|\u003C|\n| |Sprig of mistletoe | 1 gp | --- |\n| |Totem | 1 gp | --- |\n| |Wooden staff | 5 gp | 4 lb. |\n| |Yew wand | 10 gp | 1 lb. |\n|//Holy symbol// |\u003C|\u003C|\u003C|\n| |Amulet | 5 gp | 1 lb. |\n| |Emblem | 5 gp | --- |\n| |Reliquary | 5 gp | 2 lb. |\n\n!!! Other Adventuring Gear\n\n|noborder alternate|k\n|!Item |\u003C|!Cost|!Weight|\n| |Abacus                       |     2 gp | 2 lb. |\n| |Acid (vial)                  |    25 gp | 1 lb. |\n| |Alchemist's fire (flask)     |    50 gp | 1 lb. |\n| |Antitoxin (vial)             |    50 gp | --- |\n| |Backpack                     |     2 gp | 5 lb. |\n| |Ball bearings (bag of 1,000) |     1 gp | 2 lb. |\n| |Barrel                       |     2 gp | 70 lb. |\n| |Basket                       |     4 sp | 2 lb. |\n| |Bedroll                      |     1 gp | 7 lb. |\n| |Bell                         |     1 gp | --- |\n| |Blanket                      |     5 sp | 3 lb. |\n| |Block and tackle             |     1 gp | 5 lb. |\n| |Book                         |    25 gp | 5 lb. |\n| |Bottle, glass                |     2 gp | 2 lb. |\n| |Bucket                       |     5 cp | 2 lb. |\n| |Caltrops (bag of 20)         |     1 gp | 2 lb. |\n| |Candle                       |     1 cp | --- |\n| |Case, crossbow bolt          |     1 gp | 1 lb. |\n| |Case, map or scroll          |     1 gp | 1 lb. |\n| |Chain (10 feet)              |     5 gp | 10 lb. |\n| |Chalk (1 piece)              |     1 cp | --- |\n| |Chest                        |     5 gp | 25 lb. |\n| |Climber's kit                |    25 gp | 12 lb. |\n| |Clothes, common              |     5 sp | 3 lb. |\n| |Clothes, costume             |     5 gp | 4 lb. |\n| |Clothes, fine                |    15 gp | 6 lb. |\n| |Clothes, traveler's          |     2 gp | 4 lb. |\n| |Component pouch              |    25 gp | 2 lb. |\n| |Crowbar                      |     2 gp | 5 lb. |\n| |Fishing tackle               |     1 gp | 4 lb. |\n| |Flask or tankard             |     2 cp | 1 lb. |\n| |Grappling hook               |     2 gp | 4 lb. |\n| |Hammer                       |     1 gp | 3 lb. |\n| |Hammer, sledge               |     2 gp | 10 lb. |\n| |Healer's kit                 |     5 gp | 3 lb. |\n| |Holy water (flask)           |    25 gp | 1 lb. |\n| |Hourglass                    |    25 gp | 1 lb. |\n| |Hunting trap                 |     5 gp | 25 lb. |\n| |Ink (1 ounce bottle)         |    10 gp | --- |\n| |Ink pen                      |     2 cp | --- |\n| |Jug or pitcher               |     2 cp | 4 lb. |\n| |Ladder (10 foot)             |     1 sp | 25 lb. |\n| |Lamp                         |     5 gp | 1 lb. |\n| |Lantern, bullseye            |    10 gp | 2 lb. |\n| |Lantern, hooded              |     5 gp | 2 lb. |\n| |Lock                         |    10 gp | 1 lb. |\n| |Magnifying glass             |   100 gp | --- |\n| |Manacles                     |     2 gp | 6 lb. |\n| |Mess kit                     |     2 sp | 1 lb. |\n| |Mirror, steel                |     5 gp | 1/2 lb. |\n| |Oil (flask)                  |     1 sp | 1 lb. |\n| |Paper (one sheet)            |     2 sp | --- |\n| |Parchment (one sheet)        |     1 sp | --- |\n| |Perfume (vial)               |     5 gp | --- |\n| |Pick, miner's                |     2 gp | 10 lb. |\n| |Piton                        |     5 cp | 1/4 lb. |\n| |Poison, basic (vial)         |   100 gp | --- |\n| |Pole (10-foot)               |     5 cp | 7 lb. |\n| |Pot, iron                    |     2 gp | 10 lb. |\n| |Potion of healing            |    50 gp | 1/2 lb. |\n| |Pouch                        |     5 sp | 1 lb. |\n| |Quiver                       |     1 gp | 1 lb. |\n| |Ram, portable                |     4 gp | 35 lb. |\n| |Rations (1 day)              |     5 sp | 2 lb. |\n| |Robes                        |     1 gp | 4 lb. |\n| |Rope, hempen (50 feet)       |     1 gp | 10 lb. |\n| |Rope, silk (50 feet)         |    10 gp | 5 lb. |\n| |Sack                         |     1 cp | 1/2 lb. |\n| |Scale, merchant's            |     5 gp | 3 lb. |\n| |Sealing wax                  |     5 sp | --- |\n| |Shovel                       |     2 gp | 5 lb. |\n| |Signal whistle               |     5 cp | --- |\n| |Signet ring                  |     5 gp | --- |\n| |Soap                         |     2 cp | --- |\n| |Spellbook                    |    50 gp | 3 lb. |\n| |Spikes, iron (10)            |     1 gp | 5 lb. |\n| |Spyglass                     | 1,000 gp | 1 lb. |\n| |Tent, two-person             |     2 gp | 20 lb. |\n| |Tinderbox                    |     5 sp | 1 lb. |\n| |Torch                        |     1 cp | 1 lb. |\n| |Vial                         |     1 gp | --- |\n| |Waterskin                    |     2 sp | 5 lb. (full) |\n| |Whetstone                    |     1 cp | 1 lb. |\n\n//''Acid.''// As an action, you can splash the contents of this vial onto a creature within 5 feet of you or throw the vial up to 20 feet, shattering it on impact. In either case, make a ranged attack against a creature or object, treating the acid as an improvised weapon. On a hit, the target takes 2d6 acid damage.\n\n//''Alchemist’s Fire.''// This sticky, adhesive fluid ignites when exposed to air. As an action, you can throw this flask up to 20 feet, shattering it on impact. Make a ranged attack against a creature or object, treating the alchemist’s fire as an improvised weapon. On a hit, the target takes 1d4 fire damage at the start of each of its turns. A creature can end this damage by using its action to make a DC 10 Dexterity check to extinguish the flames.\n\n//''Antitoxin.''// A creature that drinks this vial of liquid gains advantage on saving throws against poison for 1 hour. It confers no benefit to undead or constructs.\n\n//''Arcane Focus.''// An arcane focus is a special item — an orb, a crystal, a rod, a specially constructed staff, a wand-like length of wood, or some similar item — designed to channel the power of arcane spells. A sorcerer, warlock, or wizard can use such an item as a spellcasting focus.\n\n//''Ball Bearings.''// As an action, you can spill these tiny metal balls from their pouch to cover a level, square area that is 10 feet on a side. A creature moving across the covered area must succeed on a DC 10 Dexterity saving throw or fall prone. A creature moving through the area at half speed doesn’t need to make the save.\n\n//''Block and Tackle.''// A set of pulleys with a cable threaded through them and a hook to attach to objects, a block and tackle allows you to hoist up to four times the weight you can normally lift.\n\n//''Book.''// A book might contain poetry, historical accounts, information pertaining to a particular field of lore, diagrams and notes on gnomish contraptions, or just about anything else that can be represented using text or pictures. A book of spells is a ''spellbook''.\n\n//''Caltrops.''// As an action, you can spread a bag of caltrops to cover a square area that is 5 feet on a side. Any creature that enters the area must succeed on a DC 15 Dexterity saving throw or stop moving this turn and take 1 piercing damage. Taking this damage reduces the creature’s walking speed by 10 feet until the creature regains at least 1 hit point. A creature moving through the area at half speed doesn’t need to make the save.\n\n//''Candle.''// For 1 hour, a candle sheds bright light in a 5-foot radius and dim light for an additional 5 feet.\n\n//''Case, Crossbow Bolt.''// This wooden case can hold up to twenty crossbow bolts.\n\n//''Case, Map or Scroll.''// This cylindrical leather case can hold up to ten rolled-up sheets of paper or five rolled-up sheets of parchment.\n\n//''Chain.''// A chain has 10 hit points. It can be burst with a successful DC 20 Strength check.\n\n//''Climber’s Kit.''// A climber’s kit includes special pitons, boot tips, gloves, and a harness. You can use the climber’s kit as an action to anchor yourself; when you do, you can’t fall more than 25 feet from the point where you anchored yourself, and you can’t climb more than 25 feet away from that point without undoing the anchor.\n\n//''Component Pouch.''// A component pouch is a small, watertight leather belt pouch that has compartments to hold all the material components and other special items you need to cast your spells, except for those components that have a specific cost (as indicated in a spell’s description).\n\n//''Crowbar.''// Using a crowbar grants advantage to Strength checks where the crowbar’s leverage can be applied.\n\n//''Druidic Focus.''// A druidic focus might be a sprig of mistletoe or holly, a wand or scepter made of yew or another special wood, a staff drawn whole out of a living tree, or a totem object incorporating feathers, fur, bones, and teeth from sacred animals. A druid can use such an object as a spellcasting focus.\n\n//''Fishing Tackle.''// This kit includes a wooden rod, silken line, corkwood bobbers, steel hooks, lead sinkers, velvet lures, and narrow netting.\n\n//''Healer’s Kit.''// This kit is a leather pouch containing bandages, salves, and splints. The kit has ten uses. As an action, you can expend one use of the kit to stabilize a creature that has 0 hit points, without needing to make a Wisdom (Medicine) check.\n\n//''Holy Symbol.''// A holy symbol is a representation of a god or pantheon. It might be an amulet depicting a symbol representing a deity, the same symbol carefully engraved or inlaid as an emblem on a shield, or a tiny box holding a fragment of a sacred relic. A cleric or paladin can use a holy symbol as a spellcasting focus. To use the symbol in this way, the caster must hold it in hand, wear it visibly, or bear it on a shield.\n\n//''Holy Water.''// As an action, you can splash the contents of this flask onto a creature within 5 feet of you or throw it up to 20 feet, shattering it on impact. In either case, make a ranged attack against a target creature, treating the holy water as an improvised weapon. If the target is a fiend or undead, it takes 2d6 radiant damage.\n\nA cleric or paladin may create holy water by performing a special ritual. The ritual takes 1 hour to perform, uses 25 gp worth of powdered silver, and requires the caster to expend a 1st-level spell slot.\n\n//''Hunting Trap.''// When you use your action to set it, this trap forms a saw-toothed steel ring that snaps shut when a creature steps on a pressure plate in the center. The trap is affixed by a heavy chain to an immobile object, such as a tree or a spike driven into the ground. A creature that steps on the plate must succeed on a DC 13 Dexterity saving throw or take 1d4 piercing damage and stop moving. Thereafter, until the creature breaks free of the trap, its movement is limited by the length of the chain (typically 3 feet long). A creature can use its action to make a DC 13 Strength check, freeing itself or another creature within its reach on a success. Each failed check deals 1 piercing damage to the trapped creature.\n\n//''Lamp.''// A lamp casts bright light in a 15-foot radius and dim light for an additional 30 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil.\n\n//''Lantern, Bullseye.''// A bullseye lantern casts bright light in a 60-foot cone and dim light for an additional 60 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil.\n\n//''Lantern, Hooded.''// A hooded lantern casts bright light in a 30-foot radius and dim light for an additional 30 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil. As an action, you can lower the hood, reducing the light to dim light in a 5-foot radius.\n\n//''Lock.''// A key is provided with the lock. Without the key, a creature proficient with thieves’ tools can pick this lock with a successful DC 15 Dexterity check. Your DM may decide that better locks are available for higher prices.\n\n//''Magnifying Glass.''// This lens allows a closer look at small objects. It is also useful as a substitute for flint and steel when starting fires. Lighting a fire with a magnifying glass requires light as bright as sunlight to focus, tinder to ignite, and about 5 minutes for the fire to ignite. A magnifying glass grants advantage on any ability check made to appraise or inspect an item that is small or highly detailed.\n\n//''Manacles.''// These metal restraints can bind a Small or Medium creature. Escaping the manacles requires a successful DC 20 Dexterity check. Breaking them requires a successful DC 20 Strength check. Each set of manacles comes with one key. Without the key, a creature proficient with thieves’ tools can pick the manacles’ lock with a successful DC 15 Dexterity check. Manacles have 15 hit points.\n\n//''Mess Kit.''// This tin box contains a cup and simple cutlery. The box clamps together, and one side can be used as a cooking pan and the other as a plate or shallow bowl.\n\n//''Oil.''// Oil usually comes in a clay flask that holds 1 pint. As an action, you can splash the oil in this flask onto a creature within 5 feet of you or throw it up to 20 feet, shattering it on impact. Make a ranged attack against a target creature or object, treating the oil as an improvised weapon. On a hit, the target is covered in oil. If the target takes any fire damage before the oil dries (after 1 minute), the target takes an additional 5 fire damage from the burning oil. You can also pour a flask of oil on the ground to cover a 5-foot-square area, provided that the surface is level. If lit, the oil burns for 2 rounds and deals 5 fire damage to any creature that enters the area or ends its turn in the area. A creature can take this damage only once per turn.\n\n//''Poison, Basic.''// You can use the poison in this vial to coat one slashing or piercing weapon or up to three pieces of ammunition. Applying the poison takes an action. A creature hit by the poisoned weapon or ammunition must succeed on a DC 10 Constitution saving throw or take 1d4 poison damage. Once applied, the poison retains potency for 1 minute before drying.\n\n//''Potion of Healing.''// A character who drinks the magical red fluid in this vial regains 2d4 + 2 hit points. Drinking or administering a potion takes an action.\n\n//''Pouch.''// A cloth or leather pouch can hold up to 20 sling bullets or 50 blowgun needles, among other things. A compartmentalized pouch for holding spell components is called a component pouch (described earlier in this section).\n\n//''Quiver.''// A quiver can hold up to 20 arrows.\n\n//''Ram, Portable.''// You can use a portable ram to break down doors. When doing so, you gain a +4 bonus on the Strength check. One other character can help you use the ram, giving you advantage on this check.\n\n//''Rations.''// Rations consist of dry foods suitable for extended travel, including jerky, dried fruit, hardtack, and nuts.\n\n//''Rope.''// Rope, whether made of hemp or silk, has 2 hit points and can be burst with a DC 17 Strength check.\n\n//''Scale, Merchant’s.''// A scale includes a small balance, pans, and a suitable assortment of weights up to 2 pounds. With it, you can measure the exact weight of small objects, such as raw precious metals or trade goods, to help determine their worth.\n\n//''Spellbook.''// Essential for wizards, a spellbook is a leather-bound tome with 100 blank vellum pages suitable for recording spells.\n\n//''Spyglass.''// Objects viewed through a spyglass are magnified to twice their size.\n\n//''Tent.''// A simple and portable canvas shelter, a tent sleeps two.\n\n//''Tinderbox.''// This small container holds flint, fire steel, and tinder (usually dry cloth soaked in light oil) used to kindle a fire. Using it to light a torch — or anything else with abundant, exposed fuel — takes an action. Lighting any other fire takes 1 minute.\n\n//''Torch.''// A torch burns for 1 hour, providing bright light in a 20-foot radius and dim light for an additional 20 feet. If you make a melee attack with a burning torch and hit, it deals 1 fire damage.\n\n!!! Container Capacity\n\n|noborder alternate|k\n|!Container |!Capacity |\n|Backpack* |1 cubic foot/30 pounds of gear |\n|Barrel |40 gallons liquid, 4 cubic feet solid |\n|Basket |2 cubic feet/40 pounds of gear |\n|Bottle |1 1/2 pints liquid |\n|Bucket |3 gallons liquid, 1/2 cubic food solid |\n|Chest |12 cubic feet/300 pounds gear |\n|Flask or tankard |1 pint liquid |\n|Jug or pitcher |1 gallon liquid |\n|Pot, iron |1 gallon liquid |\n|Pouch |1/5 cubic foot/6 pounds of gear |\n|Sack |1 cubic foot/30 pounds of gear |\n|Vial |4 ounces liquid |\n|Waterskin |4 pints liquid |\n\n\u003C$text text=\"*\" />You can also strap items, such as a bedroll or a coil of rope, to the outside of a backpack.\n\n!! Equipment Packs\n\nThe starting equipment you get from your class includes a collection of useful adventuring gear, put together in a pack. The contents of these packs are listed here. If you are buying your starting equipment, you can purchase a pack for the price shown, which might be cheaper than buying the items individually.\n\n//''Burglar’s Pack (16 gp).''// Includes a backpack, a bag of 1,000 ball bearings, 10 feet of string, a bell, 5 candles, a crowbar, a hammer, 10 pitons, a hooded lantern, 2 flasks of oil, 5 days rations, a tinderbox, and a waterskin. The pack also has 50 feet of hempen rope strapped to the side of it.\n\n//''Diplomat’s Pack (39 gp).''// Includes a chest, 2 cases for maps and scrolls, a set of fine clothes, a bottle of ink, an ink pen, a lamp, 2 flasks of oil, 5 sheets of paper, a vial of perfume, sealing wax, and soap.\n\n//''Dungeoneer’s Pack (12 gp).''// Includes a backpack, a crowbar, a hammer, 10 pitons, 10 torches, a tinderbox, 10 days of rations, and a waterskin. The pack also has 50 feet of hempen rope strapped to the side of it.\n\n//''Entertainer’s Pack (40 gp).''// Includes a backpack, a bedroll, 2 costumes, 5 candles, 5 days of rations, a waterskin, and a disguise kit.\n\n//''Explorer’s Pack (10 gp).''// Includes a backpack, a bedroll, a mess kit, a tinderbox, 10 torches, 10 days of rations, and a waterskin. The pack also has 50 feet of hempen rope strapped to the side of it.\n\n//''Priest’s Pack (19 gp).''// Includes a backpack, a blanket, 10 candles, a tinderbox, an alms box, 2 blocks of incense, a censer, vestments, 2 days of rations, and a waterskin.\n\n//''Scholar’s Pack (40 gp).''// Includes a backpack, a book of lore, a bottle of ink, an ink pen, 10 sheets of parchment, a little bag of sand, and a small knife.","tags":"[[Player's Handbook]] Equipment","title":"Adventuring Gear","modified":"20260708173309941"},
{"created":"20260709150305591","text":"//Some rogues enhance their fine-honed skills of stealth and agility with magic, learning tricks of enchantment and illusion. These rogues include pickpockets and burglars, but also pranksters, mischief-makers, and a significant number of adventurers.//\n\n!! Spellcasting\n\nWhen you reach 3rd level, you gain the ability to cast spells.\n\n|noborder alternate|k\n|!Rogue Level|!Cantrips Known|!Spells Known|!Spell Slots Per Level|\u003C|\u003C|\u003C|\n|~|~|~|!1st|!2nd|!3rd|!4th|\n|  3rd | 3 | 3  | 2 | --- | --- | --- |\n|  4th | 3 | 4  | 3 | --- | --- | --- |\n|  5th | 3 | 4  | 3 | --- | --- | --- |\n|  6th | 3 | 4  | 3 | --- | --- | --- |\n|  7th | 3 | 5  | 4 |  2  | --- | --- |\n|  8th | 3 | 6  | 4 |  2  | --- | --- |\n|  9th | 3 | 6  | 4 |  2  | --- | --- |\n| 10th | 4 | 7  | 4 |  3  | --- | --- |\n| 11th | 4 | 8  | 4 |  3  | --- | --- |\n| 12th | 4 | 8  | 4 |  3  | --- | --- |\n| 13th | 4 | 9  | 4 |  3  |  2  | --- |\n| 14th | 4 | 10 | 4 |  3  |  2  | --- |\n| 15th | 4 | 10 | 4 |  3  |  2  | --- |\n| 16th | 4 | 11 | 4 |  3  |  3  | --- |\n| 17th | 4 | 11 | 4 |  3  |  3  | --- |\n| 18th | 4 | 11 | 4 |  3  |  3  | --- |\n| 19th | 4 | 12 | 4 |  3  |  3  |  1  |\n| 20th | 4 | 13 | 4 |  3  |  3  |  1  |\n\n''//Cantrips.//'' You learn three cantrips: [[Mage Hand]] and two other cantrips of your choice from the wizard spell list. You learn another wizard cantrip of your choice at 10th level.\n\n//''Spell Slots.''// The Arcane Trickster Spellcasting table shows how many spell slots you have to cast your wizard spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nFor example, if you know the 1st-level spell [[Charm Person]] and have a 1st-level and a 2nd-level spell slot available, you can cast [[Charm Person]] using either slot.\n\n//''Spells Known of 1st-Level and Higher.''// You know three 1st-level wizard spells of your choice, two of which you must choose from the enchantment and illusion spells on the wizard spell list.\n\nThe Spells Known column of the Arcane Trickster Spellcasting table shows when you learn more wizard spells of 1st level or higher. Each of these spells must be an enchantment or illusion spell of your choice, and must be of a level for which you have spell slots. For instance, when you reach 7th level in this class, you can learn one new spell of 1st or 2nd level.\n\nThe spells you learn at 8th, 14th, and 20th level can come from any school of magic.\n\nWhenever you gain a level in this class, you can replace one of the wizard spells you know with another spell of your choice from the wizard spell list. The new spell must be of a level for which you have spell slots, and it must be an enchantment or illusion spell, unless you’re replacing the spell you gained at 3rd, 8th, 14th, or 20th level from any school of magic.\n\n//''Spellcasting Ability.''// Intelligence is your spellcasting ability for your wizard spells, since you learn your spells through dedicated study and memorization. You use your Intelligence whenever a spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for a wizard spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Intelligence modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Intelligence modifier\n\n!! Mage Hand Legerdemain\n\nStarting at 3rd level, when you cast [[Mage Hand]], you can make the spectral hand invisible, and you can perform the following additional tasks with it:\n\n* You can stow one object the hand is holding in a container worn or carried by another creature.\n* You can retrieve an object in a container worn or carried by another creature.\n* You can use thieves’ tools to pick locks and disarm traps at range.\n\nYou can perform one of these tasks without being noticed by a creature if you succeed on a Dexterity (Sleight of Hand) check contested by the creature’s Wisdom (Perception) check.\n\nIn addition, you can use the bonus action granted by your Cunning Action to control the hand.\n\n!! Magical Ambush\n\nStarting at 9th level, if you are hidden from a creature when you cast a spell on it, the creature has disadvantage on any saving throw it makes against the spell this turn.\n\n!! Versatile Trickster\n\nAt 13th level, you gain the ability to distract targets with your [[Mage Hand]]. As a bonus action on your turn, you can designate a creature within 5 feet of the spectral hand created by the spell. Doing so gives you advantage on attack rolls against that creature until the end of the turn.\n\n!! Spell Thief\n\nAt 17th level, you gain the ability to magically steal the knowledge of how to cast a spell from another spellcaster.\n\nImmediately after a creature casts a spell that targets you or includes you in its area of effect, you can use your reaction to force the creature to make a saving throw with its spellcasting ability modifier. The DC equals your spell save DC. On a failed save, you negate the spell’s effect against you, and you steal the knowledge of the spell if it is at least 1st level and of a level you can cast (it doesn’t need to be a wizard spell). For the next 8 hours, you know the spell and can cast it using your spell slots. The creature can’t cast that spell until the 8 hours have passed.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","tags":"Subclasses Rogue [[Player's Handbook]]","title":"Arcane Trickster","modified":"20260709150959832"},
{"created":"20260707181609258","text":"''Armor Proficiency.'' Anyone can put on a suit of armor or strap a shield to an arm. Only those proficient in the armor’s use know how to wear it effectively, however. Your class gives you proficiency with certain types of armor. If you wear armor that you lack proficiency with, you have disadvantage on any ability check, saving throw, or attack roll that involves Strength or Dexterity, and you can’t cast spells.\n\n''Armor Class (AC).'' Armor protects its wearer from attacks. The armor (and shield) you wear determines your base Armor Class.\n\n''Heavy Armor.'' Heavier armor interferes with the wearer’s ability to move quickly, stealthily, and freely. If the Armor table shows \"Str 13\" or \"Str 15\" in the Strength column for an armor type, the armor reduces the wearer’s speed by 10 feet unless the wearer has a Strength score equal to or higher than the listed score.\n\n''Stealth.'' If the Armor table shows \"Disadvantage\" in the Stealth column, the wearer has disadvantage on Dexterity (Stealth) checks.\n\n''Shields.'' A shield is made from wood or metal and is carried in one hand. Wielding a shield increases your Armor Class by 2. You can benefit from only one shield at a time.\n\n|noborder alternate|k\n|!Armor Name     |\u003C|  !Cost   |!Armor Class (AC)         | !Strength |!Stealth     | !Weight |\n|//Light Armor// |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Padded          |   5 gp   |11 + Dex modifier         |    ---    |Disadvantage |  8 lb.  |\n| |Leather         |  10 gp   |11 + Dex modifier         |    ---    |---          | 10 lb.  |\n| |Studded Leather |  45 gp   |12 + Dex modifier         |    ---    |---          | 13 lb.  |\n|//Medium Armor// |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Hide            |  10 gp   |12 + Dex modifier (max 2) |    ---    |---          | 12 lb.  |\n| |Chain shirt     |  50 gp   |13 + Dex modifier (max 2) |    ---    |---          | 20 lb.  |\n| |Scale mail      |  50 gp   |14 + Dex modifier (max 2) |    ---    |Disadvantage | 45 lb.  |\n| |Breastplate     |  400 gp  |14 + Dex modifier (max 2) |    ---    |---          | 25 lb.  |\n| |Half plate      |  750 gp  |15 + Dex modifier (max 2) |    ---    |Disadvantage | 40 lb.  |\n|//Heavy Armor// |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Ring mail       |  30 gp   |14                        |    ---    |Disadvantage | 40 lb.  |\n| |Chain mail      |  75 gp   |16                        |   Str 13  |Disadvantage | 55 lb.  |\n| |Splint          |  200 gp  |17                        |   Str 13  |Disadvantage | 60 lb.  |\n| |Plate           | 1,500 gp |18                        |   Str 15  |Disadvantage | 65 lb.  |\n|//Shield// |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Shield          |  10 gp   |+2                        |    ---    |---          |  6 lb.  |\n\n!!! Light Armor\n\nMade from supple and thin materials, light armor favors agile adventurers since it offers some protection without sacrificing mobility. If you wear light armor, you add your Dexterity modifier to the base number from your armor type to determine your Armor Class.\n\n//''Padded.''// Padded armor consists of quilted layers of cloth and batting.\n\n//''Leather.''// The breastplate and shoulder protectors of this armor are made of leather that has been stiffened by being boiled in oil. The rest of the armor is made of softer and more flexible materials.\n\n//''Studded Leather.''// Made from tough but flexible leather, studded leather is reinforced with close-set rivets or spikes.\n\n!!! Medium Armor\n\nMedium armor offers more protection than light armor, but it also impairs movement more. If you wear medium armor, you add your Dexterity modifier, to a maximum of +2, to the base number from your armor type to determine your Armor Class.\n\n//''Hide.''// This crude armor consists of thick furs and pelts.\n\n//''Chain Shirt.''// Made of interlocking metal rings, a chain shirt is worn between layers of clothing or leather. This armor offers modest protection to the wearer’s upper body and allows the sound of the rings rubbing against one another to be muffled by outer layers.\n\n//''Scale Mail.''// This armor consists of a coat and leggings (and perhaps a separate skirt) of leather covered with overlapping pieces of metal, much like the scales of a fish. The suit includes gauntlets.\n\n//''Breastplate.''// This armor consists of a fitted metal chest piece worn with supple leather. Although it leaves the legs and arms relatively unprotected, this armor provides good protection for the wearer’s vital organs while leaving the wearer relatively unencumbered.\n\n//''Half Plate.''// Half plate consists of shaped metal plates that cover most of the wearer’s body. It does not include leg protection beyond simple greaves that are attached with leather straps.\n\n!!! Heavy Armor\n\nOf all the armor categories, heavy armor offers the best protection. These suits of armor cover the entire body and are designed to stop a wide range of attacks. Only proficient warriors can manage their weight and bulk.\n\nHeavy armor doesn’t let you add your Dexterity modifier to your Armor Class, but it also doesn’t penalize you if your Dexterity modifier is negative.\n\n//''Ring Mail.''// This armor is leather armor with heavy rings sewn into it. The rings help reinforce the armor against blows from swords and axes. Ring mail is inferior to chain mail, and it’s usually worn only by those who can’t afford better armor.\n\n//''Chain Mail.''// Made of interlocking metal rings, chain mail includes a layer of quilted fabric worn underneath the mail to prevent chafing and to cushion the impact of blows. The suit includes gauntlets.\n\n//''Splint.''// This armor is made of narrow vertical strips of metal riveted to a backing of leather that is worn over cloth padding. Flexible chain mail protects the joints.\n\n//''Plate.''// Plate consists of shaped, interlocking metal plates to cover the entire body. A suit of plate includes gauntlets, heavy leather boots, a visored helmet, and thick layers of padding underneath the armor. Buckles and straps distribute the weight over the body.\n\n!! Getting Into and Out of Armor\n\nThe time it takes to don or doff a type of armor or a shield is shown in the Donning and Doffing Armor table.\n\n//''Don.''// This is the time it takes to put on the item. You benefit from its AC only if you take the full time to don it.\n\n//''Doff.''// This is the time it takes to take off the item. If you have help removing armor, reduce this time by half.\n\n!!! Donning and Doffing Armor\n\n|noborder alternate|k\n|!Category    |!Don       |!Doff     |\n|Light Armor  |1 minute   |1 minute  |\n|Medium Armor |5 minutes  |1 minute  |\n|Heavy Armor  |10 minutes |5 minutes |\n|Shield       |1 action   |1 action  |","tags":"Equipment [[Player's Handbook]]","title":"Armor and Shields","modified":"20260707183448098"},
{"created":"20260713082456635","text":"//Artificers use a variety of tools to channel their arcane power. To cast a spell, an artificer might use alchemist’s supplies to create a potent elixir, calligrapher’s supplies to inscribe a sigil of power, or tinker’s tools to craft a temporary charm. The magic of artificers is tied to their tools and their talents, and few other characters can produce the right tool for a job as well as an artificer.//\n\n|noborder alternate|k\n|!Level|!PB|!Features |!Infusions Known|!Infused Items|!Cantrips Known|!Spell Slots per Spell Level|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|\n|  1st | +2 |Magical Tinkering, Spellcasting                  | --- | --- |  2  |  2  | --- | --- | --- | --- |\n|  2nd | +2 |Infuse Item                                      |  4  |  2  |  2  |  2  | --- | --- | --- | --- |\n|  3rd | +2 |Artificer Specialist, The Right Tool For The Job |  4  |  2  |  2  |  3  | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement                        |  4  |  2  |  2  |  3  | --- | --- | --- | --- |\n|  5th | +3 |Artificer Specialist Feature                     |  4  |  2  |  2  |  4  |  2  | --- | --- | --- |\n|  6th | +3 |Tool Expertise                                   |  6  |  3  |  2  |  4  |  2  | --- | --- | --- |\n|  7th | +3 |Flash of Genius                                  |  6  |  3  |  2  |  4  |  3  | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement                        |  6  |  3  |  2  |  4  |  3  | --- | --- | --- |\n|  9th | +4 |Artificer Specialist Feature                     |  6  |  3  |  2  |  4  |  3  |  2  | --- | --- |\n| 10th | +4 |Magic Item Adept                                 |  8  |  4  |  3  |  4  |  3  |  2  | --- | --- |\n| 11th | +4 |Spell-Storing Item                               |  8  |  4  |  3  |  4  |  3  |  3  | --- | --- |\n| 12th | +4 |Ability Score Improvement                        |  8  |  4  |  3  |  4  |  3  |  3  | --- | --- |\n| 13th | +5 |---                                              |  8  |  4  |  3  |  4  |  3  |  3  |  1  | --- |\n| 14th | +5 |Magic Item Savant                                | 10  |  5  |  4  |  4  |  3  |  3  |  1  | --- |\n| 15th | +5 |Artificer Specialist Feature                     | 10  |  5  |  4  |  4  |  3  |  3  |  2  | --- |\n| 16th | +5 |Ability Score Improvement                        | 10  |  5  |  4  |  4  |  3  |  3  |  2  | --- |\n| 17th | +6 |---                                              | 10  |  5  |  4  |  4  |  3  |  3  |  3  |  1  |\n| 18th | +6 |Magic Item Master                                | 12  |  6  |  4  |  4  |  3  |  3  |  3  |  1  |\n| 19th | +6 |Ability Score Improvement                        | 12  |  6  |  4  |  4  |  3  |  3  |  3  |  2  |\n| 20th | +6 |Soul of Artifice                                 | 12  |  6  |  4  |  4  |  3  |  3  |  3  |  2  |\n\n! Class Features\n\nAs an artificer, you gain the following class features.\n\n!!! Hit Points\n\n''Hit Dice:'' 1d8 per artificer level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per artificer level after 1st\n\n!!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields\n\n''Weapons:'' Simple weapons\n\n''Tools:'' Thieves’ tools, tinker’s tools, one type of artisan’s tools of your choice\n\n''Saving Throws:'' Constitution, Intelligence\n\n''Skills:'' Choose two from Arcana, History, Investigation, Medicine, Nature, Perception, Sleight of Hand\n\n!!! Firearm Proficiency\n\nThe secrets of gunpowder weapons have been discovered in various corners of the D&D multiverse. If your Dungeon Master uses the rules on firearms in the [[Dungeon Master's Guide]] and your artificer has been exposed to the operation of such weapons, your artificer is proficient with them.\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* any two [[simple weapons|Weapons]] of your choice\n* a [[light crossbow|Weapons]] and 20 [[bolts|Adventuring Gear]]\n* (//a//) [[studded leather armor|Armor and Shields]] or (//b//) [[scale mail|Armor and Shields]]\n* [[thieves’ tools|Tools]] and a [[dungeoneer’s pack|Adventuring Gear]]\n\nAlternatively, you may start with 5d4x10 gp to buy your equipment.\n\n!! Magical Tinkering\n\nAt 1st level, you've learned how to invest a spark of magic into mundane objects. To use this ability, you must have thieves' tools or artisan's tools in hand. You then touch a Tiny nonmagical object as an action and give it one of the following magical properties of your choice:\n\n* The object sheds bright light in a 5-foot radius and dim light for an additional 5 feet.\n* Whenever tapped by a creature, the object emits a recorded message that can be heard up to 10 feet away. You utter the message when you bestow this property on the object, and the recording can be no more than 6 seconds long.\n* The object continuously emits your choice of an odor or a nonverbal sound (wind, waves, chirping, or the like). The chosen phenomenon is perceivable up to 10 feet away.\n* A static visual effect appears on one of the object's surfaces. This effect can be a picture, up to 25 words of text, lines and shapes, or a mixture of these elements, as you like.\n\nThe chosen property lasts indefinitely. As an action, you can touch the object and end the property early.\n\nYou can bestow magic on multiple objects, touching one object each time you use this feature, though a single object can only bear one property at a time. The maximum number of objects you can affect with this feature at one time is equal to your Intelligence modifier (minimum of one object). If you try to exceed your maximum, the oldest property immediately ends, and then the new property applies.\n\n!! Spellcasting\n\nYou've studied the workings of magic and how to cast spells, channeling the magic through objects. To observers, you don't appear to be casting spells in a conventional way; you appear to produce wonders from mundane items and outlandish inventions.\n\n!!! Tools Required\n\nYou produce your artificer spell effects through your tools. You must have a spellcasting focus - specifically thieves' tools or some kind of artisan's tool - in hand when you cast any spell with this Spellcasting feature (meaning the spell has an \"M\" component when you cast it). You must be proficient with the tool to use it in this way.\n\nAfter you gain the Infuse Item feature at 2nd level, you can also use any item bearing one of your infusions as a spellcasting focus.\n\n!!! Cantrips (0-Level Spells)\n\nAt 1st level, you know two cantrips of your choice from the artificer spell list. At higher levels, you learn additional artificer cantrips of your choice, as shown in the Cantrips Known column of the Artificer table.\n\nWhen you gain a level in this class, you can replace one of the artificer cantrips you know with another cantrip from the artificer spell list.\n\n!!! Preparing and Casting Spells\n\nThe Artificer table shows how many spell slots you have to cast your artificer spells. To cast one of your artificer spells of 1st level or higher, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.\n\nYou prepare the list of artificer spells that are available for you to cast, choosing from the artificer spell list. When you do so, choose a number of artificer spells equal to your Intelligence modifier + half your artificer level, rounded down (minimum of one spell). The spells must be of a level for which you have spell slots.\n\nFor example, if you are a 5th-level artificer, you have four 1st-level and two 2nd-level spell slots. With an Intelligence of 14, your list of prepared spells can include four spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell Cure Wounds, you can cast it using a lst-level or a 2nd-level slot. Casting the spell doesn't remove it from your list of prepared spells.\n\nYou can change your list of prepared spells when you finish a long rest. Preparing a new list of artificer spells requires time spent tinkering with your spellcasting focuses: at least 1 minute per spell level for each spell on your list.\n\n!!! Spellcasting Ability\n\nIntelligence is your spellcasting ability for your artificer spells; your understanding of the theory behind magic allows you to wield these spells with superior skill. You use your Intelligence whenever an artificer spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for an artificer spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Intelligence modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Intelligence modifier\n\n!!! Ritual Casting\n\nYou can cast an artificer spell as a ritual if that spell has the ritual tag and you have the spell prepared.\n\n!! Infuse Item\n\nAt 2nd level, you gain the ability to imbue mundane items with certain magical infusions, turning those objects into magic items.\n\n!!! Infusions Known\n\nWhen you gain this feature, pick four artificer infusions to learn, choosing from the “Artificer Infusions” section at the end of the class’s description. You learn additional infusions of your choice when you reach certain levels in this class, as shown in the Infusions Known column of the Artificer table.\n\nWhenever you gain a level in this class, you can replace one of the artificer infusions you learned with a new one.\n\n!!! Infusing an Item\n\nWhenever you finish a long rest, you can touch a nonmagical object and imbue it with one of your artificer infusions, turning it into a magic item. An infusion works on only certain kinds of objects, as specified in the infusion’s description. If the item requires attunement, you can attune yourself to it the instant you infuse the item. If you decide to attune to the item later, you must do so using the normal process for attunement.\n\nYour infusion remains in an item indefinitely, but when you die, the infusion vanishes after a number of days equal to your Intelligence modifier (minimum of 1 day). The infusion also vanishes if you replace your knowledge of the infusion.\n\nYou can infuse more than one nonmagical object at the end of a long rest; the maximum number of objects appears in the Infused Items column of the Artificer table. You must touch each of the objects, and each of your infusions can be in only one object at a time. Moreover, no object can bear more than one of your infusions at a time. If you try to exceed your maximum number of infusions, the oldest infusion ends, and then the new infusion applies.\n\nIf an infusion ends on an item that contains other things, like a bag of holding, its contents harmlessly appear in and around its space.\n\n!! Artificer Specialist\n\nAt 3rd level, you choose the type of specialist you are. Your choice grants you features at 5th level and again at 9th and 15th level.\n\n* [[Alchemist]]{{$:/TCE}}\n* [[Armorer]]{{$:/TCE}}\n* [[Artillerist]]{{$:/TCE}}\n* [[Battle Smith]]{{$:/TCE}}\n\n!! The Right Tool for the Job\n\nAt 3rd level, you've learned how to produce exactly the tool you need: with thieves’ tools or artisan’s tools in hand, you can magically create one set of artisan’s tools in an unoccupied space within 5 feet of you. This creation requires 1 hour of uninterrupted work, which can coincide with a short or long rest. Though the product of magic, the tools are nonmagical, and they vanish when you use this feature again.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Tool Expertise\n\nAt 6th level, your proficiency bonus is now doubled for any ability check you make that uses your proficiency with a tool.\n\n!! Flash of Genius\n\nAt 7th level, you've gained the ability to come up with solutions under pressure. When you or another creature you can see within 30 feet of you makes an ability check or a saving throw, you can use your reaction to add your Intelligence modifier to the roll.\n\nYou can use this feature a number of times equal to your Intelligence modifier (minimum of once). You regain all expended uses when you finish a long rest.\n\n!! Magic Item Adept\n\nAt 10th level, you've achieved a profound understanding of how to use and make magic items:\n\n* You can attune to up to four magic items at once.\n* If you craft a magic item with a rarity of common or uncommon, it takes you a quarter of the normal time, and it costs you half as much of the usual gold.\n\n!! Spell-Storing Item\n\nAt 11th level, you can now store a spell in an object. Whenever you finish a long rest, you can touch one simple or martial weapon or one item that you can use as a spellcasting focus, and you store a spell in it, choosing a 1st- or 2nd-level spell from the artificer spell list that requires 1 action to cast (you needn’t have it prepared).\n\nWhile holding the object, a creature can take an action to produce the spell’s effect from it, using your spellcasting ability modifier. If the spell requires concentration, the creature must concentrate. The spell stays in the object until it’s been used a number of times equal to twice your Intelligence modifier (minimum of twice) or until you use this feature again to store a spell in an object.\n\n!! Magic Item Savant\n\nAt 14th level, your skill with magic items deepens:\n\n* You can attune to up to five magic items at once.\n* You ignore all class, race, spell, and level requirements on attuning to or using a magic item.\n\n!! Magic Item Master\n\nAt 18th level, you can now attune up to six magic items at once.\n\n!! Soul of Artifice\n\nAt 20th level, you have developed a mystical connection to your magic items, which you can draw on for protection:\n\n* You gain a +1 bonus to all saving throws per magic item you are currently attuned to.\n* If you’re reduced to 0 hit points but not killed outright, you can use your reaction to end one of your artificer infusions, causing you to drop to 1 hit point instead of 0.\n","title":"Artificer","modified":"20260713085511445","type":"","tags":"Classes [[Tasha's Cauldron of Everything]]"},
{"created":"20260709150153612","text":"//You focus your training on the grim art of death. Those who adhere to this archetype are diverse: hired killers, spies, bounty hunters, and even specially anointed priests trained to exterminate the enemies of their deity. Stealth, poison, and disguise help you eliminate your foes with deadly efficiency.//\n\n!! Bonus Proficiencies\n\nWhen you choose this archetype at 3rd level, you gain proficiency with the disguise kit and the poisoner’s kit.\n\n!! Assassinate\n\nStarting at 3rd level, you are at your deadliest when you get the drop on your enemies. You have advantage on attack rolls against any creature that hasn’t taken a turn in the combat yet. In addition, any hit you score against a creature that is surprised is a critical hit.\n\n!! Infiltration Expertise\n\nStarting at 9th level, you can unfailingly create false identities for yourself. You must spend seven days and 25 gp to establish the history, profession, and affiliations for an identity. You can’t establish an identity that belongs to someone else. For example, you might acquire appropriate clothing, letters of introduction, and official-looking certification to establish yourself as a member of a trading house from a remote city so you can insinuate yourself into the company of other wealthy merchants.\n\nThereafter, if you adopt the new identity as a disguise, other creatures believe you to be that person until given an obvious reason not to.\n\n!! Impostor\n\nAt 13th level, you gain the ability to unerringly mimic another person’s speech, writing, and behavior. You must spend at least three hours studying these three components of the person’s behavior, listening to speech, examining handwriting, and observing mannerisms.\n\nYour ruse is indiscernible to the casual observer. If a wary creature suspects something is amiss, you have advantage on any Charisma (Deception) check you make to avoid detection.\n\n!! Death Strike\n\nStarting at 17th level, you become a master of instant death. When you attack and hit a creature that is surprised, it must make a Constitution saving throw (DC 8 + your Dexterity modifier + your proficiency bonus). On a failed save, double the damage of your attack against the creature.","tags":"Subclasses Rogue [[Player's Handbook]]","title":"Assassin","modified":"20260709150237659"},
{"created":"20260706163603438","text":"//For some, their rage springs from a communion with fierce animal spirits. Others draw from a roiling reservoir of anger at a world full of pain. For every barbarian, rage is a power that fuels not just a battle frenzy but also uncanny reflexes, resilience, and feats of strength.//\n\n|noborder alternate|k\n|!Level| !PB |!Features                     |!Rages| !Rage Damage |\n| 1st  | +2  |Rage, Unarmored Defense       |  2   | +2 |\n| 2nd  | +2  |Reckless Attack, Danger Sense |  2   | +2 |\n| 3rd  | +2  |Primal Path                   |  3   | +2 |\n| 4th  | +2  |Ability Score Improvement     |  3   | +2 |\n| 5th  | +3  |Extra Attack, Fast Movement   |  3   | +2 |\n| 6th  | +3  |Path Feature                  |  4   | +2 |\n| 7th  | +3  |Feral Instinct                |  4   | +2 |\n| 8th  | +3  |Ability Score Improvement     |  4   | +2 |\n| 9th  | +4  |Brutal Critical (1 die)       |  4   | +3 |\n| 10th | +4  |Path Feature                  |  4   | +3 |\n| 11th | +4  |Relentless Rage               |  4   | +3 |\n| 12th | +4  |Ability Score Improvement     |  5   | +3 |\n| 13th | +5  |Brutal Critical (2 dice)      |  5   | +3 |\n| 14th | +5  |Path Feature                  |  5   | +3 |\n| 15th | +5  |Persistent Rage               |  5   | +3 |\n| 16th | +5  |Ability Score Improvement     |  5   | +4 |\n| 17th | +6  |Brutal Critical (3 dice)      |  6   | +4 |\n| 18th | +6  |Indomitable Might             |  6   | +4 |\n| 19th | +6  |Ability Score Improvement     |  6   | +4 |\n| 20th | +6  |Primal Champion               |Unlimited| +4 |\n\n! Class Features\n\nAs a barbarian, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d12 per barbarian level\n\n''Hit Points at 1st Level:'' 12 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d12 (or 7) + your Constitution modifier per barbarian level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields\n\n''Weapons:'' Simple weapons, martial weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Strength, Constitution\n\n''Skills:'' Choose two from Animal Handling, Athletics, Intimidation, Nature, Perception, and Survival\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[greataxe|Weapons]] or (//b//) any [[martial melee weapon|Weapons]]\n* (//a//) two [[handaxes|Weapons]] or (//b//) any [[simple weapon|Weapons]]\n* An [[explorer’s pack|Adventuring Gear]] and four [[javelins|Weapons]]\n\nAlternatively, you may start with 2d4x10 gp to buy your equipment.\n\n!! Rage\n\nIn battle, you fight with primal ferocity. On your turn, you can enter a rage as a bonus action.\n\nWhile raging, you gain the following benefits if you aren’t wearing heavy armor:\n\n* You have advantage on Strength checks and Strength saving throws.\n* When you make a melee weapon attack using Strength, you gain a bonus to the damage roll that increases as you gain levels as a barbarian, as shown in the Rage Damage column of the Barbarian table.\n* You have resistance to bludgeoning, piercing, and slashing damage.\n\nIf you are able to cast spells, you can’t cast them or concentrate on them while raging.\n\nYour rage lasts for 1 minute. It ends early if you are knocked unconscious or if your turn ends and you haven’t attacked a hostile creature since your last turn or taken damage since then. You can also end your rage on your turn as a bonus action.\n\nOnce you have raged the number of times shown for your barbarian level in the Rages column of the Barbarian table, you must finish a long rest before you can rage again.\n\n!! Unarmored Defense\n\nWhile you are not wearing any armor, your Armor Class equals 10 + your Dexterity modifier + your Constitution modifier. You can use a shield and still gain this benefit.\n\n!! Reckless Attack\n\nStarting at 2nd level, you can throw aside all concern for defense to attack with fierce desperation. When you make your first attack on your turn, you can decide to attack recklessly. Doing so gives you advantage on melee weapon attack rolls using Strength during this turn, but attack rolls against you have advantage until your next turn.\n\n!! Danger Sense\n\nAt 2nd level, you gain an uncanny sense of when things nearby aren’t as they should be, giving you an edge when you dodge away from danger.\n\nYou have advantage on Dexterity saving throws against effects that you can see, such as traps and spells. To gain this benefit, you can’t be blinded, deafened, or incapacitated.\n\n!! Primal Path\n\nAt 3rd level, you choose a path that shapes the nature of your rage. Your choice grants you features at 3rd level and again at 6th, 10th, and 14th levels.\n\n* [[Path of the Berserker]]{{$:/PHB}}\n* [[Path of the Totem Warrior]]{{$:/PHB}}\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Extra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Fast Movement\n\nStarting at 5th level, your speed increases by 10 feet while you aren’t wearing heavy armor.\n\n!! Feral Instinct\n\nBy 7th level, your instincts are so honed that you have advantage on initiative rolls.\n\nAdditionally, if you are surprised at the beginning of combat and aren’t incapacitated, you can act normally on your first turn, but only if you enter your rage before doing anything else on that turn.\n\n!! Brutal Critical\n\nBeginning at 9th level, you can roll one additional weapon damage die when determining the extra damage for a critical hit with a melee attack.\n\nThis increases to two additional dice at 13th level and three additional dice at 17th level.\n\n!! Relentless Rage\n\nStarting at 11th level, your rage can keep you fighting despite grievous wounds. If you drop to 0 hit points while you’re raging and don’t die outright, you can make a DC 10 Constitution saving throw. If you succeed, you drop to 1 hit point instead.\n\nEach time you use this feature after the first, the DC increases by 5. When you finish a short or long rest, the DC resets to 10.\n\n!! Persistent Rage\n\nBeginning at 15th level, your rage is so fierce that it ends early only if you fall unconscious or if you choose to end it.\n\n!! Indomitable Might\n\nBeginning at 18th level, if your total for a Strength check is less than your Strength score, you can use that score in place of the total.\n\n!! Primal Champion\n\nAt 20th level, you embody the power of the wilds. Your Strength and Constitution scores increase by 4. Your maximum for those scores is now 24.","tags":"Classes [[Player's Handbook]]","title":"Barbarian","modified":"20260713093037360"},
