{"created":"20260706170436041","text":"//Clerics are intermediaries between the mortal world and the distant planes of the gods. As varied as the gods they serve, clerics strive to embody the handiwork of their deities. No ordinary priest, a cleric is imbued with divine magic.//\n\n|noborder alternate|k\n| !Level | !PB |!Features | !Cantrips Known | !Spell Slots per Spell Level |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|!6th|!7th|!8th|!9th|\n|  1st | +2 |Spellcasting, Divine Domain                                             | 3 | 2 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |Channel Divinity (1/rest), Divine Domain Feature                        | 3 | 3 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  3rd | +2 |---                                                                     | 3 | 4 |  2  | --- | --- | --- | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement                                               | 4 | 4 |  3  | --- | --- | --- | --- | --- | --- | --- |\n|  5th | +3 |Destroy Undead (CR 1/2)                                                 | 4 | 4 |  3  |  2  | --- | --- | --- | --- | --- | --- |\n|  6th | +3 |Channel Divinity (2/rest), Divine Domain Feature                        | 4 | 4 |  3  |  3  | --- | --- | --- | --- | --- | --- |\n|  7th | +3 |---                                                                     | 4 | 4 |  3  |  3  |  1  | --- | --- | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement, Destroy Undead (CR 1), Divine Domain Feature | 4 | 4 |  3  |  3  |  2  | --- | --- | --- | --- | --- |\n|  9th | +4 |---                                                                     | 4 | 4 |  3  |  3  |  3  |  1  | --- | --- | --- | --- |\n| 10th | +4 |Divine Intervention                                                     | 5 | 4 |  3  |  3  |  3  |  2  | --- | --- | --- | --- |\n| 11th | +4 |Destroy Undead (CR 2)                                                   | 5 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 12th | +4 |Ability Score Improvement                                               | 5 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 13th | +5 |---                                                                     | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 14th | +5 |Destroy Undead (CR 3)                                                   | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 15th | +5 |---                                                                     | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 16th | +5 |Ability Score Improvement                                               | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 17th | +6 |Destroy Undead (CR 4), Divine Domain Feature                            | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  |  1  |\n| 18th | +6 |Channel Divinity (3/rest)                                               | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  |  1  |\n| 19th | +6 |Ability Score Improvement                                               | 5 | 4 |  3  |  3  |  3  |  2  |  2  |  1  |  1  |  1  |\n| 20th | +6 |Divine Intervention Improvement                                         | 5 | 4 |  3  |  3  |  3  |  2  |  2  |  2  |  1  |  1  |\n\n! Class Features\n\nAs a cleric, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per cleric level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per cleric level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields\n\n''Weapons:'' Simple weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Wisdom, Charisma\n\n''Skills:'' Choose two from History, Insight, Medicine, Persuasion, and Religion\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[mace|Weapons]] or (//b//) a [[warhammer|Weapons]] (if proficient)\n* (//a//) [[scale mail|Armor and Shields]], (//b//) [[leather armor|Armor and Shields]], or (//c//) [[chain mail|Armor and Shields]] (if proficient)\n* (//a//) a [[light crossbow|Weapons]] and 20 [[bolts|Adventuring Gear]] or (//b//) any [[simple weapon|Weapons]]\n* (//a//) a [[priest’s pack|Adventuring Gear]] or (//b//) an [[explorer’s pack|Adventuring Gear]]\n* A [[shield|Armor and Shields]] and a [[holy symbol|Adventuring Gear]]\n\nAlternatively, you may start with 5d4x10 gp to buy your equipment.\n\n!! Spellcasting\n\nAs a conduit for divine power, you can cast cleric spells.\n\n!!! Cantrips\n\nAt 1st level, you know three cantrips of your choice from the cleric spell list. You learn additional cleric cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Cleric table.\n\n!!! Preparing and Casting Spells\n\nThe Cleric table shows how many spell slots you have to cast your cleric spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nYou prepare the list of cleric spells that are available for you to cast, choosing from the cleric spell list. When you do so, choose a number of cleric spells equal to your Wisdom modifier + your cleric level (minimum of one spell). The spells must be of a level for which you have spell slots.\n\nFor example, if you are a 3rd-level cleric, you have four 1st-level and two 2nd-level spell slots. With a Wisdom of 16, your list of prepared spells can include six spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell [[Cure Wounds]], you can cast it using a 1st-level or 2nd-level slot. Casting the spell doesn’t remove it from your list of prepared spells.\n\nYou can change your list of prepared spells when you finish a long rest. Preparing a new list of cleric spells requires time spent in prayer and meditation: at least 1 minute per spell level for each spell on your list.\n\n!!! Spellcasting Ability\n\nWisdom is your spellcasting ability for your cleric spells. The power of your spells comes from your devotion to your deity. You use your Wisdom whenever a cleric spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a cleric spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Wisdom modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Wisdom modifier\n\n!!! Ritual Casting\n\nYou can cast a cleric spell as a ritual if that spell has the ritual tag and you have the spell prepared.\n\n!!! Spellcasting Focus\n\nYou can use a holy symbol as a spellcasting focus for your cleric spells.\n\n!! Divine Domain\n\nAt 1st level, you choose a domain shaped by your choice of Deity and the gifts they grant you. Your choice grants you domain spells and other features when you choose it at 1st level. It also grants you additional ways to use Channel Divinity when you gain that feature at 2nd level, and additional benefits at 6th, 8th, and 17th levels.\n\n* [[Death Domain]]{{$:/DMG}}\n* [[Knowledge Domain]]{{$:/PHB}}\n* [[Life Domain]]{{$:/PHB}}\n* [[Light Domain]]{{$:/PHB}}\n* [[Nature Domain]]{{$:/PHB}}\n* [[Tempest Domain]]{{$:/PHB}}\n* [[Trickery Domain]]{{$:/PHB}}\n* [[War Domain]]{{$:/PHB}}\n\n!!! Domain Spells\n\nEach domain has a list of spells — its domain spells — that you gain at the cleric levels noted in the domain description. Once you gain a domain spell, you always have it prepared, and it doesn’t count against the number of spells you can prepare each day.\n\nIf you have a domain spell that doesn’t appear on the cleric spell list, the spell is nonetheless a cleric spell for you.\n\n!! Channel Divinity\n\nAt 2nd level, you gain the ability to channel divine energy directly from your deity, using that energy to fuel magical effects. You start with two such effects: Turn Undead and an effect determined by your domain. Some domains grant you additional effects as you advance in levels, as noted in the domain description.\n\nWhen you use your Channel Divinity, you choose which effect to create. You must then finish a short or long rest to use your Channel Divinity again.\n\nSome Channel Divinity effects require saving throws. When you use such an effect from this class, the DC equals your cleric spell save DC.\n\nBeginning at 6th level, you can use your Channel Divinity twice between rests, and beginning at 18th level, you can use it three times between rests. When you finish a short or long rest, you regain your expended uses.\n\n!!! Channel Divinity: Turn Undead\n\nAs an action, you present your holy symbol and speak a prayer censuring the undead. Each undead that can see or hear you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is turned for 1 minute or until it takes any damage.\n\nA turned creature must spend its turns trying to move as far away from you as it can, and it can’t willingly move to a space within 30 feet of you. It also can’t take reactions. For its action, it can use only the Dash action or try to escape from an effect that prevents it from moving. If there’s nowhere to move, the creature can use the Dodge action.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Destroy Undead\n\nStarting at 5th level, when an undead fails its saving throw against your Turn Undead feature, the creature is instantly destroyed if its challenge rating is at or below a certain threshold, as shown in the Destroy Undead table.\n\n|noborder alternate|k\n| !Cleric Level |!Destroys Undead of CR... |\n| 5th  |1/2 or lower |\n| 8th  |1 or lower |\n| 11th |2 or lower |\n| 14th |3 or lower |\n| 17th |4 or lower |\n\n!! Divine Intervention\n\nBeginning at 10th level, you can call on your deity to intervene on your behalf when your need is great.\n\nImploring your deity’s aid requires you to use your action. Describe the assistance you seek, and roll percentile dice. If you roll a number equal to or lower than your cleric level, your deity intervenes. The DM chooses the nature of the intervention; the effect of any cleric spell or cleric domain spell would be appropriate.\n\nIf your deity intervenes, you can’t use this feature again for 7 days. Otherwise, you can use it again after you finish a long rest.\n\nAt 20th level, your call for intervention succeeds automatically, no roll required.","tags":"Classes [[Player's Handbook]]","title":"Cleric","modified":"20260713093223112"},
{"created":"20260513145716385","text":"//Bards of the College of Lore know something about most things, collecting bits of knowledge from sources as diverse as scholarly tomes and peasant tales. Whether singing folk ballads in taverns or elaborate compositions in royal courts, these bards use their gifts to hold audiences spellbound. When the applause dies down, the audience members might find themselves questioning everything they held to be true, from their faith in the priesthood of the local temple to their loyalty to the king.//\n\n//The loyalty of these bards lies in the pursuit of beauty and truth, not in fealty to a monarch or following the tenets of a deity. A noble who keeps such a bard as a herald or advisor knows that the bard would rather be honest than politic.//\n\n//The college’s members gather in libraries and sometimes in actual colleges, complete with classrooms and dormitories, to share their lore with one another. They also meet at festivals or affairs of state, where they can expose corruption, unravel lies, and poke fun at self-important figures of authority.//\n\n!! Bonus Proficiencies\n\nWhen you join the College of Lore at 3rd level, you gain proficiency with three skills of your choice.\n\n!! Cutting Words\n\nAlso at 3rd level, you learn how to use your wit to distract, confuse, and otherwise sap the confidence and competence of others. When a creature that you can see within 60 feet of you makes an attack roll, an ability check, or a damage roll, you can use your reaction to expend one of your uses of Bardic Inspiration, rolling a Bardic Inspiration die and subtracting the number rolled from the creature’s roll. You can choose to use this feature after the creature makes its roll, but before the DM determines whether the attack roll or ability check succeeds or fails, or before the creature deals its damage. The creature is immune if it can’t hear you or if it’s immune to being charmed.\n\n!! Additional Magical Secrets\n\nAt 6th level, you learn two spells of your choice from any class. A spell you choose must be of a level you can cast, as shown on the Bard table, or a cantrip. The chosen spells count as bard spells for you but don’t count against the number of bard spells you know.\n\n!! Peerless Skill\n\nStarting at 14th level, when you make an ability check, you can expend one use of Bardic Inspiration. Roll a Bardic Inspiration die and add the number rolled to your ability check. You can choose to do so after you roll the die for the ability check, but before the DM tells you whether you succeed or fail.","title":"College of Lore","modified":"20260707183526685","type":"","tags":"Subclasses Bard [[Player's Handbook]]"},
{"created":"20260706170316656","text":"//Bards of the College of Valor are daring skalds whose tales keep alive the memory of the great heroes of the past, and thereby inspire a new generation of heroes. These bards gather in mead halls or around great bonfires to sing the deeds of the mighty, both past and present. They travel the land to witness great events firsthand and to ensure that the memory of those events doesn’t pass from the world. With their songs, they inspire others to reach the same heights of accomplishment as the heroes of old.//\n\n!! Bonus Proficiencies\n\nWhen you join the College of Valor at 3rd level, you gain proficiency with medium armor, shields, and martial weapons.\n\n!! Combat Inspiration\n\nAlso at 3rd level, you learn to inspire others in battle. A creature that has a Bardic Inspiration die from you can roll that die and add the number rolled to a weapon damage roll it just made. Alternatively, when an attack roll is made against the creature, it can use its reaction to roll the Bardic Inspiration die and add the number rolled to its AC against that attack, after seeing the roll but before knowing whether it hits or misses.\n\n!! Extra Attack\n\nStarting at 6th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Battle Magic\n\nAt 14th level, you have mastered the art of weaving spellcasting and weapon use into a single harmonious act. When you use your action to cast a bard spell, you can make one weapon attack as a bonus action.","title":"College of Valor","modified":"20260707183534217","type":"","tags":"Bard Subclasses [[Player's Handbook]]"},
{"created":"20260710130140633","text":"You are an experienced criminal with a history of breaking the law. You have spent a lot of time among other criminals and still have contacts within the criminal underworld. You’re far closer than most people to the world of murder, theft, and violence that pervades the underbelly of civilization, and you have survived up to this point by flouting the rules and regulations of society.\n\n''Skill Proficiencies:'' Deception, Stealth\n\n''Tool Proficiencies:'' One type of gaming set, thieves' tools\n\n''Equipment:'' A [[crowbar|Adventuring Gear]], a set of dark [[common clothes|Adventuring Gear]] including a hood, and a [[pouch|Adventuring Gear]] containing 15 gp\n\n!! Criminal Specialty\n\nThere are many kinds of criminals, and within a thieves’ guild or similar criminal organization, individual members have particular specialties. Even criminals who operate outside of such organizations have strong preferences for certain kinds of crimes over others. Choose the role you played in your criminal life, or roll on the table below.\n\n|noborder alternate|k\n|!d8|!Specialty |\n| 1 |Blackmailer |\n| 2 |Burglar |\n| 3 |Enforcer |\n| 4 |Fence |\n| 5 |Highway robber |\n| 6 |Hired killer |\n| 7 |Pickpocket |\n| 8 |Smuggler |\n\n!! Feature: Criminal Contact\n\nYou have a reliable and trustworthy contact who acts as your liaison to a network of other criminals. You know how to get messages to and from your contact, even over great distances; specifically, you know the local messengers, corrupt caravan masters, and seedy sailors who can deliver messages for you.\n\n!! Suggested Characteristics\n\nCriminals might seem like villains on the surface, and many of them are villainous to the core. But some have an abundance of endearing, if not redeeming, characteristics. There might be honor among thieves, but criminals rarely show any respect for law or authority.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I always have a plan for what to do when things go wrong. |\n| 2 |I am always calm, no matter what the situation. I never raise my voice or let my emotions control me. |\n| 3 |The first thing I do in a new place is note the locations of everything valuable — or where such things could be hidden. |\n| 4 |I would rather make a new friend than a new enemy. |\n| 5 |I am incredibly slow to trust. Those who seem the fairest often have the most to hide. |\n| 6 |I don’t pay attention to the risks in a situation. Never tell me the odds. |\n| 7 |The best way to get me to do something is to tell me I can’t do it. |\n| 8 |I blow up at the slightest insult. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Honor.'' I don’t steal from others in the trade. (Lawful) |\n| 2 |''Freedom.'' Chains are meant to be broken, as are those who would forge them. (Chaotic) |\n| 3 |''Charity.'' I steal from the wealthy so that I can help people in need. (Good) |\n| 4 |''Greed.'' I will do whatever it takes to become wealthy. (Evil) |\n| 5 |''People.'' I’m loyal to my friends, not to any ideals, and everyone else can take a trip down the Styx for all I care. (Neutral) |\n| 6 |''Redemption.'' There’s a spark of good in everyone. (Good) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |I'm trying to pay off an old debt I owe to a generous benefactor. |\n| 2 |My ill-gotten gains go to support my family. |\n| 3 |Something important was taken from me, and I aim to steal it back. |\n| 4 |I will become the greatest thief that ever lived. |\n| 5 |I'm guilty of a terrible crime. I hope I can redeem myself for it. |\n| 6 |Someone I loved died because of a mistake I made. That will never happen again. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |When I see something valuable, I can’t think about anything but how to steal it. |\n| 2 |When faced with a choice between money and my friends, I usually choose the money. |\n| 3 |If there’s a plan, I’ll forget it. If I don’t forget it, I’ll ignore it. |\n| 4 |I have a “tell” that reveals when I’m lying. |\n| 5 |I turn tail and run when things look bad. |\n| 6 |An innocent person is in prison for a crime that I committed. I’m okay with that. |\n\n!! Variant Criminal: Spy\n\nAlthough your capabilities are not much different from those of a burglar or smuggler, you learned and practiced them in a very different context: as an espionage agent. You might have been an officially sanctioned agent of the crown, or perhaps you sold the secrets you uncovered to the highest bidder.","tags":"Background [[Player's Handbook]]","title":"Criminal","modified":"20260710131112112"},
{"created":"20260713073705707","text":"//The Death domain is concerned with the forces that cause death, as well as the negative energy that gives rise to undead creatures. Deities such as Chemosh, Myrkul, and Wee Jas are patrons of necromancers, death knights, liches, mummy lords, and vampires. Gods of the Death domain also embody murder (Anubis, Bhaal, and Pyremius), pain (Iuz or Loviatar), disease or poison (Incabulos, Talona, or Morgion), and the underworld (Hades and Hel).//\n\n!!! Death Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[False Life]], [[Ray of Sickness]] |\n| 3rd |[[Blindness/Deafness]], [[Ray of Enfeeblement]] |\n| 5th |[[Animate Dead]], [[Vampiric Touch]] |\n| 7th |[[Blight]], [[Death Ward]] |\n| 9th |[[Antilife Shell]], [[Cloudkill]] |\n\n!! Bonus Proficiency\n\nWhen the cleric chooses this domain at 1st level, he or she gains proficiency with martial weapons.\n\n!! Reaper\n\nAt 1st level, the cleric learns one necromancy cantrip of his or her choice from any spell list. When the cleric casts a necromancy cantrip that normally targets only one creature, the spell can instead target two creatures within range and within 5 feet of each other.\n\n!! Channel Divinity: Touch of Death\n\nStarting at 2nd level, the cleric can use Channel Divinity to destroy another creature’s life force by touch.\n\nWhen the cleric hits a creature with a melee attack, the cleric can use Channel Divinity to deal extra necrotic damage to the target. The damage equals 5 + twice his or her cleric level.\n\n!! Inescapable Destruction\n\nStarting at 6th level, the cleric’s ability to channel negative energy becomes more potent. Necrotic damage dealt by the character’s cleric spells and Channel Divinity options ignores resistance to necrotic damage.\n\n!! Divine Strike\n\nAt 8th level, the cleric gains the ability to infuse his or her weapon strikes with necrotic energy. Once on each of the cleric’s turns when he or she hits a creature with a weapon attack, the cleric can cause the attack to deal an extra 1d8 necrotic damage to the target. When the cleric reaches 14th level, the extra damage increases to 2d8.\n\n!! Improved Reaper\n\nStarting at 17th level, when the cleric casts a necromancy spell of 1st through 5th level that targets only one creature, the spell can instead target two creatures within range and within 5 feet of each other. If the spell consumes its material components, the cleric must provide them for each target.","tags":"Cleric Subclasses [[Dungeon Master's Guide]]","title":"Death Domain","modified":"20260713073911496"},
{"created":"20260709182825497","text":"//Your innate magic comes from draconic magic that was mingled with your blood or that of your ancestors. Most often, sorcerers with this origin trace their descent back to a mighty sorcerer of ancient times who made a bargain with a dragon or who might even have claimed a dragon parent. Some of these bloodlines are well established in the world, but most are obscure. Any given sorcerer could be the first of a new bloodline, as a result of a pact or some other exceptional circumstance.//\n\n!! Dragon Ancestor\n\nAt 1st level, you choose one type of dragon as your ancestor. The damage type associated with each dragon is used by features you gain later.\n\n!!! Draconic Ancestry\n\n|noborder alternate|k\n|!Dragon |!Damage Type |\n|Black  |Acid |\n|Blue   |Lightning |\n|Brass  |Fire |\n|Bronze |Lightning |\n|Copper |Acid |\n|Gold   |Fire |\n|Green  |Poison |\n|Red    |Fire |\n|Silver |Cold |\n|White  |Cold |\n\nYou can speak, read, and write Draconic. Additionally, whenever you make a Charisma check when interacting with dragons, your proficiency bonus is doubled if it applies to the check.\n\n!! Draconic Resilience\n\nAs magic flows through your body, it causes physical traits of your dragon ancestors to emerge. At 1st level, your hit point maximum increases by 1 and increases by 1 again whenever you gain a level in this class.\n\nAdditionally, parts of your skin are covered by a thin sheen of dragon-like scales. When you aren’t wearing armor, your AC equals 13 + your Dexterity modifier.\n\n!! Elemental Affinity\n\nStarting at 6th level, when you cast a spell that deals damage of the type associated with your draconic ancestry, you can add your Charisma modifier to one damage roll of that spell. At the same time, you can spend 1 sorcery point to gain resistance to that damage type for 1 hour.\n\n!! Dragon Wings\n\nAt 14th level, you gain the ability to sprout a pair of dragon wings from your back, gaining a flying speed equal to your current speed. You can create these wings as a bonus action on your turn. They last until you dismiss them as a bonus action on your turn.\n\nYou can’t manifest your wings while wearing armor unless the armor is made to accommodate them, and clothing not made to accommodate your wings might be destroyed when you manifest them.\n\n!! Draconic Presence\n\nBeginning at 18th level, you can channel the dread presence of your dragon ancestor, causing those around you to become awestruck or frightened. As an action, you can spend 5 sorcery points to draw on this power and exude an aura of awe or fear (your choice) to a distance of 60 feet. For 1 minute or until you lose your concentration (as if you were casting a concentration spell), each hostile creature that starts its turn in this aura must succeed on a Wisdom saving throw or be charmed (if you chose awe) or frightened (if you chose fear) until the aura ends. A creature that succeeds on this saving throw is immune to your aura for 24 hours.","title":"Draconic Bloodline","modified":"20260709183043194","type":"","tags":"Sorcerer [[Player's Handbook]] Subclasses"},
{"created":"20260711125912238","text":"//Dragons are winged reptiles of ancient lineage and\nfearsome power, with the oldest dragons accounted\nas some of the most powerful creatures in the world.\nDragons are also magical creatures whose innate\npower fuels their dreaded breath weapons and other\npreternatural abilities.//\n\n//When a dragon in polymorphed form mates with\nanother creature, the union sometimes produces\nmixed-parentage offspring. The result is a creature\nthat combines the essence of a dragon with the form\nof its other parent. Regardless of their origins, all\nthose with draconic parentage have similar traits and\nappearance, gaining either resistance to destructive\nenergy or a breath weapon.//\n\n! Changeling Traits\n\n!! Breath Weapon (7 Points)\nYou can use your action to exhale destructive energy.\nYour draconic parentage determines the size, shape,\nand damage type of the exhalation.\n\nWhen you use your breath weapon, each creature\nin the area of the exhalation must make a saving\nthrow, the type of which is determined by your\ndraconic parentage. The DC for this saving throw\nequals 8 + your Constitution modifier + your\nproficiency bonus. A creature takes 2d6 damage on a\nfailed save, and half as much damage on a successful\none. The damage increases to 3d6 at 6th level, 4d6 at\n11th level, and 5d6 at 16th level.\n\nAfter you use your breath weapon, you can’t use it\nagain until you complete a short or long rest.\n\n!! Damage Resistance (3 Points)\nYou have resistance to the damage type associated\nwith your draconic parentage.\n\n!! Darkvision (4 Points)\nYou have superior vision in dark and dim conditions.\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!!! Draconic Parentage\n\n|noborder alternate|k\n|!Dragon |!Damage Type |!Breath Weapon |\n|Black  |Acid      |5 by 30 ft. line (Dex. save) |\n|Blue   |Lightning |5 by 30 ft. line (Dex. save) |\n|Brass  |Fire      |5 by 30 ft. line (Dex. save) |\n|Bronze |Lightning |5 by 30 ft. line (Dex. save) |\n|Copper |Acid      |5 by 30 ft. line (Dex. save) |\n|Gold   |Fire      |15 ft. cone (Dex. save) |\n|Green  |Poison    |15 ft. cone (Con. save) |\n|Red    |Fire      |15 ft. cone (Dex. save) |\n|Silver |Cold      |15 ft. cone (Con. save) |\n|White  |Cold      |15 ft. cone (Con. save) |","tags":"Parentage [[Elf & Orc 1]]","title":"Draconic Parentage","modified":"20260711130217617"},
{"created":"20260708091053178","text":"//Whether calling on the elemental forces of nature or emulating the creatures of the animal world, druids are an embodiment of nature’s resilience, cunning, and fury. They claim no mastery over nature. Instead, they see themselves as extensions of nature’s indomitable will.//\n\n|noborder alternate|k\n| !Level | !PB |!Features | !Cantrips Known | !Spell Slots per Spell Level |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|!6th|!7th|!8th|!9th|\n|  1st | +2 |Druidic, Spellcasting                             | 2 | 2 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |Wild Shape, Druid Circle                          | 2 | 3 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  3rd | +2 |---                                               | 2 | 4 |  2  | --- | --- | --- | --- | --- | --- | --- |\n|  4th | +2 |Wild Shape Improvement, Ability Score Improvement | 3 | 4 |  3  | --- | --- | --- | --- | --- | --- | --- |\n|  5th | +3 |---                                               | 3 | 4 |  3  |  2  | --- | --- | --- | --- | --- | --- |\n|  6th | +3 |Druid Circle Feature                              | 3 | 4 |  3  |  3  | --- | --- | --- | --- | --- | --- |\n|  7th | +3 |---                                               | 3 | 4 |  3  |  3  |  1  | --- | --- | --- | --- | --- |\n|  8th | +3 |Wild Shape Improvement, Ability Score Improvement | 3 | 4 |  3  |  3  |  2  | --- | --- | --- | --- | --- |\n|  9th | +4 |---                                               | 3 | 4 |  3  |  3  |  3  |  1  | --- | --- | --- | --- |\n| 10th | +4 |Druid Circle Feature                              | 4 | 4 |  3  |  3  |  3  |  2  | --- | --- | --- | --- |\n| 11th | +4 |---                                               | 4 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 12th | +4 |Ability Score Improvement                         | 4 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 13th | +5 |---                                               | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 14th | +5 |Druid Circle Feature                              | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 15th | +5 |---                                               | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 16th | +5 |Ability Score Improvement                         | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 17th | +6 |---                                               | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  |  1  |\n| 18th | +6 |Timeless Body, Beast Spells                       | 4 | 4 |  3  |  3  |  3  |  3  |  1  |  1  |  1  |  1  |\n| 19th | +6 |Ability Score Improvement                         | 4 | 4 |  3  |  3  |  3  |  3  |  2  |  1  |  1  |  1  |\n| 20th | +6 |Archdruid                                         | 4 | 4 |  3  |  3  |  3  |  3  |  2  |  2  |  1  |  1  |\n\n! Class Features\n\nAs a druid, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per druid level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per druid level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields (druids will not wear armor or use shields made of metal)\n\n''Weapons:'' Clubs, daggers, darts, javelins, maces, quarterstaffs, scimitars, sickles, slings, spears\n\n''Tools:'' Herbalism kit\n\n''Saving Throws:'' Intelligence, Wisdom\n\n''Skills:'' Choose two from Arcana, Animal Handling, Insight, Medicine, Nature, Perception, Religion, and Survival\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a wooden [[shield|Armor and Shields]] or (//b//) any [[simple weapon|Weapons]]\n* (//a//) a [[scimitar|Weapons]] or (//b//) any [[simple melee weapon|Weapons]]\n* [[Leather armor|Armor and Shields]], an [[explorer’s pack|Adventuring Gear]], and a [[druidic focus|Adventuring Gear]]\n\nAlternatively, you may start with 2d4x10 gp to buy your equipment.\n\n!! Druidic\n\nYou know Druidic, the secret language of druids. You can speak the language and use it to leave hidden messages. You and others who know this language automatically spot such a message. Others spot the message’s presence with a successful DC 15 Wisdom (Perception) check but can’t decipher it without magic.\n\n!! Spellcasting\n\nDrawing on the divine essence of nature itself, you can cast spells to shape that essence to your will.\n\n!!! Cantrips\n\nAt 1st level, you know two cantrips of your choice from the druid spell list. You learn additional druid cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Druid table.\n\n!!! Preparing and Casting Spells\n\nThe Druid table shows how many spell slots you have to cast your druid spells of 1st level and higher. To cast one of these druid spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nYou prepare the list of druid spells that are available for you to cast, choosing from the druid spell list. When you do so, choose a number of druid spells equal to your Wisdom modifier + your druid level (minimum of one spell). The spells must be of a level for which you have spell slots.\n\nFor example, if you are a 3rd-level druid, you have four 1st-level and two 2nd-level spell slots. With a Wisdom of 16, your list of prepared spells can include six spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell cure wounds, you can cast it using a 1st-level or 2nd-level slot. Casting the spell doesn’t remove it from your list of prepared spells.\n\nYou can also change your list of prepared spells when you finish a long rest. Preparing a new list of druid spells requires time spent in prayer and meditation: at least 1 minute per spell level for each spell on your list.\n\n!!! Spellcasting Ability\n\nWisdom is your spellcasting ability for your druid spells, since your magic draws upon your devotion and attunement to nature. You use your Wisdom whenever a spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a druid spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Wisdom modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Wisdom modifier\n\n!!! Ritual Casting\n\nYou can cast a druid spell as a ritual if that spell has the ritual tag and you have the spell prepared.\nSpellcasting Focus\n\nYou can use a [[druidic focus|Adventuring Gear]] as a spellcasting focus for your druid spells.\n\n!! Wild Shape\n\nStarting at 2nd level, you can use your action to magically assume the shape of a beast that you have seen before. You can use this feature twice. You regain expended uses when you finish a short or long rest.\n\nYour druid level determines the beasts you can transform into, as shown in the Beast Shapes table. At 2nd level, for example, you can transform into any beast that has a challenge rating of 1/4 or lower that doesn’t have a flying or swimming speed.\n\n!!! Beast Shapes\n\n|!Level|!Max. CR|!Limitations |!Example |\n| 2nd  |  1/4   |No flying or swimming speed |Wolf |\n| 4th  |  1/2   |No flying speed |Crocodile |\n| 6th  |   1    |--- |Giant eagle |\n\nYou can stay in a beast shape for a number of hours equal to half your druid level (rounded down). You then revert to your normal form unless you expend another use of this feature. You can revert to your normal form earlier by using a bonus action on your turn. You automatically revert if you fall unconscious, drop to 0 hit points, or die.\n\nWhile you are transformed, the following rules apply:\n\n* Your game statistics are replaced by the statistics of the beast, but you retain your alignment, personality, and Intelligence, Wisdom, and Charisma scores. You also retain all of your skill and saving throw proficiencies, in addition to gaining those of the creature. If the creature has the same proficiency as you and the bonus in its stat block is higher than yours, use the creature’s bonus instead of yours. If the creature has any legendary or lair actions, you can’t use them.\n* When you transform, you assume the beast’s hit points and Hit Dice. When you revert to your normal form, you return to the number of hit points you had before you transformed. However, if you revert as a result of dropping to 0 hit points, any excess damage carries over to your normal form. For example, if you take 10 damage in animal form and have only 1 hit point left, you revert and take 9 damage. As long as the excess damage doesn’t reduce your normal form to 0 hit points, you aren’t knocked unconscious.\n* You can’t cast spells, and your ability to speak or take any action that requires hands is limited to the capabilities of your beast form. Transforming doesn’t break your concentration on a spell you’ve already cast, however, or prevent you from taking actions that are part of a spell, such as [[Call Lightning]], that you’ve already cast.\n* You retain the benefit of any features from your class, race, or other source and can use them if the new form is physically capable of doing so. However, you can’t use any of your special senses, such as darkvision, unless your new form also has that sense.\n* You choose whether your equipment falls to the ground in your space, merges into your new form, or is worn by it. Worn equipment functions as normal, but the DM decides whether it is practical for the new form to wear a piece of equipment, based on the creature’s shape and size. Your equipment doesn’t change size or shape to match the new form, and any equipment that the new form can’t wear must either fall to the ground or merge with it. Equipment that merges with the form has no effect until you leave the form.\n\n!! Druid Circle\n\nAt 2nd level, you choose to identify with a circle of druids. Your choice grants you features at 2nd level and again at 6th, 10th, and 14th level.\n\n* [[Circle of the Land]]{{$:/PHB}}\n* [[Circle of the Moon]]{{$:/PHB}}\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Timeless Body\n\nStarting at 18th level, the primal magic that you wield causes you to age more slowly. For every 10 years that pass, your body ages only 1 year.\n\n!! Beast Spells\n\nBeginning at 18th level, you can cast many of your druid spells in any shape you assume using Wild Shape. You can perform the somatic and verbal components of a druid spell while in a beast shape, but you aren’t able to provide material components.\n\n!! Archdruid\n\nAt 20th level, you can use your Wild Shape an unlimited number of times.\n\nAdditionally, you can ignore the verbal and somatic components of your druid spells, as well as any material components that lack a cost and aren’t consumed by a spell. You gain this benefit in both your normal shape and your beast shape from Wild Shape.","tags":"Classes [[Player's Handbook]]","title":"Druid","modified":"20260713093244980"},

{"created":"20260711130256504","text":"//Though they stand well under 5 feet tall, dwarves are\nso broad and compact that they can weigh as much\nas a human standing nearly two feet taller.//\n\n//Dwarven skin ranges from black to a paler hue\ntinged with red, but the most common shades are\nlight brown or deep tan earthen tones. Their hair is\nusually black, gray, or brown, though paler dwarves\noften have red hair. Dwarven beards grow fuller,\nthicker, and faster than those of humans.//\n\n//Dwarves can live to be more than 400 years old, so\nthe oldest living dwarves often remember a very\ndifferent world. This longevity grants them a\nperspective on the world that shorter-lived peoples\nsuch as humans and halflings lack.//\n\n//Dwarves come in three physiologically distinct\ntypes: hill, mountain, and gray. All adapted to life\nunderground, but at different depths. Hill dwarves\nadapted closest to the surface, mountain dwarves a\nlittle deeper, and gray dwarves adapted to a life\ntotally bereft of sunshine. Of course, whatever your\ndwarven parentage, you are free to live wherever you\nfeel most at home.//\n\n! Dwarven Traits\n\n!! Darkvision (4 Points)\nYou have superior vision in dark and dim conditions.\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Duergar Magic (6 Points)\nWhen you reach 3rd level, you can cast the\nenlarge/reduce spell on yourself once with this trait,\nusing only the spell’s enlarge option. When you reach\n5th level, you can cast the invisibility spell on yourself\nonce with this trait. You don’t need material\ncomponents for either spell, and you can’t cast them\nwhile you’re in direct sunlight, although sunlight has\nno effect on them once cast. You regain the ability to\ncast these spells with this trait when you finish a long\nrest.\n\nYou can also cast these spells using any spell slots\nyou have of the appropriate level. Intelligence is your\nspellcasting ability for these spells.\n\n!! Duergar Resilience\nYou have advantage on saving throws against\nillusions and against being charmed or paralyzed.\n\n!! Dwarven Resilience (5 Points)\nYou have advantage on saving throws against poison,\nand you have resistance against poison damage.\n\n!! Dwarven Toughness (5 Points)\nYour hit point maximum increases by 1, and it\nincreases by 1 every time you gain a level.\n\n!! Long-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively long.\n\n!! Stocky (–1 Points)\nYour base speed reduces to 25 feet. Your speed is not\nfurther reduced by wearing heavy armor.\n\n!! Strong (4 Points)\nYour Strength score increases by 1. You can’t\nincrease an ability score above 17 using this trait.\n\n!! Sunlight Sensitivity (–6 Points)\nYou have disadvantage on attack rolls and on\nWisdom (Perception) checks that rely on sight when\nyou, the target of your attack, or whatever you are\ntrying to perceive is in direct sunlight.\n\n!! Superior Darkvision (2 Points)\nIf you inherit darkvision from your other birth parent,\nincrease your darkvision’s range by 60 feet.","tags":"Parentage [[Elf & Orc 1]]","title":"Dwarven Parentage","modified":"20260711130441137"},
{"created":"20260709191129758","text":"If an eldritch invocation has prerequisites, you must meet them to learn it. You can learn the invocation at the same time that you meet its prerequisites. A level prerequisite refers to your level in this class.\n\n!! Agonizing Blast\n\n//Prerequisite: Eldritch Blast cantrip//\n\nWhen you cast [[Eldritch Blast]], add your Charisma modifier to the damage it deals on a hit.\n\n!! Armor of Shadows\n\nYou can cast [[Mage Armor]] on yourself at will, without expending a spell slot or material components.\n\n!! Ascendant Step\n\n//Prerequisite: 9th level//\n\nYou can cast [[Levitate]] on yourself at will, without expending a spell slot or material components.\n\n!! Beast Speech\n\nYou can cast [[Speak with Animals]] at will, without expending a spell slot.\n\n!! Beguiling Influence\n\nYou gain proficiency in the Deception and Persuasion skills.\n\n!! Bewitching Whispers\n\n//Prerequisite: 7th level//\n\nYou can cast [[Compulsion]] once using a warlock spell slot. You can’t do so again until you finish a long rest.\n\n!! Book of Ancient Secrets\n\n//Prerequisite: Pact of the Tome feature//\n\nYou can now inscribe magical rituals in your Book of Shadows. Choose two 1st-level spells that have the ritual tag from any class’s spell list (the two needn’t be from the same list). The spells appear in the book and don’t count against the number of spells you know. With your Book of Shadows in hand, you can cast the chosen spells as rituals. You can’t cast the spells except as rituals, unless you’ve learned them by some other means. You can also cast a warlock spell you know as a ritual if it has the ritual tag.\n\nOn your adventures, you can add other ritual spells to your Book of Shadows. When you find such a spell, you can add it to the book if the spell’s level is equal to or less than half your warlock level (rounded up) and if you can spare the time to transcribe the spell. For each level of the spell, the transcription process takes 2 hours and costs 50 gp for the rare inks needed to inscribe it.\n\n!! Chains of Carceri\n\n//Prerequisite: 15th level, Pact of the Chain feature//\n\nYou can cast [[Hold Monster]] at will — targeting a celestial, fiend, or elemental — without expending a spell slot or material components. You must finish a long rest before you can use this invocation on the same creature again.\n\n!! Devil’s Sight\n\nYou can see normally in darkness, both magical and nonmagical, to a distance of 120 feet.\n\n!! Dreadful Word\n\n//Prerequisite: 7th level//\n\nYou can cast [[Confusion]] once using a warlock spell slot. You can’t do so again until you finish a long rest.\n\n!! Eldritch Sight\n\nYou can cast [[Detect Magic]] at will, without expending a spell slot.\n\n!! Eldritch Spear\n\n//Prerequisite: Eldritch Blast cantrip//\n\nWhen you cast [[Eldritch Blast]], its range is 300 feet.\n\n!! Eyes of the Rune Keeper\n\nYou can read all writing.\n\n!! Fiendish Vigor\n\nYou can cast [[False Life]] on yourself at will as a 1st-level spell, without expending a spell slot or material components.\n\n!! Gaze of Two Minds\n\nYou can use your action to touch a willing humanoid and perceive through its senses until the end of your next turn. As long as the creature is on the same plane of existence as you, you can use your action on subsequent turns to maintain this connection, extending the duration until the end of your next turn. While perceiving through the other creature’s senses, you benefit from any special senses possessed by that creature, and you are blinded and deafened to your own surroundings.\n\n!! Lifedrinker\n\n//Prerequisite: 12th level, Pact of the Blade feature//\n\nWhen you hit a creature with your pact weapon, the creature takes extra necrotic damage equal to your Charisma modifier (minimum 1).\n\n!! Mask of Many Faces\n\nYou can cast [[Disguise Self]] at will, without expending a spell slot.\n\n!! Master of Myriad Forms\n\n//Prerequisite: 15th level//\n\nYou can cast [[Alter Self]] at will, without expending a spell slot.\n\n!! Minions of Chaos\n\n//Prerequisite: 9th level//\n\nYou can cast [[Conjure Elemental]] once using a warlock spell slot. You can’t do so again until you finish a long rest.\n\n!! Mire the Mind\n\n//Prerequisite: 5th level//\n\nYou can cast [[Slow]] once using a warlock spell slot. You can’t do so again until you finish a long rest.\n\n!! Misty Visions\n\nYou can cast [[Silent Image]] at will, without expending a spell slot or material components.\n\n!! One with Shadows\n\n//Prerequisite: 5th level//\n\nWhen you are in an area of dim light or darkness, you can use your action to become invisible until you move or take an action or a reaction.\n\n!! Otherworldly Leap\n\n//Prerequisite: 9th level//\n\nYou can cast jump on yourself at will, without expending a spell slot or material components.\n\n!! Repelling Blast\n\n//Prerequisite: Eldritch Blast cantrip//\n\nWhen you hit a creature with [[Eldritch Blast]], you can push the creature up to 10 feet away from you in a straight line.\n\n!! Sculptor of Flesh\n\n//Prerequisite: 7th level//\n\nYou can cast [[Polymorph]] once using a warlock spell slot. You can’t do so again until you finish a long rest.\n\n!! Sign of Ill Omen\n\n//Prerequisite: 5th level//\n\nYou can cast [[Bestow Curse]] once using a warlock spell slot. You can’t do so again until you finish a long rest.\n\n!! Thief of Five Fates\n\nYou can cast [[Bane]] once using a warlock spell slot. You can’t do so again until you finish a long rest.\n\n!! Thirsting Blade\n\n//Prerequisite: 5th level, Pact of the Blade feature//\n\nYou can attack with your pact weapon twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Visions of Distant Realms\n\n//Prerequisite: 15th level//\n\nYou can cast [[Arcane Eye]] at will, without expending a spell slot.\n\n!! Voice of the Chain Master\n\n//Prerequisite: Pact of the Chain feature//\n\nYou can communicate telepathically with your familiar and perceive through your familiar’s senses as long as you are on the same plane of existence. Additionally, while perceiving through your familiar’s senses, you can also speak through your familiar in your own voice, even if your familiar is normally incapable of speech.\n\n!! Whispers of the Grave\n\n//Prerequisite: 9th level//\n\nYou can cast [[Speak with Dead]] at will, without expending a spell slot.\n\n!! Witch Sight\n\n//Prerequisite: 15th level//\n\nYou can see the true form of any shapechanger or creature concealed by illusion or transmutation magic while the creature is within 30 feet of you and within line of sight.","title":"Eldritch Invocations","modified":"20260709191854578","type":"","tags":"[[Player's Handbook]] Warlock"},
{"created":"20260709070156488","text":"//The archetypal Eldritch Knight combines the martial mastery common to all fighters with a careful study of magic. Eldritch Knights use magical techniques similar to those practiced by wizards. They focus their study on two of the eight schools of magic: abjuration and evocation. Abjuration spells grant an Eldritch Knight additional protection in battle, and evocation spells deal damage to many foes at once, extending the fighter’s reach in combat. These knights learn a comparatively small number of spells, committing them to memory instead of keeping them in a spellbook.//\n\n!!! Eldritch Knight Spellcasting\n\n|noborder alternate|k\n| !Fighter Level | !Cantrips Known | !Spells Known | !Spell Slots Per Level |\u003C|\u003C|\u003C|\n|~|~|~| !1st | !2nd | !3rd | !4th |\n|  3rd | 2 |  3 | 2 | --- | --- | --- |\n|  4th | 2 |  4 | 3 | --- | --- | --- |\n|  5th | 2 |  4 | 3 | --- | --- | --- |\n|  6th | 2 |  4 | 3 | --- | --- | --- |\n|  7th | 2 |  5 | 4 |  2  | --- | --- |\n|  8th | 2 |  6 | 4 |  2  | --- | --- |\n|  9th | 2 |  6 | 4 |  2  | --- | --- |\n| 10th | 3 |  7 | 4 |  3  | --- | --- |\n| 11th | 3 |  8 | 4 |  3  | --- | --- |\n| 12th | 3 |  8 | 4 |  3  | --- | --- |\n| 13th | 3 |  9 | 4 |  3  |  2  | --- |\n| 14th | 3 | 10 | 4 |  3  |  2  | --- |\n| 15th | 3 | 10 | 4 |  3  |  2  | --- |\n| 16th | 3 | 11 | 4 |  3  |  3  | --- |\n| 17th | 3 | 11 | 4 |  3  |  3  | --- |\n| 18th | 3 | 11 | 4 |  3  |  3  | --- |\n| 19th | 3 | 12 | 4 |  3  |  3  |  1  |\n| 20th | 3 | 13 | 4 |  3  |  3  |  1  |\n\n!! Spellcasting\n\nWhen you reach 3rd level, you augment your martial prowess with the ability to cast spells.\n\n!!! Cantrips \n\nYou learn two cantrips of your choice from the wizard spell list. You learn an additional wizard cantrip of your choice at 10th level.\n\n!!! Spell Slots\n\nThe Eldritch Knight Spellcasting table shows how many spell slots you have to cast your wizard spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nFor example, if you know the 1st-level spell shield and have a 1st-level and a 2nd-level spell slot available, you can cast shield using either slot.\n\n!!! Spells Known of 1st-Level and Higher\n\nYou know three 1st-level wizard spells of your choice, two of which you must choose from the abjuration and evocation spells on the wizard spell list.\n\nThe Spells Known column of the Eldritch Knight Spellcasting table shows when you learn more wizard spells of 1st level or higher. Each of these spells must be an abjuration or evocation spell of your choice, and must be of a level for which you have spell slots. For instance, when you reach 7th level in this class, you can learn one new spell of 1st or 2nd level.\n\nThe spells you learn at 8th, 14th, and 20th level can come from any school of magic.\n\nWhenever you gain a level in this class, you can replace one of the wizard spells you know with another spell of your choice from the wizard spell list. The new spell must be of a level for which you have spell slots, and it must be an abjuration or evocation spell, unless you’re replacing the spell you gained at 3rd, 8th, 14th, or 20th level from any school of magic.\n\n!!! Spellcasting Ability\n\nIntelligence is your spellcasting ability for your wizard spells, since you learn your spells through study and memorization. You use your Intelligence whenever a spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for a wizard spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Intelligence modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Intelligence modifier\n\n!! Weapon Bond\n\nAt 3rd level, you learn a ritual that creates a magical bond between yourself and one weapon. You perform the ritual over the course of 1 hour, which can be done during a short rest. The weapon must be within your reach throughout the ritual, at the conclusion of which you touch the weapon and forge the bond.\n\nOnce you have bonded a weapon to yourself, you can’t be disarmed of that weapon unless you are incapacitated. If it is on the same plane of existence, you can summon that weapon as a bonus action on your turn, causing it to teleport instantly to your hand.\n\nYou can have up to two bonded weapons, but can summon only one at a time with your bonus action. If you attempt to bond with a third weapon, you must break the bond with one of the other two.\n\n!! War Magic\n\nBeginning at 7th level, when you use your action to cast a cantrip, you can make one weapon attack as a bonus action.\n\n!! Eldritch Strike\n\nAt 10th level, you learn how to make your weapon strikes undercut a creature’s resistance to your spells. When you hit a creature with a weapon attack, that creature has disadvantage on the next saving throw it makes against a spell you cast before the end of your next turn.\n\n!! Arcane Charge\n\nAt 15th level, you gain the ability to teleport up to 30 feet to an unoccupied space you can see when you use your Action Surge. You can teleport before or after the additional action.\n\n!! Improved War Magic\n\nStarting at 18th level, when you use your action to cast a spell, you can make one weapon attack as a bonus action.","tags":"Subclasses [[Player's Handbook]] Fighter","title":"Eldritch Knight","modified":"20260709190924425"},
{"created":"20260711130447806","text":"//Genies are rare elemental creatures out of story and\nlegend. Only a few can be found on the Material\nPlane. The rest reside on the Elemental Planes,\nwhere they typically rule from lavish palaces.//\n\n//A genie is born when the soul of a sentient living\ncreature melds with an elemental plane’s primordial\nmatter. Only under rare circumstances does such an\nelemental-infused soul coalesce into a manifest form\nand create a genie.//\n\n//A genie usually retains no connection to the soul\nthat gave it form. That life force is a building block\nthat determines the genie’s form and one or two key\npersonality traits.//\n\n//Although they resemble humanoid beings, genies\nare elemental spirits given physical form. A genie\nwith a stronger connection to its mortal soul might\nchoose to sire a child with a mortal, although such\noffspring, called genasi, are rare.//\n\n! Elemental Traits\n\n!! Acid Resistance (3 Points)\nYou have resistance to acid damage.\n\n!! Amphibious (1 Point)\nYou can breathe air and water.\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. Your ties to the Elemental Planes make your\ndarkvision unusual: everything you see in darkness is\nin a shade of red.\n\n!! Djinni Resistances (5 Points)\nYou have resistance to lightning and thunder\ndamage.\n\n!! Earth Walk (1 Point)\nYou can move across difficult terrain made of earth\nor stone without expending extra movement.\n\n!! Fire Resistance (3 Points)\nYou have resistance to fire damage.\n\n!! Natural Armor (2 Points)\nWhen you aren’t wearing armor, your AC is 12 + your\nConstitution modifier. You can use your natural\narmor to determine your AC if the armor you wear\nwould leave you with a lower AC. A shield’s benefits\napply as normal while you use your natural armor.\n\n!! Petrification Resistance (2 Points)\nYou have advantage on saving throws against being\npetrified.\n\n!! Swim (2 Points)\nYou have a swimming speed of 30 feet.\n\n!! Unending Breath (1 Point)\nYou can hold your breath indefinitely while you’re not\nincapacitated.","tags":"Parentage [[Elf & Orc 1]]","title":"Elemental Parentage","modified":"20260711130614846"},
{"created":"20260711130617285","text":"//Elves are known for their sharp facial features. They\nare slightly shorter than humans, ranging from well\nunder 5 feet tall to just over 6 feet. They are more\nslender than humans, weighing only 100 to 145\npounds.//\n\n//Elves’ coloration encompasses the normal human\nrange and also includes skin in shades of copper,\nbronze, purple, and almost bluish-white, hair of\ngreen or blue, and eyes like pools of liquid gold or\nsilver. Most elves have no facial and little body hair.//\n\n//Elves can live for centuries, giving them a broad\nperspective on events. Since they are so long-lived,\nthey can enjoy centuries of exploration, discovery,\nrelaxation, or any other pursuit.//\n\n//Elves have adapted to a number of different\nenvironments. Some live deep in the forest or jungle,\nswift and trackless, while others live by or near the\nsea, giving them aquatic adaptations. Still other elves\nlive their lives underground, giving them unrivaled\neyesight and innate magicks.//\n\n//Some elves have spilled beyond the Material\nPlane, entering other realms and staying for\ncountless generations. The elves known as the\neladrin have adapted to the vibrant Feywild while the\nshadar-kai elves can survive in the gloomy\nShadowfell.//\n\n! Elven Traits\n\n!! Child of the Sea (3 Points)\nYou have a swimming speed of 30 feet, and you can\nbreathe air and water.\n\n!! Darkvision (4 Points)\nYou have superior vision in dark and dim conditions.\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Drow Magic (6 Points)\nYou know the [[Dancing Lights]] cantrip. When you reach\n3rd level, you can cast the [[Faerie Fire]] spell once with\nthis trait and regain the ability to do so when you\nfinish a long rest. When you reach 5th level, you can\ncast the [[Darkness]] spell once with this trait and\nregain the ability to do so when you finish a long rest.\n\nYou can also cast these spells using any spell slots\nyou have of the appropriate level. Charisma is your\nspellcasting ability for these spells.\n\n!! Fey Ancestry (3 Points)\nYou have advantage on saving throws against being\ncharmed, and magic can’t put you to sleep.\n\n!! Fey Step (8 Points)\nAs a bonus action, you can magically teleport up to\n30 feet to an unoccupied space you can see. Once\nyou use this trait, you can’t do so again until you\nfinish a long rest.\n\nWhen you reach 3rd level, your Fey Step trait gains\nan additional effect based on your season; if the\neffect requires a saving throw, the DC equals 8 +\nyour proficiency bonus + your Charisma modifier.\n\n//''Autumn.''// Immediately after you use your Fey Step,\nup to two creatures of your choice that you can see\nwithin 10 feet of you must succeed on a Wisdom\nsaving throw or be charmed by you for 1 minute, or\nuntil you or your companions deal any damage to it.\n\n//''Winter.''// When you use your Fey Step, one creature\nof your choice that you can see within 5 feet of you\nbefore you teleport must succeed on a Wisdom\nsaving throw or be frightened of you until the end of\nyour next turn.\n\n//''Spring.''// When you use your Fey Step, you can\ntouch one willing creature within 5 feet of you. That\ncreature then teleports instead of you, appearing in\nan unoccupied space of your choice that you can see\nwithin 30 feet of you.\n\n//''Summer.''// Immediately after you use your Fey Step,\neach creature of your choice that you can see within\n5 feet of you takes fire damage equal to your\nCharisma modifier (minimum of 1 damage).\n\n!! Fleet of Foot (2 Points)\nYour base speed increases by 5 feet.\n\n!! Keen Senses (2 Points)\nYou have proficiency in the Perception skill.\n\n!! Long-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively long.\n\n!! Necrotic Resistance (2 Points)\nYou have resistance to necrotic damage.\nSunlight Sensitivity (–6 Points)\nYou have disadvantage on attack rolls and on\nWisdom (Perception) checks that rely on sight when\nyou, the target of your attack, or whatever you are\ntrying to perceive is in direct sunlight.\n\n!! Superior Darkvision (2 Points)\nIf you inherit darkvision from your other birth parent,\nincrease your darkvision’s range by 60 feet.\n\n!! Sylvan Magic (2 Points)\nWhen you reach 5th level, you can cast the pass\nwithout trace spell once with this trait, and you\nregain the ability to cast it this way when you finish a\nlong rest.\n\nYou can also cast this spell using any spell slots\nyou have of the appropriate level. Wisdom is your\nspellcasting ability for this spell.\n\n!! Trance (1 Point)\nYou don’t need to sleep. Instead, you meditate deeply,\nremaining semiconscious, for 4 hours a day. (The\nCommon word for such meditation is “trance.”) After\nresting in this way, you gain the same benefit that a\nhuman does from 8 hours of sleep.","tags":"Parentage [[Elf & Orc 1]]","title":"Elven Parentage","modified":"20260711130914108"},
{"created":"20260710130804089","text":"You thrive in front of an audience. You know how to entrance them, entertain them, and even inspire them. Your poetics can stir the hearts of those who hear you, awakening grief or joy, laughter or anger. Your music raises their spirits or captures their sorrow. Your dance steps captivate, your humor cuts to the quick. Whatever techniques you use, your art is your life.\n\n''Skill Proficiencies:'' Acrobatics, Performance\n\n''Tool Proficiencies:'' Disguise kit, one type of musical instrument\n\n''Equipment:'' A [[musical instrument|Tools]] (one of your choice), the favor of an admirer (love letter, lock of hair, or trinket), a [[costume|Adventuring Gear]], and a [[pouch|Adventuring Gear]] containing 15 gp\n\n!! Entertainer Routines\n\nA good entertainer is versatile, spicing up every performance with a variety of different routines. Choose one to three routines or roll on the table below to define your expertise as an entertainer.\n\n|noborder alternate|k\n|!d10|!Entertainer Routine |\n| 1 |Actor |\n| 2 |Dancer |\n| 3 |Fire-eater |\n| 4 |Jester |\n| 5 |Juggler |\n| 6 |Instrumentalist |\n| 7 |Poet |\n| 8 |Singer |\n| 9 |Storyteller |\n| 10 |Tumbler |\n\n!! Feature: By Popular Demand\n\nYou can always find a place to perform, usually in an inn or tavern but possibly with a circus, at a theater, or even in a noble’s court. At such a place, you receive free lodging and food of a modest or comfortable standard (depending on the quality of the establishment), as long as you perform each night. In addition, your performance makes you something of a local figure. When strangers recognize you in a town where you have performed, they typically take a liking to you.\n\n!! Suggested Characteristics\n\nSuccessful entertainers have to be able to capture and hold an audience’s attention, so they tend to have flamboyant or forceful personalities. They’re inclined toward the romantic and often cling to high-minded ideals about the practice of art and the appreciation of beauty.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I know a story relevant to almost every situation. |\n| 2 |Whenever I come to a new place, I collect local rumors and spread gossip. |\n| 3 |I’m a hopeless romantic, always searching for that “special someone.” |\n| 4 |Nobody stays angry at me or around me for long, since I can defuse any amount of tension. |\n| 5 |I love a good insult, even one directed at me. |\n| 6 |I get bitter if I’m not the center of attention. |\n| 7 |I’ll settle for nothing less than perfection. |\n| 8 |I change my mood or my mind as quickly as I change key in a song. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Beauty.'' When I perform, I make the world better than it was. (Good) |\n| 2 |''Tradition.'' The stories, legends, and songs of the past must never be forgotten, for they teach us who we are. (Lawful) |\n| 3 |''Creativity.'' The world is in need of new ideas and bold action. (Chaotic) |\n| 4 |''Greed.'' I’m only in it for the money and fame. (Evil) |\n| 5 |''People.'' I like seeing the smiles on people’s faces when I perform. That’s all that matters. (Neutral) |\n| 6 |''Honesty.'' Art should reflect the soul; it should come from within and reveal who we really are. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |My instrument is my most treasured possession, and it reminds me of someone I love. |\n| 2 |Someone stole my precious instrument, and someday I’ll get it back. |\n| 3 |I want to be famous, whatever it takes. |\n| 4 |I idolize a hero of the old tales and measure my deeds against that person’s. |\n| 5 |I will do anything to prove myself superior to my hated rival. |\n| 6 |I would do anything for the other members of my old troupe. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |I’ll do anything to win fame and renown. |\n| 2 |I’m a sucker for a pretty face. |\n| 3 |A scandal prevents me from ever going home again. That kind of trouble seems to follow me around. |\n| 4 |I once satirized a noble who still wants my head. It was a mistake that I will likely repeat. |\n| 5 |I have trouble keeping my true feelings hidden. My sharp tongue lands me in trouble. |\n| 6 |Despite my best efforts, I am unreliable to my friends. |\n\n!! Variant Entertainer: Gladiator\n\nA gladiator is as much an entertainer as any minstrel or circus performer, trained to make the arts of combat into a spectacle the crowd can enjoy. This kind of flashy combat is your entertainer routine, though you might also have some skills as a tumbler or actor. Using your By Popular Demand feature, you can find a place to perform in any place that features combat for entertainment — perhaps a gladiatorial arena or secret pit fighting club. You can replace the musical instrument in your equipment package with an inexpensive but unusual weapon, such as a trident or net.","tags":"Background [[Player's Handbook]]","title":"Entertainer","modified":"20260714014730944"},
{"created":"20260713092818647","text":"//The marketplace of a large city teems with buyers and sellers of many sorts: dwarf smiths and elf woodcarvers, halfling farmers and gnome jewelers, not to mention humans of every shape, size, and color drawn from a spectrum of nations and cultures. In the largest cities, almost anything imaginable is offered for sale, from exotic spices and luxurious clothing to wicker baskets and practical swords.//\n\n//For an adventurer, the availability of armor, weapons, backpacks, rope, and similar goods is of paramount importance, since proper equipment can mean the difference between life and death in a dungeon or the untamed wilds. This chapter details the mundane and exotic merchandise that adventurers commonly find useful in the face of the threats that the worlds of D&D present.//\n\n! Starting Equipment\n\nWhen you create your character, you receive equipment based on a combination of your class and background. Alternatively, you can start with a number of gold pieces based on your class and spend them on items from the lists in this chapter. See the Starting Wealth by Class table in the [[Wealth]] article to determine how much gold you have to spend.\n\nYou decide how your character came by this starting equipment. It might have been an inheritance, or goods that the character purchased during his or her upbringing. You might have been equipped with a weapon, armor, and a backpack as part of military service. You might even have stolen your gear. A weapon could be a family heirloom, passed down from generation to generation until your character finally took up the mantle and followed in an ancestor’s adventurous footsteps.\n\n''See the following articles for rules and details for various types of equipment.''\n\n* [[Wealth]]\n* [[Armor and Shields]]\n* [[Weapons]]\n* [[Adventuring Gear]]\n* [[Tools]]\n* [[Mounts and Vehicles]]\n* [[Trade Goods]]\n* [[Expenses]]\n* [[Trinkets]]","title":"Equipment","modified":"20260713094637148","type":"","tags":"[[General Rules]]"},
{"created":"20260708115530086","text":"//Fighters all share an unparalleled mastery with weapons and armor, and a thorough knowledge of the skills of combat. And they are well acquainted with death, both meting it out and staring it defiantly in the face.//\n\n|noborder alternate|k\n| !Level | !PB |!Features |\n|  1st | +2 |Fighting Style, Second Wind |\n|  2nd | +2 |Action Surge (one use)                            |\n|  3rd | +2 |Martial Archetype                                 |\n|  4th | +2 |Ability Score Improvement                         |\n|  5th | +3 |Extra Attack                                      |\n|  6th | +3 |Ability Score Improvement                         |\n|  7th | +3 |Martial Archetype Feature                         |\n|  8th | +3 |Ability Score Improvement                         |\n|  9th | +4 |Indomitable (one use)                             |\n| 10th | +4 |Martial Archetype Feature                         |\n| 11th | +4 |Extra Attack (2)                                  |\n| 12th | +4 |Ability Score Improvement                         |\n| 13th | +5 |Indomitable (two uses)                            |\n| 14th | +5 |Ability Score Improvement                         |\n| 15th | +5 |Martial Archetype Feature                         |\n| 16th | +5 |Ability Score Improvement                         |\n| 17th | +6 |Action Surge (two uses), Indomitable (three uses) |\n| 18th | +6 |Martial Archetype Feature                         |\n| 19th | +6 |Ability Score Improvement                         |\n| 20th | +6 |Extra Attack (3)                                  |\n\n! Class Features\n\nAs a fighter, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d10 per fighter level\n\n''Hit Points at 1st Level:'' 10 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d10 (or 6) + your Constitution modifier per fighter level after 1st\n\n!! Proficiencies\n\n''Armor:'' All armor, shields\n\n''Weapons:'' Simple weapons, martial weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Strength, Constitution\n\n''Skills:'' Choose two skills from Acrobatics, Animal Handling, Athletics, History, Insight, Intimidation, Perception, and Survival\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) [[chain mail|Armor and Shields]] or (//b//) [[leather armor|Armor and Shields]], [[longbow|Weapons]], and 20 [[arrows|Adventuring Gear]]\n* (//a//) a [[martial weapon|Weapons]] and a [[shield|Armor and Shields]] or (//b//) two [[martial weapons|Weapons]]\n* (//a//) a [[light crossbow|Weapons]] and 20 [[bolts|Adventuring Gear]] or (//b//) two [[handaxes|Weapons]]\n* (//a//) a [[dungeoneer’s pack|Adventuring Gear]] or (//b//) an [[explorer’s pack|Adventuring Gear]]\n\nAlternatively, you may start with 5d4x10 gp to buy your equipment.\n\n!! Fighting Style\n\nYou adopt a particular style of fighting as your specialty. Choose one of the following options. You can’t take a Fighting Style option more than once, even if you later get to choose again.\n\n!!! Archery\n\nYou gain a +2 bonus to attack rolls you make with ranged weapons.\n\n!!! Defense\n\nWhile you are wearing armor, you gain a +1 bonus to AC.\n\n!!! Dueling\n\nWhen you are wielding a melee weapon in one hand and no other weapons, you gain a +2 bonus to damage rolls with that weapon.\n\n!!! Great Weapon Fighting\n\nWhen you roll a 1 or 2 on a damage die for an attack you make with a melee weapon that you are wielding with two hands, you can reroll the die and must use the new roll, even if the new roll is a 1 or a 2. The weapon must have the two-handed or versatile property for you to gain this benefit.\n\n!!! Protection\n\nWhen a creature you can see attacks a target other than you that is within 5 feet of you, you can use your reaction to impose disadvantage on the attack roll. You must be wielding a shield.\n\n!!! Two-Weapon Fighting\n\nWhen you engage in two-weapon fighting, you can add your ability modifier to the damage of the second attack.\n\n!! Second Wind\n\nYou have a limited well of stamina that you can draw on to protect yourself from harm. On your turn, you can use a bonus action to regain hit points equal to 1d10 + your fighter level. Once you use this feature, you must finish a short or long rest before you can use it again.\n\n!! Action Surge\n\nStarting at 2nd level, you can push yourself beyond your normal limits for a moment. On your turn, you can take one additional action.\n\nOnce you use this feature, you must finish a short or long rest before you can use it again. Starting at 17th level, you can use it twice before a rest, but only once on the same turn.\n\n!! Martial Archetype\n\nAt 3rd level, you choose an archetype that you strive to emulate in your combat styles and techniques. The archetype you choose grants you features at 3rd level and again at 7th, 10th, 15th, and 18th level.\n\n* [[Battle Master]]{{$:/PHB}}\n* [[Champion]]{{$:/PHB}}\n* [[Eldritch Knight]]{{$:/PHB}}\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 6th, 8th, 12th, 14th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Extra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\nThe number of attacks increases to three when you reach 11th level in this class and to four when you reach 20th level in this class.\n\n!! Indomitable\n\nBeginning at 9th level, you can reroll a saving throw that you fail. If you do so, you must use the new roll, and you can’t use this feature again until you finish a long rest.\n\nYou can use this feature twice between long rests starting at 13th level and three times between long rests starting at 17th level.","tags":"Classes [[Player's Handbook]]","title":"Fighter","modified":"20260713093306702"},
{"created":"20260711130916972","text":"//Firbolgs are adapted to life in the deep forest.\nThough they stand between 7 and 8 feet tall and\nweigh between 240 and 300 pounds, they prove\ndifficult to track due to their innate magic. Between\nshort bursts of invisibility and certain illusory\nmagicks, firbolg are masters of elusion.//\n\n//Firbolgs have bluish skin or a thin covering of pale\nblue hair. They also have a pink nose and long ears.\nIn addition to their blue coat of fur, most firbolg sport\na second coat of hair that covers their heads. Some\nfirbolgs can grow beards with it as well.//\n\n! Firbolg Traits\n\n!! Firbolg Magic (8 Points)\nYou can cast [[Detect Magic]] and [[Disguise Self]] with this\ntrait. Once you cast either spell, you can’t cast it again\nwith this trait until you finish a short or long rest.\nWhen you use this version of [[Disguise Self]], you can\nseem to be the height of humans or elves, allowing\nyou to more easily blend in.\n\nYou can also cast these spells using any spell slots\nyou have of the appropriate level. Wisdom is your\nspellcasting ability for these spells.\n\n!! Long-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively long.\n\n!! Hidden Step (5 Points)\nAs a bonus action, you can magically turn invisible\nuntil the start of your next turn or until you attack,\nmake a damage roll, or force someone to make a\nsaving throw. Once you use this trait, you can’t use it\nagain until you finish a short or long rest.\n\n!! Powerful Build (1 Point)\nYou count as one size larger when determining your\ncarrying capacity and the weight you can push, drag,\nor lift.","tags":"Parentage [[Elf & Orc 1]]","title":"Firbolg Parentage","modified":"20260711131053751"},
{"created":"20260710132206017","text":"You come from a humble social rank, but you are destined for so much more. Already the people of your home village regard you as their champion, and your destiny calls you to stand against the tyrants and monsters that threaten the common folk everywhere.\n\n''Skill Proficiencies:'' Animal Handling, Survival\n\n''Tool Proficiencies:'' One type of artisan’s tools, vehicles (land)\n\n''Equipment:'' A set of artisan’s tools (one of your choice), a [[shovel|Adventuring Gear]], an [[iron pot|Adventuring Gear]], a set of [[common clothes|Adventuring Gear]], and a [[pouch|Adventuring Gear]] containing 10 gp\n\n!! Defining Event\n\nYou previously pursued a simple profession among the peasantry, perhaps as a farmer, miner, servant, shepherd, woodcutter, or gravedigger. But something happened that set you on a different path and marked you for greater things. Choose or randomly determine a defining event that marked you as a hero of the people.\n\n|noborder alternate|k\n|!d10|!Defining Event |\n| 1  |I stood up to a tyrant’s agents. |\n| 2  |I saved people during a natural disaster. |\n| 3  |I stood alone against a terrible monster. |\n| 4  |I stole from a corrupt merchant to help the poor. |\n| 5  |I led a militia to fight off an invading army. |\n| 6  |I broke into a tyrant’s castle and stole weapons to arm the people. |\n| 7  |I trained the peasantry to use farm implements as weapons against a tyrant’s soldiers. |\n| 8  |A lord rescinded an unpopular decree after I led a symbolic act of protest against it. |\n| 9  |A celestial, fey, or similar creature gave me a blessing or revealed my secret origin. |\n| 10 |Recruited into a lord’s army, I rose to leadership and was commended for my heroism. |\n\n!! Feature: Rustic Hospitality\n\nSince you come from the ranks of the common folk, you fit in among them with ease. You can find a place to hide, rest, or recuperate among other commoners, unless you have shown yourself to be a danger to th
