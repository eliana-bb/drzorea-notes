 granted by your background:\n\n* (//a//) a mace or (//b//) a warhammer (if proficient)\n* (//a//) scale mail, (//b//) leather armor, or (//c//) chain mail (if proficient)\n* (//a//) a light crossbow and 20 bolts or (//b//) any simple weapon\n* (//a//) a priest’s pack or (//b//) an explorer’s pack\n* A shield and a holy symbol\n\n!! Spellcasting\n\nAs a conduit for divine power, you can cast cleric spells.\n\n!!! Cantrips\n\nAt 1st level, you know three cantrips of your choice from the cleric spell list. You learn additional cleric cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Cleric table.\n\n!!! Preparing and Casting Spells\n\nThe Cleric table shows how many spell slots you have to cast your cleric spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nYou prepare the list of cleric spells that are available for you to cast, choosing from the cleric spell list. When you do so, choose a number of cleric spells equal to your Wisdom modifier + your cleric level (minimum of one spell). The spells must be of a level for which you have spell slots.\n\nFor example, if you are a 3rd-level cleric, you have four 1st-level and two 2nd-level spell slots. With a Wisdom of 16, your list of prepared spells can include six spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell [[Cure Wounds]], you can cast it using a 1st-level or 2nd-level slot. Casting the spell doesn’t remove it from your list of prepared spells.\n\nYou can change your list of prepared spells when you finish a long rest. Preparing a new list of cleric spells requires time spent in prayer and meditation: at least 1 minute per spell level for each spell on your list.\n\n!!! Spellcasting Ability\n\nWisdom is your spellcasting ability for your cleric spells. The power of your spells comes from your devotion to your deity. You use your Wisdom whenever a cleric spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a cleric spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Wisdom modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Wisdom modifier\n\n!!! Ritual Casting\n\nYou can cast a cleric spell as a ritual if that spell has the ritual tag and you have the spell prepared.\n\n!!! Spellcasting Focus\n\nYou can use a holy symbol as a spellcasting focus for your cleric spells.\n\n!! Divine Domain\n\nAt 1st level, you choose a domain shaped by your choice of Deity and the gifts they grant you. Your choice grants you domain spells and other features when you choose it at 1st level. It also grants you additional ways to use Channel Divinity when you gain that feature at 2nd level, and additional benefits at 6th, 8th, and 17th levels.\n\n* [[Death Domain]]{{$:/DMG}}\n* [[Knowledge Domain]]{{$:/PHB}}\n* [[Life Domain]]{{$:/PHB}}\n* [[Light Domain]]{{$:/PHB}}\n* [[Nature Domain]]{{$:/PHB}}\n* [[Tempest Domain]]{{$:/PHB}}\n* [[Trickery Domain]]{{$:/PHB}}\n* [[War Domain]]{{$:/PHB}}\n\n!!! Domain Spells\n\nEach domain has a list of spells — its domain spells — that you gain at the cleric levels noted in the domain description. Once you gain a domain spell, you always have it prepared, and it doesn’t count against the number of spells you can prepare each day.\n\nIf you have a domain spell that doesn’t appear on the cleric spell list, the spell is nonetheless a cleric spell for you.\n\n!! Channel Divinity\n\nAt 2nd level, you gain the ability to channel divine energy directly from your deity, using that energy to fuel magical effects. You start with two such effects: Turn Undead and an effect determined by your domain. Some domains grant you additional effects as you advance in levels, as noted in the domain description.\n\nWhen you use your Channel Divinity, you choose which effect to create. You must then finish a short or long rest to use your Channel Divinity again.\n\nSome Channel Divinity effects require saving throws. When you use such an effect from this class, the DC equals your cleric spell save DC.\n\nBeginning at 6th level, you can use your Channel Divinity twice between rests, and beginning at 18th level, you can use it three times between rests. When you finish a short or long rest, you regain your expended uses.\n\n!!! Channel Divinity: Turn Undead\n\nAs an action, you present your holy symbol and speak a prayer censuring the undead. Each undead that can see or hear you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is turned for 1 minute or until it takes any damage.\n\nA turned creature must spend its turns trying to move as far away from you as it can, and it can’t willingly move to a space within 30 feet of you. It also can’t take reactions. For its action, it can use only the Dash action or try to escape from an effect that prevents it from moving. If there’s nowhere to move, the creature can use the Dodge action.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Destroy Undead\n\nStarting at 5th level, when an undead fails its saving throw against your Turn Undead feature, the creature is instantly destroyed if its challenge rating is at or below a certain threshold, as shown in the Destroy Undead table.\n\n|noborder alternate|k\n| !Cleric Level |!Destroys Undead of CR... |\n| 5th  |1/2 or lower |\n| 8th  |1 or lower |\n| 11th |2 or lower |\n| 14th |3 or lower |\n| 17th |4 or lower |\n\n!! Divine Intervention\n\nBeginning at 10th level, you can call on your deity to intervene on your behalf when your need is great.\n\nImploring your deity’s aid requires you to use your action. Describe the assistance you seek, and roll percentile dice. If you roll a number equal to or lower than your cleric level, your deity intervenes. The DM chooses the nature of the intervention; the effect of any cleric spell or cleric domain spell would be appropriate.\n\nIf your deity intervenes, you can’t use this feature again for 7 days. Otherwise, you can use it again after you finish a long rest.\n\nAt 20th level, your call for intervention succeeds automatically, no roll required.","tags":"Classes [[Player's Handbook]]","title":"Cleric","modified":"20260708075525995"},
{"created":"20260513145716385","text":"//Bards of the College of Lore know something about most things, collecting bits of knowledge from sources as diverse as scholarly tomes and peasant tales. Whether singing folk ballads in taverns or elaborate compositions in royal courts, these bards use their gifts to hold audiences spellbound. When the applause dies down, the audience members might find themselves questioning everything they held to be true, from their faith in the priesthood of the local temple to their loyalty to the king.//\n\n//The loyalty of these bards lies in the pursuit of beauty and truth, not in fealty to a monarch or following the tenets of a deity. A noble who keeps such a bard as a herald or advisor knows that the bard would rather be honest than politic.//\n\n//The college’s members gather in libraries and sometimes in actual colleges, complete with classrooms and dormitories, to share their lore with one another. They also meet at festivals or affairs of state, where they can expose corruption, unravel lies, and poke fun at self-important figures of authority.//\n\n!! Bonus Proficiencies\n\nWhen you join the College of Lore at 3rd level, you gain proficiency with three skills of your choice.\n\n!! Cutting Words\n\nAlso at 3rd level, you learn how to use your wit to distract, confuse, and otherwise sap the confidence and competence of others. When a creature that you can see within 60 feet of you makes an attack roll, an ability check, or a damage roll, you can use your reaction to expend one of your uses of Bardic Inspiration, rolling a Bardic Inspiration die and subtracting the number rolled from the creature’s roll. You can choose to use this feature after the creature makes its roll, but before the DM determines whether the attack roll or ability check succeeds or fails, or before the creature deals its damage. The creature is immune if it can’t hear you or if it’s immune to being charmed.\n\n!! Additional Magical Secrets\n\nAt 6th level, you learn two spells of your choice from any class. A spell you choose must be of a level you can cast, as shown on the Bard table, or a cantrip. The chosen spells count as bard spells for you but don’t count against the number of bard spells you know.\n\n!! Peerless Skill\n\nStarting at 14th level, when you make an ability check, you can expend one use of Bardic Inspiration. Roll a Bardic Inspiration die and add the number rolled to your ability check. You can choose to do so after you roll the die for the ability check, but before the DM tells you whether you succeed or fail.","title":"College of Lore","modified":"20260707183526685","type":"","tags":"Subclasses Bard [[Player's Handbook]]"},
{"created":"20260706170316656","text":"//Bards of the College of Valor are daring skalds whose tales keep alive the memory of the great heroes of the past, and thereby inspire a new generation of heroes. These bards gather in mead halls or around great bonfires to sing the deeds of the mighty, both past and present. They travel the land to witness great events firsthand and to ensure that the memory of those events doesn’t pass from the world. With their songs, they inspire others to reach the same heights of accomplishment as the heroes of old.//\n\n!! Bonus Proficiencies\n\nWhen you join the College of Valor at 3rd level, you gain proficiency with medium armor, shields, and martial weapons.\n\n!! Combat Inspiration\n\nAlso at 3rd level, you learn to inspire others in battle. A creature that has a Bardic Inspiration die from you can roll that die and add the number rolled to a weapon damage roll it just made. Alternatively, when an attack roll is made against the creature, it can use its reaction to roll the Bardic Inspiration die and add the number rolled to its AC against that attack, after seeing the roll but before knowing whether it hits or misses.\n\n!! Extra Attack\n\nStarting at 6th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Battle Magic\n\nAt 14th level, you have mastered the art of weaving spellcasting and weapon use into a single harmonious act. When you use your action to cast a bard spell, you can make one weapon attack as a bonus action.","title":"College of Valor","modified":"20260707183534217","type":"","tags":"Bard Subclasses [[Player's Handbook]]"},
{"created":"20260708091053178","text":"//Whether calling on the elemental forces of nature or emulating the creatures of the animal world, druids are an embodiment of nature’s resilience, cunning, and fury. They claim no mastery over nature. Instead, they see themselves as extensions of nature’s indomitable will.//\n\n|noborder alternate|k\n| !Level | !PB |!Features | !Cantrips Known | !Spell Slots per Spell Level |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|!6th|!7th|!8th|!9th|\n|  1st | +2 |Druidic, Spellcasting                             | 2 | 2 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |Wild Shape, Druid Circle                          | 2 | 3 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  3rd | +2 |---                                               | 2 | 4 |  2  | --- | --- | --- | --- | --- | --- | --- |\n|  4th | +2 |Wild Shape Improvement, Ability Score Improvement | 3 | 4 |  3  | --- | --- | --- | --- | --- | --- | --- |\n|  5th | +3 |---                                               | 3 | 4 |  3  |  2  | --- | --- | --- | --- | --- | --- |\n|  6th | +3 |Druid Circle Feature                              | 3 | 4 |  3  |  3  | --- | --- | --- | --- | --- | --- |\n|  7th | +3 |---                                               | 3 | 4 |  3  |  3  |  1  | --- | --- | --- | --- | --- |\n|  8th | +3 |Wild Shape Improvement, Ability Score Improvement | 3 | 4 |  3  |  3  |  2  | --- | --- | --- | --- | --- |\n|  9th | +4 |---                                               | 3 | 4 |  3  |  3  |  3  |  1  | --- | --- | --- | --- |\n| 10th | +4 |Druid Circle Feature                              | 4 | 4 |  3  |  3  |  3  |  2  | --- | --- | --- | --- |\n| 11th | +4 |---                                               | 4 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 12th | +4 |Ability Score Improvement                         | 4 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 13th | +5 |---                                               | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 14th | +5 |Druid Circle Feature                              | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 15th | +5 |---                                               | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 16th | +5 |Ability Score Improvement                         | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 17th | +6 |---                                               | 4 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  |  1  |\n| 18th | +6 |Timeless Body, Beast Spells                       | 4 | 4 |  3  |  3  |  3  |  3  |  1  |  1  |  1  |  1  |\n| 19th | +6 |Ability Score Improvement                         | 4 | 4 |  3  |  3  |  3  |  3  |  2  |  1  |  1  |  1  |\n| 20th | +6 |Archdruid                                         | 4 | 4 |  3  |  3  |  3  |  3  |  2  |  2  |  1  |  1  |\n\n! Class Features\n\nAs a druid, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per druid level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per druid level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields (druids will not wear armor or use shields made of metal)\n\n''Weapons:'' Clubs, daggers, darts, javelins, maces, quarterstaffs, scimitars, sickles, slings, spears\n\n''Tools:'' Herbalism kit\n\n''Saving Throws:'' Intelligence, Wisdom\n\n''Skills:'' Choose two from Arcana, Animal Handling, Insight, Medicine, Nature, Perception, Religion, and Survival\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a wooden [[shield|Armor and Shields]] or (//b//) any [[simple weapon|Weapons]]\n* (//a//) a [[scimitar|Weapons]] or (//b//) any [[simple melee weapon|Weapons]]\n* [[Leather armor|Armor and Shields]], an [[explorer’s pack|Adventuring Gear]], and a [[druidic focus|Adventuring Gear]]\n\n!! Druidic\n\nYou know Druidic, the secret language of druids. You can speak the language and use it to leave hidden messages. You and others who know this language automatically spot such a message. Others spot the message’s presence with a successful DC 15 Wisdom (Perception) check but can’t decipher it without magic.\n\n!! Spellcasting\n\nDrawing on the divine essence of nature itself, you can cast spells to shape that essence to your will.\n\n!!! Cantrips\n\nAt 1st level, you know two cantrips of your choice from the druid spell list. You learn additional druid cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Druid table.\n\n!!! Preparing and Casting Spells\n\nThe Druid table shows how many spell slots you have to cast your druid spells of 1st level and higher. To cast one of these druid spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nYou prepare the list of druid spells that are available for you to cast, choosing from the druid spell list. When you do so, choose a number of druid spells equal to your Wisdom modifier + your druid level (minimum of one spell). The spells must be of a level for which you have spell slots.\n\nFor example, if you are a 3rd-level druid, you have four 1st-level and two 2nd-level spell slots. With a Wisdom of 16, your list of prepared spells can include six spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell cure wounds, you can cast it using a 1st-level or 2nd-level slot. Casting the spell doesn’t remove it from your list of prepared spells.\n\nYou can also change your list of prepared spells when you finish a long rest. Preparing a new list of druid spells requires time spent in prayer and meditation: at least 1 minute per spell level for each spell on your list.\n\n!!! Spellcasting Ability\n\nWisdom is your spellcasting ability for your druid spells, since your magic draws upon your devotion and attunement to nature. You use your Wisdom whenever a spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a druid spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Wisdom modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Wisdom modifier\n\n!!! Ritual Casting\n\nYou can cast a druid spell as a ritual if that spell has the ritual tag and you have the spell prepared.\nSpellcasting Focus\n\nYou can use a [[druidic focus|Adventuring Gear]] as a spellcasting focus for your druid spells.\n\n!! Wild Shape\n\nStarting at 2nd level, you can use your action to magically assume the shape of a beast that you have seen before. You can use this feature twice. You regain expended uses when you finish a short or long rest.\n\nYour druid level determines the beasts you can transform into, as shown in the Beast Shapes table. At 2nd level, for example, you can transform into any beast that has a challenge rating of 1/4 or lower that doesn’t have a flying or swimming speed.\n\n!!! Beast Shapes\n\n|!Level|!Max. CR|!Limitations |!Example |\n| 2nd  |  1/4   |No flying or swimming speed |Wolf |\n| 4th  |  1/2   |No flying speed |Crocodile |\n| 6th  |   1    |--- |Giant eagle |\n\nYou can stay in a beast shape for a number of hours equal to half your druid level (rounded down). You then revert to your normal form unless you expend another use of this feature. You can revert to your normal form earlier by using a bonus action on your turn. You automatically revert if you fall unconscious, drop to 0 hit points, or die.\n\nWhile you are transformed, the following rules apply:\n\n* Your game statistics are replaced by the statistics of the beast, but you retain your alignment, personality, and Intelligence, Wisdom, and Charisma scores. You also retain all of your skill and saving throw proficiencies, in addition to gaining those of the creature. If the creature has the same proficiency as you and the bonus in its stat block is higher than yours, use the creature’s bonus instead of yours. If the creature has any legendary or lair actions, you can’t use them.\n* When you transform, you assume the beast’s hit points and Hit Dice. When you revert to your normal form, you return to the number of hit points you had before you transformed. However, if you revert as a result of dropping to 0 hit points, any excess damage carries over to your normal form. For example, if you take 10 damage in animal form and have only 1 hit point left, you revert and take 9 damage. As long as the excess damage doesn’t reduce your normal form to 0 hit points, you aren’t knocked unconscious.\n* You can’t cast spells, and your ability to speak or take any action that requires hands is limited to the capabilities of your beast form. Transforming doesn’t break your concentration on a spell you’ve already cast, however, or prevent you from taking actions that are part of a spell, such as [[Call Lightning]], that you’ve already cast.\n* You retain the benefit of any features from your class, race, or other source and can use them if the new form is physically capable of doing so. However, you can’t use any of your special senses, such as darkvision, unless your new form also has that sense.\n* You choose whether your equipment falls to the ground in your space, merges into your new form, or is worn by it. Worn equipment functions as normal, but the DM decides whether it is practical for the new form to wear a piece of equipment, based on the creature’s shape and size. Your equipment doesn’t change size or shape to match the new form, and any equipment that the new form can’t wear must either fall to the ground or merge with it. Equipment that merges with the form has no effect until you leave the form.\n\n!! Druid Circle\n\nAt 2nd level, you choose to identify with a circle of druids. Your choice grants you features at 2nd level and again at 6th, 10th, and 14th level.\n\n* [[Circle of the Land]]{{$:/PHB}}\n* [[Circle of the Moon]]{{$:/PHB}}\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Timeless Body\n\nStarting at 18th level, the primal magic that you wield causes you to age more slowly. For every 10 years that pass, your body ages only 1 year.\n\n!! Beast Spells\n\nBeginning at 18th level, you can cast many of your druid spells in any shape you assume using Wild Shape. You can perform the somatic and verbal components of a druid spell while in a beast shape, but you aren’t able to provide material components.\n\n!! Archdruid\n\nAt 20th level, you can use your Wild Shape an unlimited number of times.\n\nAdditionally, you can ignore the verbal and somatic components of your druid spells, as well as any material components that lack a cost and aren’t consumed by a spell. You gain this benefit in both your normal shape and your beast shape from Wild Shape.","tags":"Classes [[Player's Handbook]]","title":"Druid","modified":"20260708173351436"},
{"created":"20260709070156488","text":"//The archetypal Eldritch Knight combines the martial mastery common to all fighters with a careful study of magic. Eldritch Knights use magical techniques similar to those practiced by wizards. They focus their study on two of the eight schools of magic: abjuration and evocation. Abjuration spells grant an Eldritch Knight additional protection in battle, and evocation spells deal damage to many foes at once, extending the fighter’s reach in combat. These knights learn a comparatively small number of spells, committing them to memory instead of keeping them in a spellbook.//\n\n!!! Eldritch Knight Spellcasting\n\n|noborder alternate|k\n| !Fighter Level | !Cantrips Known | !Spells Known | !Spell Slots Per Level |\u003C|\u003C|\u003C|\n|~|~|~| !1st | !2nd | !3rd | !4th |\n|  3rd | 2 |  3 | 2 | --- | --- | --- |\n|  4th | 2 |  4 | 3 | --- | --- | --- |\n|  5th | 2 |  4 | 3 | --- | --- | --- |\n|  6th | 2 |  4 | 3 | --- | --- | --- |\n|  7th | 2 |  5 | 4 |  2  | --- | --- |\n|  8th | 2 |  6 | 4 |  2  | --- | --- |\n|  9th | 2 |  6 | 4 |  2  | --- | --- |\n| 10th | 3 |  7 | 4 |  3  | --- | --- |\n| 11th | 3 |  8 | 4 |  3  | --- | --- |\n| 12th | 3 |  8 | 4 |  3  | --- | --- |\n| 13th | 3 |  9 | 4 |  3  |  2  | --- |\n| 14th | 3 | 10 | 4 |  3  |  2  | --- |\n| 15th | 3 | 10 | 4 |  3  |  2  | --- |\n| 16th | 3 | 11 | 4 |  3  |  3  | --- |\n| 17th | 3 | 11 | 4 |  3  |  3  | --- |\n| 18th | 3 | 11 | 4 |  3  |  3  | --- |\n| 19th | 3 | 12 | 4 |  3  |  3  |  1  |\n| 20th | 3 | 13 | 4 |  3  |  3  |  1  |\n\n!! Spellcasting\n\nWhen you reach 3rd level, you augment your martial prowess with the ability to cast spells. See chapter 10 for the general rules of spellcasting and chapter 11 for the wizard spell list.\n\n!!! Cantrips \n\nYou learn two cantrips of your choice from the wizard spell list. You learn an additional wizard cantrip of your choice at 10th level.\n\n!!! Spell Slots\n\nThe Eldritch Knight Spellcasting table shows how many spell slots you have to cast your wizard spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nFor example, if you know the 1st-level spell shield and have a 1st-level and a 2nd-level spell slot available, you can cast shield using either slot.\n\n!!! Spells Known of 1st-Level and Higher\n\nYou know three 1st-level wizard spells of your choice, two of which you must choose from the abjuration and evocation spells on the wizard spell list.\n\nThe Spells Known column of the Eldritch Knight Spellcasting table shows when you learn more wizard spells of 1st level or higher. Each of these spells must be an abjuration or evocation spell of your choice, and must be of a level for which you have spell slots. For instance, when you reach 7th level in this class, you can learn one new spell of 1st or 2nd level.\n\nThe spells you learn at 8th, 14th, and 20th level can come from any school of magic.\n\nWhenever you gain a level in this class, you can replace one of the wizard spells you know with another spell of your choice from the wizard spell list. The new spell must be of a level for which you have spell slots, and it must be an abjuration or evocation spell, unless you’re replacing the spell you gained at 3rd, 8th, 14th, or 20th level from any school of magic.\n\n!!! Spellcasting Ability\n\nIntelligence is your spellcasting ability for your wizard spells, since you learn your spells through study and memorization. You use your Intelligence whenever a spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for a wizard spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Intelligence modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Intelligence modifier\n\n!! Weapon Bond\n\nAt 3rd level, you learn a ritual that creates a magical bond between yourself and one weapon. You perform the ritual over the course of 1 hour, which can be done during a short rest. The weapon must be within your reach throughout the ritual, at the conclusion of which you touch the weapon and forge the bond.\n\nOnce you have bonded a weapon to yourself, you can’t be disarmed of that weapon unless you are incapacitated. If it is on the same plane of existence, you can summon that weapon as a bonus action on your turn, causing it to teleport instantly to your hand.\n\nYou can have up to two bonded weapons, but can summon only one at a time with your bonus action. If you attempt to bond with a third weapon, you must break the bond with one of the other two.\n\n!! War Magic\n\nBeginning at 7th level, when you use your action to cast a cantrip, you can make one weapon attack as a bonus action.\n\n!! Eldritch Strike\n\nAt 10th level, you learn how to make your weapon strikes undercut a creature’s resistance to your spells. When you hit a creature with a weapon attack, that creature has disadvantage on the next saving throw it makes against a spell you cast before the end of your next turn.\n\n!! Arcane Charge\n\nAt 15th level, you gain the ability to teleport up to 30 feet to an unoccupied space you can see when you use your Action Surge. You can teleport before or after the additional action.\n\n!! Improved War Magic\n\nStarting at 18th level, when you use your action to cast a spell, you can make one weapon attack as a bonus action.","tags":"Subclasses [[Player's Handbook]] Fighter","title":"Eldritch Knight","modified":"20260709145526575"},
{"created":"20260708115530086","text":"//Fighters all share an unparalleled mastery with weapons and armor, and a thorough knowledge of the skills of combat. And they are well acquainted with death, both meting it out and staring it defiantly in the face.//\n\n|noborder alternate|k\n| !Level | !PB |!Features |\n|  1st | +2 |Fighting Style, Second Wind |\n|  2nd | +2 |Action Surge (one use)                            |\n|  3rd | +2 |Martial Archetype                                 |\n|  4th | +2 |Ability Score Improvement                         |\n|  5th | +3 |Extra Attack                                      |\n|  6th | +3 |Ability Score Improvement                         |\n|  7th | +3 |Martial Archetype Feature                         |\n|  8th | +3 |Ability Score Improvement                         |\n|  9th | +4 |Indomitable (one use)                             |\n| 10th | +4 |Martial Archetype Feature                         |\n| 11th | +4 |Extra Attack (2)                                  |\n| 12th | +4 |Ability Score Improvement                         |\n| 13th | +5 |Indomitable (two uses)                            |\n| 14th | +5 |Ability Score Improvement                         |\n| 15th | +5 |Martial Archetype Feature                         |\n| 16th | +5 |Ability Score Improvement                         |\n| 17th | +6 |Action Surge (two uses), Indomitable (three uses) |\n| 18th | +6 |Martial Archetype Feature                         |\n| 19th | +6 |Ability Score Improvement                         |\n| 20th | +6 |Extra Attack (3)                                  |\n\n! Class Features\n\nAs a fighter, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d10 per fighter level\n\n''Hit Points at 1st Level:'' 10 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d10 (or 6) + your Constitution modifier per fighter level after 1st\n\n!! Proficiencies\n\n''Armor:'' All armor, shields\n\n''Weapons:'' Simple weapons, martial weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Strength, Constitution\n\n''Skills:'' Choose two skills from Acrobatics, Animal Handling, Athletics, History, Insight, Intimidation, Perception, and Survival\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) [[chain mail|Armor and Shields]] or (//b//) [[leather armor|Armor and Shields]], [[longbow|Weapons]], and 20 [[arrows|Adventuring Gear]]\n* (//a//) a [[martial weapon|Weapons]] and a [[shield|Armor and Shields]] or (//b//) two [[martial weapons|Weapons]]\n* (//a//) a [[light crossbow|Weapons]] and 20 [[bolts|Adventuring Gear]] or (//b//) two [[handaxes|Weapons]]\n* (//a//) a [[dungeoneer’s pack|Adventuring Gear]] or (//b//) an [[explorer’s pack|Adventuring Gear]]\n\n!! Fighting Style\n\nYou adopt a particular style of fighting as your specialty. Choose one of the following options. You can’t take a Fighting Style option more than once, even if you later get to choose again.\n\n!!! Archery\n\nYou gain a +2 bonus to attack rolls you make with ranged weapons.\n\n!!! Defense\n\nWhile you are wearing armor, you gain a +1 bonus to AC.\n\n!!! Dueling\n\nWhen you are wielding a melee weapon in one hand and no other weapons, you gain a +2 bonus to damage rolls with that weapon.\n\n!!! Great Weapon Fighting\n\nWhen you roll a 1 or 2 on a damage die for an attack you make with a melee weapon that you are wielding with two hands, you can reroll the die and must use the new roll, even if the new roll is a 1 or a 2. The weapon must have the two-handed or versatile property for you to gain this benefit.\n\n!!! Protection\n\nWhen a creature you can see attacks a target other than you that is within 5 feet of you, you can use your reaction to impose disadvantage on the attack roll. You must be wielding a shield.\n\n!!! Two-Weapon Fighting\n\nWhen you engage in two-weapon fighting, you can add your ability modifier to the damage of the second attack.\n\n!! Second Wind\n\nYou have a limited well of stamina that you can draw on to protect yourself from harm. On your turn, you can use a bonus action to regain hit points equal to 1d10 + your fighter level. Once you use this feature, you must finish a short or long rest before you can use it again.\n\n!! Action Surge\n\nStarting at 2nd level, you can push yourself beyond your normal limits for a moment. On your turn, you can take one additional action.\n\nOnce you use this feature, you must finish a short or long rest before you can use it again. Starting at 17th level, you can use it twice before a rest, but only once on the same turn.\n\n!! Martial Archetype\n\nAt 3rd level, you choose an archetype that you strive to emulate in your combat styles and techniques. The archetype you choose grants you features at 3rd level and again at 7th, 10th, 15th, and 18th level.\n\n* [[Battle Master]]{{$:/PHB}}\n* [[Champion]]{{$:/PHB}}\n* [[Eldritch Knight]]{{$:/PHB}}\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 6th, 8th, 12th, 14th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Extra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\nThe number of attacks increases to three when you reach 11th level in this class and to four when you reach 20th level in this class.\n\n!! Indomitable\n\nBeginning at 9th level, you can reroll a saving throw that you fail. If you do so, you must use the new roll, and you can’t use this feature again until you finish a long rest.\n\nYou can use this feature twice between long rests starting at 13th level and three times between long rests starting at 17th level.","tags":"Classes [[Player's Handbook]]","title":"Fighter","modified":"20260709145432237"},
{"created":"20260709132457914","text":"//Emulating the Hunter archetype means accepting your place as a bulwark between the people you protect and the terrors of the wilderness. As you walk the Hunter’s path, you learn specialized techniques for fighting the threats you face, from rampaging ogres to towering giants and terrifying dragons.//\n\n!! Hunter’s Prey\n\nAt 3rd level, you gain one of the following features of your choice.\n\n//''Colossus Slayer.''// Your tenacity can wear down the most potent foes. When you hit a creature with a weapon attack, the creature takes an extra 1d8 damage if it’s below its hit point maximum. You can deal this extra damage only once per turn.\n\n//''Giant Killer.''// When a Large or larger creature within 5 feet of you hits or misses you with an attack, you can use your reaction to attack that creature immediately after its attack, provided that you can see the creature.\n\n//''Horde Breaker.''// Once on each of your turns when you make a weapon attack, you can make another attack with the same weapon against a different creature that is within 5 feet of the original target and within range of your weapon.\n\n!! Defensive Tactics\n\nAt 7th level, you gain one of the following features of your choice.\n\n//''Escape the Horde.''// Opportunity attacks against you are made with disadvantage.\n\n//''Multiattack Defense.''// When a creature hits you with an attack, you gain a +4 bonus to AC against all subsequent attacks made by that creature for the rest of the turn.\n\n//''Steel Will.''// You have advantage on saving throws against being frightened.\n\n!! Multiattack\n\nAt 11th level, you gain one of the following features of your choice.\n\n//''Volley.''// You can use your action to make a ranged attack against any number of creatures within 10 feet of a point you can see within your weapon’s range. You must have ammunition for each target, as normal, and you make a separate attack roll for each target.\n\n//''Whirlwind Attack.''// You can use your action to make a melee attack against any number of creatures within 5 feet of you, with a separate attack roll for each target.\n\n!! Superior Hunter’s Defense\n\nAt 15th level, you gain one of the following features of your choice.\n\n//''Evasion.''// When you are subjected to an effect, such as a red dragon’s fiery breath or a [[Lightning Bolt]] spell, that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.\n\n//''Stand Against the Tide.''// When a hostile creature misses you with a melee attack, you can use your reaction to force that creature to repeat the same attack against another creature (other than itself) of your choice.\n\n//''Uncanny Dodge.''// When an attacker that you can see hits you with an attack, you can use your reaction to halve the attack’s damage against you.","tags":"Subclasses Ranger [[Player's Handbook]]","title":"Hunter","modified":"20260709145441257"},
{"created":"20260707183956606","text":"//The gods of knowledge — including Oghma, Boccob, Gilean, Aureon, and Thoth — value learning and understanding above all. Some teach that knowledge is to be gathered and shared in libraries and universities, or promote the practical knowledge of craft and invention. Some deities hoard knowledge and keep its secrets to themselves. And some promise their followers that they will gain tremendous power if they unlock the secrets of the multiverse. Followers of these gods study esoteric lore, collect old tomes, delve into the secret places of the earth, and learn all they can. Some gods of knowledge promote the practical knowledge of craft and invention, including smith deities like Gond, Reorx, Onatar, Moradin, Hephaestus, and Goibhniu.//\n\n!!! Knowledge Domain Spells\n\n|noborder alternate|k\n|!Cleric Level |!Spells |\n| 1st |[[Command]], [[Identify]] |\n| 3rd |[[Augury]], [[Suggestion]] |\n| 5th |[[Nondetection]], [[Speak with Dead]] |\n| 7th |[[Arcane Eye]], [[Confusion]] |\n| 9th |[[Legend Lore]], [[Scrying]] |\n\n!! Blessings of Knowledge\n\nAt 1st level, you learn two languages of your choice. You also become proficient in your choice of two of the following skills: Arcana, History, Nature, or Religion.\n\nYour proficiency bonus is doubled for any ability check you make that uses either of those skills.\n\n!! Channel Divinity: Knowledge of the Ages\n\nStarting at 2nd level, you can use your Channel Divinity to tap into a divine well of knowledge. As an action, you choose one skill or tool. For 10 minutes, you have proficiency with the chosen skill or tool.\n\n!! Channel Divinity: Read Thoughts\n\nAt 6th level, you can use your Channel Divinity to read a creature’s thoughts. You can then use your access to the creature’s mind to command it.\n\nAs an action, choose one creature that you can see within 60 feet of you. That creature must make a Wisdom saving throw. If the creature succeeds on the saving throw, you can’t use this feature on it again until you finish a long rest.\n\nIf the creature fails its save, you can read its surface thoughts (those foremost in its mind, reflecting its current emotions and what it is actively thinking about) when it is within 60 feet of you. This effect lasts for 1 minute.\n\nDuring that time, you can use your action to end this effect and cast the [[Suggestion]] spell on the creature without expending a spell slot. The target automatically fails its saving throw against the spell.\n\n!! Potent Spellcasting\n\nStarting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.\n\n!! Visions of the Past\n\nStarting at 17th level, you can call up visions of the past that relate to an object you hold or your immediate surroundings. You spend at least 1 minute in meditation and prayer, then receive dreamlike, shadowy glimpses of recent events. You can meditate in this way for a number of minutes equal to your Wisdom score and must maintain concentration during that time, as if you were casting a spell.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.\n\n//''Object Reading.''// Holding an object as you meditate, you can see visions of the object’s previous owner. After meditating for 1 minute, you learn how the owner acquired and lost the object, as well as the most recent significant event involving the object and that owner. If the object was owned by another creature in the recent past (within a number of days equal to your Wisdom score), you can spend 1 additional minute for each owner to learn the same information about that creature.\n\n//''Area Reading.''// As you meditate, you see visions of recent events in your immediate vicinity (a room, street, tunnel, clearing, or the like, up to a 50-foot cube), going back a number of days equal to your Wisdom score. For each minute you meditate, you learn about one significant event, beginning with the most recent. Significant events typically involve powerful emotions, such as battles and betrayals, marriages and murders, births and funerals. However, they might also include more mundane events that are nevertheless important in your current situation.","title":"Knowledge Domain","modified":"20260708090217919","type":"","tags":"[[Player's Handbook]] Subclasses Cleric"},
{"created":"20260708084859699","text":"//The Life domain focuses on the vibrant positive energy — one of the fundamental forces of the universe — that sustains all life. The gods of life promote vitality and health through healing the sick and wounded, caring for those in need, and driving away the forces of death and undeath. Almost any non-evil deity can claim influence over this domain, particularly agricultural deities (such as Chauntea, Arawai, and Demeter), sun gods (such as Lathander, Pelor, and Re-Horakhty), gods of healing or endurance (such as Ilmater, Mishakal, Apollo, and Diancecht), and gods of home and community (such as Hestia, Hathor, and Boldrei).//\n\n!!! Life Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Bless]], [[Cure Wounds]] |\n| 3rd |[[Lesser Restoration]], [[Spiritual Weapon]] |\n| 5th |[[Beacon of Hope]], [[Revivify]] |\n| 7th |[[Death Ward]], [[Guardian of Faith]] |\n| 9th |[[Mass Cure Wounds]], [[Raise Dead]] |\n\n!! Bonus Proficiency\n\nWhen you choose this domain at 1st level, you gain proficiency with heavy armor.\n\n!! Disciple of Life\n\nAlso starting at 1st level, your healing spells are more effective. Whenever you use a spell of 1st level or higher to restore hit points to a creature, the creature regains additional hit points equal to 2 + the spell’s level.\n\n!! Channel Divinity: Preserve Life\n\nStarting at 2nd level, you can use your Channel Divinity to heal the badly injured.\n\nAs an action, you present your holy symbol and evoke healing energy that can restore a number of hit points equal to five times your cleric level. Choose any creatures within 30 feet of you, and divide those hit points among them. This feature can restore a creature to no more than half of its hit point maximum. You can’t use this feature on an undead or a construct.\n\n!! Blessed Healer\n\nBeginning at 6th level, the healing spells you cast on others heal you as well. When you cast a spell of 1st level or higher that restores hit points to a creature other than you, you regain hit points equal to 2 + the spell’s level.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 radiant damage to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Supreme Healing\n\nStarting at 17th level, when you would normally roll one or more dice to restore hit points with a spell, you instead use the highest number possible for each die. For example, instead of restoring 2d6 hit points to a creature, you restore 12.","tags":"Cleric [[Player's Handbook]] Subclasses","title":"Life Domain","modified":"20260708090235382"},
{"created":"20260708085208961","text":"//Gods of light — including Helm, Lathander, Pholtus, Branchala, the Silver Flame, Belenus, Apollo, and Re-Horakhty — promote the ideals of rebirth and renewal, truth, vigilance, and beauty, often using the symbol of the sun. Some of these gods are portrayed as the sun itself or as a charioteer who guides the sun across the sky. Others are tireless sentinels whose eyes pierce every shadow and see through every deception. Some are deities of beauty and artistry, who teach that art is a vehicle for the soul’s improvement. Clerics of a god of light are enlightened souls infused with radiance and the power of their gods’ discerning vision, charged with chasing away lies and burning away darkness.//\n\n!!! Light Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Burning Hands]], [[Faerie Fire]] |\n| 3rd |[[Flaming Sphere]], [[Scorching Ray]] |\n| 5th |[[Daylight]], [[Fireball]] |\n| 7th |[[Guardian of Faith]], [[Wall of Fire]] |\n| 9th |[[Flame Strike]], [[Scrying]] |\n\n!! Bonus Cantrip\n\nWhen you choose this domain at 1st level, you gain the [[Light]] cantrip if you don’t already know it. This cantrip doesn’t count against the number of cleric cantrips you know.\n\n!! Warding Flare\n\nAlso at 1st level, you can interpose divine light between yourself and an attacking enemy. When you are attacked by a creature within 30 feet of you that you can see, you can use your reaction to impose disadvantage on the attack roll, causing light to flare before the attacker before it hits or misses. An attacker that can’t be blinded is immune to this feature.\n\nYou can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.\n\n!! Channel Divinity: Radiance of the Dawn\n\nStarting at 2nd level, you can use your Channel Divinity to harness sunlight, banishing darkness and dealing radiant damage to your foes.\n\nAs an action, you present your holy symbol, and any magical darkness within 30 feet of you is dispelled. Additionally, each hostile creature within 30 feet of you must make a Constitution saving throw. A creature takes radiant damage equal to 2d10 + your cleric level on a failed saving throw, and half as much damage on a successful one. A creature that has total cover from you is not affected.\n\n!! Improved Flare\n\nStarting at 6th level, you can also use your Warding Flare feature when a creature that you can see within 30 feet of you attacks a creature other than you.\n\n!! Potent Spellcasting\n\nStarting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.\n\n!! Corona of Light\n\nStarting at 17th level, you can use your action to activate an aura of sunlight that lasts for 1 minute or until you dismiss it using another action. You emit bright light in a 60-foot radius and dim light 30 feet beyond that. Your enemies in the bright light have disadvantage on saving throws against any spell that deals fire or radiant damage.","tags":"Cleric [[Player's Handbook]] Subclasses","title":"Light Domain","modified":"20260708090250142"},
{"created":"20260709071144527","text":"//Whatever their discipline, monks are united in their ability to magically harness the energy that flows in their bodies. Whether channeled as a striking display of combat prowess or a subtler focus of defensive ability and speed, this energy infuses all that a monk does.//\n\n|noborder alternate|k\n| !Level | !PB | !Martial Arts | !Ki Points | !Unarmored Movement |!Features |\n|  1st | +2 | 1d4  | --- |   ---   |Unarmored Defense, Martial Arts |\n|  2nd | +2 | 1d4  |  2  | +10 ft. |Ki, Unarmored Movement |\n|  3rd | +2 | 1d4  |  3  | +10 ft. |Monastic Tradition, Deflect Missiles |\n|  4th | +2 | 1d4  |  4  | +10 ft. |Ability Score Improvement |\n|  5th | +3 | 1d4  |  5  | +10 ft. |Extra Attack, Stunning Strike |\n|  6th | +3 | 1d6  |  6  | +15 ft. |Ki-Empowered Strikes, Monastic Tradition Feature |\n|  7th | +3 | 1d6  |  7  | +15 ft. |Evasion, Stillness of Mind |\n|  8th | +3 | 1d6  |  8  | +15 ft. |Ability Score Improvement |\n|  9th | +4 | 1d6  |  9  | +15 ft. |Unarmored Movement Improvement |\n| 10th | +4 | 1d6  | 10  | +20 ft. |Purity of Body |\n| 11th | +4 | 1d8  | 11  | +20 ft. |Monastic Tradition Feature |\n| 12th | +4 | 1d8  | 12  | +20 ft. |Ability Score Improvement |\n| 13th | +5 | 1d8  | 13  | +20 ft. |Tongue of the Sun and Moon |\n| 14th | +5 | 1d8  | 14  | +25 ft. |Diamond Soul |\n| 15th | +5 | 1d8  | 15  | +25 ft. |Timeless Body |\n| 16th | +5 | 1d8  | 16  | +25 ft. |Ability Score Improvement |\n| 17th | +6 | 1d10 | 17  | +25 ft. |Monastic Tradition Feature |\n| 18th | +6 | 1d10 | 18  | +30 ft. |Empty Body |\n| 19th | +6 | 1d10 | 19  | +30 ft. |Ability Score Improvement |\n| 20th | +6 | 1d10 | 20  | +30 ft. |Perfect Self |\n\n! Class Features\n\nAs a monk, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per monk level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per monk level after 1st\n\n!! Proficiencies\n\n''Armor:'' None\n\n''Weapons:'' Simple weapons, shortswords\n\n''Tools:'' Choose one type of artisan’s tools or one musical instrument\n\n''Saving Throws:'' Strength, Dexterity\n\n''Skills:'' Choose two from Acrobatics, Athletics, History, Insight, Religion, and Stealth\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[shortsword|Weapons]] or (//b//) any [[simple weapon|Weapons]]\n* (//a//) a [[dungeoneer’s pack|Adventuring Gear]] or (//b//) an [[explorer’s pack|Adventuring Gear]]\n* 10 [[darts|Adventuring Gear]]\n\n!! Unarmored Defense\n\nBeginning at 1st level, while you are wearing no armor and not wielding a shield, your AC equals 10 + your Dexterity modifier + your Wisdom modifier.\n\n!! Martial Arts\n\nAt 1st level, your practice of martial arts gives you mastery of combat styles that use unarmed strikes and monk weapons, which are shortswords and any simple melee weapons that don’t have the two-handed or heavy property.\n\nYou gain the following benefits while you are unarmed or wielding only monk weapons and you aren’t wearing armor or wielding a shield:\n\n* You can use Dexterity instead of Strength for the attack and damage rolls of your unarmed strikes and monk weapons.\n* You can roll a d4 in place of the normal damage of your unarmed strike or monk weapon. This die changes as you gain monk levels, as shown in the Martial Arts column of the Monk table.\n* When you use the Attack action with an unarmed strike or a monk weapon on your turn, you can make one unarmed strike as a bonus action. For example, if you take the Attack action and attack with a quarterstaff, you can also make an unarmed strike as a bonus action, assuming you haven’t already taken a bonus action this turn.\n\nCertain monasteries use specialized forms of the monk weapons. For example, you might use a club that is two lengths of wood connected by a short chain (called a nunchaku) or a sickle with a shorter, straighter blade (called a kama). Whatever name you use for a monk weapon, you can use the game statistics normal for the weapon.\n\n!! Ki\n\nStarting at 2nd level, your training allows you to harness the mystic energy of ki. Your access to this energy is represented by a number of ki points. Your monk level determines the number of points you have, as shown in the Ki Points column of the Monk table.\n\nYou can spend these points to fuel various ki features. You start knowing three such features: Flurry of Blows, Patient Defense, and Step of the Wind. You learn more ki features as you gain levels in this class.\n\nWhen you spend a ki point, it is unavailable until you finish a short or long rest, at the end of which you draw all of your expended ki back into yourself. You must spend at least 30 minutes of the rest meditating to regain your ki points.\n\nSome of your ki features require your target to make a saving throw to resist the feature’s effects. The saving throw DC is calculated as follows:\n\n''Ki save DC'' = 8 + your proficiency bonus + your Wisdom modifier\n\n!!! Flurry of Blows\n\nImmediately after you take the Attack action on your turn, you can spend 1 ki point to make two unarmed strikes as a bonus action.\n\n!!! Patient Defense\n\nYou can spend 1 ki point to take the Dodge action as a bonus action on your turn.\n\n!!! Step of the Wind\n\nYou can spend 1 ki point to take the Disengage or Dash action as a bonus action on your turn, and your jump distance is doubled for the turn.\n\n!! Unarmored Movement\n\nStarting at 2nd level, your speed increases by 10 feet while you are not wearing armor or wielding a shield. This bonus increases when you reach certain monk levels, as shown in the Monk table.\n\nAt 9th level, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the move.\n\n!! Monastic Tradition\n\nWhen you reach 3rd level, you commit yourself to a monastic tradition. Your tradition grants you features at 3rd level and again at 6th, 11th, and 17th level.\n\n* [[Way of the Four Elements]]{{$:/PHB}}\n* [[Way of the Open Hand]]{{$:/PHB}}\n* [[Way of Shadow]]{{$:/PHB}}\n\n!! Deflect Missiles\n\nStarting at 3rd level, you can use your reaction to deflect or catch the missile when you are hit by a ranged weapon attack. When you do so, the damage you take from the attack is reduced by 1d10 + your Dexterity modifier + your monk level.\n\nIf you reduce the damage to 0, you can catch the missile if it is small enough for you to hold in one hand and you have at least one hand free. If you catch a missile in this way, you can spend 1 ki point to make a ranged attack with the weapon or piece of ammunition you just caught, as part of the same reaction. You make this attack with proficiency, regardless of your weapon proficiencies, and the missile counts as a monk weapon for the attack, which has a normal range of 20 feet and a long range of 60 feet.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Slow Fall\n\nBeginning at 4th level, you can use your reaction when you fall to reduce any falling damage you take by an amount equal to five times your monk level.\nExtra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Stunning Strike\n\nStarting at 5th level, you can interfere with the flow of ki in an opponent’s body. When you hit another creature with a melee weapon attack, you can spend 1 ki point to attempt a stunning strike. The target must succeed on a Constitution saving throw or be stunned until the end of your next turn.\n\n!! Ki-Empowered Strikes\n\nStarting at 6th level, your unarmed strikes count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.\n\n!! Evasion\n\nAt 7th level, your instinctive agility lets you dodge out of the way of certain area effects, such as a blue dragon’s lightning breath or a fireball spell. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.\n\n!! Stillness of Mind\n\nStarting at 7th level, you can use your action to end one effect on yourself that is causing you to be charmed or frightened.\n\n!! Purity of Body\n\nAt 10th level, your mastery of the ki flowing through you makes you immune to disease and poison.\n\n!! Tongue of the Sun and Moon\n\nStarting at 13th level, you learn to touch the ki of other minds so that you understand all spoken languages. Moreover, any creature that can understand a language can understand what you say.\n\n!! Diamond Soul\n\nBeginning at 14th level, your mastery of ki grants you proficiency in all saving throws.\n\nAdditionally, whenever you make a saving throw and fail, you can spend 1 ki point to reroll it and take the second result.\n\n!! Timeless Body\n\nAt 15th level, your ki sustains you so that you suffer none of the frailty of old age, and you can’t be aged magically. You can still die of old age, however. In addition, you no longer need food or water.\n\n!! Empty Body\n\nBeginning at 18th level, you can use your action to spend 4 ki points to become invisible for 1 minute. During that time, you also have resistance to all damage but force damage.\n\nAdditionally, you can spend 8 ki points to cast the [[Astral Projection]] spell, without needing material components. When you do so, you can’t take any other creatures with you.\n\n!! Perfect Self\n\nAt 20th level, when you roll for initiative and have no ki points remaining, you regain 4 ki points.","tags":"Classes [[Player's Handbook]]","title":"Monk","modified":"20260709082215800"},
{"created":"20260708085801265","text":"//Gods of nature are as varied as the natural world itself, from inscrutable gods of the deep forests (such as Silvanus, Obad-Hai, Chislev, Balinor, and Pan) to friendly deities associated with particular springs and groves (such as Eldath). Druids revere nature as a whole and might serve one of these deities, practicing mysterious rites and reciting all-but-forgotten prayers in their own secret tongue. But many of these gods have clerics as well, champions who take a more active role in advancing the interests of a particular nature god. These clerics might hunt the evil monstrosities that despoil the woodlands, bless the harvest of the faithful, or wither the crops of those who anger their gods.//\n\n!!! Nature Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Animal Friendship]], [[Speak with Animals]] |\n| 3rd |[[Barkskin]], [[Spike Growth]] |\n| 5th |[[Plant Growth]], [[Wind Wall]] |\n| 7th |[[Dominate Beast]], [[Grasping Vine]] |\n| 9th |[[Insect Plague]], [[Tree Stride]] |\n\n!! Acolyte of Nature\n\nAt 1st level, you learn one druid cantrip of your choice. This cantrip counts as a cleric cantrip for you, but it doesn’t count against the number of cleric cantrips you know. You also gain proficiency in one of the following skills of your choice: Animal Handling, Nature, or Survival.\n\n!! Bonus Proficiency\n\nAlso at 1st level, you gain proficiency with heavy armor.\n\n!! Channel Divinity: Charm Animals and Plants\n\nStarting at 2nd level, you can use your Channel Divinity to charm animals and plants.\n\nAs an action, you present your holy symbol and invoke the name of your deity. Each beast or plant creature that can see you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is charmed by you for 1 minute or until it takes damage. While it is charmed by you, it is friendly to you and other creatures you designate.\n\n!! Dampen Elements\n\nStarting at 6th level, when you or a creature within 30 feet of you takes acid, cold, fire, lightning, or thunder damage, you can use your reaction to grant resistance to the creature against that instance of the damage.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 cold, fire, or lightning damage (your choice) to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Master of Nature\n\nAt 17th level, you gain the ability to command animals and plant creatures. While creatures are charmed by your Charm Animals and Plants feature, you can take a bonus action on your turn to verbally command what each of those creatures will do on its next turn.","tags":"Cleric Subclasses [[Player's Handbook]]","title":"Nature Domain","modified":"20260709092513909"},
{"created":"20260709091928981","text":"//The Oath of Devotion binds a paladin to the loftiest ideals of justice, virtue, and order. Sometimes called cavaliers, white knights, or holy warriors, these paladins meet the ideal of the knight in shining armor, acting with honor in pursuit of justice and the greater good. They hold themselves to the highest standards of conduct, and some, for better or worse, hold the rest of the world to the same standards. Many who swear this oath are devoted to gods of law and good and use their gods’ tenets as the measure of their devotion. They hold angels — the perfect servants of good — as their ideals, and incorporate images of angelic wings into their helmets or coats of arms.//\n\n!! Tenets of Devotion\n\nThough the exact words and strictures of the Oath of Devotion vary, paladins of this oath share these tenets.\n\n//''Honesty.''// Don’t lie or cheat. Let your word be your promise.\n\n//''Courage.''// Never fear to act, though caution is wise.\n\n//''Compassion.''// Aid others, protect the weak, and punish those who threaten them. Show mercy to your foes, but temper it with wisdom.\n\n//''Honor.''// Treat others with fairness, and let your honorable deeds be an example to them. Do as much good as possible while causing the least amount of harm.\n\n//''Duty.''// Be responsible for your actions and their consequences, protect those entrusted to your care, and obey those who have just authority over you.\n\n!! Oath Spells\n\nYou gain oath spells at the paladin levels listed.\n\n!!! Oath of Devotion Spells\n\n|noborder alternate|k\n|!Paladin Level|!Spells |\n|  3rd |[[Protection from Evil and Good]], [[Sanctuary]] |\n|  5th |[[Lesser Restoration]], [[Zone of Truth]] |\n|  9th |[[Beacon of Hope]], [[Dispel Magic]] |\n| 13th |[[Freedom of Movement]], [[Guardian of Faith]] |\n| 17th |[[Commune]], [[Flame Strike]] |\n\n!! Channel Divinity\n\nWhen you take this oath at 3rd level, you gain the following two Channel Divinity options.\n\n//''Sacred Weapon.''// As an action, you can imbue one weapon that you are holding with positive energy, using your Channel Divinity. For 1 minute, you add your Charisma modifier to attack rolls made with that weapon (with a minimum bonus of +1). The weapon also emits bright light in a 20-foot radius and dim light 20 feet beyond that. If the weapon is not already magical, it becomes magical for the duration.\n\nYou can end this effect on your turn as part of any other action. If you are no longer holding or carrying this weapon, or if you fall unconscious, this effect ends.\n\n//''Turn the Unholy.''// As an action, you present your holy symbol and speak a prayer censuring fiends and undead, using your Channel Divinity. Each fiend or undead that can see or hear you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is turned for 1 minute or until it takes damage.\n\nA turned creature must spend its turns trying to move as far away from you as it can, and it can’t willingly move to a space within 30 feet of you. It also can’t take reactions. For its action, it can use only the Dash action or try to escape from an effect that prevents it from moving. If there’s nowhere to move, the creature can use the Dodge action.\n\n!! Aura of Devotion\n\nStarting at 7th level, you and friendly creatures within 10 feet of you can’t be charmed while you are conscious.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Purity of Spirit\n\nBeginning at 15th level, you are always under the effects of a [[Protection from Evil and Good]] spell.\nHoly Nimbus\n\nAt 20th level, as an action, you can emanate an aura of sunlight. For 1 minute, bright light shines from you in a 30-foot radius, and dim light shines 30 feet beyond that.\n\nWhenever an enemy creature starts its turn in the bright light, the creature takes 10 radiant damage.\n\nIn addition, for the duration, you have advantage on saving throws against spells cast by fiends or undead.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","title":"Oath of Devotion","modified":"20260709093056713","type":"","tags":"Paladin Subclasses [[Player's Handbook]]"},
{"created":"20260709092619166","text":"//The Oath of the Ancients is as old as the race of elves and the rituals of the druids. Sometimes called fey knights, green knights, or horned knights, paladins who swear this oath cast their lot with the side of the light in the cosmic struggle against darkness because they love the beautiful and life-giving things of the world, not necessarily because they believe in principles of honor, courage, and justice. They adorn their armor and clothing with images of growing things — leaves, antlers, or flowers — to reflect their commitment to preserving life and light in the world.//\n\n!! Tenets of the Ancients\n\nThe tenets of the Oath of the Ancients have been preserved for uncounted centuries. This oath emphasizes the principles of good above any concerns of law or chaos. Its four central principles are simple.\n\n//''Kindle the Light.''// Through your acts of mercy, kindness, and forgiveness, kindle the light of hope in the world, beating back despair.\n\n//''Shelter the Light.''// Where there is good, beauty, love, and laughter in the world, stand against the wickedness that would swallow it. Where life flourishes, stand against the forces that would render it barren.\n\n//''Preserve Your Own Light.''// Delight in song and laughter, in beauty and art. If you allow the light to die in your own heart, you can’t preserve it in the world.\n\n//''Be the Light.''// Be a glorious beacon for all who live in despair. Let the light of your joy and courage shine forth in all your deeds.\n\n!! Oath Spells\n\nYou gain oath spells at the paladin levels listed.\n\n!!! Oath of the Ancients Spells\n\n|!Paladin Level|!Spells |\n|  3rd |[[Ensnaring Strike]], [[Speak with Animals]] |\n|  5th |[[Misty Step]], [[Moonbeam]] |\n|  9th |[[Plant Growth]], [[Protection from Energy]] |\n| 13th |[[Ice Storm]], [[Stoneskin]] |\n| 17th |[[Commune with Nature]], [[Tree Stride]] |\n\n!! Channel Divinity\n\nWhen you take this oath at 3rd level, you gain the following two Channel Divinity options.\n\n//''Nature’s Wrath.''// You can use your Channel Divinity to invoke primeval forces to ensnare a foe. As an action, you can cause spectral vines to spring up and reach for a creature within 10 feet of you that you can see. The creature must succeed on a Strength or Dexterity saving throw (its choice) or be restrained. While restrained by the vines, the creature repeats the saving throw at the end of each of its turns. On a success, it frees itself and the vines vanish.\n\n//''Turn the Faithless.''// You can use your Channel Divinity to utter ancient words that are painful for fey and fiends to hear. As an action, you present your holy symbol, and each fey or fiend within 30 feet of you that can hear you must make a Wisdom saving throw. On a failed save, the creature is turned for 1 minute or until it takes damage.\n\nA turned creature must spend its turns trying to move as far away from you as it can, and it can’t willingly move to a space within 30 feet of you. It also can’t take reactions. For its action, it can use only the Dash action or try to escape from an effect that prevents it from moving. If there’s nowhere to move, the creature can use the Dodge action.\n\nIf the creature’s true form is concealed by an illusion, shapeshifting, or other effect, that form is revealed while it is turned.\n\n!! Aura of Warding\n\nBeginning at 7th level, ancient magic lies so heavily upon you that it forms an eldritch ward. You and friendly creatures within 10 feet of you have resistance to damage from spells.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Undying Sentinel\n\nStarting at 15th level, when you are reduced to 0 hit points and are not killed outright, you can choose to drop to 1 hit point instead. Once you use this ability, you can’t use it again until you finish a long rest.\n\nAdditionally, you suffer none of the drawbacks of old age, and you can’t be aged magically.\n\n!! Elder Champion\n\nAt 20th level, you can assume the form of an ancient force of nature, taking on an appearance you choose. For example, your skin might turn green or take on a bark-like texture, your hair might become leafy or moss-like, or you might sprout antlers or a lion-like mane.\n\nUsing your action, you undergo a transformation. For 1 minute, you gain the following benefits:\n\n* At the start of each of your turns, you regain 10 hit points.\n* Whenever you cast a paladin spell that has a casting time of 1 action, you can cast it using a bonus action instead.\n* Enemy creatures within 10 feet of you have disadvantage on saving throws against your paladin spells and Channel Divinity options.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","tags":"Paladin [[Player's Handbook]] Subclasses","title":"Oath of the Ancients","modified":"20260709093109449"},
{"created":"20260709093036848","text":"//The Oath of Vengeance is a solemn commitment to punish those who have committed a grievous sin. When evil forces slaughter helpless villagers, when an entire people turns against the will of the gods, when a thieves’ guild grows too violent and powerful, when a dragon rampages through the countryside — at times like these, paladins arise and swear an Oath of Vengeance to set right that which has gone wrong. To these paladins — sometimes called avengers or dark knights — their own purity is not as important as delivering justice.//\n\n!! Tenets of Vengeance\n\nThe tenets of the Oath of Vengeance vary by paladin, but all the tenets revolve around punishing wrongdoers by any means necessary. Paladins who uphold these tenets are willing to sacrifice even their own righteousness to mete out justice upon those who do evil, so the paladins are often neutral or lawful neutral in alignment. The core principles of the tenets are brutally simple.\n\n//''Fight the Greater Evil.''// Faced with a choice of fighting my sworn foes or combating a lesser evil, I choose the greater evil.\n\n//''No Mercy for the Wicked.''// Ordinary foes might win my mercy, but my sworn enemies do not.\n\n//''By Any Means Necessary.''// My qualms can’t get in the way of exterminating my foes.\n\n//''Restitution.''// If my foes wreak ruin on the world, it is because I failed to stop them. I must help those harmed by their misdeeds.\n\n!! Oath Spells\n\nYou gain oath spells at the paladin levels listed.\n\n!!! Oath of Vengeance Spells\n\n|!Paladin Level|!Spells |\n|  3rd |[[Bane]], [[Hunter's Mark]] |\n|  5th |[[Hold Person]], [[Misty Step]] |\n|  9th |[[Haste]], [[Protection from Energy]] |\n| 13th |[[Banishment]], [[Dimension Door]] |\n| 17th |[[Hold Monster]], [[Scrying]] |\n\n!! Channel Divinity\n\nWhen you take this oath at 3rd level, you gain the following two Channel Divinity options.\n\n//''Abjure Enemy.''// As an action, you present your holy symbol and speak a prayer of denunciation, using your Channel Divinity. Choose one creature within 60 feet of you that you can see. That creature must make a Wisdom saving throw, unless it is immune to being frightened. Fiends and undead have disadvantage on this saving throw.\n\nOn a failed save, the creature is frightened for 1 minute or until it takes any damage. While frightened, the creature’s speed is 0, and it can’t benefit from any bonus to its speed.\n\nOn a successful save, the creature’s speed is halved for 1 minute or until the creature takes any damage.\n\n//''Vow of Enmity.''// As a bonus action, you can utter a vow of enmity against a creature you can see within 10 feet of you, using your Channel Divinity. You gain advantage on attack rolls against the creature for 1 minute or until it drops to 0 hit points or falls unconscious.\n\n!! Relentless Avenger\n\nBy 7th level, your supernatural focus helps you close off a foe’s retreat. When you hit a creature with an opportunity attack, you can move up to half your speed immediately after the attack and as part of the same reaction. This movement doesn’t provoke opportunity attacks.\n\n!! Soul of Vengeance\n\nStarting at 15th level, the authority with which you speak your Vow of Enmity gives you greater power over your foe. When a creature under the effect of your Vow of Enmity makes an attack, you can use your reaction to make a melee weapon attack against that creature if it is within range.\n\n!! Avenging Angel\n\nAt 20th level, you can assume the form of an angelic avenger. Using your action, you undergo a transformation. For 1 hour, you gain the following benefits:\n\n* Wings sprout from your back and grant you a flying speed of 60 feet.\n* You emanate an aura of menace in a 30-foot radius. The first time any enemy creature enters the aura or starts its turn there during a battle, the creature must succeed on a Wisdom saving throw or become frightened of you for 1 minute or until it takes any damage. Attack rolls against the frightened creature have advantage.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","tags":"Paladin Subclasses [[Player's Handbook]]","title":"Oath of Vengeance","modified":"20260709093341556"},
{"created":"20260709084340627","text":"//Whatever their origin and their mission, paladins are united by their oaths to stand against the forces of evil. Whether sworn before a god’s altar and the witness of a priest, in a sacred glade before nature spirits and fey beings, or in a moment of desperation and grief with the dead as the only witness, a paladin’s oath is a powerful bond. It is a source of power that turns a devout warrior into a blessed champion.//\n\n|noborder alternate|k\n|!Level|!PB|!Features |!Spell Slots per Spell Level|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|!1st|!2nd|!3rd|!4th|!5th|\n|  1st | +2 |Divine Sense, Lay on Hands                 | --- | --- | --- | --- | --- |\n|  2nd | +2 |Fighting Style, Spellcasting, Divine Smite |  2  | --- | --- | --- | --- |\n|  3rd | +2 |Divine Health, Sacred Oath                 |  3  | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement                  |  3  | --- | --- | --- | --- |\n|  5th | +3 |Extra Attack                               |  4  |  2  | --- | --- | --- |\n|  6th | +3 |Aura of Protection                         |  4  |  2  | --- | --- | --- |\n|  7th | +3 |Sacred Oath Feature                        |  4  |  3  | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement                  |  4  |  3  | --- | --- | --- |\n|  9th | +4 |---                                        |  4  |  3  |  2  | --- | --- |\n| 10th | +4 |Aura of Courage                            |  4  |  3  |  2  | --- | --- |\n| 11th | +4 |Improved Divine Smite                      |  4  |  3  |  3  | --- | --- |\n| 12th | +4 |Ability Score Improvement                  |  4  |  3  |  3  | --- | --- |\n| 13th | +5 |---                                        |  4  |  3  |  3  |  1  | --- |\n| 14th | +5 |Cleansing Touch                            |  4  |  3  |  3  |  1  | --- |\n| 15th | +5 |Sacred Oath Feature                        |  4  |  3  |  3  |  2  | --- |\n| 16th | +5 |Ability Score Improvement                  |  4  |  3  |  3  |  2  | --- |\n| 17th | +6 |---                                        |  4  |  3  |  3  |  3  |  1  |\n| 18th | +6 |Aura Improvements                          |  4  |  3  |  3  |  3  |  1  |\n| 19th | +6 |Ability Score Improvement                  |  4  |  3  |  3  |  3  |  2  |\n| 20th | +6 |Sacred Oath Feature                        |  4  |  3  |  3  |  3  |  2  |\n\n! Class Features\n\nAs a paladin, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d10 per paladin level\n\n''Hit Points at 1st Level:'' 10 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d10 (or 6) + your Constitution modifier per paladin level after 1st\n\n!! Proficiencies\n\n''Armor:'' All armor, shields\n\n''Weapons:'' Simple weapons, martial weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Wisdom, Charisma\n\n''Skills:'' Choose two from Athletics, Insight, Intimidation, Medicine, Persuasion, and Religion\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[martial weapon|Weapons]] and a [[shield|Armor and Shields]] or (//b//) two [[martial weapons|Weapons]]\n* (//a//) five [[javelins|Weapons]] or (//b//) any [[simple melee weapon|Weapons]]\n* (//a//) a [[priest’s pack|Adventuring Gear]] or (//b//) an [[explorer’s pack|Adventuring Gear]]\n* [[Chain mail|Armor and Shields]] and a [[holy symbol|Adventuring Gear]]\n\n!! Divine Sense\n\nThe presence of strong evil registers on your senses like a noxious odor, and powerful good rings like heavenly music in your ears. As an action, you can open your awareness to detect such forces. Until the end of your next turn, you know the location of any celestial, fiend, or undead within 60 feet of you that is not behind total cover. You know the type (celestial, fiend, or undead) of any being whose presence you sense, but not its identity (the vampire Count Strahd von Zarovich, for instance). Within the same radius, you also detect the presence of any place or object that has been consecrated or desecrated, as with the [[Hallow]] spell.\n\nYou can use this feature a number of times equal to 1 + your Charisma modifier. When you finish a long rest, you regain all expended uses.\n\n!! Lay on Hands\n\nYour blessed touch can heal wounds. You have a pool of healing power that replenishes when you take a long rest. With that pool, you can restore a total number of hit points equal to your paladin level × 5.\n\nAs an action, you can touch a creature and draw power from the pool to restore a number of hit points to that creature, up to the maximum amount remaining in your pool.\n\nAlternatively, you can expend 5 hit points from your pool of healing to cure the target of one disease or neutralize one poison affecting it. You can cure multiple diseases and neutralize multiple poisons with a single use of Lay on Hands, expending hit points separately for each one.\n\nThis feature has no effect on undead and constructs.\n\n!! Fighting Style\n\nAt 2nd level, you adopt a style of fighting as your specialty. Choose one of the following options. You can’t take a Fighting Style option more than once, even if you later get to choose again.\n\n!!! Defense\n\nWhile you are wearing armor, you gain a +1 bonus to AC.\n\n!!! Dueling\n\nWhen you are wielding a melee weapon in one hand and no other weapons, you gain a +2 bonus to damage rolls with that weapon.\n\n!!! Great Weapon Fighting\n\nWhen you roll a 1 or 2 on a damage die for an attack you make with a melee weapon that you are wielding with two hands, you can reroll the die and must use the new roll. The weapon must have the two-handed or versatile property for you to gain this benefit.\n\n!!! Protection\n\nWhen a creature you can see attacks a target other than you that is within 5 feet of you, you can use your reaction to impose disadvantage on the attack roll. You must be wielding a shield.\n\n!! Spellcasting\n\nBy 2nd level, you have learned to draw o
