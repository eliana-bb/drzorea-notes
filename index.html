{"created":"20260711135739107","text":"//Generally, satyrs look similar to humans, with a\nrange of builds and features. However, their goatlike\nhorns, pointed ears, and furred lower bodies sharply\ndistinguish them. Satyrs range from just under 5 feet\nto about 6 feet in height, with generally slender\nbuilds.//\n\n//Satyrs’ solid horns connect to their heads at the\nbase of their skulls, while their legs end in sturdy\nhooves. Thick fur covers their bodies from the waist\ndown. This fur is shorter at the waist and longer\nbelow the knees. Short, soft hair grows down their\nneck and spine, along their shoulders, and on their\nforearms.//\n\n//Satyrs have so much energy at their disposal,\nothers are often hard pressed to keep up despite\nsatyrs’ short stature.//\n\n! Satyr Traits\n\n!! Fast (2 Points)\nYour base speed increases by 5 feet.\n\n!! Fey (2 Points)\nYour creature type is fey, rather than humanoid.\n\n!! Fey Cunning (5 Points)\nChoose one from among Dexterity, Constitution, or\nWisdom. You have advantage on all saving throws of\nthis type against spells and other magical effects. You\ncan take this trait up to three times.\n\n!! Magic Resistance (2 Points)\nChoose one from among Strength, Intelligence, and\nCharisma. You have advantage on all saving throws\nof this type against spells and other magical effects.\nYou can take this trait up to three times.\n\n!! Ram (1 Point)\nYou can use your head and horns to make unarmed\nstrikes. If you hit with them, you deal bludgeoning\ndamage equal to 1d4 + your Strength modifier.","tags":"Parentage [[Elf & Orc 1]]","title":"Satyr Parentage","modified":"20260711135949804"},
{"created":"20260709193520187","text":"The School of Abjuration emphasizes magic that blocks, banishes, or protects. Detractors of this school say that its tradition is about denial, negation rather than positive assertion. You understand, however, that ending harmful effects, protecting the weak, and banishing evil influences is anything but a philosophical void. It is a proud and respected vocation.\n\nCalled abjurers, members of this school are sought when baleful spirits require exorcism, when important locations must be guarded against magical spying, and when portals to other planes of existence must be closed.\n\n!! Abjuration Savant\n\nBeginning when you select this school at 2nd level, the gold and time you must spend to copy an abjuration spell into your spellbook is halved.\n\n!! Arcane Ward\n\nStarting at 2nd level, you can weave magic around yourself for protection. When you cast an abjuration spell of 1st level or higher, you can simultaneously use a strand of the spell’s magic to create a magical ward on yourself that lasts until you finish a long rest. The ward has a hit point maximum equal to twice your wizard level + your Intelligence modifier. Whenever you take damage, the ward takes the damage instead. If this damage reduces the ward to 0 hit points, you take any remaining damage.\n\nWhile the ward has 0 hit points, it can’t absorb damage, but its magic remains. Whenever you cast an abjuration spell of 1st level or higher, the ward regains a number of hit points equal to twice the level of the spell.\n\nOnce you create the ward, you can’t create it again until you finish a long rest.\n\n!! Projected Ward\n\nStarting at 6th level, when a creature that you can see within 30 feet of you takes damage, you can use your reaction to cause your Arcane Ward to absorb that damage. If this damage reduces the ward to 0 hit points, the warded creature takes any remaining damage.\n\n!! Improved Abjuration\n\nBeginning at 10th level, when you cast an abjuration spell that requires you to make an ability check as a part of casting that spell (as in [[Counterspell]] and [[Dispel Magic]]), you add your proficiency bonus to that ability check.\n\n!! Spell Resistance\n\nStarting at 14th level, you have advantage on saving throws against spells.\n\nFurthermore, you have resistance against the damage of spells.","title":"School of Abjuration","modified":"20260709193610274","type":"","tags":"Wizard Subclasses [[Player's Handbook]]"},
{"created":"20260709193616886","text":"As a conjurer, you favor spells that produce objects and creatures out of thin air. You can conjure billowing clouds of killing fog or summon creatures from elsewhere to fight on your behalf. As your mastery grows, you learn spells of transportation and can teleport yourself across vast distances, even to other planes of existence, in an instant.\n\n!! Conjuration Savant\n\nBeginning when you select this school at 2nd level, the gold and time you must spend to copy a conjuration spell into your spellbook is halved.\n\n!! Minor Conjuration\n\nStarting at 2nd level when you select this school, you can use your action to conjure up an inanimate object in your hand or on the ground in an unoccupied space that you can see within 10 feet of you. This object can be no larger than 3 feet on a side and weigh no more than 10 pounds, and its form must be that of a nonmagical object that you have seen. The object is visibly magical, radiating dim light out to 5 feet.\n\nThe object disappears after 1 hour, when you use this feature again, or if it takes or deals any damage.\n\n!! Benign Transposition\n\nStarting at 6th level, you can use your action to teleport up to 30 feet to an unoccupied space that you can see. Alternatively, you can choose a space within range that is occupied by a Small or Medium creature. If that creature is willing, you both teleport, swapping places.\n\nOnce you use this feature, you can’t use it again until you finish a long rest or you cast a conjuration spell of 1st level or higher.\n\n!! Focused Conjuration\n\nBeginning at 10th level, while you are concentrating on a conjuration spell, your concentration can’t be broken as a result of taking damage.\n\n!! Durable Summons\n\nStarting at 14th level, any creature that you summon or create with a conjuration spell has 30 temporary hit points.","title":"School of Conjuration","modified":"20260709193652919","type":"","tags":"Wizard Subclasses [[Player's Handbook]]"},
{"created":"20260709193659316","text":"The counsel of a diviner is sought by royalty and commoners alike, for all seek a clearer understanding of the past, present, and future. As a diviner, you strive to part the veils of space, time, and consciousness so that you can see clearly. You work to master spells of discernment, remote viewing, supernatural knowledge, and foresight.\n\n!! Divination Savant\n\nBeginning when you select this school at 2nd level, the gold and time you must spend to copy a divination spell into your spellbook is halved.\n\n!! Portent\n\nStarting at 2nd level when you choose this school, glimpses of the future begin to press in on your awareness. When you finish a long rest, roll two d20s and record the numbers rolled. You can replace any attack roll, saving throw, or ability check made by you or a creature that you can see with one of these foretelling rolls. You must choose to do so before the roll, and you can replace a roll in this way only once per turn.\n\nEach foretelling roll can be used only once. When you finish a long rest, you lose any unused foretelling rolls.\n\n!! Expert Divination\n\nBeginning at 6th level, casting divination spells comes so easily to you that it expends only a fraction of your spellcasting efforts. When you cast a divination spell of 2nd level or higher using a spell slot, you regain one expended spell slot. The slot you regain must be of a level lower than the spell you cast and can’t be higher than 5th level.\n\n!! The Third Eye\n\nStarting at 10th level, you can use your action to increase your powers of perception. When you do so, choose one of the following benefits, which lasts until you are incapacitated or you take a short or long rest. You can’t use the feature again until you finish a rest.\n\n//''Darkvision.''// You gain darkvision out to a range of 60 feet.\n\n//''Ethereal Sight.''// You can see into the Ethereal Plane within 60 feet of you.\n\n//''Greater Comprehension.''// You can read any language.\n\n//''See Invisibility.''// You can see invisible creatures and objects within 10 feet of you that are within line of sight.\n\n!! Greater Portent\n\nStarting at 14th level, the visions in your dreams intensify and paint a more accurate picture in your mind of what is to come. You roll three d20s for your Portent feature, rather than two.","title":"School of Divination","modified":"20260709193744583","type":"","tags":"Wizard Subclasses [[Player's Handbook]]"},
{"created":"20260709193751729","text":"As a member of the School of Enchantment, you have honed your ability to magically entrance and beguile other people and monsters. Some enchanters are peacemakers who bewitch the violent to lay down their arms and charm the cruel into showing mercy. Others are tyrants who magically bind the unwilling into their service. Most enchanters fall somewhere in between.\n\n!! Enchantment Savant\n\nBeginning when you select this school at 2nd level, the gold and time you must spend to copy an enchantment spell into your spellbook is halved.\n\n!! Hypnotic Gaze\n\nStarting at 2nd level when you choose this school, your soft words and enchanting gaze can magically enthrall another creature. As an action, choose one creature that you can see within 5 feet of you. If the target can see or hear you, it must succeed on a Wisdom saving throw against your wizard spell save DC or be charmed by you until the end of your next turn. The charmed creature’s speed drops to 0, and the creature is incapacitated and visibly dazed.\n\nOn subsequent turns, you can use your action to maintain this effect, extending its duration until the end of your next turn. However, the effect ends if you move more than 5 feet away from the creature, if the creature can neither see nor hear you, or if the creature takes damage.\n\nOnce the effect ends, or if the creature succeeds on its initial saving throw against this effect, you can’t use this feature on that creature again until you finish a long rest.\n\n!! Instinctive Charm\n\nBeginning at 6th level, when a creature you can see within 30 feet of you makes an attack roll against you, you can use your reaction to divert the attack, provided that another creature is within the attack’s range. The attacker must make a Wisdom saving throw against your wizard spell save DC. On a failed save, the attacker must target the creature that is closest to it, not including you or itself. If multiple creatures are closest, the attacker chooses which one to target. On a successful save, you can’t use this feature on the attacker again until you finish a long rest.\n\nYou must choose to use this feature before knowing whether the attack hits or misses. Creatures that can’t be charmed are immune to this effect.\n\n!! Split Enchantment\n\nStarting at 10th level, when you cast an enchantment spell of 1st level or higher that targets only one creature, you can have it target a second creature.\n\n!! Alter Memories\n\nAt 14th level, you gain the ability to make a creature unaware of your magical influence on it. When you cast an enchantment spell to charm one or more creatures, you can alter one creature’s understanding so that it remains unaware of being charmed.\n\nAdditionally, once before the spell expires, you can use your action to try to make the chosen creature forget some of the time it spent charmed. The creature must succeed on an Intelligence saving throw against your wizard spell save DC or lose a number of hours of its memories equal to 1 + your Charisma modifier (minimum 1). You can make the creature forget less time, and the amount of time can’t exceed the duration of your enchantment spell.","title":"School of Enchantment","modified":"20260709193828363","type":"","tags":"Wizard Subclasses [[Player's Handbook]]"},
{"created":"20260709193834728","text":"You focus your study on magic that creates powerful elemental effects such as bitter cold, searing flame, rolling thunder, crackling lightning, and burning acid. Some evokers find employment in military forces, serving as artillery to blast enemy armies from afar. Others use their spectacular power to protect the weak, while some seek their own gain as bandits, adventurers, or aspiring tyrants.\n\n!! Evocation Savant\n\nBeginning when you select this school at 2nd level, the gold and time you must spend to copy an evocation spell into your spellbook is halved.\n\n!! Sculpt Spells\n\nBeginning at 2nd level, you can create pockets of relative safety within the effects of your evocation spells. When you cast an evocation spell that affects other creatures that you can see, you can choose a number of them equal to 1 + the spell’s level. The chosen creatures automatically succeed on their saving throws against the spell, and they take no damage if they would normally take half damage on a successful save.\n\n!! Potent Cantrip\n\nStarting at 6th level, your damaging cantrips affect even creatures that avoid the brunt of the effect. When a creature succeeds on a saving throw against your cantrip, the creature takes half the cantrip’s damage (if any) but suffers no additional effect from the cantrip.\n\n!! Empowered Evocation\n\nBeginning at 10th level, you can add your Intelligence modifier to one damage roll of any wizard evocation spell you cast.\n\n!! Overchannel\n\nStarting at 14th level, you can increase the power of your simpler spells. When you cast a wizard spell of 1st through 5th level that deals damage, you can deal maximum damage with that spell.\n\nThe first time you do so, you suffer no adverse effect. If you use this feature again before you finish a long rest, you take 2d12 necrotic damage for each level of the spell, immediately after you cast it. Each time you use this feature again before finishing a long rest, the necrotic damage per spell level increases by 1d12. This damage ignores resistance and immunity.","title":"School of Evocation","modified":"20260709193904805","type":"","tags":"Wizard Subclasses [[Player's Handbook]]"},
{"created":"20260709193908801","text":"You focus your studies on magic that dazzles the senses, befuddles the mind, and tricks even the wisest folk. Your magic is subtle, but the illusions crafted by your keen mind make the impossible seem real. Some illusionists — including many gnome wizards — are benign tricksters who use their spells to entertain. Others are more sinister masters of deception, using their illusions to frighten and fool others for their personal gain.\n\n!! Illusion Savant\n\nBeginning when you select this school at 2nd level, the gold and time you must spend to copy an illusion spell into your spellbook is halved.\n\n!! Improved Minor Illusion\n\nWhen you choose this school at 2nd level, you learn the [[Minor Illusion]] cantrip. If you already know this cantrip, you learn a different wizard cantrip of your choice. The cantrip doesn’t count against your number of cantrips known.\n\nWhen you cast [[Minor Illusion]], you can create both a sound and an image with a single casting of the spell.\n\n!! Malleable Illusions\n\nStarting at 6th level, when you cast an illusion spell that has a duration of 1 minute or longer, you can use your action to change the nature of that illusion (using the spell’s normal parameters for the illusion), provided that you can see the illusion.\n\n!! Illusory Self\n\nBeginning at 10th level, you can create an illusory duplicate of yourself as an instant, almost instinctual reaction to danger. When a creature makes an attack roll against you, you can use your reaction to interpose the illusory duplicate between the attacker and yourself. The attack automatically misses you, then the illusion dissipates.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.\n\n!! Illusory Reality\n\nBy 14th level, you have learned the secret of weaving shadow magic into your illusions to give them a semi-reality. When you cast an illusion spell of 1st level or higher, you can choose one inanimate, nonmagical object that is part of the illusion and make that object real. You can do this on your turn as a bonus action while the spell is ongoing. The object remains real for 1 minute. For example, you can create an illusion of a bridge over a chasm and then make it real long enough for your allies to cross.\n\nThe object can’t deal damage or otherwise directly harm anyone.","title":"School of Illusion","modified":"20260709193956214","type":"","tags":"Wizard Subclasses [[Player's Handbook]]"},
{"created":"20260709194002556","text":"The School of Necromancy explores the cosmic forces of life, death, and undeath. As you focus your studies in this tradition, you learn to manipulate the energy that animates all living things. As you progress, you learn to sap the life force from a creature as your magic destroys its body, transforming that vital energy into magical power you can manipulate.\n\nMost people see necromancers as menacing, or even villainous, due to the close association with death. Not all necromancers are evil, but the forces they manipulate are considered taboo by many societies.\n\n!! Necromancy Savant\n\nBeginning when you select this school at 2nd level, the gold and time you must spend to copy a necromancy spell into your spellbook is halved.\n\n!! Grim Harvest\n\nAt 2nd level, you gain the ability to reap life energy from creatures you kill with your spells. Once per turn when you kill one or more creatures with a spell of 1st level or higher, you regain hit points equal to twice the spell’s level, or three times its level if the spell belongs to the School of Necromancy. You don’t gain this benefit for killing constructs or undead.\n\n!! Undead Thralls\n\nAt 6th level, you add the [[Animate Dead]] spell to your spellbook if it is not there already. When you cast [[Animate Dead]], you can target one additional corpse or pile of bones, creating another zombie or skeleton, as appropriate.\n\nWhenever you create an undead using a necromancy spell, it has additional benefits:\n\n* The creature’s hit point maximum is increased by an amount equal to your wizard level.\n* The creature adds your proficiency bonus to its weapon damage rolls.\n\n!! Inured to Undeath\n\nBeginning at 10th level, you have resistance to necrotic damage, and your hit point maximum can’t be reduced. You have spent so much time dealing with undead and the forces that animate them that you have become inured to some of their worst effects.\n\n!! Command Undead\n\nStarting at 14th level, you can use magic to bring undead under your control, even those created by other wizards. As an action, you can choose one undead that you can see within 60 feet of you. That creature must make a Charisma saving throw against your wizard spell save DC. If it succeeds, you can’t use this feature on it again. If it fails, it becomes friendly to you and obeys your commands until you use this feature again.\n\nIntelligent undead are harder to control in this way. If the target has an Intelligence of 8 or higher, it has advantage on the saving throw. If it fails the saving throw and has an Intelligence of 12 or higher, it can repeat the saving throw at the end of every hour until it succeeds and breaks free.","title":"School of Necromancy","modified":"20260709194115415","type":"","tags":"Wizard Subclasses [[Player's Handbook]]"},
{"created":"20260709194118090","text":"You are a student of spells that modify energy and matter. To you, the world is not a fixed thing, but eminently mutable, and you delight in being an agent of change. You wield the raw stuff of creation and learn to alter both physical forms and mental qualities. Your magic gives you the tools to become a smith on reality’s forge.\n\nSome transmuters are tinkerers and pranksters, turning people into toads and transforming copper into silver for fun and occasional profit. Others pursue their magical studies with deadly seriousness, seeking the power of the gods to make and destroy worlds.\n\n!! Transmutation Savant\n\nBeginning when you select this school at 2nd level, the gold and time you must spend to copy a transmutation spell into your spellbook is halved.\n\n!! Minor Alchemy\n\nStarting at 2nd level when you select this school, you can temporarily alter the physical properties of one nonmagical object, changing it from one substance into another. You perform a special alchemical procedure on one object composed entirely of wood, stone (but not a gemstone), iron, copper, or silver, transforming it into a different one of those materials. For each 10 minutes you spend performing the procedure, you can transform up to 1 cubic foot of material. After 1 hour, or until you lose your concentration (as if you were concentrating on a spell), the material reverts to its original substance.\n\n!! Transmuter’s Stone\n\nStarting at 6th level, you can spend 8 hours creating a transmuter’s stone that stores transmutation magic. You can benefit from the stone yourself or give it to another creature. A creature gains a benefit of your choice as long as the stone is in the creature’s possession. When you create the stone, choose the benefit from the following options:\n\n* Darkvision out to a range of 60 feet\n* An increase to speed of 10 feet while the creature is unencumbered\n* Proficiency in Constitution saving throws\n* Resistance to acid, cold, fire, lightning, or thunder damage (your choice whenever you choose this benefit)\n\nEach time you cast a transmutation spell of 1st level or higher, you can change the effect of your stone if the stone is on your person.\n\nIf you create a new transmuter’s stone, the previous one ceases to function.\n\n!! Shapechanger\n\nAt 10th level, you add the [[Polymorph]] spell to your spellbook, if it is not there already. You can cast [[Polymorph]] without expending a spell slot. When you do so, you can target only yourself and transform into a beast whose challenge rating is 1 or lower.\n\nOnce you cast [[Polymorph]] in this way, you can’t do so again until you finish a short or long rest, though you can still cast it normally using an available spell slot.\n\n!! Master Transmuter\n\nStarting at 14th level, you can use your action to consume the reserve of transmutation magic stored within your transmuter’s stone in a single burst. When you do so, choose one of the following effects. Your transmuter’s stone is destroyed and can’t be remade until you finish a long rest.\n\n//''Major Transformation.''// You can transmute one nonmagical object — no larger than a 5-foot cube — into another nonmagical object of similar size and mass and of equal or lesser value. You must spend 10 minutes handling the object to transform it.\n\n//''Panacea.''// You remove all curses, diseases, and poisons affecting a creature that you touch with the transmuter’s stone. The creature also regains all its hit points.\n\n//''Restore Life.''// You cast the [[Raise Dead]] spell on a creature you touch with the transmuter’s stone, without expending a spell slot or needing to have the spell in your spellbook.\n\nRestore Youth. You touch the transmuter’s stone to a willing creature, and that creature’s apparent age is reduced by 3d10 years, to a minimum of 13 years. This effect doesn’t extend the creature’s lifespan.","title":"School of Transmutation","modified":"20260709194315861","type":"","tags":"Wizard Subclasses [[Player's Handbook]]"},
{"created":"20260711135953491","text":"//A shifter is born with a beast within, an archetypal\nforce that shapes their body and mind. The beast\nwithin is a pool of powerful instincts.//\n\n//When a shifter fully embraces this beast within,\nthey physically transform for a short time. A shifter’s\ntype reflects the beast within. Four are especially\ncommon: Beasthide often signifies the bear or boar:\nresilient and thick-skinned. Longtooth shifters\ntypically have lupine traits and deliver a fearsome\nbite. Swiftstride are often predatory and feline, but a\nswiftstride could also be a cunning rat who darts\nthrough the shadows. Wildhunt shifters are born\nfrom any creature that tracks its prey.//\n\n//While the beast within certainly has a physical\nimpact on a shifter, the shifter’s personality is their\nown. Two beasthide shifters share the same special\ntrait, but if one has the aspect of the boar and the\nother is more like a bear, they’ll be quite different in\nappearance. With any shifter, identifying the beast\nwithin is a crucial part of understanding themself.//\n\n! Shifter Traits\n\n!! Beasthide Shifting (6 Points)\nAs a bonus action, you can assume a more bestial\nappearance. This transformation lasts for 1 minute,\nuntil you die, or until you revert to your normal\nappearance as a bonus action. When you shift, you\ngain 1d6 temporary hit points. While shifted, you\nhave a +1 bonus to your Armor Class.\n\nIf you already have the Shifting trait from another\nbirth parent, the temporary hit points stack when you\nshift.\n\nOnce you shift, you can’t do so again until you\nfinish a short or long rest.\n\n!! Darkvision (4 Points)\nYou have superior vision in dark and dim conditions.\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Longtooth Shifting (5 Points)\nAs a bonus action, you can assume a more bestial\nappearance. This transformation lasts for 1 minute,\nuntil you die, or until you revert to your normal\nappearance as a bonus action. While shifted, you can\nuse your elongated fangs to make an unarmed strike\nas a bonus action. If you hit with your fangs, you can\ndeal piercing damage equal to 1d6 + your Strength\nmodifier, instead of the bludgeoning damage normal\nfor an unarmed strike.\n\nOnce you shift, you can’t do so again until you\nfinish a short or long rest.\n\n!! Shifting (3 Points)\nAs a bonus action, you can assume a more bestial\nappearance. This transformation lasts for 1 minute,\nuntil you die, or until you revert to your normal\nappearance as a bonus action. When you shift, you\ngain temporary hit points equal to your level + your\nConstitution modifier (minimum of 1 temporary hit\npoint).\n\nOnce you shift, you can’t do so again until you\nfinish a short or long rest.\n\n!! Swiftstride Shifting (6 Points)\nAs a bonus action, you can assume a more bestial\nappearance. This transformation lasts for 1 minute,\nuntil you die, or until you revert to your normal\nappearance as a bonus action. While shifted, your\nbase speed increases by 10 feet. Additionally, you can\nmove up to 10 feet as a reaction when a creature\nends its turn within 5 feet of you. This reactive\nmovement doesn’t provoke opportunity attacks.\n\nOnce you shift, you can’t do so again until you\nfinish a short or long rest.\n\n!! Wildhunt Shifting (8 Points)\nAs a bonus action, you can assume a more bestial\nappearance. This transformation lasts for 1 minute,\nuntil you die, or until you revert to your normal\nappearance as a bonus action. While shifted, you\nhave advantage on Wisdom checks, and no creature\nwithin 30 feet of you can make an attack roll with\nadvantage against you, unless you’re incapacitated.\n\nOnce you shift, you can’t do so again until you\nfinish a short or long rest.","tags":"Parentage [[Elf & Orc 1]]","title":"Shifter Parentage","modified":"20260711140306762"},
{"created":"20260711140310721","text":"//Some use magic to fuse different life forms together.\nSome organizations or powerful individuals extend\nthis research to humanoid subjects, magically\ntransferring the traits of various animals into\nhumans, elves, vedalken, and others.//\n\n//These hyper-evolved specimens are called hybrids,\nthough they sometimes refer to themselves as\nguardians. A hybrid’s biological enhancements can\nchange their appearance drastically, though most\nhybrids retain their basic physical form.//\n\n//All are augmented with characteristics of animals,\nmostly aquatic, reptilian, or amphibian creatures.\nThese include crab claws, squid tentacles, wings or\nfins like those of manta rays, translucent or\ncamouflaged skin, or shark-like maws filled with\nsharp teeth.//\n\n//Because hybrids are already a combination of\nspecies, even those with two hybrid birth parents are\nstill partly something else.//\n\n! Simic Hybrid Traits\n\n!! Acid Spit (9 Points)\n\nStarting at 5th level, you can spray acid from glands\nin your mouth. As an action, you target one creature\nor object you can see within 30 feet of you. The\ntarget takes 2d10 acid damage unless it succeeds on\na Dexterity saving throw against a DC equal to 8 +\nyour Constitution modifier + your proficiency bonus.\n\nThis damage increases by 1d10 when you reach\n11th level (3d10) and 17th level (4d10). You can use\nthis trait a number of times equal to your\nConstitution modifier (minimum of once), and you\nregain all expended uses of it when you finish a long\nrest.\n\n!! Carapace (4 Points)\nStarting at 5th level, your skin in places is covered by\na thick shell. You gain a +1 bonus to AC when you’re\nnot wearing heavy armor.\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Grappling Appendages (3 Points)\nStarting at 5th level, you have two special\nappendages growing alongside your arms. Choose\nwhether they’re both claws or tentacles. As an action,\nyou can use one of them to try to grapple a creature.\nEach one is also a natural weapon, which you can\nuse to make an unarmed strike. If you hit with it, the\ntarget takes bludgeoning damage equal to 1d6 + your\nStrength modifier, instead of the bludgeoning\ndamage normal for an unarmed strike. Immediately\nafter hitting, you can try to grapple the target as a\nbonus action. These appendages can’t precisely\nmanipulate anything and can’t wield weapons, magic\nitems, or other specialized equipment.\n\n!! Manta Glide (1 Point)\nYou have ray-like fins that you can use as wings to\nslow your fall or allow you to glide. When you fall and\naren’t incapacitated, you can subtract up to 100 feet\nfrom the fall when calculating falling damage, and\nyou can move up to 2 feet horizontally for every 1\nfoot you descend.\n\n!! Nimble Climber (6 Points)\nYou have a climbing speed equal to your base speed.\n\n!! Underwater Adaptation (3 Points)\nYou can breathe air and water, and you have a\nswimming speed equal to your base speed.","tags":"Parentage [[Elf & Orc 1]]","title":"Simic Hybrid Parentage","modified":"20260711140509378"},
{"created":"20260711122236052","text":"War has been your life for as long as you care to remember. You trained as a youth, studied the use of weapons and armor, learned basic survival techniques, including how to stay alive on the battlefield. You might have been part of a standing national army or a mercenary company, or perhaps a member of a local militia who rose to prominence during a recent war.\n\nWhen you choose this background, work with your DM to determine which military organization you were a part of, how far through its ranks you progressed, and what kind of experiences you had during your military career. Was it a standing army, a town guard, or a village militia? Or it might have been a noble’s or merchant’s private army, or a mercenary company.\n\n''Skill Proficiencies:'' Athletics, Intimidation\n\n''Tool Proficiencies:'' One type of gaming set, vehicles (land)\n\n''Equipment:'' An insignia of rank, a trophy taken from a fallen enemy (a dagger, broken blade, or piece of a banner), a set of bone dice or deck of cards, a set of [[common clothes|Adventuring Gear]], and a [[pouch|Adventuring Gear]] containing 10 gp\n\n!! Specialty\n\nDuring your time as a soldier, you had a specific role to play in your unit or army. Roll a d8 or choose from the options in the table below to determine your role:\n\n|noborder alternate|k\n|!d8|!Specialty |\n| 1 |Officer |\n| 2 |Scout |\n| 3 |Infantry |\n| 4 |Cavalry |\n| 5 |Healer |\n| 6 |Quartermaster |\n| 7 |Standard bearer |\n| 8 |Support staff (cook, blacksmith, or the like) |\n\n!! Feature: Military Rank\n\nYou have a military rank from your career as a soldier. Soldiers loyal to your former military organization still recognize your authority and influence, and they defer to you if they are of a lower rank. You can invoke your rank to exert influence over other soldiers and requisition simple equipment or horses for temporary use. You can also usually gain access to friendly military encampments and fortresses where your rank is recognized.\n\n!! Suggested Characteristics\n\nThe horrors of war combined with the rigid discipline of military service leave their mark on all soldiers, shaping their ideals, creating strong bonds, and often leaving them scarred and vulnerable to fear, shame, and hatred.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I’m always polite and respectful. |\n| 2 |I’m haunted by memories of war. I can’t get the images of violence out of my mind. |\n| 3 |I’ve lost too many friends, and I’m slow to make new ones. |\n| 4 |I’m full of inspiring and cautionary tales from my military experience relevant to almost every combat situation. |\n| 5 |I can stare down a hell hound without flinching. |\n| 6 |I enjoy being strong and like breaking things. |\n| 7 |I have a crude sense of humor. |\n| 8 |I face problems head-on. A simple, direct solution is the best path to success. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Greater Good.'' Our lot is to lay down our lives in defense of others. (Good) |\n| 2 |''Responsibility.'' I do what I must and obey just authority. (Lawful) |\n| 3 |''Independence.'' When people follow orders blindly, they embrace a kind of tyranny. (Chaotic) |\n| 4 |''Might.'' In life as in war, the stronger force wins. (Evil) |\n| 5 |''Live and Let Live.'' Ideals aren’t worth killing over or going to war for. (Neutral) |\n| 6 |''Nation.'' My city, nation, or people are all that matter. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |I would still lay down my life for the people I served with. |\n| 2 |Someone saved my life on the battlefield. To this day, I will never leave a friend behind. |\n| 3 |My honor is my life. |\n| 4 |I’ll never forget the crushing defeat my company suffered or the enemies who dealt it. |\n| 5 |Those who fight beside me are those worth dying for. |\n| 6 |I fight for those who cannot fight for themselves. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |The monstrous enemy we faced in battle still leaves me quivering with fear. |\n| 2 |I have little respect for anyone who is not a proven warrior. |\n| 3 |I made a terrible mistake in battle that cost many lives, and I would do anything to keep that mistake secret. |\n| 4 |My hatred of my enemies is blind and unreasoning. |\n| 5 |I obey the law, even if the law causes misery. |\n| 6 |I’d rather eat my armor than admit when I’m wrong. |","tags":"[[Player's Handbook]] Background","title":"Soldier","modified":"20260711123001065"},
{"created":"20260709181137966","text":"//Sorcerers carry a magical birthright conferred upon them by an exotic bloodline, some otherworldly influence, or exposure to unknown cosmic forces. One can’t study sorcery as one learns a language, any more than one can learn to live a legendary life. No one chooses sorcery; the power chooses the sorcerer.//\n\n|noborder alternate|k\n|!Level|!PB|!Sorcery Points|!Features |!Cantrips Known|!Spells Known|!Spell Slots per Spell Level|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|!6th|!7th|!8th|!9th|\n|  1st | +2 | --- |Spellcasting, Sorcerous Origin | 4 | 2  | 2 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |  2  |Font of Magic                  | 4 | 3  | 3 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  3rd | +2 |  3  |Metamagic                      | 4 | 4  | 4 |  2  | --- | --- | --- | --- | --- | --- | --- |\n|  4th | +2 |  4  |Ability Score Improvement      | 5 | 5  | 4 |  3  | --- | --- | --- | --- | --- | --- | --- |\n|  5th | +3 |  5  |---                            | 5 | 6  | 4 |  3  |  2  | --- | --- | --- | --- | --- | --- |\n|  6th | +3 |  6  |Sorcerous Origin Feature       | 5 | 7  | 4 |  3  |  3  | --- | --- | --- | --- | --- | --- |\n|  7th | +3 |  7  |---                            | 5 | 8  | 4 |  3  |  3  |  1  | --- | --- | --- | --- | --- |\n|  8th | +3 |  8  |Ability Score Improvement      | 5 | 9  | 4 |  3  |  3  |  2  | --- | --- | --- | --- | --- |\n|  9th | +4 |  9  |---                            | 5 | 10 | 4 |  3  |  3  |  3  |  1  | --- | --- | --- | --- |\n| 10th | +4 | 10  |Metamagic                      | 6 | 11 | 4 |  3  |  3  |  3  |  2  | --- | --- | --- | --- |\n| 11th | +4 | 11  |---                            | 6 | 12 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 12th | +4 | 12  |Ability Score Improvement      | 6 | 12 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 13th | +5 | 13  |---                            | 6 | 13 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 14th | +5 | 14  |Sorcerous Origin Feature       | 6 | 13 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 15th | +5 | 15  |---                            | 6 | 14 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 16th | +5 | 16  |Ability Score Improvement      | 6 | 14 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 17th | +6 | 17  |Metamagic                      | 6 | 15 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  |  1  |\n| 18th | +6 | 18  |Sorcerous Origin Feature       | 6 | 15 | 4 |  3  |  3  |  3  |  3  |  1  |  1  |  1  |  1  |\n| 19th | +6 | 19  |Ability Score Improvement      | 6 | 15 | 4 |  3  |  3  |  3  |  3  |  2  |  1  |  1  |  1  |\n| 20th | +6 | 20  |Sorcerous Restoration          | 6 | 15 | 4 |  3  |  3  |  3  |  3  |  2  |  2  |  1  |  1  |\n\n! Class Features\n\nAs a sorcerer, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d6 per sorcerer level\n\n''Hit Points at 1st Level:'' 6 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d6 (or 4) + your Constitution modifier per sorcerer level after 1st\n\n!! Proficiencies\n\n''Armor:'' None\n\n''Weapons:'' Daggers, darts, slings, quarterstaffs, light crossbows\n\n''Tools:'' None\n\n''Saving Throws:'' Constitution, Charisma\n\n''Skills:'' Choose two from Arcana, Deception, Insight, Intimidation, Persuasion, and Religion\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[light crossbow|Weapons]] and 20 [[bolts|Adventuring Gear]] or (//b//) any [[simple weapon|Weapons]]\n* (//a//) a [[component pouch|Adventuring Gear]] or (//b//) an [[arcane focus|Adventuring Gear]]\n* (//a//) a [[dungeoneer’s pack|Adventuring Gear]] or (//b//) an [[explorer’s pack|Adventuring Gear]]\n* Two [[daggers|Weapons]]\n\nAlternatively, you may start with 3d4x10 gp to buy your equipment.\n\n!! Spellcasting\n\nAn event in your past, or in the life of a parent or ancestor, left an indelible mark on you, infusing you with arcane magic. This font of magic, whatever its origin, fuels your spells.\n\n!!! Cantrips\n\nAt 1st level, you know four cantrips of your choice from the sorcerer spell list. You learn additional sorcerer cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Sorcerer table.\n\n!!! Spell Slots\n\nThe Sorcerer table shows how many spell slots you have to cast your sorcerer spells of 1st level and higher. To cast one of these sorcerer spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nFor example, if you know the 1st-level spell [[Burning Hands]] and have a 1st-level and a 2nd-level spell slot available, you can cast [[Burning Hands]] using either slot.\n\n!!! Spells Known of 1st Level and Higher\n\nYou know two 1st-level spells of your choice from the sorcerer spell list.\n\nThe Spells Known column of the Sorcerer table shows when you learn more sorcerer spells of your choice. Each of these spells must be of a level for which you have spell slots. For instance, when you reach 3rd level in this class, you can learn one new spell of 1st or 2nd level.\n\nAdditionally, when you gain a level in this class, you can choose one of the sorcerer spells you know and replace it with another spell from the sorcerer spell list, which also must be of a level for which you have spell slots.\n\n!!! Spellcasting Ability\n\nCharisma is your spellcasting ability for your sorcerer spells, since the power of your magic relies on your ability to project your will into the world. You use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a sorcerer spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Charisma modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Charisma modifier\n\n!!! Spellcasting Focus\n\nYou can use an arcane focus as a spellcasting focus for your sorcerer spells.\n\n!! Sorcerous Origin\n\nChoose a sorcerous origin, which describes the source of your innate magical power. Your choice grants you features when you choose it at 1st level and again at 6th, 14th, and 18th level.\n\n* [[Draconic Bloodline]]{{$:/PHB}}\n* [[Wild Magic]]{{$:/PHB}}\n\n!! Font of Magic\n\nAt 2nd level, you tap into a deep wellspring of magic within yourself. This wellspring is represented by sorcery points, which allow you to create a variety of magical effects.\n\n!!! Sorcery Points\n\nYou have 2 sorcery points, and you gain more as you reach higher levels, as shown in the Sorcery Points column of the Sorcerer table. You can never have more sorcery points than shown on the table for your level. You regain all spent sorcery points when you finish a long rest.\n\n!!! Flexible Casting\n\nYou can use your sorcery points to gain additional spell slots, or sacrifice spell slots to gain additional sorcery points. You learn other ways to use your sorcery points as you reach higher levels.\n\n//''Creating Spell Slots.''// You can transform unexpended sorcery points into one spell slot as a bonus action on your turn. The Creating Spell Slots table shows the cost of creating a spell slot of a given level. You can create spell slots no higher in level than 5th.\n\nAny spell slot you create with this feature vanishes when you finish a long rest.\n\n|noborder alternate|k\n|!Spell Slot Level|!Sorcery Point Cost|\n| 1st | 2 |\n| 2nd | 3 |\n| 3rd | 5 |\n| 4th | 6 |\n| 5th | 7 |\n\n//''Converting a Spell Slot to Sorcery Points.''// As a bonus action on your turn, you can expend one spell slot and gain a number of sorcery points equal to the slot’s level.\n\n!! Metamagic\n\nAt 3rd level, you gain the ability to twist your spells to suit your needs. You gain two of the following Metamagic options of your choice. You gain another one at 10th and 17th level.\n\nYou can use only one Metamagic option on a spell when you cast it, unless otherwise noted.\n\n!!! Careful Spell\n\nWhen you cast a spell that forces other creatures to make a saving throw, you can protect some of those creatures from the spell’s full force. To do so, you spend 1 sorcery point and choose a number of those creatures up to your Charisma modifier (minimum of one creature). A chosen creature automatically succeeds on its saving throw against the spell.\n\n!!! Distant Spell\n\nWhen you cast a spell that has a range of 5 feet or greater, you can spend 1 sorcery point to double the range of the spell.\n\nWhen you cast a spell that has a range of touch, you can spend 1 sorcery point to make the range of the spell 30 feet.\n\n!!! Empowered Spell\n\nWhen you roll damage for a spell, you can spend 1 sorcery point to reroll a number of the damage dice up to your Charisma modifier (minimum of one). You must use the new rolls.\n\nYou can use Empowered Spell even if you have already used a different Metamagic option during the casting of the spell.\n\n!!! Extended Spell\n\nWhen you cast a spell that has a duration of 1 minute or longer, you can spend 1 sorcery point to double its duration, to a maximum duration of 24 hours.\n\n!!! Heightened Spell\n\nWhen you cast a spell that forces a creature to make a saving throw to resist its effects, you can spend 3 sorcery points to give one target of the spell disadvantage on its first saving throw made against the spell.\n\n!!! Quickened Spell\n\nWhen you cast a spell that has a casting time of 1 action, you can spend 2 sorcery points to change the casting time to 1 bonus action for this casting.\n\n!!! Subtle Spell\n\nWhen you cast a spell, you can spend 1 sorcery point to cast it without any somatic or verbal components.\n\n!!! Twinned Spell\n\nWhen you cast a spell that targets only one creature and doesn’t have a range of self, you can spend a number of sorcery points equal to the spell’s level to target a second creature in range with the same spell (1 sorcery point if the spell is a cantrip).\n\nTo be eligible, a spell must be incapable of targeting more than one creature at the spell’s current level. For example, [[Magic Missile]] and [[Scorching Ray]] aren’t eligible, but [[Ray of Frost]] and [[Chromatic Orb]] are.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Sorcerous Restoration\n\nAt 20th level, you regain 4 expended sorcery points whenever you finish a short rest.","tags":"Classes [[Player's Handbook]]","title":"Sorcerer","modified":"20260713093642426"},
{"created":"20260711140512404","text":"//Tabaxi, also known as jaguar people or catfolk, are\nfeline humanoids. Tabaxi are taller on average than\nhumans at 6 to 7 feet and relatively slender.//\n\n//Their bodies are covered with fur that can\nsometimes be striped, spotted, or all one color. Tabaxi\nfur colors range from light yellow to brownish red. In\nthe right environment, their coat provides some\ncamouflage. Tabaxi eyes have slit pupils and are\nusually green or yellow. Like cats, tabaxi have claws\nand long tails. The occasional rare tabaxi is born\nwith almost no tail.//\n\n//Tabaxi have abilities similar to most other felines.\nThey are good swimmers and climbers, can see in\nthe dark, and are capable of short bursts of\nincredible speed when needed. They also have an\nexceptional sense of smell.//\n\n//Not surprisingly, most tabaxi are carnivores, being\nnaturally adapted hunters. However, tabaxi can eat\nplants and some even take up vegetarianism without\ncomplication.//\n\n//Tabaxi generally have a gestation time of six or\nseven months and often give birth to twins or triplets.\nTabaxi are born blind, hairless, and helpless, but they\nare usually walking in half the time it takes a human.\nIn other respects, tabaxi and humans mature at\nabout the same rate.//\n\n! Tabaxi Traits\n\n!! Cat’s Claws (3 Points)\nBecause of your claws, you have a climbing speed of\n20 feet. In addition, your claws are natural weapons,\nwhich you can use to make unarmed strikes. If you\nhit with them, you deal slashing damage equal to 1d4\n+ your Strength modifier, instead of the bludgeoning\ndamage normal for an unarmed strike.\n\n!! Cat’s Talent (2 Points)\nYou are proficient in your choice of one of the\nfollowing skills: Perception and Stealth.\n\n!! Darkvision (4 Points)\nYou have a cat’s keen senses, especially in the dark.\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Feline Agility (6 Points)\nYour reflexes and agility allow you to move with a\nburst of speed. When you move on your turn in\ncombat, you can double your speed until the end of\nthe turn. Once you use this trait, you can’t use it\nagain until you move 0 feet on one of your turns.","tags":"Parentage [[Elf & Orc 1]]","title":"Tabaxi Parentage","modified":"20260711140741240"},
{"created":"20260713082114403","text":"Tasha's Cauldron of Everything, 2020, published by Wizards of the Coast.","tags":"Sourcebooks","title":"Tasha's Cauldron of Everything","modified":"20260713082209269"},
{"created":"20260708090109437","text":"//Gods whose portfolios include the Tempest domain — including Talos, Umberlee, Kord, Zeboim, the Devourer, Zeus, and Thor — govern storms, sea, and sky. They include gods of lightning and thunder, gods of earthquakes, some fire gods, and certain gods of violence, physical strength, and courage. In some pantheons, a god of this domain rules over other deities and is known for swift justice delivered by thunderbolts. In the pantheons of seafaring people, gods of this domain are ocean deities and the patrons of sailors. Tempest gods send their clerics to inspire fear in the common folk, either to keep those folk on the path of righteousness or to encourage them to offer sacrifices of propitiation to ward off divine wrath.//\n\n!!! Tempest Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Fog Cloud]], [[Thunderwave]] |\n| 3rd |[[Gust of Wind]], [[Shatter]] |\n| 5th |[[Call Lightning]], [[Sleet Storm]] |\n| 7th |[[Control Water]], [[Ice Storm]] |\n| 9th |[[Destructive Wave]], [[Insect Plague]] |\n\n!! Bonus Proficiencies\n\nAt 1st level, you gain proficiency with martial weapons and heavy armor.\n\n!! Wrath of the Storm\n\nAlso at 1st level, you can thunderously rebuke attackers. When a creature within 5 feet of you that you can see hits you with an attack, you can use your reaction to cause the creature to make a Dexterity saving throw. The creature takes 2d8 lightning or thunder damage (your choice) on a failed saving throw, and half as much damage on a successful one.\n\nYou can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.\n\n!! Channel Divinity: Destructive Wrath\n\nStarting at 2nd level, you can use your Channel Divinity to wield the power of the storm with unchecked ferocity.\n\nWhen you roll lightning or thunder damage, you can use your Channel Divinity to deal maximum damage, instead of rolling.\n\n!! Thunderbolt Strike\n\nAt 6th level, when you deal lightning damage to a Large or smaller creature, you can also push it up to 10 feet away from you.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 thunder damage to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Stormborn\n\nAt 17th level, you have a flying speed equal to your current walking speed whenever you are not underground or indoors.","tags":"Cleric [[Player's Handbook]] Subclasses","title":"Tempest Domain","modified":"20260708090433802"},
{"created":"20260709190257680","text":"//Your patron is a lord or lady of the fey, a creature of legend who holds secrets that were forgotten before the mortal races were born. This being’s motivations are often inscrutable, and sometimes whimsical, and might involve a striving for greater magical power or the settling of age-old grudges. Beings of this sort include the Prince of Frost; the Queen of Air and Darkness, ruler of the Gloaming Court; Titania of the Summer Court; her consort Oberon, the Green Lord; Hyrsam, the Prince of Fools; and ancient hags.//\n\n!! Expanded Spell List\n\nThe Archfey lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.\n\n!!! Archfey Expanded Spells\n\n|noborder alternate|k\n|!Spell Level|!Spells |\n| 1st |[[Faerie Fire]], [[Sleep]] |\n| 2nd |[[Calm Emotions]], [[Phantasmal Force]] |\n| 3rd |[[Blink]], [[Plant Growth]] |\n| 4th |[[Dominate Beast]], [[Greater Invisibility]] |\n| 5th |[[Dominate Person]], [[Seeming]] |\n\n!! Fey Presence\n\nStarting at 1st level, your patron bestows upon you the ability to project the beguiling and fearsome presence of the fey. As an action, you can cause each creature in a 10-foot cube originating from you to make a Wisdom saving throw against your warlock spell save DC. The creatures that fail their saving throws are all charmed or frightened by you (your choice) until the end of your next turn.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.\n\n!! Misty Escape\n\nStarting at 6th level, you can vanish in a puff of mist in response to harm. When you take damage, you can use your reaction to turn invisible and teleport up to 60 feet to an unoccupied space you can see. You remain invisible until the start of your next turn or until you attack or cast a spell.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.\n\n!! Beguiling Defenses\n\nBeginning at 10th level, your patron teaches you how to turn the mind-affecting magic of your enemies against them. You are immune to being charmed, and when another creature attempts to charm you, you can use your reaction to attempt to turn the charm back on that creature. The creature must succeed on a Wisdom saving throw against your warlock spell save DC or be charmed by you for 1 minute or until the creature takes any damage.\n\n!! Dark Delirium\n\nStarting at 14th level, you can plunge a creature into an illusory realm. As an action, choose a creature that you can see within 60 feet of you. It must make a Wisdom saving throw against your warlock spell save DC. On a failed save, it is charmed or frightened by you (your choice) for 1 minute or until your concentration is broken (as if you are concentrating on a spell). This effect ends early if the creature takes any damage.\n\nUntil this illusion ends, the creature thinks it is lost in a misty realm, the appearance of which you choose. The creature can see and hear only itself, you, and the illusion.\n\nYou must finish a short or long rest before you can use this feature again.","title":"The Archfey","modified":"20260709190651135","type":"","tags":"[[Player's Handbook]] Warlock Subclasses"},
{"created":"20260709190508937","text":"//You have made a pact with a fiend from the lower planes of existence, a being whose aims are evil, even if you strive against those aims. Such beings desire the corruption or destruction of all things, ultimately including you. Fiends powerful enough to forge a pact include demon lords such as Demogorgon, Orcus, Fraz’Urb-luu, and Baphomet; archdevils such as Asmodeus, Dispater, Mephistopheles, and Belial; pit fiends and balors that are especially mighty; and ultroloths and other lords of the yugoloths.//\n\n!! Expanded Spell List\n\nThe Fiend lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.\n\n!!! Fiend Expanded Spells\n\n|noborder alternate|k\n|!Spell Level|!Spells |\n| 1st |[[Burning Hands]], [[Command]] |\n| 2nd |[[Blindness/Deafness]], [[Scorching Ray]] |\n| 3rd |[[Fireball]], [[Stinking Cloud]] |\n| 4th |[[Fire Shield]], [[Wall of Fire]] |\n| 5th |[[Flame Strike]], [[Hallow]] |\n\n!! Dark One’s Blessing\n\nStarting at 1st level, when you reduce a hostile creature to 0 hit points, you gain temporary hit points equal to your Charisma modifier + your warlock level (minimum of 1).\n\n!! Dark One’s Own Luck\n\nStarting at 6th level, you can call on your patron to alter fate in your favor. When you make an ability check or a saving throw, you can use this feature to add a d10 to your roll. You can do so after seeing the initial roll but before any of the roll’s effects occur.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.\n\n!! Fiendish Resilience\n\nStarting at 10th level, you can choose one damage type when you finish a short or long rest. You gain resistance to that damage type until you choose a different one with this feature. Damage from magical weapons or silver weapons ignores this resistance.\n\n!! Hurl Through Hell\n\nStarting at 14th level, when you hit a creature with an attack, you can use this feature to instantly transport the target through the lower planes. The creature disappears and hurtles through a nightmare landscape.\n\nAt the end of your next turn, the target returns to the space it previously occupied, or the nearest unoccupied space. If the target is not a fiend, it takes 10d10 psychic damage as it reels from its horrific experience.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","tags":"Warlock Subclasses [[Player's Handbook]]","title":"The Fiend","modified":"20260709190645810"},
{"created":"20260709190654141","text":"//Your patron is a mysterious entity whose nature is utterly foreign to the fabric of reality. It might come from the Far Realm, the space beyond reality, or it could be one of the elder gods known only in legends. Its motives are incomprehensible to mortals, and its knowledge so immense and ancient that even the greatest libraries pale in comparison to the vast secrets it holds. The Great Old One might be unaware of your existence or entirely indifferent to you, but the secrets you have learned allow you to draw your magic from it.//\n\n//Entities of this type include Ghaunadar, called That Which Lurks; Tharizdun, the Chained God; Dendar, the Night Serpent; Zargon, the Returner; Great Cthulhu; and other unfathomable beings.//\n\n!! Expanded Spell List\n\nThe Great Old One lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.\n\n!!! Great Old One Expanded Spells\n\n|noborder alternate|k\n|!Spell Level|!Spells |\n| 1st |[[Dissonant Whispers]], [[Tasha's Hideous Laughter]] |\n| 2nd |[[Detect Thoughts]], [[Phantasmal Force]] |\n| 3rd |[[Clairvoyance]], [[Sending]] |\n| 4th |[[Dominate Beast]], [[Evard's Black Tentacles]] |\n| 5th |[[Dominate Person]], [[Telekinesis]] |\n\n!! Awakened Mind\n\nStarting at 1st level, your alien knowledge gives you the ability to touch the minds of other creatures. You can telepathically speak to any creature you can see within 30 feet of you. You don’t need to share a language with the creature for it to understand your telepathic utterances, but the creature must be able to understand at least one language.\n\n!! Entropic Ward\n\nAt 6th level, you learn to magically ward yourself against attack and to turn an enemy’s failed strike into good luck for yourself. When a creature makes an attack roll against you, you can use your reaction to impose disadvantage on that roll. If the attack misses you, your next attack roll against the creature has advantage if you make it before the end of your next turn.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.\n\n!! Thought Shield\n\nStarting at 10th level, your thoughts can’t be read by telepathy or other means unless you allow it. You also have resistance to psychic damage, and whenever a creature deals psychic damage to you, that creature takes the same amount of damage that you do.\n\n!! Create Thrall\n\nAt 14th level, you gain the ability to infect a humanoid’s mind with the alien magic of your patron. You can use your action to touch an incapacitated humanoid. That creature is then charmed by you until a [[Remove Curse]] spell is cast on it, the charmed condition is removed from it, or you use this feature again.\n\nYou can communicate telepathically with the charmed creature as long as the two of you are on the same plane of existence.","tags":"Warlock Subclasses [[Player's Handbook]]","title":"The Great Old One","modified":"20260709190853105"},
{"created":"20260709150121338","text":"//You hone your skills in the larcenous arts. Burglars, bandits, cutpurses, and other criminals typically follow this archetype, but so do rogues who prefer to think of themselves as professional treasure seekers, explorers, delvers, and investigators. In addition to improving your agility and stealth, you learn skills useful for delving into ancient ruins, reading unfamiliar languages, and using magic items you normally couldn’t employ.//\n\n!! Fast Hands\n\nStarting at 3rd level, you can use the bonus action granted by your Cunning Action to make a Dexterity (Sleight of Hand) check, use your thieves’ tools to disarm a trap or open a lock, or take the Use an Object action.\n\n!! Second-Story Work\n\nWhen you choose this archetype at 3rd level, you gain the ability to climb faster than normal; climbing no longer costs you extra movement.\n\nIn addition, when you make a running jump, the distance you cover increases by a number of feet equal to your Dexterity modifier.\n\n!! Supreme Sneak\n\nStarting at 9th level, you have advantage on a Dexterity (Stealth) check if you move no more than half your speed on the same turn.\n\n!! Use Magic Device\n\nBy 13th level, you have learned enough about the workings of magic that you can improvise the use of items even when they are not intended for you. You ignore all class, race, and level requirements on the use of magic items.\n\n!! Thief’s Reflexes\n\nWhen you reach 17th level, you have become adept at laying ambushes and quickly escaping danger. You can take two turns during the first round of any combat. You take your first turn at your normal initiative and your second turn at your initiative minus 10. You can’t use this feature when you are surprised.","tags":"Rogue [[Player's Handbook]] Subclasses","title":"Thief","modified":"20260709150259950"},
{"created":"20260713123137235","text":"A tool helps you to do something you couldn’t otherwise do, such as craft or repair an item, forge a document, or pick a lock. Your race, class, background, or feats give you proficiency with certain tools. Proficiency with a tool allows you to add your proficiency bonus to any ability check you make using that tool. Tool use is not tied to a single ability, since proficiency with a tool represents broader knowledge of its use. For example, the DM might ask you to make a Dexterity check to carve a fine detail with your woodcarver’s tools, or a Strength check to make something out of particularly hard wood.\n\n!!! Tools\n\n|noborder alternate|k\n|!Item |\u003C| !Cost | !Weight |\n|//Artisan's Tools//       |\u003C|\u003C|\u003C|\n| |Alchemist's supplies    | 50 gp | 8 lb.   |\n| |Brewer's supplies       | 20 gp | 9 lb.   |\n| |Calligrapher's supplies | 10 gp | 5 lb.   |\n| |Carpenter's tools       | 8 gp  | 6 lb.   |\n| |Cartographer's tools    | 15 gp | 6 lb.   |\n| |Cobbler's tools         | 5 gp  | 5 lb.   |\n| |Cook's utensils         | 1 gp  | 8 lb.   |\n| |Glassblower's tools     | 30 gp | 5 lb.   |\n| |Jeweler's tools         | 25 gp | 2 lb.   |\n| |Leatherworker's tools   | 5 gp  | 5 lb.   |\n| |Mason's tools           | 10 gp | 8 lb.   |\n| |Painter's supplies      | 10 gp | 5 lb.   |\n| |Potter's tools          | 10 gp | 3 lb.   |\n| |Smith's tools           | 20 gp | 8 lb.   |\n| |Tinker's tools          | 50 gp | 10 lb.  |\n| |Weaver's tools          | 1 gp  | 5 lb.   |\n| |Woodcarver's tools      | 1 gp  | 5 lb.   |\n|Disguise kit            |\u003C| 25 gp | 3 lb.   |\n|Forgery kit             |\u003C| 15 gp | 5 lb.   |\n|//Gaming Sets//           |\u003C|\u003C|\u003C|\n| |Dice set                | 1 sp  | ---     |\n| |Dragonchess set         | 1 gp  | 1/2 lb. |\n| |Playing card set        | 5 sp  | ---     |\n| |Three-Dragon Ante set   | 1 gp  | ---     |\n|Herbalism kit           |\u003C| 5 gp  | 3 lb.   |\n|//Musical Instruments//   |\u003C|\u003C|\u003C|\n| |Bagpipes                | 30 gp | 6 lb.   |\n| |Drum                    | 6 gp  | 3 lb.   |\n| |Dulcimer                | 25 gp | 10 lb.  |\n| |Flute                   | 2 gp  | 1 lb.   |\n| |Lute                    | 35 gp | 2 lb.   |\n| |Lyre                    | 30 gp | 2 lb.   |\n| |Horn                    | 3 gp  | 2 lb.   |\n| |Pan Flute               | 12 gp | 2 lb.   |\n| |Shawm                   | 2 gp  | 1 lb.   |\n| |Viol                    | 30 gp | 1 lb.   |\n|Navigator's tools       |\u003C| 25 gp | 2 lb.   |\n|Poisoner's kit          |\u003C| 50 gp | 2 lb.   |\n|Thieves' tools          |\u003C| 25 gp | 1 lb.   |\n|Vehicles (land or water) |\u003C| *    | *       |\n\n\u003C$text text=\"*\"/>See the article on [[Mounts and Vehicles]].\n\n//''Artisan’s Tools.''// These special tools include the items needed to pursue a craft or trade. The table shows examples of the most common types of tools, each providing items related to a single craft. Proficiency with a set of artisan’s tools lets you add your proficiency bonus to any ability checks you make using the tools in your craft. Each type of artisan’s tools requires a separate proficiency.\n\n//''Disguise Kit.''// This pouch of cosmetics, hair dye, and small props lets you create disguises that change your physical appearance. Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to create a visual disguise.\n\n//''Forgery Kit.''// This small box contains a variety of papers and parchments, pens and inks, seals and sealing wax, gold and silver leaf, and other supplies necessary to create convincing forgeries of physical documents. Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to create a physical forgery of a document.\n\n//''Gaming Set.''// This item encompasses a wide range of game pieces, including dice and decks of cards (for games such as Three-Dragon Ante). A few common examples appear on the Tools table, but other kinds of gaming sets exist. If you are proficient with a gaming set, you can add your proficiency bonus to ability checks you make to play a game with that set. Each type of gaming set requires a separate proficiency.\n\n//''Herbalism Kit.''// This kit contains a variety of instruments such as clippers, mortar and pestle, and pouches and vials used by herbalists to create remedies and potions. Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to identify or apply herbs. Also, proficiency with this kit is required to create antitoxin and potions of healing.\n\n//''Musical Instrument.''// Several of the most common types of musical instruments are shown on the table as examples. If you have proficiency with a given musical instrument, you can add your proficiency bonus to any ability checks you make to play music with the instrument. A bard can use a musical instrument as a spellcasting focus, as described in chapter 10. Each type of musical instrument requires a separate proficiency.\n\n//''Navigator’s Tools.''// This set of instruments is used for navigation at sea. Proficiency with navigator’s tools lets you chart a ship’s course and follow navigation charts. In addition, these tools allow you to add your proficiency bonus to any ability check you make to avoid getting lost at sea.\n\n//''Poisoner’s Kit.''// A poisoner’s kit includes the vials, chemicals, and other equipment necessary for the creation of poisons. Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to craft or use poisons.\n\n//''Thieves’ Tools.''// This set of tools includes a small file, a set of lock picks, a small mirror mounted on a metal handle, a set of narrow-bladed scissors, and a pair of pliers. Proficiency with these tools lets you add your proficiency bonus to any ability checks you make to disarm traps or open locks.","title":"Tools","modified":"20260713133453041","type":"","tags":"Equipment [[Player's Handbook]]"},
{"created":"20260711140744143","text":"//A tortle hatches from a thick-shelled egg and spends\nthe first few weeks of its life crawling on all fours.\nThey may have up to ten siblings hatched from the\nsame clutch of eggs or be the only one.//\n\n//After they mature, an adult tortle stands 5 to 6 feet\ntall and average 450 pounds. Their shell accounts for\nroughly one-third of their weight. The shells they\ncarry around provide all the shelter they require,\nthough some tortles enjoy the convenience of\nadditional housing.//\n\n//Though not quite aquatic, tortles are adapted to\nlife by the sea. While they aren't expert swimmers,\nthey can remain underwater for up to an hour before\nneeding to surface for air. Where a tortle decides to\nlive ultimately is a personal choice.//\n\n! Tortle Traits\n\n!! Claws (1 Point)\nYour claws are natural weapons, which you can use\nto make unarmed strikes. If you hit with them, you\ndeal slashing damage equal to 1d4 + your Strength\nmodifier, instead of the bludgeoning damage normal\nfor an unarmed strike.\n\n!! Hold Breath (1 Point)\nYou can hold your breath for up to 1 hour at a time.\nYou aren’t a natural swimmer, but you can remain\nunderwater for some time before needing to come up\nfor air.\n\n!! Natural Armor (4 Points)\nYour shell provides some protection, giving you a\nbase AC of 13 + your Dexterity modifier. If you are\nusing a shield, you can apply the shield’s bonus as\nnormal.\n\nIf you already have the Natural Armor trait\ninherited from your other birth parent, your shell\nhardens and thickens. You have a base AC of 17, but\nyour Dexterity modifier no longer affects this number\nand you gain no benefit from wearing armor.\n\n!! Shell Defense (1 Point)\nYou can withdraw into your shell as an action. Until\nyou emerge, you gain a +2 bonus to AC, and you have\nadvantage on Strength and Constitution saving\nthrows. While in your shell, you are prone, your\nspeed is 0 and can’t increase, you have disadvantage\non Dexterity saving throws, you can’t take\nreactions, and the only action you can take\nis a bonus action to emerge from your shell.\n\nIf you already have the Shell Defense\ntrait inherited from your other birth\nparent, you gain a +4 bonus to AC\nwith this trait.","tags":"Parentage [[Elf & Orc 1]]","title":"Tortle Parentage","modified":"20260711165007228"},
{"created":"20260708090438144","text":"//Gods of trickery — such as Tymora, Beshaba, Olidammara, the Traveler, Garl Glittergold, and Loki — are mischief-makers and instigators who stand as a constant challenge to the accepted order among both gods and mortals. They’re patrons of thieves, scoundrels, gamblers, rebels, and liberators. Their clerics are a disruptive force in the world, puncturing pride, mocking tyrants, stealing from the rich, freeing captives, and flouting hollow traditions. They prefer subterfuge, pranks, deception, and theft rather than direct confrontation.//\n\n!!! Trickery Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Charm Person]], [[Disguise Self]] |\n| 3rd |[[Mirror Image]], [[Pass without Trace]] |\n| 5th |[[Blink]], [[Dispel Magic]] |\n| 7th |[[Dimension Door]], [[Polymorph]] |\n| 9th |[[Dominate Person]], [[Modify Memory]] |\n\n!! Blessing of the Trickster\n\nStarting when you choose this domain at 1st level, you can use your action to touch a willing creature other than yourself to give it advantage on Dexterity (Stealth) checks. This blessing lasts for 1 hour or until you use this feature again.\n\n!! Channel Divinity: Invoke Duplicity\n\nStarting at 2nd level, you can use your Channel Divinity to create an illusory duplicate of yourself.\n\nAs an action, you create a perfect illusion of yourself that lasts for 1 minute, or until you lose your concentration (as if you were concentrating on a spell). The illusion appears in an unoccupied space that you can see within 30 feet of you. As a bonus action on your turn, you can move the illusion up to 30 feet to a space you can see, but it must remain within 120 feet of you.\n\nFor the duration, you can cast spells as though you were in the illusion’s space, but you must use your own senses. Additionally, when both you and your illusion are within 5 feet of a creature that can see the illusion, you have advantage on attack rolls against that creature, given how distracting the illusion is to the target.\n\n!! Channel Divinity: Cloak of Shadows\n\nStarting at 6th level, you can use your Channel Divinity to vanish.\n\nAs an action, you become invisible until the end of your next turn. You become visible if you attack or cast a spell.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with poison — a gift from your deity. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 poison damage to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Improved Duplicity\n\nAt 17th level, you can create up to four duplicates of yourself, instead of one, when you use Invoke Duplicity. As a bonus action on your turn, you can move any number of them up to 30 feet, to a maximum range of 120 feet.","tags":"Cleric Subclasses [[Player's Handbook]]","title":"Trickery Domain","modified":"20260709092524980"},
{"created":"20260711165009760","text":"//Tritons are blue-skinned humanoids adapted to live\nin the ocean depths. Most have green hair\nreminiscent of seaweed and webbed feet that aid\npropulsion through the water. Webbed hands make\ntritons agile swimmers while still allowing them to\ngrip objects.//\n\n//Triton eyes vary in color between inky black to\nbright red and orange. They can see in the dark,\nwhich helps them explore the deep sea or a dark\nalley on a moonless night.//\n\n//Tritons also have resistance to cold damage, since\ntheir ancestors came from frigid depths. They have\nnatural resistance to toxins and venoms, since the\nsea is full of plants and animals that use these as\nprotection or hunting.//\n\n//Tritons lay soft eggs in cocoons of bubbles strung\nbetween vegetation or ocean floor rocks. There the\npale blue fetuses are visible for the entire gestation\nperiod. When they hatch, they look like miniature\nversions of their parents and slowly grow to mature\nsize over the course of about ten years.//\n\n! Triton Traits\n\n!! Acid Resistance (3 Points)\nYou have resistance to acid damage.\n\n!! Amphibious (1 Point)\nYou can breathe air and water.\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Guardians of the Depths (3 Points)\nAdapted to the frigid ocean depths, you have\nresistance to cold damage.\n\n!! Long-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively long.\n\n!! Swim (2 Points)\nYou have a swimming speed of 30 feet.","tags":"Parentage [[Elf & Orc 1]]","title":"Triton Parentage","modified":"20260711165129725"},
{"created":"20260711123006404","text":"You grew up on the streets alone, orphaned, and poor. You had no one to watch over you or to provide for you, so you learned to provide for yourself. You fought fiercely over food and kept a constant watch out for other desperate souls who might steal from you. You slept on rooftops and in alleyways, exposed to the elements, and endured sickness without the advantage of medicine or a place to recuperate. You’ve survived despite all odds, and did so through cunning, strength, speed, or some combination of each.\n\nYou begin your adventuring career with enough money to live modestly but securely for at least ten days. How did you come by that money? What allowed you to break free of your desperate circumstances and embark on a better life?\n\n''Skill Proficiencies:'' Sleight of Hand, Stealth\n\n''Tool Proficiencies:'' Disguise kit, thieves’ tools\n\n''Equipment:'' A [[small knife|Adventuring Gear]], a map of the city you grew up in, a pet mouse, a token to remember your parents by, a set of [[common clothes|Adventuring Gear]], and a [[pouch|Adventuring Gear]] containing 10 gp\n\n!! Feature: City Secrets\n\nYou know the secret patterns and flow to cities and can find passages through the urban sprawl that others would miss. When you are not in combat, you (and companions you lead) can travel between any two locations in the city twice as fast as your speed would normally allow.\n\n!! Suggested Characteristics\n\nUrchins are shaped by lives of desperate poverty, for good and for ill. They tend to be driven either by a commitment to the people with whom they shared life on the street or by a burning desire to find a better life — and maybe get some payback on all the rich people who treated them badly.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I hide scraps of food and trinkets away in my pockets. |\n| 2 |I ask a lot of questions. |\n| 3 |I like to squeeze into small places where no one else can get to me. |\n| 4 |I sleep with my back to a wall or tree, with everything I own wrapped in a bundle in my arms. |\n| 5 |I eat like a pig and have bad manners. |\n| 6 |I think anyone who’s nice to me is hiding evil intent. |\n| 7 |I don’t like to bathe. |\n| 8 |I bluntly say what other people are hinting at or hiding. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Respect.'' All people, rich or poor, deserve respect. (Good) |\n| 2 |''Community.'' We have to take care of each other, because no one else is going to do it. (Lawful) |\n| 3 |''Change.'' The low are lifted up, and the high and mighty are brought down. Change is the nature of things. (Chaotic) |\n| 4 |''Retribution.'' The rich need to be shown what life and death are like in the gutters. (Evil) |\n| 5 |''People.'' I help the people who help me — that’s what keeps us alive. (Neutral) |\n| 6 |''Aspiration.'' I’m going to prove that I’m worthy of a better life. |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |My town or city is my home, and I’ll fight to defend it. |\n| 2 |I sponsor an orphanage to keep others from enduring what I was forced to endure. |\n| 3 |I owe my survival to another urchin who taught me to live on the streets. |\n| 4 |I owe a debt I can never repay to the person who took pity on me. |\n| 5 |I escaped my life of poverty by robbing an important person, and I’m wanted for it. |\n| 6 |No one else should have to endure the hardships I’ve been through. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |If I’m outnumbered, I will run away from a fight. |\n| 2 |Gold seems like a lot of money to me, and I’ll do just about anything for more of it. |\n| 3 |I will never fully trust anyone other than myself. |\n| 4 |I’d rather kill someone in their sleep than fight fair. |\n| 5 |It’s not stealing if I need it more than someone else. |\n| 6 |People who can’t take care of themselves get what they deserve. |","tags":"[[Player's Handbook]] Background","title":"Urchin","modified":"20260711125114896"},
