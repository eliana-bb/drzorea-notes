{"created":"20260708085801265","text":"//Gods of nature are as varied as the natural world itself, from inscrutable gods of the deep forests (such as Silvanus, Obad-Hai, Chislev, Balinor, and Pan) to friendly deities associated with particular springs and groves (such as Eldath). Druids revere nature as a whole and might serve one of these deities, practicing mysterious rites and reciting all-but-forgotten prayers in their own secret tongue. But many of these gods have clerics as well, champions who take a more active role in advancing the interests of a particular nature god. These clerics might hunt the evil monstrosities that despoil the woodlands, bless the harvest of the faithful, or wither the crops of those who anger their gods.//\n\n!!! Nature Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Animal Friendship]], [[Speak with Animals]] |\n| 3rd |[[Barkskin]], [[Spike Growth]] |\n| 5th |[[Plant Growth]], [[Wind Wall]] |\n| 7th |[[Dominate Beast]], [[Grasping Vine]] |\n| 9th |[[Insect Plague]], [[Tree Stride]] |\n\n!! Acolyte of Nature\n\nAt 1st level, you learn one druid cantrip of your choice. This cantrip counts as a cleric cantrip for you, but it doesn’t count against the number of cleric cantrips you know. You also gain proficiency in one of the following skills of your choice: Animal Handling, Nature, or Survival.\n\n!! Bonus Proficiency\n\nAlso at 1st level, you gain proficiency with heavy armor.\n\n!! Channel Divinity: Charm Animals and Plants\n\nStarting at 2nd level, you can use your Channel Divinity to charm animals and plants.\n\nAs an action, you present your holy symbol and invoke the name of your deity. Each beast or plant creature that can see you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is charmed by you for 1 minute or until it takes damage. While it is charmed by you, it is friendly to you and other creatures you designate.\n\n!! Dampen Elements\n\nStarting at 6th level, when you or a creature within 30 feet of you takes acid, cold, fire, lightning, or thunder damage, you can use your reaction to grant resistance to the creature against that instance of the damage.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 cold, fire, or lightning damage (your choice) to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Master of Nature\n\nAt 17th level, you gain the ability to command animals and plant creatures. While creatures are charmed by your Charm Animals and Plants feature, you can take a bonus action on your turn to verbally command what each of those creatures will do on its next turn.","tags":"Cleric Subclasses [[Player's Handbook]]","title":"Nature Domain","modified":"20260709092513909"},
{"created":"20260711115247717","text":"You understand wealth, power, and privilege. You carry a noble title, and your family owns land, collects taxes, and wields significant political influence. You might be a pampered aristocrat unfamiliar with work or discomfort, a former merchant just elevated to the nobility, or a disinherited scoundrel with a disproportionate sense of entitlement. Or you could be an honest, hard-working landowner who cares deeply about the people who live and work on your land, keenly aware of your responsibility to them.\n\nWork with your DM to come up with an appropriate title and determine how much authority that title carries. A noble title doesn’t stand on its own — it’s connected to an entire family, and whatever title you hold, you will pass it down to your own children. Not only do you need to determine your noble title, but you should also work with the DM to describe your family and their influence on you.\n\nIs your family old and established, or was your title only recently bestowed? How much influence do they wield, and over what area? What kind of reputation does your family have among the other aristocrats of the region? How do the common people regard them?\n\nWhat’s your position in the family? Are you the heir to the head of the family? Have you already inherited the title? How do you feel about that responsibility? Or are you so far down the line of inheritance that no one cares what you do, as long as you don’t embarrass the family? How does the head of your family feel about your adventuring career? Are you in your family’s good graces, or shunned by the rest of your family?\n\nDoes your family have a coat of arms? An insignia you might wear on a signet ring? Particular colors you wear all the time? An animal you regard as a symbol of your line or even a spiritual member of the family?\n\nThese details help establish your family and your title as features of the world of the campaign.\n\n''Skill Proficiencies:'' History, Persuasion\n\n''Tool Proficiencies:'' One type of gaming set\n\n''Languages:'' One of your choice\n\n''Equipment:'' A set of [[fine clothes|Adventuring Gear]], a [[signet ring|Adventuring Gear]], a scroll of pedigree, and a purse containing 25 gp\n\n!! Feature: Position of Privilege\n\nThanks to your noble birth, people are inclined to think the best of you. You are welcome in high society, and people assume you have the right to be wherever you are. The common folk make every effort to accommodate you and avoid your displeasure, and other people of high birth treat you as a member of the same social sphere. You can secure an audience with a local noble if you need to.\n\n!! Suggested Characteristics\n\nNobles are born and raised to a very different lifestyle than most people ever experience, and their personalities reflect that upbringing. A noble title comes with a plethora of bonds — responsibilities to family, to other nobles (including the sovereign), to the people entrusted to the family’s care, or even to the title itself. But this responsibility is often a good way to undermine a noble.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |My eloquent flattery makes everyone I talk to feel like the most wonderful and important person in the world. |\n| 2 |The common folk love me for my kindness and generosity. |\n| 3 |No one could doubt by looking at my regal bearing that I am a cut above the unwashed masses. |\n| 4 |I take great pains to always look my best and follow the latest fashions. |\n| 5 |I don’t like to get my hands dirty, and I won’t be caught dead in unsuitable accommodations. |\n| 6 |Despite my noble birth, I do not place myself above other folk. We all have the same blood. |\n| 7 |My favor, once lost, is lost forever. |\n| 8 |If you do me an injury, I will crush you, ruin your name, and salt your fields. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Respect.'' Respect is due to me because of my position, but all people regardless of station deserve to be treated with dignity. (Good) |\n| 2 |''Responsibility.'' It is my duty to respect the authority of those above me, just as those below me must respect mine. (Lawful) |\n| 3 |''Independence.'' I must prove that I can handle myself without the coddling of my family. (Chaotic) |\n| 4 |''Power.'' If I can attain more power, no one will tell me what to do. (Evil) |\n| 5 |''Family.'' Blood runs thicker than water. (Any) |\n| 6 |''Noble Obligation.'' It is my duty to protect and care for the people beneath me. (Good) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |I will face any challenge to win the approval of my family. |\n| 2 |My house’s alliance with another noble family must be sustained at all costs. |\n| 3 |Nothing is more important than the other members of my family. |\n| 4 |I am in love with the heir of a family that my family despises. |\n| 5 |My loyalty to my sovereign is unwavering. |\n| 6 |The common folk must see me as a hero of the people. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |I secretly believe that everyone is beneath me. |\n| 2 |I hide a truly scandalous secret that could ruin my family forever. |\n| 3 |I too often hear veiled insults and threats in every word addressed to me, and I’m quick to anger. |\n| 4 |I have an insatiable desire for decadent pleasures. |\n| 5 |In fact, the world does revolve around me. |\n| 6 |By my words and actions, I often bring shame to my family. |\n\n!! Variant Noble: Knight\n\nA knighthood is among the lowest noble titles in most societies, but it can be a path to higher status. If you wish to be a knight, choose the Retainers feature (see the sidebar) instead of the Position of Privilege feature. One of your commoner retainers is replaced by a noble who serves as your squire, aiding you in exchange for training on his or her own path to knighthood. Your two remaining retainers might include a groom to care for your horse and a servant who polishes your armor (and even helps you put it on).\n\nAs an emblem of chivalry and the ideals of courtly love, you might include among your equipment a banner or other token from a noble lord or lady to whom you have given your heart — in a chaste sort of devotion. (This person could be your bond.)\n\n!! Variant Feature: Retainers\n\nIf your character has a noble background, you may select this background feature instead of Position of Privilege.\n\nYou have the service of three retainers loyal to your family. These retainers can be attendants or messengers, and one might be a majordomo. Your retainers are commoners who can perform mundane tasks for you, but they do not fight for you, will not follow you into obviously dangerous areas (such as dungeons), and will leave if they are frequently endangered or abused.","tags":"[[Player's Handbook]] Background","title":"Noble","modified":"20260711120215021"},
{"created":"20260709091928981","text":"//The Oath of Devotion binds a paladin to the loftiest ideals of justice, virtue, and order. Sometimes called cavaliers, white knights, or holy warriors, these paladins meet the ideal of the knight in shining armor, acting with honor in pursuit of justice and the greater good. They hold themselves to the highest standards of conduct, and some, for better or worse, hold the rest of the world to the same standards. Many who swear this oath are devoted to gods of law and good and use their gods’ tenets as the measure of their devotion. They hold angels — the perfect servants of good — as their ideals, and incorporate images of angelic wings into their helmets or coats of arms.//\n\n!! Tenets of Devotion\n\nThough the exact words and strictures of the Oath of Devotion vary, paladins of this oath share these tenets.\n\n//''Honesty.''// Don’t lie or cheat. Let your word be your promise.\n\n//''Courage.''// Never fear to act, though caution is wise.\n\n//''Compassion.''// Aid others, protect the weak, and punish those who threaten them. Show mercy to your foes, but temper it with wisdom.\n\n//''Honor.''// Treat others with fairness, and let your honorable deeds be an example to them. Do as much good as possible while causing the least amount of harm.\n\n//''Duty.''// Be responsible for your actions and their consequences, protect those entrusted to your care, and obey those who have just authority over you.\n\n!! Oath Spells\n\nYou gain oath spells at the paladin levels listed.\n\n!!! Oath of Devotion Spells\n\n|noborder alternate|k\n|!Paladin Level|!Spells |\n|  3rd |[[Protection from Evil and Good]], [[Sanctuary]] |\n|  5th |[[Lesser Restoration]], [[Zone of Truth]] |\n|  9th |[[Beacon of Hope]], [[Dispel Magic]] |\n| 13th |[[Freedom of Movement]], [[Guardian of Faith]] |\n| 17th |[[Commune]], [[Flame Strike]] |\n\n!! Channel Divinity\n\nWhen you take this oath at 3rd level, you gain the following two Channel Divinity options.\n\n//''Sacred Weapon.''// As an action, you can imbue one weapon that you are holding with positive energy, using your Channel Divinity. For 1 minute, you add your Charisma modifier to attack rolls made with that weapon (with a minimum bonus of +1). The weapon also emits bright light in a 20-foot radius and dim light 20 feet beyond that. If the weapon is not already magical, it becomes magical for the duration.\n\nYou can end this effect on your turn as part of any other action. If you are no longer holding or carrying this weapon, or if you fall unconscious, this effect ends.\n\n//''Turn the Unholy.''// As an action, you present your holy symbol and speak a prayer censuring fiends and undead, using your Channel Divinity. Each fiend or undead that can see or hear you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is turned for 1 minute or until it takes damage.\n\nA turned creature must spend its turns trying to move as far away from you as it can, and it can’t willingly move to a space within 30 feet of you. It also can’t take reactions. For its action, it can use only the Dash action or try to escape from an effect that prevents it from moving. If there’s nowhere to move, the creature can use the Dodge action.\n\n!! Aura of Devotion\n\nStarting at 7th level, you and friendly creatures within 10 feet of you can’t be charmed while you are conscious.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Purity of Spirit\n\nBeginning at 15th level, you are always under the effects of a [[Protection from Evil and Good]] spell.\nHoly Nimbus\n\nAt 20th level, as an action, you can emanate an aura of sunlight. For 1 minute, bright light shines from you in a 30-foot radius, and dim light shines 30 feet beyond that.\n\nWhenever an enemy creature starts its turn in the bright light, the creature takes 10 radiant damage.\n\nIn addition, for the duration, you have advantage on saving throws against spells cast by fiends or undead.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","title":"Oath of Devotion","modified":"20260709093056713","type":"","tags":"Paladin Subclasses [[Player's Handbook]]"},
{"created":"20260709092619166","text":"//The Oath of the Ancients is as old as the race of elves and the rituals of the druids. Sometimes called fey knights, green knights, or horned knights, paladins who swear this oath cast their lot with the side of the light in the cosmic struggle against darkness because they love the beautiful and life-giving things of the world, not necessarily because they believe in principles of honor, courage, and justice. They adorn their armor and clothing with images of growing things — leaves, antlers, or flowers — to reflect their commitment to preserving life and light in the world.//\n\n!! Tenets of the Ancients\n\nThe tenets of the Oath of the Ancients have been preserved for uncounted centuries. This oath emphasizes the principles of good above any concerns of law or chaos. Its four central principles are simple.\n\n//''Kindle the Light.''// Through your acts of mercy, kindness, and forgiveness, kindle the light of hope in the world, beating back despair.\n\n//''Shelter the Light.''// Where there is good, beauty, love, and laughter in the world, stand against the wickedness that would swallow it. Where life flourishes, stand against the forces that would render it barren.\n\n//''Preserve Your Own Light.''// Delight in song and laughter, in beauty and art. If you allow the light to die in your own heart, you can’t preserve it in the world.\n\n//''Be the Light.''// Be a glorious beacon for all who live in despair. Let the light of your joy and courage shine forth in all your deeds.\n\n!! Oath Spells\n\nYou gain oath spells at the paladin levels listed.\n\n!!! Oath of the Ancients Spells\n\n|!Paladin Level|!Spells |\n|  3rd |[[Ensnaring Strike]], [[Speak with Animals]] |\n|  5th |[[Misty Step]], [[Moonbeam]] |\n|  9th |[[Plant Growth]], [[Protection from Energy]] |\n| 13th |[[Ice Storm]], [[Stoneskin]] |\n| 17th |[[Commune with Nature]], [[Tree Stride]] |\n\n!! Channel Divinity\n\nWhen you take this oath at 3rd level, you gain the following two Channel Divinity options.\n\n//''Nature’s Wrath.''// You can use your Channel Divinity to invoke primeval forces to ensnare a foe. As an action, you can cause spectral vines to spring up and reach for a creature within 10 feet of you that you can see. The creature must succeed on a Strength or Dexterity saving throw (its choice) or be restrained. While restrained by the vines, the creature repeats the saving throw at the end of each of its turns. On a success, it frees itself and the vines vanish.\n\n//''Turn the Faithless.''// You can use your Channel Divinity to utter ancient words that are painful for fey and fiends to hear. As an action, you present your holy symbol, and each fey or fiend within 30 feet of you that can hear you must make a Wisdom saving throw. On a failed save, the creature is turned for 1 minute or until it takes damage.\n\nA turned creature must spend its turns trying to move as far away from you as it can, and it can’t willingly move to a space within 30 feet of you. It also can’t take reactions. For its action, it can use only the Dash action or try to escape from an effect that prevents it from moving. If there’s nowhere to move, the creature can use the Dodge action.\n\nIf the creature’s true form is concealed by an illusion, shapeshifting, or other effect, that form is revealed while it is turned.\n\n!! Aura of Warding\n\nBeginning at 7th level, ancient magic lies so heavily upon you that it forms an eldritch ward. You and friendly creatures within 10 feet of you have resistance to damage from spells.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Undying Sentinel\n\nStarting at 15th level, when you are reduced to 0 hit points and are not killed outright, you can choose to drop to 1 hit point instead. Once you use this ability, you can’t use it again until you finish a long rest.\n\nAdditionally, you suffer none of the drawbacks of old age, and you can’t be aged magically.\n\n!! Elder Champion\n\nAt 20th level, you can assume the form of an ancient force of nature, taking on an appearance you choose. For example, your skin might turn green or take on a bark-like texture, your hair might become leafy or moss-like, or you might sprout antlers or a lion-like mane.\n\nUsing your action, you undergo a transformation. For 1 minute, you gain the following benefits:\n\n* At the start of each of your turns, you regain 10 hit points.\n* Whenever you cast a paladin spell that has a casting time of 1 action, you can cast it using a bonus action instead.\n* Enemy creatures within 10 feet of you have disadvantage on saving throws against your paladin spells and Channel Divinity options.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","tags":"Paladin [[Player's Handbook]] Subclasses","title":"Oath of the Ancients","modified":"20260709093109449"},
{"created":"20260709093036848","text":"//The Oath of Vengeance is a solemn commitment to punish those who have committed a grievous sin. When evil forces slaughter helpless villagers, when an entire people turns against the will of the gods, when a thieves’ guild grows too violent and powerful, when a dragon rampages through the countryside — at times like these, paladins arise and swear an Oath of Vengeance to set right that which has gone wrong. To these paladins — sometimes called avengers or dark knights — their own purity is not as important as delivering justice.//\n\n!! Tenets of Vengeance\n\nThe tenets of the Oath of Vengeance vary by paladin, but all the tenets revolve around punishing wrongdoers by any means necessary. Paladins who uphold these tenets are willing to sacrifice even their own righteousness to mete out justice upon those who do evil, so the paladins are often neutral or lawful neutral in alignment. The core principles of the tenets are brutally simple.\n\n//''Fight the Greater Evil.''// Faced with a choice of fighting my sworn foes or combating a lesser evil, I choose the greater evil.\n\n//''No Mercy for the Wicked.''// Ordinary foes might win my mercy, but my sworn enemies do not.\n\n//''By Any Means Necessary.''// My qualms can’t get in the way of exterminating my foes.\n\n//''Restitution.''// If my foes wreak ruin on the world, it is because I failed to stop them. I must help those harmed by their misdeeds.\n\n!! Oath Spells\n\nYou gain oath spells at the paladin levels listed.\n\n!!! Oath of Vengeance Spells\n\n|!Paladin Level|!Spells |\n|  3rd |[[Bane]], [[Hunter's Mark]] |\n|  5th |[[Hold Person]], [[Misty Step]] |\n|  9th |[[Haste]], [[Protection from Energy]] |\n| 13th |[[Banishment]], [[Dimension Door]] |\n| 17th |[[Hold Monster]], [[Scrying]] |\n\n!! Channel Divinity\n\nWhen you take this oath at 3rd level, you gain the following two Channel Divinity options.\n\n//''Abjure Enemy.''// As an action, you present your holy symbol and speak a prayer of denunciation, using your Channel Divinity. Choose one creature within 60 feet of you that you can see. That creature must make a Wisdom saving throw, unless it is immune to being frightened. Fiends and undead have disadvantage on this saving throw.\n\nOn a failed save, the creature is frightened for 1 minute or until it takes any damage. While frightened, the creature’s speed is 0, and it can’t benefit from any bonus to its speed.\n\nOn a successful save, the creature’s speed is halved for 1 minute or until the creature takes any damage.\n\n//''Vow of Enmity.''// As a bonus action, you can utter a vow of enmity against a creature you can see within 10 feet of you, using your Channel Divinity. You gain advantage on attack rolls against the creature for 1 minute or until it drops to 0 hit points or falls unconscious.\n\n!! Relentless Avenger\n\nBy 7th level, your supernatural focus helps you close off a foe’s retreat. When you hit a creature with an opportunity attack, you can move up to half your speed immediately after the attack and as part of the same reaction. This movement doesn’t provoke opportunity attacks.\n\n!! Soul of Vengeance\n\nStarting at 15th level, the authority with which you speak your Vow of Enmity gives you greater power over your foe. When a creature under the effect of your Vow of Enmity makes an attack, you can use your reaction to make a melee weapon attack against that creature if it is within range.\n\n!! Avenging Angel\n\nAt 20th level, you can assume the form of an angelic avenger. Using your action, you undergo a transformation. For 1 hour, you gain the following benefits:\n\n* Wings sprout from your back and grant you a flying speed of 60 feet.\n* You emanate an aura of menace in a 30-foot radius. The first time any enemy creature enters the aura or starts its turn there during a battle, the creature must succeed on a Wisdom saving throw or become frightened of you for 1 minute or until it takes any damage. Attack rolls against the frightened creature have advantage.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","tags":"Paladin Subclasses [[Player's Handbook]]","title":"Oath of Vengeance","modified":"20260709093341556"},
{"created":"20260713074756503","text":"//An Oathbreaker is a paladin who breaks his or her sacred oaths to pursue some dark ambition or serve an evil power. Whatever light burned in the paladin’s heart has been extinguished. Only darkness remains.//\n\n//A paladin must be evil and at least 3rd level to become an Oathbreaker. The paladin replaces the features specific to his or her Sacred Oath with Oathbreaker features.//\n\n!! Oathbreaker Spells\n\nYou gain oath spells at the paladin levels listed.\n\n!!! Oathbreaker Spells\n\n|noborder alternate|k\n|!Paladin Level|!Spells |\n|  3rd |[[Hellish Rebuke]], [[Inflict Wounds]] |\n|  5th |[[Crown of Madness]], [[Darkness]] |\n|  9th |[[Animate Dead]], [[Bestow Curse]] |\n| 13th |[[Blight]], [[Confusion]] |\n| 17th |[[Contagion]], [[Dominate Person]] |\n\n!! Channel Divinity\n\nAn Oathbreaker paladin of 3rd level or higher gains the following two Channel Divinity options.\n\n//''Control Undead.''// As an action, the paladin targets one undead creature he or she can see within 30 feet of him or her. The target must make a Wisdom saving throw. On a failed save, the target must obey the paladin’s commands for the next 24 hours, or until the paladin uses this Channel Divinity option again. An undead whose challenge rating is equal to or greater than the paladin’s level is immune to this effect.\n\n//''Dreadful Aspect.''// As an action, the paladin channels the darkest emotions and focuses them into a burst of magical menace. Each creature of the paladin’s choice within 30 feet of the paladin must make a Wisdom saving throw if it can see the paladin. On a failed save, the target is frightened of the paladin for 1 minute. If a creature frightened by this effect ends its turn more than 30 feet away from the paladin, it can attempt another Wisdom saving throw to end the effect on it.\n\n!! Aura of Hate\n\nStarting at 7th level, the paladin, as well any fiends and undead within 10 feet of the paladin, gains a bonus to melee weapon damage rolls equal to the paladin’s Charisma modifier (minimum of +1). A creature can benefit from this feature from only one paladin at a time.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Supernatural Resistance\n\nAt 15th level, the paladin gains resistance to bludgeoning, piercing, and slashing damage from nonmagical weapons.\n\n!! Dread Lord\n\nAt 20th-level, the paladin can, as an action, surround himself or herself with an aura of gloom that lasts for 1 minute. The aura reduces any bright light in a 30-foot radius around the paladin to dim light. Whenever an enemy that is frightened by the paladin starts its turn in the aura, it takes 4d10 psychic damage. Additionally, the paladin and creatures he or she chooses in the aura are draped in deeper shadow. Creatures that rely on sight have disadvantage on attack rolls against creatures draped in this shadow.\n\nWhile the aura lasts, the paladin can use a bonus action on his or her turn to cause the shadows in the aura to attack one creature. The paladin makes a melee spell attack against the target. If the attack hits, the target takes necrotic damage equal to 3d10 + the paladin’s Charisma modifier.\n\nAfter activating the aura, the paladin can’t do so again until he or she finishes a long rest.","title":"Oathbreaker","modified":"20260713075011867","type":"","tags":"Paladin Subclasses [[Dungeon Master's Guide]]"},
{"created":"20260711135449513","text":"//Orcs have green or gray skin, dark hair, flat noses,\nlong faces, and teeth or tusks that protrude from\ntheir lips. Orcs usually stand over 6 feet tall and\nweigh between 230 and 280 pounds. Their large\nframes grant them the ability to lift heavy loads\nrelative to what humans can carry.//\n\n//Orcs are adapted to live in many of the same\nplaces where humans dwell—places where water is\nplentiful, game is abundant, and the weather is calm\nor predictable.//\n\n//Due to their ability to see in the dark, orcs often\nlive in unlit places like the Underdark. Those who\ndwell on the surface are usually nocturnal, sleeping\nall day and hunting or working at night. Because of\nthis, orcs can live near humanoids with the latter\nseldom seeing their orc neighbors.//\n\n//Misinformation abounds about orcs and their\noffspring. According to some accounts, all orcs\nworship the one-eyed god Gruumsh and are prone to\nviolent urges. Indeed, some even believe that orcs are\nuniversally evil.//\n\n//But because orcs are sentient humanoids, they\nmake their own decisions. Some spurn Gruumsh\nand his allies while others interpret his whispers in\ndifferent ways.//\n\n! Minotaur Traits\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Powerful Build (1 Point)\nYou count as one size larger when determining your\ncarrying capacity and the weight you can push, drag,\nor lift.\n\n!! Relentless Endurance (6 Points)\nWhen you are reduced to 0 hit points but not killed\noutright, you can drop to 1 hit point instead. You can’t\nuse this feature again until you finish a long rest.\n\nIf you already have the Relentless Endurance trait\ninherited from your other birth parent, immediately\nafter using this trait, you can use your reaction to\ntake one action.","tags":"Parentage [[Elf & Orc 1]]","title":"Orc Parentage","modified":"20260711135730491"},
{"created":"20260711115856811","text":"You grew up in the wilds, far from the comforts of town and technology. You’ve witnessed the migration of herds larger than forests, survived weather more extreme than any city-dweller could comprehend, and enjoyed the solitude of being the only thinking creature for miles in any direction. The wilds are in your blood, whether you were a nomad, an explorer, a recluse, a hunter-gatherer, or even a marauder. Even in places where you don’t know the specific features of the terrain, you know the ways of the wild.\n\n''Skill Proficiencies:'' Athletics, Survival\n\n''Tool Proficiencies:'' One type of musical instrument\n\n''Languages:'' One of your choice\n\n''Equipment:'' A [[staff|Adventuring Gear]], a [[hunting trap|Tools]], a trophy from an animal you killed, a set of [[traveler’s clothes|Adventuring Gear]], and a [[pouch|Adventuring Gear]] containing 10 gp\n\n!! Origin\n\nYou’ve been to strange places and seen things that others cannot begin to fathom. Consider some of the distant lands you have visited, and how they impacted you. You can roll on the following table to determine your occupation during your time in the wild, or choose one that best fits your character.\n\n|noborder alternate|k\n|!d10|!Origin |\n| 1 |Forester |\n| 2 |Trapper |\n| 3 |Homesteader |\n| 4 |Guide |\n| 5 |Exile or outcast |\n| 6 |Bounty hunter |\n| 7 |Pilgrim |\n| 8 |Tribal nomad |\n| 9 |Hunter-gatherer |\n| 10 |Tribal marauder |\n\n!! Feature: Wanderer\n\nYou have an excellent memory for maps and geography, and you can always recall the general layout of terrain, settlements, and other features around you. In addition, you can find food and fresh water for yourself and up to five other people each day, provided that the land offers berries, small game, water, and so forth.\n\n!! Suggested Characteristics\n\nOften considered rude and uncouth, outlanders have little respect for the niceties of life in the cities. The ties of tribe, clan, family, and the natural world of which they are a part are the most important bonds to most outlanders.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I’m driven by a wanderlust that led me away from home. |\n| 2 |I watch over my friends as if they were a litter of newborn pups. |\n| 3 |I once ran twenty-five miles without stopping to warn to my clan of an approaching orc horde. I’d do it again if I had to. |\n| 4 |I have a lesson for every situation, drawn from observing nature. |\n| 5 |I place no stock in wealthy or well-mannered folk. Money and manners won’t save you from a hungry owlbear. |\n| 6 |I’m always picking things up, absently fiddling with them, and sometimes accidentally breaking them. |\n| 7 |I feel far more comfortable around animals than people. |\n| 8 |I was, in fact, raised by wolves. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Change.'' Life is like the seasons, in constant change, and we must change with it. (Chaotic) |\n| 2 |''Greater Good.'' It is each person’s responsibility to make the most happiness for the whole tribe. (Good) |\n| 3 |''Honor.'' If I dishonor myself, I dishonor my whole clan. (Lawful) |\n| 4 |''Might.'' The strongest are meant to rule. (Evil) |\n| 5 |''Nature.'' The natural world is more important than all the constructs of civilization. (Neutral) |\n| 6 |''Glory.'' I must earn glory in battle, for myself and my clan. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |I am too enamored of ale, wine, and other intoxicants. |\n| 2 |There’s no room for caution in a life lived to the fullest. |\n| 3 |I remember every insult I’ve received and nurse a silent resentment toward anyone who’s ever wronged me. |\n| 4 |I am slow to trust members of other races, tribes, and societies. |\n| 5 |Violence is my answer to almost any challenge. |\n| 6 |Don’t expect me to save those who can’t save themselves. It is nature’s way that the strong thrive and the weak perish. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |I secretly believe that everyone is beneath me. |\n| 2 |I hide a truly scandalous secret that could ruin my family forever. |\n| 3 |I too often hear veiled insults and threats in every word addressed to me, and I’m quick to anger. |\n| 4 |I have an insatiable desire for decadent pleasures. |\n| 5 |In fact, the world does revolve around me. |\n| 6 |By my words and actions, I often bring shame to my family. |","tags":"[[Player's Handbook]] Background","title":"Outlander","modified":"20260711121348637"},
{"created":"20260709084340627","text":"//Whatever their origin and their mission, paladins are united by their oaths to stand against the forces of evil. Whether sworn before a god’s altar and the witness of a priest, in a sacred glade before nature spirits and fey beings, or in a moment of desperation and grief with the dead as the only witness, a paladin’s oath is a powerful bond. It is a source of power that turns a devout warrior into a blessed champion.//\n\n|noborder alternate|k\n|!Level|!PB|!Features |!Spell Slots per Spell Level|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|!1st|!2nd|!3rd|!4th|!5th|\n|  1st | +2 |Divine Sense, Lay on Hands                 | --- | --- | --- | --- | --- |\n|  2nd | +2 |Fighting Style, Spellcasting, Divine Smite |  2  | --- | --- | --- | --- |\n|  3rd | +2 |Divine Health, Sacred Oath                 |  3  | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement                  |  3  | --- | --- | --- | --- |\n|  5th | +3 |Extra Attack                               |  4  |  2  | --- | --- | --- |\n|  6th | +3 |Aura of Protection                         |  4  |  2  | --- | --- | --- |\n|  7th | +3 |Sacred Oath Feature                        |  4  |  3  | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement                  |  4  |  3  | --- | --- | --- |\n|  9th | +4 |---                                        |  4  |  3  |  2  | --- | --- |\n| 10th | +4 |Aura of Courage                            |  4  |  3  |  2  | --- | --- |\n| 11th | +4 |Improved Divine Smite                      |  4  |  3  |  3  | --- | --- |\n| 12th | +4 |Ability Score Improvement                  |  4  |  3  |  3  | --- | --- |\n| 13th | +5 |---                                        |  4  |  3  |  3  |  1  | --- |\n| 14th | +5 |Cleansing Touch                            |  4  |  3  |  3  |  1  | --- |\n| 15th | +5 |Sacred Oath Feature                        |  4  |  3  |  3  |  2  | --- |\n| 16th | +5 |Ability Score Improvement                  |  4  |  3  |  3  |  2  | --- |\n| 17th | +6 |---                                        |  4  |  3  |  3  |  3  |  1  |\n| 18th | +6 |Aura Improvements                          |  4  |  3  |  3  |  3  |  1  |\n| 19th | +6 |Ability Score Improvement                  |  4  |  3  |  3  |  3  |  2  |\n| 20th | +6 |Sacred Oath Feature                        |  4  |  3  |  3  |  3  |  2  |\n\n! Class Features\n\nAs a paladin, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d10 per paladin level\n\n''Hit Points at 1st Level:'' 10 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d10 (or 6) + your Constitution modifier per paladin level after 1st\n\n!! Proficiencies\n\n''Armor:'' All armor, shields\n\n''Weapons:'' Simple weapons, martial weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Wisdom, Charisma\n\n''Skills:'' Choose two from Athletics, Insight, Intimidation, Medicine, Persuasion, and Religion\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[martial weapon|Weapons]] and a [[shield|Armor and Shields]] or (//b//) two [[martial weapons|Weapons]]\n* (//a//) five [[javelins|Weapons]] or (//b//) any [[simple melee weapon|Weapons]]\n* (//a//) a [[priest’s pack|Adventuring Gear]] or (//b//) an [[explorer’s pack|Adventuring Gear]]\n* [[Chain mail|Armor and Shields]] and a [[holy symbol|Adventuring Gear]]\n\nAlternatively, you may start with 5d4x10 gp to buy your equipment.\n\n!! Divine Sense\n\nThe presence of strong evil registers on your senses like a noxious odor, and powerful good rings like heavenly music in your ears. As an action, you can open your awareness to detect such forces. Until the end of your next turn, you know the location of any celestial, fiend, or undead within 60 feet of you that is not behind total cover. You know the type (celestial, fiend, or undead) of any being whose presence you sense, but not its identity (the vampire Count Strahd von Zarovich, for instance). Within the same radius, you also detect the presence of any place or object that has been consecrated or desecrated, as with the [[Hallow]] spell.\n\nYou can use this feature a number of times equal to 1 + your Charisma modifier. When you finish a long rest, you regain all expended uses.\n\n!! Lay on Hands\n\nYour blessed touch can heal wounds. You have a pool of healing power that replenishes when you take a long rest. With that pool, you can restore a total number of hit points equal to your paladin level × 5.\n\nAs an action, you can touch a creature and draw power from the pool to restore a number of hit points to that creature, up to the maximum amount remaining in your pool.\n\nAlternatively, you can expend 5 hit points from your pool of healing to cure the target of one disease or neutralize one poison affecting it. You can cure multiple diseases and neutralize multiple poisons with a single use of Lay on Hands, expending hit points separately for each one.\n\nThis feature has no effect on undead and constructs.\n\n!! Fighting Style\n\nAt 2nd level, you adopt a style of fighting as your specialty. Choose one of the following options. You can’t take a Fighting Style option more than once, even if you later get to choose again.\n\n!!! Defense\n\nWhile you are wearing armor, you gain a +1 bonus to AC.\n\n!!! Dueling\n\nWhen you are wielding a melee weapon in one hand and no other weapons, you gain a +2 bonus to damage rolls with that weapon.\n\n!!! Great Weapon Fighting\n\nWhen you roll a 1 or 2 on a damage die for an attack you make with a melee weapon that you are wielding with two hands, you can reroll the die and must use the new roll. The weapon must have the two-handed or versatile property for you to gain this benefit.\n\n!!! Protection\n\nWhen a creature you can see attacks a target other than you that is within 5 feet of you, you can use your reaction to impose disadvantage on the attack roll. You must be wielding a shield.\n\n!! Spellcasting\n\nBy 2nd level, you have learned to draw on divine magic through meditation and prayer to cast spells as a cleric does. \n\n!!! Preparing and Casting Spells\n\nThe Paladin table shows how many spell slots you have to cast your paladin spells. To cast one of your paladin spells of 1st level or higher, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nYou prepare the list of paladin spells that are available for you to cast, choosing from the paladin spell list. When you do so, choose a number of paladin spells equal to your Charisma modifier + half your paladin level, rounded down (minimum of one spell). The spells must be of a level for which you have spell slots.\n\nFor example, if you are a 5th-level paladin, you have four 1st-level and two 2nd-level spell slots. With a Charisma of 14, your list of prepared spells can include four spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell cure wounds, you can cast it using a 1st-level or a 2nd-level slot. Casting the spell doesn’t remove it from your list of prepared spells.\n\nYou can change your list of prepared spells when you finish a long rest. Preparing a new list of paladin spells requires time spent in prayer and meditation: at least 1 minute per spell level for each spell on your list.\n\n!!! Spellcasting Ability\n\nCharisma is your spellcasting ability for your paladin spells, since their power derives from the strength of your convictions. You use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a paladin spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Charisma modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Charisma modifier\n\n!!! Spellcasting Focus\n\nYou can use a holy symbol as a spellcasting focus for your paladin spells.\n\n!! Divine Smite\n\nStarting at 2nd level, when you hit a creature with a melee weapon attack, you can expend one spell slot to deal radiant damage to the target, in addition to the weapon’s damage. The extra damage is 2d8 for a 1st-level spell slot, plus 1d8 for each spell level higher than 1st, to a maximum of 5d8. The damage increases by 1d8 if the target is an undead or a fiend, to a maximum of 6d8.\n\n!! Divine Health\n\nBy 3rd level, the divine magic flowing through you makes you immune to disease.\n\n!! Sacred Oath\n\nWhen you reach 3rd level, you swear the oath that binds you as a paladin forever. Up to this time you have been in a preparatory stage, committed to the path but not yet sworn to it.\n\n* [[Oath of the Ancients]]{{$:/PHB}}\n* [[Oath of Devotion]]{{$:/PHB}}\n* [[Oath of Vengeance]]{{$:/PHB}}\n* [[Oathbreaker]]{{$:/DMG}}\n\nYour choice grants you features at 3rd level and again at 7th, 15th, and 20th level. Those features include oath spells and the Channel Divinity feature.\n\n!!! Oath Spells\n\nEach oath has a list of associated spells. You gain access to these spells at the levels specified in the oath description. Once you gain access to an oath spell, you always have it prepared. Oath spells don’t count against the number of spells you can prepare each day.\n\nIf you gain an oath spell that doesn’t appear on the paladin spell list, the spell is nonetheless a paladin spell for you.\n\n!!! Channel Divinity\n\nYour oath allows you to channel divine energy to fuel magical effects. Each Channel Divinity option provided by your oath explains how to use it.\n\nWhen you use your Channel Divinity, you choose which option to use. You must then finish a short or long rest to use your Channel Divinity again.\n\nSome Channel Divinity effects require saving throws. When you use such an effect from this class, the DC equals your paladin spell save DC.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat. \n\n!! Extra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Aura of Protection\n\nStarting at 6th level, whenever you or a friendly creature within 10 feet of you must make a saving throw, the creature gains a bonus to the saving throw equal to your Charisma modifier (with a minimum bonus of +1). You must be conscious to grant this bonus.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Aura of Courage\n\nStarting at 10th level, you and friendly creatures within 10 feet of you can’t be frightened while you are conscious.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Improved Divine Smite\n\nBy 11th level, you are so suffused with righteous might that all your melee weapon strikes carry divine power with them. Whenever you hit a creature with a melee weapon, the creature takes an extra 1d8 radiant damage.\n\n!! Cleansing Touch\n\nBeginning at 14th level, you can use your action to end one spell on yourself or on one willing creature that you touch.\n\nYou can use this feature a number of times equal to your Charisma modifier (a minimum of once). You regain expended uses when you finish a long rest.","tags":"Classes [[Player's Handbook]]","title":"Paladin","modified":"20260713093344518"},
{"created":"20260506145300415","text":"//For some barbarians, rage is a means to an end – that end being violence. The Path of the Berserker is a path of untrammeled fury, slick with blood. As you enter the berserker's rage, you thrill in the chaos of battle, heedless of your own health or well-being.//\n\n!! Frenzy\n\nStarting when you choose this path at 3rd level, you can go into a frenzy when you rage. If you do so, for the duration of your rage you can make a single melee weapon attack as a bonus action on each of your turns after this one. When your rage ends, you suffer one level of exhaustion.\n\n!! Mindless Rage\n\nBeginning at 6th level, you can't be charmed or frightened while raging. If you are charmed or frightened when you enter your rage, the effect is suspended for the duration of the rage.\n\n!! Intimidating Presence\n\nBeginning at 10th level, you can use your action to frighten someone with your menacing presence. When you do so, choose one creature that you can see within 30 feet of you. If the creature can see or hear you, it must succeed on a Wisdom saving throw (DC equal to 8 + your proficiency bonus + your Charisma modifier) or be frightened of you until the end of your next turn. On subsequent turns, you can use your action to extend the duration of this effect on the frightened creature until the end of your next turn. This effect ends if the creature ends its turn out of line of sight or more than 60 feet away from you.\n\nIf the creature succeeds on its saving throw, you can't use this feature on that creature again for 24 hours.\n\n!! Retaliation\n\nStarting at 14th level, when you take damage from a creature that is within 5 feet of you, you can use your reaction to make a melee weapon attack against that creature.","title":"Path of the Berserker","modified":"20260707183542433","type":"","tags":"Subclasses Barbarian [[Player's Handbook]]"},
{"created":"20260506145541819","text":"//The Path of the Totem Warrior is a spiritual journey, as the barbarian accepts a spirit animal as guide, protector, and inspiration. In battle, your totem spirit fills you with supernatural might, adding magical fuel to your barbarian rage.//\n\n//Most barbarian tribes consider a totem animal to be kin to a particular clan. In such cases, it is unusual for an individual to have more than one totem animal spirit, though exceptions exist.//\n\n!! Spirit Seeker\n\nYours is a path that seeks attunement with the natural world, giving you a kinship with beasts. At 3rd level when you adopt this path, you gain the ability to cast the [[Beast Sense]] and [[Speak with Animals]] spells, but only as rituals.\n\n!! Totem Spirit\n\nAt 3rd level, when you adopt this path, you choose a totem spirit and gain its feature. You must make or acquire a physical totem object – an amulet or similar adornment – that incorporates fur or feathers, claws, teeth, or bones of the totem animal. At your option, you also gain minor physical attributes that are reminiscent of your totem spirit. For example, if you have a bear totem spirit, you might be unusually hairy and thick-skinned, or if your totem is the eagle, your eyes turn bright yellow.\n\nYour totem animal might be an animal related to those listed here but more appropriate to your homeland. For example, you could choose a hawk or vulture in place of an eagle.\n\n//''Bear.''// While raging, you have resistance to all damage except psychic damage. The spirit of the bear makes you tough enough to stand up to any punishment.\n\n//''Eagle.''// While you're raging and aren't wearing heavy armor, other creatures have disadvantage on opportunity attack rolls against you, and you can use the Dash action as a bonus action on your turn. The spirit of the eagle makes you into a predator who can weave through the fray with ease.\n\n//''Wolf.''// While you're raging, your friends have advantage on melee attack rolls against any creature within 5 feet of you that is hostile to you. The spirit of the wolf makes you a leader of hunters.\n\n!! Aspect of the Beast\n\nAt 6th level, you gain a magical benefit based on the totem animal of your choice. You can choose the same animal you selected at 3rd level or a different one.\n\n//''Bear.''// You gain the might of a bear. Your carrying capacity (including maximum load and maximum lift) is doubled, and you have advantage on Strength checks made to push, pull, lift, or break objects.\n\n//''Eagle.''// You gain the eyesight of an eagle. You can see up to 1 mile away with no difficulty, able to discern even fine details as though looking at something no more than 100 feet away from you. Additionally, dim light doesn't impose disadvantage on your Wisdom (Perception) checks.\n\n//''Wolf.''// You gain the hunting sensibilities of a wolf. You can track other creatures while traveling at a fast pace, and you can move stealthily while traveling at a normal pace.\n\n!! Spirit Walker\n\nAt 10th level, you can cast the [[Commune with Nature]] spell, but only as a ritual. When you do so, a spiritual version of one of the animals you chose for Totem Spirit or Aspect of the Beast appears to you to convey the information you seek.\n\n!! Totemic Attunement\n\nAt 14th level, you gain a magical benefit based on a totem animal of your choice. You can choose the same animal you selected previously or a different one.\n\n//''Bear.''// While you're raging, any creature within 5 feet of you that's hostile to you has disadvantage on attack rolls against targets other than you or another character with this feature. An enemy is immune to this effect if it can't see or hear you or if it can't be frightened.\n\n//''Eagle.''// While raging, you have a flying speed equal to your current walking speed. This benefit works only in short bursts; you fall if you end your turn in the air and nothing else is holding you aloft.\n\n//''Wolf.''// While you're raging, you can use a bonus action on your turn to knock a Large or smaller creature prone when you hit it with melee weapon attack.","tags":"Barbarian Subclasses [[Player's Handbook]]","title":"Path of the Totem Warrior","modified":"20260707183549942"},

{"created":"20260709094651363","text":"//Far from the bustle of cities and towns, past the hedges that shelter the most distant farms from the terrors of the wild, amid the dense-packed trees of trackless forests and across wide and empty plains, rangers keep their unending watch.//\n\n|noborder alternate|k\n|!Level|!PB|!Features |!Spells Known|!Spell Slots per Spell Level |\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|\n|  1st | +2 |Favored Enemy, Natural Explorer                   | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |Fighting Style, Spellcasting                      |  2  |  2  | --- | --- | --- | --- |\n|  3rd | +2 |Ranger Archetype, Primeval Awareness              |  3  |  3  | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement                         |  3  |  3  | --- | --- | --- | --- |\n|  5th | +3 |Extra Attack                                      |  4  |  4  |  2  | --- | --- | --- |\n|  6th | +3 |Favored Enemy and Natural Explorer Improvements   |  4  |  4  |  2  | --- | --- | --- |\n|  7th | +3 |Ranger Archetype Feature                          |  5  |  4  |  3  | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement, Land's Stride          |  5  |  4  |  3  | --- | --- | --- |\n|  9th | +4 |---                                               |  6  |  4  |  3  |  2  | --- | --- |\n| 10th | +4 |Natural Explorer Improvement, Hide in Plain Sight |  6  |  4  |  3  |  2  | --- | --- |\n| 11th | +4 |Ranger Archetype Feature                          |  7  |  4  |  3  |  3  | --- | --- |\n| 12th | +4 |Ability Score Improvement                         |  7  |  4  |  3  |  3  | --- | --- |\n| 13th | +5 |---                                               |  8  |  4  |  3  |  3  |  1  | --- |\n| 14th | +5 |Favored Enemy Improvement, Vanish                 |  8  |  4  |  3  |  3  |  1  | --- |\n| 15th | +5 |Ranger Archetype Feature                          |  9  |  4  |  3  |  3  |  2  | --- |\n| 16th | +5 |Ability Score Improvement                         |  9  |  4  |  3  |  3  |  2  | --- |\n| 17th | +6 |---                                               |  10 |  4  |  3  |  3  |  3  |  1  |\n| 18th | +6 |Feral Senses                                      |  10 |  4  |  3  |  3  |  3  |  1  |\n| 19th | +6 |Ability Score Improvement                         |  11 |  4  |  3  |  3  |  3  |  2  |\n| 20th | +6 |Foe Slayer                                        |  11 |  4  |  3  |  3  |  3  |  2  |\n\n! Class Features\n\nAs a ranger, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d10 per ranger level\n\n''Hit Points at 1st Level:'' 10 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d10 (or 6) + your Constitution modifier per ranger level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields\n\n''Weapons:'' Simple weapons, martial weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Strength, Dexterity\n\n''Skills:'' Choose three from Animal Handling, Athletics, Insight, Investigation, Nature, Perception, Stealth, and Survival\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) [[scale mail|Armor and Shields]] or (b) [[leather armor|Armor and Shields]]\n* (//a//) two [[shortswords|Weapons]] or (b) two [[simple melee weapons|Weapons]]\n* (//a//) a [[dungeoneer’s pack|Adventuring Gear]] or (b) an [[explorer’s pack|Adventuring Gear]]\n* A [[longbow|Weapons]] and a [[quiver|Adventuring Gear]] of 20 [[arrows|Adventuring Gear]]\n\nAlternatively, you may start with 5d4x10 gp to buy your equipment.\n\n!! Favored Enemy\n\nBeginning at 1st level, you have significant experience studying, tracking, hunting, and even talking to a certain type of enemy.\n\nChoose a type of favored enemy: aberrations, beasts, celestials, constructs, dragons, elementals, fey, fiends, giants, monstrosities, oozes, plants, or undead. Alternatively, you can select two races of humanoid (such as gnolls and orcs) as favored enemies.\n\nYou have advantage on Wisdom (Survival) checks to track your favored enemies, as well as on Intelligence checks to recall information about them.\n\nWhen you gain this feature, you also learn one language of your choice that is spoken by your favored enemies, if they speak one at all.\n\nYou choose one additional favored enemy, as well as an associated language, at 6th and 14th level. As you gain levels, your choices should reflect the types of monsters you have encountered on your adventures.\n\n!! Natural Explorer\n\nYou are particularly familiar with one type of natural environment and are adept at traveling and surviving in such regions. Choose one type of favored terrain: arctic, coast, desert, forest, grassland, mountain, swamp, or the Underdark. When you make an Intelligence or Wisdom check related to your favored terrain, your proficiency bonus is doubled if you are using a skill that you’re proficient in.\n\nWhile traveling for an hour or more in your favored terrain, you gain the following benefits:\n\n* Difficult terrain doesn’t slow your group’s travel.\n* Your group can’t become lost except by magical means.\n* Even when you are engaged in another activity while traveling (such as foraging, navigating, or tracking), you remain alert to danger.\n* If you are traveling alone, you can move stealthily at a normal pace.\n* When you forage, you find twice as much food as you normally would.\n* While tracking other creatures, you also learn their exact number, their sizes, and how long ago they passed through the area.\n\nYou choose additional favored terrain types at 6th and 10th level.\n\n!! Fighting Style\n\nAt 2nd level, you adopt a particular style of fighting as your specialty. Choose one of the following options. You can’t take a Fighting Style option more than once, even if you later get to choose again.\n\n!!! Archery\n\nYou gain a +2 bonus to attack rolls you make with ranged weapons.\n\n!!! Defense\n\nWhile you are wearing armor, you gain a +1 bonus to AC.\n\n!!! Dueling\n\nWhen you are wielding a melee weapon in one hand and no other weapons, you gain a +2 bonus to damage rolls with that weapon.\n\n!!! Two-Weapon Fighting\n\nWhen you engage in two-weapon fighting, you can add your ability modifier to the damage of the second attack.\n\n!! Spellcasting\n\nBy the time you reach 2nd level, you have learned to use the magical essence of nature to cast spells, much as a druid does.\n\n!!! Spell Slots\n\nThe Ranger table shows how many spell slots you have to cast your ranger spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nFor example, if you know the 1st-level spell [[Animal Friendship]] and have a 1st-level and a 2nd-level spell slot available, you can cast [[Animal Friendship]] using either slot.\n\n!!! Spells Known of 1st Level and Higher\n\nYou know two 1st-level spells of your choice from the ranger spell list.\n\nThe Spells Known column of the Ranger table shows when you learn more ranger spells of your choice. Each of these spells must be of a level for which you have spell slots. For instance, when you reach 5th level in this class, you can learn one new spell of 1st or 2nd level.\n\nAdditionally, when you gain a level in this class, you can choose one of the ranger spells you know and replace it with another spell from the ranger spell list, which also must be of a level for which you have spell slots.\n\n!!! Spellcasting Ability\n\nWisdom is your spellcasting ability for your ranger spells, since your magic draws on your attunement to nature. You use your Wisdom whenever a spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a ranger spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Wisdom modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Wisdom modifier\n\n!! Ranger Archetype\n\nAt 3rd level, you choose an archetype that you strive to emulate. Your choice grants you features at 3rd level and again at 7th, 11th, and 15th level.\n\n* [[Hunter]]{{$:/PHB}}\n* [[Beast Master]]{{$:/PHB}}\n\n!! Primeval Awareness\n\nBeginning at 3rd level, you can use your action and expend one ranger spell slot to focus your awareness on the region around you. For 1 minute per level of the spell slot you expend, you can sense whether the following types of creatures are present within 1 mile of you (or within up to 6 miles if you are in your favored terrain): aberrations, celestials, dragons, elementals, fey, fiends, and undead. This feature doesn’t reveal the creatures’ location or number.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Extra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\nStarting at 8th level, moving through nonmagical difficult terrain costs you no extra movement. You can also pass through nonmagical plants without being slowed by them and without taking damage from them if they have thorns, spines, or a similar hazard.\n\nIn addition, you have advantage on saving throws against plants that are magically created or manipulated to impede movement, such those created by the [[Entangle]] spell.\n\n!! Hide in Plain Sight\n\nStarting at 10th level, you can spend 1 minute creating camouflage for yourself. You must have access to fresh mud, dirt, plants, soot, and other naturally occurring materials with which to create your camouflage.\n\nOnce you are camouflaged in this way, you can try to hide by pressing yourself up against a solid surface, such as a tree or wall, that is at least as tall and wide as you are. You gain a +10 bonus to Dexterity (Stealth) checks as long as you remain there without moving or taking actions. Once you move or take an action or a reaction, you must camouflage yourself again to gain this benefit.\n\n!! Vanish\n\nStarting at 14th level, you can use the Hide action as a bonus action on your turn. Also, you can’t be tracked by nonmagical means, unless you choose to leave a trail.\n\n!! Feral Senses\n\nAt 18th level, you gain preternatural senses that help you fight creatures you can’t see. When you attack a creature you can’t see, your inability to see it doesn’t impose disadvantage on your attack rolls against it.\n\nYou are also aware of the location of any invisible creature within 30 feet of you, provided that the creature isn’t hidden from you and you aren’t blinded or deafened.\n\n!! Foe Slayer\n\nAt 20th level, you become an unparalleled hunter of your enemies. Once on each of your turns, you can add your Wisdom modifier to the attack roll or the damage roll of an attack you make against one of your favored enemies. You can choose to use this feature before or after the roll, but before any effects of the roll are applied.","tags":"Classes [[Player's Handbook]]","title":"Ranger","modified":"20260713093354194"},
{"created":"20260709144901128","text":"//Rogues rely on skill, stealth, and their foes’ vulnerabilities to get the upper hand in any situation. They have a knack for finding the solution to just about any problem, demonstrating a resourcefulness and versatility that is the cornerstone of any successful adventuring party.//\n\n|noborder alternate|k\n|!Level|!PB|!Sneak Attack|!Features |\n|  1st | +2 |  1d6 |Expertise, Sneak Attack, Thieves' Cant |\n|  2nd | +2 |  1d6 |Cunning Action                         |\n|  3rd | +2 |  2d6 |Roguish Archetype                      |\n|  4th | +2 |  2d6 |Ability Score Improvement              |\n|  5th | +3 |  3d6 |Uncanny Dodge                          |\n|  6th | +3 |  3d6 |Expertise                              |\n|  7th | +3 |  4d6 |Evasion                                |\n|  8th | +3 |  4d6 |Ability Score Improvement              |\n|  9th | +4 |  5d6 |Roguish Archetype Feature              |\n| 10th | +4 |  5d6 |Ability Score Improvement              |\n| 11th | +4 |  6d6 |Reliable Talent                        |\n| 12th | +4 |  6d6 |Ability Score Improvement              |\n| 13th | +5 |  7d6 |Roguish Archetype Feature              |\n| 14th | +5 |  7d6 |Blindsense                             |\n| 15th | +5 |  8d6 |Slippery Mind                          |\n| 16th | +5 |  8d6 |Ability Score Improvement              |\n| 17th | +6 |  9d6 |Roguish Archetype Feature              |\n| 18th | +6 |  9d6 |Elusive                                |\n| 19th | +6 | 10d6 |Ability Score Improvement              |\n| 20th | +6 | 10d6 |Stroke of Luck                         |\n\n! Class Features\n\nAs a rogue, you have the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per rogue level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per rogue level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor\n\n''Weapons:'' Simple weapons, hand crossbows, longswords, rapiers, shortswords\n\n''Tools:'' Thieves’ tools\n\n''Saving Throws:'' Dexterity, Intelligence\n\n''Skills:'' Choose four from Acrobatics, Athletics, Deception, Insight, Intimidation, Investigation, Perception, Performance, Persuasion, Sleight of Hand, and Stealth\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (a) a [[rapier|Weapons]] or (b) a [[shortsword|Weapons]]\n* (a) a [[shortbow|Weapons]] and [[quiver|Adventuring Gear]] of 20 [[arrows|Adventuring Gear]] or (b) a [[shortsword|Weapons]]\n* (a) a [[burglar’s pack|Adventuring Gear]], (b) a [[dungeoneer’s pack|Adventuring Gear]], or (c) an [[explorer’s pack|Adventuring Gear]]\n* [[Leather armor|Armor and Shields]], two [[daggers|Weapons]], and [[thieves’ tools|Tools]]\n\nAlternatively, you may start with 4d4x10 gp to buy your equipment.\n\n!! Expertise\n\nAt 1st level, choose two of your skill proficiencies, or one of your skill proficiencies and your proficiency with thieves’ tools. Your proficiency bonus is doubled for any ability check you make that uses either of the chosen proficiencies.\n\nAt 6th level, you can choose two more of your proficiencies (in skills or with thieves’ tools) to gain this benefit.\n\n!! Sneak Attack\n\nBeginning at 1st level, you know how to strike subtly and exploit a foe’s distraction. Once per turn, you can deal an extra 1d6 damage to one creature you hit with an attack if you have advantage on the attack roll. The attack must use a finesse or a ranged weapon.\n\nYou don’t need advantage on the attack roll if another enemy of the target is within 5 feet of it, that enemy isn’t incapacitated, and you don’t have disadvantage on the attack roll.\n\nThe amount of the extra damage increases as you gain levels in this class, as shown in the Sneak Attack column of the Rogue table.\n\n!! Thieves’ Cant\n\nDuring your rogue training you learned thieves’ cant, a secret mix of dialect, jargon, and code that allows you to hide messages in seemingly normal conversation. Only another creature that knows thieves’ cant understands such messages. It takes four times longer to convey such a message than it does to speak the same idea plainly.\n\nIn addition, you understand a set of secret signs and symbols used to convey short, simple messages, such as whether an area is dangerous or the territory of a thieves’ guild, whether loot is nearby, or whether the people in an area are easy marks or will provide a safe house for thieves on the run.\n\n!! Cunning Action\n\nStarting at 2nd level, your quick thinking and agility allow you to move and act quickly. You can take a bonus action on each of your turns in combat. This action can be used only to take the Dash, Disengage, or Hide action.\n\n!! Roguish Archetype\n\nAt 3rd level, you choose an archetype that you emulate in the exercise of your rogue abilities. Your archetype choice grants you features at 3rd level and then again at 9th, 13th, and 17th level.\n\n* [[Arcane Trickster]]{{$:/PHB}}\n* [[Assassin]]{{$:/PHB}}\n* [[Thief]]{{$:/PHB}}\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 10th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Uncanny Dodge\n\nStarting at 5th level, when an attacker that you can see hits you with an attack, you can use your reaction to halve the attack’s damage against you.\n\n!! Evasion\n\nBeginning at 7th level, you can nimbly dodge out of the way of certain area effects, such as a red dragon’s fiery breath or an [[Ice Storm]] spell. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.\n\n!! Reliable Talent\n\nBy 11th level, you have refined your chosen skills until they approach perfection. Whenever you make an ability check that lets you add your proficiency bonus, you can treat a d20 roll of 9 or lower as a 10.\n\n!! Blindsense\n\nStarting at 14th level, if you are able to hear, you are aware of the location of any hidden or invisible creature within 10 feet of you.\n\n!! Slippery Mind\n\nBy 15th level, you have acquired greater mental strength. You gain proficiency in Wisdom saving throws.\n\n!! Elusive\n\nBeginning at 18th level, you are so evasive that attackers rarely gain the upper hand against you. No attack roll has advantage against you while you aren’t incapacitated.\n\n!! Stroke of Luck\n\nAt 20th level, you have an uncanny knack for succeeding when you need to. If your attack misses a target within range, you can turn the miss into a hit. Alternatively, if you fail an ability check, you can treat the d20 roll as a 20.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.","tags":"Classes [[Player's Handbook]]","title":"Rogue","modified":"20260713093410583"},
{"created":"20260711120618083","text":"You spent years learning the lore of the multiverse. You scoured manuscripts, studied scrolls, and listened to the greatest experts on the subjects that interest you. Your efforts have made you a master in your fields of study.\n\nSkill Proficiencies: Arcana, History\n\nLanguages: Two of your choice\n\nEquipment: A bottle of black [[ink|Adventuring Gear]], a [[quill|Adventuring Gear]], a [[small knife|Adventuring Gear]], a letter from a dead colleague posing a question you have not yet been able to answer, a set of [[common clothes|Adventuring Gear]], and a [[pouch|Adventuring Gear]] containing 10 gp\n\n!! Specialty\n\nTo determine the nature of your scholarly training, roll a d8 or choose from the options in the table below.\n\n|noborder alternate|k\n|!d8|!Specialty |\n| 1 |Alchemist |\n| 2 |Astronomer |\n| 3 |Discredited academic |\n| 4 |Librarian |\n| 5 |Professor |\n| 6 |Researcher |\n| 7 |Wizard's apprentice |\n| 8 |Scribe |\n\n!! Feature: Researcher\n\nWhen you attempt to learn or recall a piece of lore, if you do not know that information, you often know where and from whom you can obtain it. Usually, this information comes from a library, scriptorium, university, or a sage or other learned person or creature. Your DM might rule that the knowledge you seek is secreted away in an almost inaccessible place, or that it simply cannot be found. Unearthing the deepest secrets of the multiverse can require an adventure or even a whole campaign.\n\n!! Suggested Characteristics\n\nSages are defined by their extensive studies, and their characteristics reflect this life of study. Devoted to scholarly pursuits, a sage values knowledge highly — sometimes in its own right, sometimes as a means toward other ideals.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I use polysyllabic words that convey the impression of great erudition. |\n| 2 |I’ve read every book in the world’s greatest libraries -- or I like to boast that I have. |\n| 3 |I’m used to helping out those who aren’t as smart as I am, and I patiently explain anything and everything to others. |\n| 4 |There’s nothing I like more than a good mystery. |\n| 5 |I’m willing to listen to every side of an argument before I make my own judgment. |\n| 6 |I...speak...slowly...when talking...to idiots,...which...almost...everyone...is...compared...to me. |\n| 7 |I am horribly, horribly awkward in social situations. |\n| 8 |I’m convinced that people are always trying to steal my secrets. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Knowledge.'' The path to power and self-improvement is through knowledge. (Neutral) |\n| 2 |''Beauty.'' What is beautiful points us beyond itself toward what is true. (Good) |\n| 3 |''Logic.'' Emotions must not cloud our logical thinking. (Lawful) |\n| 4 |''No Limits.'' Nothing should fetter the infinite possibility inherent in all existence. (Chaotic) |\n| 5 |''Power.'' Knowledge is the path to power and domination. (Evil) |\n| 6 |''Self-Improvement.'' The goal of a life of study is the betterment of oneself. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |It is my duty to protect my students. |\n| 2 |I have an ancient text that holds terrible secrets that must not fall into the wrong hands. |\n| 3 |I work to preserve a library, university, scriptorium, or monastery. |\n| 4 |My life’s work is a series of tomes related to a specific field of lore. |\n| 5 |I’ve been searching my whole life for the answer to a certain question. |\n| 6 |I sold my soul for knowledge. I hope to do great deeds and win it back. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |I am easily distracted by the promise of information. |\n| 2 |Most people scream and run when they see a demon. I stop and take notes on its anatomy. |\n| 3 |Unlocking an ancient mystery is worth the price of a civilization. |\n| 4 |I overlook obvious solutions in favor of complicated ones. |\n| 5 |I speak without really thinking through my words, invariably insulting others. |\n| 6 |I can’t keep a secret to save my life, or anyone else’s. |","tags":"[[Player's Handbook]] Background","title":"Sage","modified":"20260711121202564"},
{"created":"20260711121145500","text":"You sailed on a seagoing vessel for years. In that time, you faced down mighty storms, monsters of the deep, and those who wanted to sink your craft to the bottomless depths. Your first love is the distant line of the horizon, but the time has come to try your hand at something new.\n\nDiscuss the nature of the ship you previously sailed with your Dungeon Master. Was it a merchant ship, a naval vessel, a ship of discovery, or a pirate ship? How famous (or infamous) is it? Is it widely traveled? Is it still sailing, or is it missing and presumed lost with all hands?\n\nWhat were your duties on board — boatswain, captain, navigator, cook, or some other position? Who were the captain and first mate? Did you leave your ship on good terms with your fellows, or on the run?\n\n''Skill Proficiencies:'' Athletics, Perception\n\n''Tool Proficiencies:'' Navigator’s tools, vehicles (water)\n\n''Equipment:'' A belaying pin (club), [[50 feet of silk rope|Adventuring Gear]], a lucky charm such as a rabbit foot or a small stone with a hole in the center (or you may roll for a random trinket), a set of [[common clothes|Adventuring Gear]], and a [[pouch|Adventuring Gear]] containing 10 gp\n\n!! Feature: Ship's Passage\n\nWhen you need to, you can secure free passage on a sailing ship for yourself and your adventuring companions. You might sail on the ship you served on, or another ship you have good relations with (perhaps one captained by a former crewmate). Because you’re calling in a favor, you can’t be certain of a schedule or route that will meet your every need. Your Dungeon Master will determine how long it takes to get where you need to go. In return for your free passage, you and your companions are expected to assist the crew during the voyage.\n\n!! Suggested Characteristics\n\nSailors can be a rough lot, but the responsibilities of life on a ship make them generally reliable as well. Life aboard a ship shapes their outlook and forms their most important attachments.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |My friends know they can rely on me, no matter what. |\n| 2 |I work hard so that I can play hard when the work is done. |\n| 3 |I enjoy sailing into new ports and making new friends over a flagon of ale. |\n| 4 |I stretch the truth for the sake of a good story. |\n| 5 |To me, a tavern brawl is a nice way to get to know a new city. |\n| 6 |I never pass up a friendly wager. |\n| 7 |My language is as foul as an otyugh nest. |\n| 8 |I like a job well done, especially if I can convince someone else to do it. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Respect.'' The thing that keeps a ship together is mutual respect between captain and crew. (Good) |\n| 2 |''Fairness.'' We all do the work, so we all share in the rewards. (Lawful) |\n| 3 |''Freedom.'' The sea is freedom — the freedom to go anywhere and do anything. (Chaotic) |\n| 4 |''Mastery.'' I’m a predator, and the other ships on the sea are my prey. (Evil) |\n| 5 |''People.'' I’m committed to my crewmates, not to ideals. (Neutral) |\n| 6 |''Aspiration.'' Someday I’ll own my own ship and chart my own destiny. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |I’m loyal to my captain first, everything else second. |\n| 2 |The ship is most important — crewmates and captains come and go. |\n| 3 |I’ll always remember my first ship. |\n| 4 |In a harbor town, I have a paramour whose eyes nearly stole me from the sea. |\n| 5 |I was cheated out of my fair share of the profits, and I want to get my due. |\n| 6 |Ruthless pirates murdered my captain and crewmates, plundered our ship, and left me to die. Vengeance will be mine. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |I follow orders, even if I think they’re wrong. |\n| 2 |I’ll say anything to avoid having to do extra work. |\n| 3 |Once someone questions my courage, I never back down no matter how dangerous the situation. |\n| 4 |Once I start drinking, it’s hard for me to stop. |\n| 5 |I can’t help but pocket loose coins and other trinkets I come across. |\n| 6 |My pride will probably lead to my destruction. |\n\n!! Variant Sailor: Pirate\n\nYou spent your youth under the sway of a dread pirate, a ruthless cutthroat who taught you how to survive in a world of sharks and lawlessness. You’ve indulged in larceny on the high seas and sent more than one deserving soul to a briny grave. Fear and bloodshed are no strangers to you, and you’ve garnered a somewhat unsavory reputation in many a port town.\n\nIf you decide that your sailing career involved piracy, you can choose the Bad Reputation feature (see sidebar) instead of the Ship’s Passage feature.\n\n!! Variant Feature: Bad Reputation\n\nIf your character has a sailor background, you may select this background feature instead of Ship’s Passage.\n\nNo matter where you go, people are afraid of you due to your reputation. When you are in a settlement, you can get away with minor criminal offenses, such as refusing to pay for food at a tavern or breaking down doors at a local shop, since most people will not report your activity to the authorities.","tags":"[[Player's Handbook]] Background","title":"Sailor","modified":"20260711122232705"},
