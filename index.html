{"created":"20260711165137146","text":"//Vedalken are tall and slender, standing almost a head\ntaller than humans on average but weighing about\nthe same. Their hairless skin comes in a range of\nshades of blue. Their eyes are darker shades of blue\nor violet. They lack external ears, their noses are\nbroad and flat, and they are partially amphibious.//\n\n//Vedalkens’ partial amphibiousness allows them to\nbreathe underwater through their skin. They can’t\nmanage to do this indefinitely, but long enough to\nsurprise exclusively land-dwelling folk. In addition, a\nvedalken has a naturally powerful and complex mind,\ngiving them protections against psychic attacks and\ncharms.//\n\n//Vedalken are among the more long-lived peoples,\nthough they don't live nearly as long as elves and\ndwarves. Even so, their lifespans are long enough to\nsee several generations of humans rise and pass\naway. This perspective informs their worldview and\nthe pace of their lives.//\n\n! Vedalken Traits\n\n!! Long-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively long.\n\n!! Partially Amphibious (1 Point)\nBy absorbing oxygen through your skin, you can\nbreathe underwater for up to 1 hour. Once you’ve\nreached that limit, you can’t use this trait again until\nyou finish a long rest.\n\n!! Vedalken Mind (7 Points)\nYou have advantage on your choice of two saving\nthrows from among Intelligence, Wisdom, and\nCharisma.\n\nIf you inherited the Vedalken Mind trait from your\nother birth parent, you also have advantage on the\nremaining type of saving throw.","tags":"Parentage [[Elf & Orc 1]]","title":"Vedalken Parentage","modified":"20260711165416581"},
{"created":"20260708090626956","text":"//War has many manifestations. It can make heroes of ordinary people. It can be desperate and horrific, with acts of cruelty and cowardice eclipsing instances of excellence and courage. In either case, the gods of war watch over warriors and reward them for their great deeds. The clerics of such gods excel in battle, inspiring others to fight the good fight or offering acts of violence as prayers. Gods of war include champions of honor and chivalry (such as Torm, Heironeous, and Kiri-Jolith) as well as gods of destruction and pillage (such as Erythnul, the Fury, Gruumsh, and Ares) and gods of conquest and domination (such as Bane, Hextor, and Maglubiyet). Other war gods (such as Tempus, Nike, and Nuada) take a more neutral stance, promoting war in all its manifestations and supporting warriors in any circumstance.//\n\n!!! War Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Divine Favor]], [[Shield of Faith]] |\n| 3rd |[[Magic Weapon]], [[Spiritual Weapon]] |\n| 5th |[[Crusader's Mantle]], [[Spirit Guardians]] |\n| 7th |[[Freedom of Movement]], [[Stoneskin]] |\n| 9th |[[Flame Strike]], [[Hold Monster]] |\n\n!! Bonus Proficiencies\n\nAt 1st level, you gain proficiency with martial weapons and heavy armor.\n\n!! War Priest\n\nFrom 1st level, your god delivers bolts of inspiration to you while you are engaged in battle. When you use the Attack action, you can make one weapon attack as a bonus action.\n\nYou can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.\n\n!! Channel Divinity: Guided Strike\n\nStarting at 2nd level, you can use your Channel Divinity to strike with supernatural accuracy. When you make an attack roll, you can use your Channel Divinity to gain a +10 bonus to the roll. You make this choice after you see the roll, but before the DM says whether the attack hits or misses.\n\n!! Channel Divinity: War God’s Blessing\n\nAt 6th level, when a creature within 30 feet of you makes an attack roll, you can use your reaction to grant that creature a +10 bonus to the roll, using your Channel Divinity. You make this choice after you see the roll, but before the DM says whether the attack hits or misses.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 damage of the same type dealt by the weapon to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Avatar of Battle\n\nAt 17th level, you gain resistance to bludgeoning, piercing, and slashing damage from nonmagical attacks.","tags":"Cleric Subclasses [[Player's Handbook]]","title":"War Domain","modified":"20260708090814478"},
{"created":"20260711165326694","text":"//The warforged were originally built to fight. While\nthe first warforged were mindless automatons, an\nunexpected breakthrough produced sapient soldiers,\ngiving rise to what some have only grudgingly\naccepted as a new species.//\n\n//Warforged are made from wood and metal, but\nthey can feel pain and emotion. Built as weapons,\nthey must now find a purpose beyond war. A\nwarforged can be a steadfast ally, a cold-hearted\nkiller, or a visionary in search of meaning.//\n\n//Warforged are formed from a blend of organic and\ninorganic materials. Root-like cords infused with\nalchemical fluids serve as their muscles, wrapped\naround a framework of steel, darkwood, or stone.\nArmored plates form a protective outer shell and\nreinforce joints. Warforged share a common facial\ndesign, with a hinged jaw and crystal eyes embedded\nbeneath a reinforced brow ridge.//\n\n//Beyond these common elements of warforged\ndesign, the precise materials and build of a\nwarforged vary based on the purpose for which it\nwas designed. Although they were manufactured,\nwarforged are living humanoids. Resting, healing\nmagic, and the Medicine skill all provide the same\nbenefits to warforged that they do to other\nhumanoids.//\n\n! Warforged Traits\n\n!! Constructed Resilience (10 Points)\nYou were created to have remarkable fortitude,\nrepresented by the following benefits:\n\n* You have advantage on saving throws against being poisoned, and you have resistance to poison damage.\n* You don’t need to eat, drink, or breathe.\n* You are immune to disease.\n* You don’t need to sleep, and magic can’t put you to sleep.\n\n!! Integrated Protection (6 Points)\nYour body has built-in defensive layers, which can be\nenhanced with armor:\n\n* You gain a +1 bonus to Armor Class.\n* You can don only armor with which you have proficiency. To don armor, you must incorporate it into your body over the course of 1 hour, during which you remain in contact with the armor. To doff armor, you must spend 1 hour removing it. You can rest while donning or doffing armor in this way.\n* While you live, your armor can’t be removed from your body against your will.\n\n!! Long-Lived (1 Point)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively long. In addition, you\nhalve the effect of any magical aging. If your other\nbirth parent is a warforged, you are immune to\nmagical aging effects.\n\n!! Sentry’s Rest (1 Point)\nWhen you take a long rest, you must spend at least\nsix hours in an inactive, motionless state, rather than\nsleeping. In this state, you appear inert, but it doesn’t\nrender you unconscious, and you can see and hear as\nnormal.","tags":"Parentage [[Elf & Orc 1]]","title":"Warforged Parentage","modified":"20260711165648586"},
{"created":"20260709184506642","text":"//Warlocks are seekers of the knowledge that lies hidden in the fabric of the multiverse. Through pacts made with mysterious beings of supernatural power, warlocks unlock magical effects both subtle and spectacular. Drawing on the ancient knowledge of beings such as fey nobles, demons, devils, hags, and alien entities of the Far Realm, warlocks piece together arcane secrets to bolster their own power.//\n\n|noborder alternate|k\n|!Level|!PB|!Features |!Cantrips Known |!Spells Known |!Spell Slots |!Slot Level |!Invocations Known |\n|  1st | +2 |Otherworldly Patron, Pact Magic | 2 |  2 | 1 | 1st | --- |\n|  2nd | +2 |Eldritch Invocations            | 2 |  3 | 2 | 1st |  2  |\n|  3rd | +2 |Pact Boon                       | 2 |  4 | 2 | 2nd |  2  |\n|  4th | +2 |Ability Score Improvement       | 3 |  5 | 2 | 2nd |  2  |\n|  5th | +3 |---                             | 3 |  6 | 2 | 3rd |  3  |\n|  6th | +3 |Otherworldly Patron Feature     | 3 |  7 | 2 | 3rd |  3  |\n|  7th | +3 |---                             | 3 |  8 | 2 | 4th |  4  |\n|  8th | +3 |Ability Score Improvement       | 3 |  9 | 2 | 4th |  4  |\n|  9th | +4 |---                             | 3 | 10 | 2 | 5th |  5  |\n| 10th | +4 |Otherworldly Patron Feature     | 4 | 10 | 2 | 5th |  5  |\n| 11th | +4 |Mystic Arcanum (6th level)      | 4 | 11 | 3 | 5th |  5  |\n| 12th | +4 |Ability Score Improvement       | 4 | 11 | 3 | 5th |  6  |\n| 13th | +5 |Mystic Arcanum (7th level)      | 4 | 12 | 3 | 5th |  6  |\n| 14th | +5 |Otherworldly Patron Feature     | 4 | 12 | 3 | 5th |  6  |\n| 15th | +5 |Mystic Arcanum (8th level)      | 4 | 13 | 3 | 5th |  7  |\n| 16th | +5 |Ability Score Improvement       | 4 | 13 | 3 | 5th |  7  |\n| 17th | +6 |Mystic Arcanum (9th level)      | 4 | 14 | 4 | 5th |  7  |\n| 18th | +6 |---                             | 4 | 14 | 4 | 5th |  8  |\n| 19th | +6 |Ability Score Improvement       | 4 | 15 | 4 | 5th |  8  |\n| 20th | +6 |Eldritch Master                 | 4 | 15 | 4 | 5th |  8  |\n\n! Class Features\n\nAs a warlock, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per warlock level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per warlock level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor\n\n''Weapons:'' Simple weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Wisdom, Charisma\n\n''Skills:'' Choose two skills from Arcana, Deception, History, Intimidation, Investigation, Nature, and Religion\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[light crossbow|Weapons]] and 20 [[bolts|Adventuring Gear]] or (//b//) any [[simple weapon|Weapons]]\n* (//a//) a [[component pouch|Adventuring Gear]] or (//b//) an [[arcane focus|Adventuring Gear]]\n* (//a//) a [[scholar’s pack|Adventuring Gear]] or (//b//) a [[dungeoneer’s pack|Adventuring Gear]]\n* [[Leather armor|Armor and Shields]], any [[simple weapon|Weapons]], and two [[daggers|Weapons]]\n\nAlternatively, you may start with 4d4x10 gp to buy your equipment.\n\n!! Otherworldly Patron\n\nAt 1st level, you have struck a bargain with an otherworldly being of your choice. Your choice grants you features at 1st level and again at 6th, 10th, and 14th level.\n\n* [[The Archfey]]{{$:/PHB}}\n* [[The Fiend]]{{$:/PHB}}\n* [[The Great Old One]]{{$:/PHB}}\n\n!! Pact Magic\n\nYour arcane research and the magic bestowed on you by your patron have given you facility with spells.\n\n!!! Cantrips\n\nYou know two cantrips of your choice from the warlock spell list. You learn additional warlock cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Warlock table.\n\n!!! Spell Slots\n\nThe Warlock table shows how many spell slots you have to cast your warlock spells of 1st through 5th level. The table also shows what the level of those slots is; all of your spell slots are the same level. To cast one of your warlock spells of 1st level or higher, you must expend a spell slot. You regain all expended spell slots when you finish a short or long rest.\n\nFor example, when you are 5th level, you have two 3rd-level spell slots. To cast the 1st-level spell [[Witch Bolt]], you must spend one of those slots, and you cast it as a 3rd-level spell.\n\n!!! Spells Known of 1st Level and Higher\n\nAt 1st level, you know two 1st-level spells of your choice from the warlock spell list.\n\nThe Spells Known column of the Warlock table shows when you learn more warlock spells of your choice of 1st level and higher. A spell you choose must be of a level no higher than what’s shown in the table’s Slot Level column for your level. When you reach 6th level, for example, you learn a new warlock spell, which can be 1st, 2nd, or 3rd level.\n\nAdditionally, when you gain a level in this class, you can choose one of the warlock spells you know and replace it with another spell from the warlock spell list, which also must be of a level for which you have spell slots.\n\n!!! Spellcasting Ability\n\nCharisma is your spellcasting ability for your warlock spells, so you use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a warlock spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Charisma modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Charisma modifier\n\n!!! Spellcasting Focus\n\nYou can use an arcane focus as a spellcasting focus for your warlock spells.\n\n!! Eldritch Invocations\n\nIn your study of occult lore, you have unearthed eldritch invocations, fragments of forbidden knowledge that imbue you with an abiding magical ability. A level prerequisite refers to your level in this class.\n\nAt 2nd level, you gain two eldritch invocations of your choice. Your invocation options are detailed on the [[Eldritch Invocations]] page. When you gain certain warlock levels, you gain additional invocations of your choice, as shown in the Invocations Known column of the Warlock table.\n\nAdditionally, when you gain a level in this class, you can choose one of the invocations you know and replace it with another invocation that you could learn at that level.\n\n!! Pact Boon\n\nAt 3rd level, your otherworldly patron bestows a gift upon you for your loyal service. You gain one of the following features of your choice.\n\n!!! Pact of the Chain\n\nYou learn the [[Find Familiar]] spell and can cast it as a ritual. The spell doesn’t count against your number of spells known.\n\nWhen you cast the spell, you can choose one of the normal forms for your familiar or one of the following special forms: imp, pseudodragon, quasit, or sprite.\n\nAdditionally, when you take the Attack action, you can forgo one of your own attacks to allow your familiar to make one attack with its reaction.\n\n!!! Pact of the Blade\n\nYou can use your action to create a pact weapon in your empty hand. You can choose the form that this melee weapon takes each time you create it. You are proficient with it while you wield it. This weapon counts as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.\n\nYour pact weapon disappears if it is more than 5 feet away from you for 1 minute or more. It also disappears if you use this feature again, if you dismiss the weapon (no action required), or if you die.\n\nYou can transform one magic weapon into your pact weapon by performing a special ritual while you hold the weapon. You perform the ritual over the course of 1 hour, which can be done during a short rest. You can then dismiss the weapon, shunting it into an extradimensional space, and it appears whenever you create your pact weapon thereafter. You can’t affect an artifact or a sentient weapon in this way. The weapon ceases being your pact weapon if you die, if you perform the 1-hour ritual on a different weapon, or if you use a 1-hour ritual to break your bond to it. The weapon appears at your feet if it is in the extradimensional space when the bond breaks.\n\n!!! Pact of the Tome\n\nYour patron gives you a grimoire called a Book of Shadows. When you gain this feature, choose three cantrips from any class’s spell list (the three needn’t be from the same list). While the book is on your person, you can cast those cantrips at will. They don’t count against your number of cantrips known. If they don’t appear on the warlock spell list, they are nonetheless warlock spells for you.\n\nIf you lose your Book of Shadows, you can perform a 1-hour ceremony to receive a replacement from your patron. This ceremony can be performed during a short or long rest, and it destroys the previous book. The book turns to ash when you die.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Mystic Arcanum\n\nAt 11th level, your patron bestows upon you a magical secret called an arcanum. Choose one 6th-level spell from the warlock spell list as this arcanum.\n\nYou can cast your arcanum spell once without expending a spell slot. You must finish a long rest before you can do so again.\n\nAt higher levels, you gain more warlock spells of your choice that can be cast in this way: one 7th-level spell at 13th level, one 8th-level spell at 15th level, and one 9th-level spell at 17th level. You regain all uses of your Mystic Arcanum when you finish a long rest.\n\n!! Eldritch Master\n\nAt 20th level, you can draw on your inner reserve of mystical power while entreating your patron to regain expended spell slots. You can spend 1 minute entreating your patron for aid to regain all your expended spell slots from your Pact Magic feature. Once you regain spell slots with this feature, you must finish a long rest before you can do so again.","tags":"Classes [[Player's Handbook]]","title":"Warlock","modified":"20260713093611527"},
{"created":"20260709082027912","text":"//Monks of the Way of Shadow follow a tradition that values stealth and subterfuge. These monks might be called ninjas or shadowdancers, and they serve as spies and assassins. Sometimes the members of a ninja monastery are family members, forming a clan sworn to secrecy about their arts and missions. Other monasteries are more like thieves’ guilds, hiring out their services to nobles, rich merchants, or anyone else who can pay their fees. Regardless of their methods, the heads of these monasteries expect the unquestioning obedience of their students.//\n\n!! Shadow Arts\n\nStarting when you choose this tradition at 3rd level, you can use your ki to duplicate the effects of certain spells. As an action, you can spend 2 ki points to cast [[Darkness]], [[Darkvision]], [[Pass without Trace]], or [[Silence]], without providing material components. Additionally, you gain the [[Minor Illusion]] cantrip if you don’t already know it.\n\n!! Shadow Step\n\nAt 6th level, you gain the ability to step from one shadow into another. When you are in dim light or darkness, as a bonus action you can teleport up to 60 feet to an unoccupied space you can see that is also in dim light or darkness. You then have advantage on the first melee attack you make before the end of the turn.\n\n!! Cloak of Shadows\n\nBy 11th level, you have learned to become one with the shadows. When you are in an area of dim light or darkness, you can use your action to become invisible. You remain invisible until you make an attack, cast a spell, or are in an area of bright light.\n\n!! Opportunist\n\nAt 17th level, you can exploit a creature’s momentary distraction when it is hit by an attack. Whenever a creature within 5 feet of you is hit by an attack made by a creature other than you, you can use your reaction to make a melee attack against that creature.","tags":"Monk Subclasses [[Player's Handbook]]","title":"Way of Shadow","modified":"20260709092540122"},
{"created":"20260709082225259","text":"//You follow a monastic tradition that teaches you to harness the elements. When you focus your ki, you can align yourself with the forces of creation and bend the four elements to your will, using them as an extension of your body. Some members of this tradition dedicate themselves to a single element, but others weave the elements together.\n\nMany monks of this tradition tattoo their bodies with representations of their ki powers, commonly imagined as coiling dragons, but also as phoenixes, fish, plants, mountains, and cresting waves.//\n\n!! Disciple of the Elements\n\nWhen you choose this tradition at 3rd level, you learn magical disciplines that harness the power of the four elements. A discipline requires you to spend ki points each time you use it.\n\nYou know the Elemental Attunement discipline and one other elemental discipline of your choice, which are detailed in the \"Elemental Disciplines\" section below. You learn one additional elemental discipline of your choice at 6th, 11th, and 17th level.\n\nWhenever you learn a new elemental discipline, you can also replace one elemental discipline that you already know with a different discipline.\n\n//''Casting Elemental Spells.''// Some elemental disciplines allow you to cast spells. To cast one of these spells, you use its casting time and other rules, but you don’t need to provide material components for it.\n\nOnce you reach 5th level in this class, you can spend additional ki points to increase the level of an elemental discipline spell that you cast, provided that the spell has an enhanced effect at a higher level, as burning hands does. The spell’s level increases by 1 for each additional ki point you spend. For example, if you are a 5th-level monk and use Sweeping Cinder Strike to cast burning hands, you can spend 3 ki points to cast it as a 2nd-level spell (the discipline’s base cost of 2 ki points plus 1).\n\nThe maximum number of ki points you can spend to cast a spell in this way (including its base ki point cost and any additional ki points you spend to increase its level) is determined by your monk level, as shown in the Spells and Ki Points table.\n\n!!! Spells and Ki Points\n\n|noborder alternate|k\n| !Monk Levels | !Maximum Ki Points for a Spell |\n| 5th–8th | 3 |\n| 9th–12th | 4 |\n| 13th–16th | 5 |\n| 17th–20th | 6 |\n\n!! Elemental Disciplines\n\nThe elemental disciplines are presented in alphabetical order. If a discipline requires a level, you must be that level in this class to learn the discipline.\n\n//''Breath of Winter (17th Level Required)''//. You can spend 6 ki points to cast [[Cone of Cold]].\n\n//''Clench of the North Wind (6th Level Required)''//. You can spend 3 ki points to cast [[Hold Person]].\n\n//''Elemental Attunement.''// You can use your action to briefly control elemental forces within 30 feet of you, causing one of the following effects of your choice:\n\n* Create a harmless, instantaneous sensory effect related to air, earth, fire, or water, such as a shower of sparks, a puff of wind, a spray of light mist, or a gentle rumbling of stone.\n* Instantaneously light or snuff out a candle, a torch, or a small campfire.\n* Chill or warm up to 1 pound of nonliving material for up to 1 hour.\n* Cause earth, fire, water, or mist that can fit within a 1-foot cube to shape itself into a crude form you designate for 1 minute.\n\n//''Eternal Mountain Defense (17th Level Required)''//. You can spend 5 ki points to cast [[Stoneskin]], targeting yourself.\n\n\n//''Fist of Unbroken Air.''// You can create a blast of compressed air that strikes like a mighty fist. As an action, you can spend 2 ki points and choose a creature within 30 feet of you. That creature must make a Strength saving throw. On a failed save, the creature takes 3d10 bludgeoning damage, plus an extra 1d10 bludgeoning damage for each additional ki point you spend, and you can push the creature up to 20 feet away from you and knock it prone. On a successful save, the creature takes half as much damage, and you don’t push it or knock it prone.\n\n//''Flames of the Phoenix (11th Level Required).''// You can spend 4 ki points to cast [[Fireball]].\n\n//''Gong of the Summit (6th Level Required)''//. You can spend 3 ki points to cast [[Shatter]].\n\n//''Mist Stance (11th Level Required).''// You can spend 4 ki points to cast [[Gaseous Form]], targeting yourself.\n\n//''Ride the Wind (11th Level Required).''// You can spend 4 ki points to cast [[Fly]], targeting yourself.\n\n//''River of Hungry Flame (17th Level Required).''// You can spend 5 ki points to cast [[Wall of Fire]].\n\n//''Rush of the Gale Spirits.''// You can spend 2 ki points to cast [[Gust of Wind]].\n\n//''Shape the Flowing River.''// As an action, you can spend 1 ki point to choose an area of ice or water no larger than 30 feet on a side within 120 feet of you. You can change water to ice within the area and vice versa, and you can reshape ice in the area in any manner you choose. You can raise or lower the ice’s elevation, create or fill in a trench, erect or flatten a wall, or form a pillar. The extent of any such changes can’t exceed half the area’s largest dimension. For example, if you affect a 30-foot square, you can create a pillar up to 15 feet high, raise or lower the square’s elevation by up to 15 feet, dig a trench up to 15 feet deep, and so on. You can’t shape the ice to trap or damage a creature in the area.\n\n//''Sweeping Cinder Strike.''// You can spend 2 ki points to cast [[Burning Hands]].\n\n//''Water Whip.''// You can spend 2 ki points as an action to create a whip of water that shoves and pulls a creature to unbalance it. A creature that you can see that is within 30 feet of you must make a Dexterity saving throw. On a failed save, the creature takes 3d10 bludgeoning damage, plus an extra 1d10 bludgeoning damage for each additional ki point you spend, and you can either knock it prone or pull it up to 25 feet closer to you. On a successful save, the creature takes half as much damage, and you don’t pull it or knock it prone.\n\n//''Wave of Rolling Earth (17th Level Required).''// You can spend 6 ki points to cast [[Wall of Stone]].","title":"Way of the Four Elements","modified":"20260709191016519","type":"","tags":"Monk [[Player's Handbook]] Subclasses"},
{"created":"20260709081926912","text":"//Monks of the Way of the Open Hand are the ultimate masters of martial arts combat, whether armed or unarmed. They learn techniques to push and trip their opponents, manipulate ki to heal damage to their bodies, and practice advanced meditation that can protect them from harm.//\n\n!! Open Hand Technique\n\nStarting when you choose this tradition at 3rd level, you can manipulate your enemy’s ki when you harness your own. Whenever you hit a creature with one of the attacks granted by your Flurry of Blows, you can impose one of the following effects on that target:\n\n* It must succeed on a Dexterity saving throw or be knocked prone.\n* It must make a Strength saving throw. If it fails, you can push it up to 15 feet away from you.\n* It can’t take reactions until the end of your next turn.\n\n!! Wholeness of Body\n\nAt 6th level, you gain the ability to heal yourself. As an action, you can regain hit points equal to three times your monk level. You must finish a long rest before you can use this feature again.\n\n!! Tranquility\n\nBeginning at 11th level, you can enter a special meditation that surrounds you with an aura of peace. At the end of a long rest, you gain the effect of a [[Sanctuary]] spell that lasts until the start of your next long rest (the spell can end early as normal). The saving throw DC for the spell equals 8 + your Wisdom modifier + your proficiency bonus.\n\n!! Quivering Palm\n\nAt 17th level, you gain the ability to set up lethal vibrations in someone’s body. When you hit a creature with an unarmed strike, you can spend 3 ki points to start these imperceptible vibrations, which last for a number of days equal to your monk level. The vibrations are harmless unless you use your action to end them. To do so, you and the target must be on the same plane of existence. When you use this action, the creature must make a Constitution saving throw. If it fails, it is reduced to 0 hit points. If it succeeds, it takes 10d10 necrotic damage.\n\nYou can have only one creature under the effect of this feature at a time. You can choose to end the vibrations harmlessly without using an action.","tags":"Monk Subclasses [[Player's Handbook]]","title":"Way of the Open Hand","modified":"20260709082024603"},
{"created":"20260713094641815","text":"Wealth appears in many forms in a D&D world. Coins, gemstones, trade goods, art objects, animals, and property can reflect your character’s financial well-being. Members of the peasantry trade in goods, bartering for what they need and paying taxes in grain and cheese.\n\nMembers of the nobility trade either in legal rights, such as the rights to a mine, a port, or farmland, or in gold bars, measuring gold by the pound rather than by the coin. Only merchants, adventurers, and those offering professional services for hire commonly deal in coins.\n\n!!! Starting Wealth by Class\n\n|noborder alternate|k\n|!Class |!Funds |\n|Artificer |5d4 x 10 gp |\n|Barbarian |2d4 x 10 gp |\n|Bard      |5d4 x 10 gp |\n|Cleric    |5d4 x 10 gp |\n|Druid     |2d4 x 10 gp |\n|Fighter   |5d4 x 10 gp |\n|Monk      |5d4 gp      |\n|Paladin   |5d4 x 10 gp |\n|Ranger    |5d4 x 10 gp |\n|Rogue     |4d4 x 10 gp |\n|Sorcerer  |3d4 x 10 gp |\n|Warlock   |4d4 x 10 gp |\n|Wizard    |4d4 x 10 gp |\n\n!! Coinage\n\nCommon coins come in several different denominations based on the relative worth of the metal from which they are made. The three most common coins are the gold piece (gp), the silver piece (sp), and the copper piece (cp).\n\nWith one gold piece, a character can buy a bedroll, 50 feet of good rope, or a goat. A skilled (but not exceptional) artisan can earn one gold piece a day. The gold piece is the standard unit of measure for wealth, even if the coin itself is not commonly used. When merchants discuss deals that involve goods or services worth hundreds or thousands of gold pieces, the transactions don’t usually involve the exchange of individual coins. Rather, the gold piece is a standard measure of value, and the actual exchange is in gold bars, letters of credit, or valuable goods.\n\nOne gold piece is worth ten silver pieces, the most prevalent coin among commoners. A silver piece buys a laborer’s work for half a day, a flask of lamp oil, or a night’s rest in a poor inn.\n\nOne silver piece is worth ten copper pieces, which are common among laborers and beggars. A single copper piece buys a candle, a torch, or a piece of chalk.\n\nIn addition, unusual coins made of other precious metals sometimes appear in treasure hoards. The electrum piece (ep) and the platinum piece (pp) originate from fallen empires and lost kingdoms, and they sometimes arouse suspicion and skepticism when used in transactions. An electrum piece is worth five silver pieces, and a platinum piece is worth ten gold pieces.\n\nA standard coin weighs about a third of an ounce, so fifty coins weigh a pound.\n\n!!! Standard Exchange Rates\n\n|noborder alternate|k\n|!Coin         |!cp   |!sp  |!ep  |!gp   |!pp     |\n|Copper (cp)   |1     |1/10 |1/50 |1/100 |1/1,000 |\n|Silver (sp)   |10    |1    |1/5  |1/10  |1/100   |\n|Electrum (ep) |50    |5    |1    |1/2   |1/20    |\n|Gold (gp)     |100   |10   |2    |1     |1/10    |\n|Platinum (pp) |1,000 |100  |20   |10    |1       |\n\n!! Selling Treasure\n\nOpportunities abound to find treasure, equipment, weapons, armor, and more in the dungeons you explore. Normally, you can sell your treasures and trinkets when you return to a town or other settlement, provided that you can find buyers and merchants interested in your loot.\n\n//''Arms, Armor, and Other Equipment.''// As a general rule, undamaged weapons, armor, and other equipment fetch half their cost when sold in a market. Weapons and armor used by monsters are rarely in good enough condition to sell.\n\n//''Magic Items.''// Selling magic items is problematic. Finding someone to buy a potion or a scroll isn’t too hard, but other items are out of the realm of most but the wealthiest nobles. Likewise, aside from a few common magic items, you won’t normally come across magic items or spells to purchase. The value of magic is far beyond simple gold and should always be treated as such.\n\n//''Gems, Jewelry, and Art Objects.''// These items retain their full value in the marketplace, and you can either trade them in for coin or use them as currency for other transactions. For exceptionally valuable treasures, the DM might require you to find a buyer in a large town or larger community first.\n\n//''Trade Goods.''// On the borderlands, many people conduct transactions through barter. Like gems and art objects, trade goods — bars of iron, bags of salt, livestock, and so on — retain their full value in the market and can be used as currency.","title":"Wealth","modified":"20260713122519064","type":"","tags":"Equipment [[Player's Handbook]]"},
{"created":"20260707184443517","text":"Your class grants proficiency in certain weapons, reflecting both the class’s focus and the tools you are most likely to use. Whether you favor a longsword or a longbow, your weapon and your ability to wield it effectively can mean the difference between life and death while adventuring.\n\nThe Weapons table shows the most common weapons used in the worlds of D&D, their price and weight, the damage they deal when they hit, and any special properties they possess. Every weapon is classified as either melee or ranged. A melee weapon is used to attack a target within 5 feet of you, whereas a ranged weapon is used to attack a target at a distance.\n\n!!! Simple Weapons\n\n|noborder alternate|k\n|!Weapon Name |\u003C| !Cost |!Damage         | !Weight |!Properties |\n|//Simple Melee Weapons//|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Club            |  1 sp |1d4 bludgeoning |  2 lb.  |Light                                    |\n| |Dagger          |  2 gp |1d4 piercing    |  1 lb.  |Finesse, light, thrown (20/60)           |\n| |Greatclub       |  2 sp |1d8 bludgeoning | 10 lb.  |Two-handed                               |\n| |Handaxe         |  5 gp |1d6 slashing    |  2 lb.  |Light, thrown (20/60)                    |\n| |Javelin         |  5 sp |1d6 piercing    |  2 lb.  |Thrown (30/120)                          |\n| |Light hammer    |  2 gp |1d4 bludgeoning |  2 lb.  |Light, thrown (20/60)                    |\n| |Mace            |  5 gp |1d6 bludgeoning |  4 lb.  |---                                      |\n| |Quarterstaff    |  2 sp |1d6 bludgeoning |  4 lb.  |Versatile (1d8)                          |\n| |Sickle          |  1 gp |1d4 slashing    |  2 lb.  |Light                                    |\n| |Spear           |  1 gp |1d6 piercing    |  3 lb.  |Thrown (20/60), versatile (1d8)          |\n|//Simple Ranged Weapons//|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Crossbow, light | 25 gp |1d8 piercing    |  5 lb.  |Ammunition (80/320), loading, two-handed |\n| |Dart            |  5 cp |1d4 piercing    | 1/4 lb. |Finesse, thrown (20/60)                  |\n| |Shortbow        | 25 gp |1d6 piercing    |  2 lb.  |Ammunition (80/320), two-handed          |\n| |Sling           |  1 sp |1d4 bludgeoning |   ---   |Ammunition (30/120)                      |\n\n!!! Martial Weapons\n\n|noborder alternate|k\n|!Weapon Name |\u003C| !Cost |!Damage          | !Weight |!Properties |\n|//Martial Melee Weapons//|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Battleaxe       | 10 gp |1d8 slashing    |  4 lb. |Versatile (1d10)                                 |\n| |Flail           | 10 gp |1d8 bludgeoning |  2 lb. |---                                              |\n| |Glaive          | 20 gp |1d10 slashing   |  6 lb. |Heavy, reach, two-handed                         |\n| |Greataxe        | 30 gp |1d12 slashing   |  7 lb. |Heavy, two-handed                                |\n| |Greatsword      | 50 gp |2d6 slashing    |  6 lb. |Heavy, two-handed                                |\n| |Halberd         | 20 gp |1d10 slashing   |  6 lb. |Heavy, reach, two-handed                         |\n| |Lance           | 10 gp |1d12 piercing   |  6 lb. |Reach, special                                   |\n| |Longsword       | 15 gp |1d8 slashing    |  3 lb. |Versatile (1d10)                                 |\n| |Maul            | 10 gp |2d6 bludgeoning | 10 lb. |Heavy, two-handed                                |\n| |Morningstar     | 15 gp |1d8 piercing    |  4 lb. |---                                              |\n| |Pike            |  5 gp |1d10 piercing   | 18 lb. |Heavy, reach, two-handed                         |\n| |Rapier          | 25 gp |1d8 piercing    |  2 lb. |Finesse                                          |\n| |Scimitar        | 25 gp |1d6 slashing    |  3 lb. |Finesse, light                                   |\n| |Shortsword      | 10 gp |1d6 piercing    |  2 lb. |Finesse, light                                   |\n| |Trident         |  5 gp |1d6 piercing    |  4 lb. |Thrown (20/60), versatile (1d8)                  |\n| |War pick        |  5 gp |1d8 piercing    |  2 lb. |---                                              |\n| |Warhammer       | 15 gp |1d8 bludgeoning |  2 lb. |Versatile (1d10)                                 |\n| |Whip            |  2 gp |1d4 slashing    |  3 lb. |Finesse, reach                                   |\n|//Martial Ranged Weapons//|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Blowgun         | 10 gp |1 piercing      |  1 lb. |Ammunition (25/100), loading                     |\n| |Crossbow, hand  | 75 gp |1d6 piercing    |  3 lb. |Ammunition (30/120), light, loading              |\n| |Crossbow, heavy | 50 gp |1d10 piercing   | 18 lb. |Ammunition (100/400), heavy, loading, two-handed |\n| |Longbow         | 50 gp |1d8 piercing    |  2 lb. |Ammunition (150/600), heavy, two-handed          |\n| |Net             |  1 gp |---             |  3 lb. |Special, thrown (5/15)                           |\n\n!! Weapon Proficiency\n\nYour race, class, and feats can grant you proficiency with certain weapons or categories of weapons. The two categories are simple and martial. Most people can use simple weapons with proficiency. These weapons include clubs, maces, and other weapons often found in the hands of commoners. Martial weapons, including swords, axes, and polearms, require more specialized training to use effectively. Most warriors use martial weapons because these weapons put their fighting style and training to best use.\n\nProficiency with a weapon allows you to add your proficiency bonus to the attack roll for any attack you make with that weapon. If you make an attack roll using a weapon with which you lack proficiency, you do not add your proficiency bonus to the attack roll.\n\n!! Weapon Properties\n\nMany weapons have special properties related to their use, as shown in the Weapons table.\n\n//''Ammunition.''// You can use a weapon that has the ammunition property to make a ranged attack only if you have ammunition to fire from the weapon. Each time you attack with the weapon, you expend one piece of ammunition. Drawing the ammunition from a quiver, case, or other container is part of the attack (you need a free hand to load a one-handed weapon). At the end of the battle, you can recover half your expended ammunition by taking a minute to search the battlefield.\n\nIf you use a weapon that has the ammunition property to make a melee attack, you treat the weapon as an improvised weapon. A sling must be loaded to deal any damage when used in this way.\n\n//''Finesse.''// When making an attack with a finesse weapon, you use your choice of your Strength or Dexterity modifier for the attack and damage rolls. You must use the same modifier for both rolls.\n\n//''Heavy.''// Creatures that are Small or Tiny have disadvantage on attack rolls with heavy weapons. A heavy weapon’s size and bulk make it too large for a Small or Tiny creature to use effectively.\n\n//''Light.''// A light weapon is small and easy to handle, making it ideal for use when fighting with two weapons.\n\n//''Loading.''// Because of the time required to load this weapon, you can fire only one piece of ammunition from it when you use an action, bonus action, or reaction to fire it, regardless of the number of attacks you can normally make.\n\n//''Range.''// A weapon that can be used to make a ranged attack has a range shown in parentheses after the ammunition or thrown property. The range lists two numbers. The first is the weapon’s normal range in feet, and the second indicates the weapon’s long range. When attacking a target beyond normal range, you have disadvantage on the attack roll. You can’t attack a target beyond the weapon’s long range.\n\n//''Reach.''// This weapon adds 5 feet to your reach when you attack with it, as well as when determining your reach for opportunity attacks with it.\n\n//''Special.''// A weapon with the special property has unusual rules governing its use, explained in the weapon’s description.\n\n//''Thrown.''// If a weapon has the thrown property, you can throw the weapon to make a ranged attack. If the weapon is a melee weapon, you use the same ability modifier for that attack roll and damage roll that you would use for a melee attack with the weapon. For example, if you throw a handaxe, you use your Strength, but if you throw a dagger, you can use either your Strength or your Dexterity, since the dagger has the finesse property.\n\n//''Two-Handed''//. This weapon requires two hands when you attack with it. This property is relevant only when you attack with the weapon, not when you simply hold it.\n\n//''Versatile.''// This weapon can be used with one or two hands. A damage value in parentheses appears with the property — the damage when the weapon is used with two hands to make a melee attack.\n\n!!! Improvised Weapons\n\nSometimes characters don’t have their weapons and have to attack with whatever is at hand. An improvised weapon includes any object you can wield in one or two hands, such as broken glass, a table leg, a frying pan, a wagon wheel, or a dead goblin.\n\nOften, an improvised weapon is similar to an actual weapon and can be treated as such. For example, a table leg is akin to a club. At the DM’s option, a character proficient with a weapon can use a similar object as if it were that weapon and use his or her proficiency bonus.\n\nAn object that bears no resemblance to a weapon deals 1d4 damage (the DM assigns a damage type appropriate to the object). If a character uses a ranged weapon to make a melee attack, or throws a melee weapon that does not have the thrown property, it also deals 1d4 damage. An improvised thrown weapon has a normal range of 20 feet and a long range of 60 feet.\n\n!!! Silvered Weapons\n\nSome monsters that have immunity or resistance to nonmagical weapons are susceptible to silver weapons, so cautious adventurers invest extra coin to plate their weapons with silver. You can silver a single weapon or ten pieces of ammunition for 100 gp. This cost represents not only the price of the silver, but the time and expertise needed to add silver to the weapon without making it less effective.\n\n!!! Special Weapons\n\nWeapons with special rules are described here.\n\n//''Lance.''// You have disadvantage when you use a lance to attack a target within 5 feet of you. Also, a lance requires two hands to wield when you aren’t mounted.\n\n//''Net.''// A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on creatures that are formless, or creatures that are Huge or larger. A creature can use its action to make a DC 10 Strength check, freeing itself or another creature within its reach on a success. Dealing 5 slashing damage to the net (AC 10) also frees the creature without harming it, ending the effect and destroying the net.\n\nWhen you use an action, bonus action, or reaction to attack with a net, you can make only one attack regardless of the number of attacks you can normally make.","title":"Weapons","modified":"20260708155936465","type":"","tags":"Equipment [[Player's Handbook]]"},
{"created":"20260709183053217","text":"//Your innate magic comes from the forces of chaos that underlie the order of creation. You might have endured exposure to raw magic, perhaps through a planar portal leading to Limbo, the Elemental Planes, or the Far Realm. Perhaps you were blessed by a fey being or marked by a demon. Or your magic could be a fluke of your birth, with no apparent cause. However it came to be, this magic churns within you, waiting for any outlet.//\n\n!! Wild Magic Surge\n\nStarting when you choose this origin at 1st level, your spellcasting can unleash surges of untamed magic. Once per turn, the DM can have you roll a d20 immediately after you cast a sorcerer spell of 1st level or higher. If you roll a 1, roll on the Wild Magic Surge table to create a magical effect. If that effect is a spell, it is too wild to be affected by your Metamagic, and if it normally requires concentration, it doesn’t require concentration in this case; the spell lasts for its full duration.\n\n!! Tides of Chaos\n\nStarting at 1st level, you can manipulate the forces of chance and chaos to gain advantage on one attack roll, ability check, or saving throw. Once you do so, you must finish a long rest before you can use this feature again.\n\nAny time before you regain the use of this feature, the DM can have you roll on the Wild Magic Surge table immediately after you cast a sorcerer spell of 1st level or higher. You then regain the use of this feature.\n\n!! Bend Luck\n\nStarting at 6th level, you have the ability to twist fate using your wild magic. When another creature you can see makes an attack roll, an ability check, or a saving throw, you can use your reaction and spend 2 sorcery points to roll 1d4 and apply the number rolled as a bonus or penalty (your choice) to the creature’s roll. You can do so after the creature rolls but before any effects of the roll occur.\n\n!! Controlled Chaos\n\nAt 14th level, you gain a modicum of control over the surges of your wild magic. Whenever you roll on the Wild Magic Surge table, you can roll twice and use either number.\n\n!! Spell Bombardment\n\nBeginning at 18th level, the harmful energy of your spells intensifies. When you roll damage for a spell and roll the highest number possible on any of the dice, choose one of those dice, roll it again and add that roll to the damage. You can use the feature only once per turn.\n\n!!! Wild Magic Surge\n\n|noborder alternate|k\n|!d100|!Effect |\n| 01–02 |Roll on this table at the start of each of your turns for the next minute, ignoring this result on subsequent rolls. |\n| 03–04 |For the next minute, you can see any invisible creature if you have line of sight to it. |\n| 05–06 |A modron chosen and controlled by the DM appears in an unoccupied space within 5 feet of you, then disappears 1 minute later. |\n| 07–08 |You cast [[Fireball]] as a 3rd-level spell centered on yourself. |\n| 09–10 |You cast [[Magic Missile]] as a 5th-level spell. |\n| 11–12 |Roll a d10. Your height changes by a number of inches equal to the roll. If the roll is odd, you shrink. If the roll is even, you grow. |\n| 13–14 |You cast [[Confusion]] centered on yourself. |\n| 15–16 |For the next minute, you regain 5 hit points at the start of each of your turns. |\n| 17–18 |You grow a long beard made of feathers that remains until you sneeze, at which point the feathers explode out from your face. |\n| 19–20 |You cast [[Grease]] centered on yourself. |\n| 21–22 |Creatures have disadvantage on saving throws against the next spell you cast in the next minute that involves a saving throw. |\n| 23–24 |Your skin turns a vibrant shade of blue. A [[Remove Curse]] spell can end this effect. |\n| 25–26 |An eye appears on your forehead for the next minute. During that time, you have advantage on Wisdom (Perception) checks that rely on sight. |\n| 27–28 |For the next minute, all your spells with a casting time of 1 action have a casting time of 1 bonus action. |\n| 29–30 |You teleport up to 60 feet to an unoccupied space of your choice that you can see. |\n| 31–32 |You are transported to the Astral Plane until the end of your next turn, after which time you return to the space you previously occupied or the nearest unoccupied space if that space is occupied. |\n| 33–34 |Maximize the damage of the next damaging spell you cast within the next minute. |\n| 35–36 |Roll a d10. Your age changes by a number of years equal to the roll. If the roll is odd, you get younger (minimum 1 year old). If the roll is even, you get older. |\n| 37–38 |1d6 flumphs controlled by the DM appear in unoccupied spaces within 60 feet of you and are frightened of you. They vanish after 1 minute. |\n| 39–40 |You regain 2d10 hit points. |\n| 41–42 |You turn into a potted plant until the start of your next turn. While a plant, you are incapacitated and have vulnerability to all damage. If you drop to 0 hit points, your pot breaks, and your form reverts. |\n| 43–44 |For the next minute, you can teleport up to 20 feet as a bonus action on each of your turns. |\n| 45–46 |You cast [[Levitate]] on yourself. |\n| 47–48 |A unicorn controlled by the DM appears in a space within 5 feet of you, then disappears 1 minute later. |\n| 49–50 |You can’t speak for the next minute. Whenever you try, pink bubbles float out of your mouth. |\n| 51–52 |A spectral shield hovers near you for the next minute, granting you a +2 bonus to AC and immunity to [[Magic Missile]]. |\n| 53–54 |You are immune to being intoxicated by alcohol for the next 5d6 days. |\n| 55–56 |Your hair falls out but grows back within 24 hours. |\n| 57–58 |For the next minute, any flammable object you touch that isn’t being worn or carried by another creature bursts into flame. |\n| 59–60 |You regain your lowest-level expended spell slot. |\n| 61–62 |For the next minute, you must shout when you speak. |\n| 63–64 |You cast [[Fog Cloud]] centered on yourself. |\n| 65–66 |Up to three creatures you choose within 30 feet of you take 4d10 lightning damage. |\n| 67–68 |You are frightened by the nearest creature until the end of your next turn. |\n| 69–70 |Each creature within 30 feet of you becomes invisible for the next minute. The invisibility ends on a creature when it attacks or casts a spell. |\n| 71–72 |You gain resistance to all damage for the next minute. |\n| 73–74 |A random creature within 60 feet of you becomes poisoned for 1d4 hours. |\n| 75–76 |You glow with bright light in a 30-foot radius for the next minute. Any creature that ends its turn within 5 feet of you is blinded until the end of its next turn. |\n| 77–78 |You cast [[Polymorph]] on yourself. If you fail the saving throw, you turn into a sheep for the spell’s duration. |\n| 79–80 |Illusory butterflies and flower petals flutter in the air within 10 feet of you for the next minute. |\n| 81–82 |You can take one additional action immediately. |\n| 83–84 |Each creature within 30 feet of you takes 1d10 necrotic damage. You regain hit points equal to the sum of the necrotic damage dealt. |\n| 85–86 |You cast [[Mirror Image]]. |\n| 87–88 |You cast [[Fly]] on a random creature within 60 feet of you. |\n| 89–90 |You become invisible for the next minute. During that time, other creatures can’t hear you. The invisibility ends if you attack or cast a spell. |\n| 91–92 |If you die within the next minute, you immediately come back to life as if by the [[Reincarnate]] spell. |\n| 93–94 |Your size increases by one size category for the next minute. |\n| 95–96 |You and all creatures within 30 feet of you gain vulnerability to piercing damage for the next minute. |\n| 97–98 |You are surrounded by faint, ethereal music for the next minute. |\n| 99–00 |You regain all expended sorcery points. |","title":"Wild Magic","modified":"20260709184356649","type":"","tags":"[[Player's Handbook]] Sorcerer Subclasses"},
{"created":"20260709192018544","text":"//Wizards are supreme magic-users, defined and united as a class by the spells they cast. Drawing on the subtle weave of magic that permeates the cosmos, wizards cast spells of explosive fire, arcing lightning, subtle deception, and brute-force mind control. Their magic conjures monsters from other planes of existence, glimpses the future, or turns slain foes into zombies. Their mightiest spells change one substance into another, call meteors down from the sky, or open portals to other worlds.//\n\n|noborder alternate|k\n|!Level|!PB|!Features |!Cantrips Known |!Spell Slots per Spell Level|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|!6th|!7th|!8th|!9th|\n|  1st | +2 |Spellcasting, Arcane Recovery | 3 | 2 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |Arcane Tradition              | 3 | 3 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  3rd | +2 |---                           | 3 | 4 |  2  | --- | --- | --- | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement     | 4 | 4 |  3  | --- | --- | --- | --- | --- | --- | --- |\n|  5th | +3 |---                           | 4 | 4 |  3  |  2  | --- | --- | --- | --- | --- | --- |\n|  6th | +3 |Arcane Tradition Feature      | 4 | 4 |  3  |  3  | --- | --- | --- | --- | --- | --- |\n|  7th | +3 |---                           | 4 | 4 |  3  |  3  |  1  | --- | --- | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement     | 4 | 4 |  3  |  3  |  2  | --- | --- | --- | --- | --- |\n|  9th | +4 |---                           | 4 | 4 |  3  |  3  |  3  |  1  | --- | --- | --- | --- |\n| 10th | +4 |Arcane Tradition Feature      | 5 | 4 |  3  |  3  |  3  |  2  | --- | --- | --- | --- |\n| 11th | +4 |---                           | 5 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 12th | +4 |Ability Score Improvement     | 5 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 13th | +5 |---                           | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 14th | +5 |Arcane Tradition Feature      | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 15th | +5 |---                           | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 16th | +5 |Ability Score Improvement     | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 17th | +6 |---                           | 5 | 4 |  3  |  3  |  3  |  3  |  1  |  1  |  1  |  1  |\n| 18th | +6 |Spell Mastery                 | 5 | 4 |  3  |  3  |  3  |  3  |  1  |  1  |  1  |  1  |\n| 19th | +6 |Ability Score Improvement     | 5 | 4 |  3  |  3  |  3  |  3  |  2  |  2  |  1  |  1  |\n| 20th | +6 |Signature Spells              | 5 | 4 |  3  |  3  |  3  |  3  |  2  |  2  |  1  |  1  |\n\n! Class Features\n\nAs a wizard, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d6 per wizard level\n\n''Hit Points at 1st Level:'' 6 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d6 (or 4) + your Constitution modifier per wizard level after 1st\n\n!! Proficiencies\n\n''Armor:'' None\n\n''Weapons:'' Daggers, darts, slings, quarterstaffs, light crossbows\n\n''Tools:'' None\n\n''Saving Throws:'' Intelligence, Wisdom\n\n''Skills:'' Choose two from Arcana, History, Insight, Investigation, Medicine, and Religion\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[quarterstaff|Weapons]] or (b) a [[dagger|Weapons]]\n* (//a//) a [[component pouch|Adventuring Gear]] or (b) an [[arcane focus|Adventuring Gear]]\n* (//a//) a [[scholar’s pack|Adventuring Gear]] or (b) an [[explorer’s pack|Adventuring Gear]]\n* A [[spellbook|Adventuring Gear]]\n\nAlternatively, you may start with 4d4x10 gp to buy your equipment.\n\n!! Spellcasting\n\nAs a student of arcane magic, you have a spellbook containing spells that show the first glimmerings of your true power.\n\n!!! Cantrips\n\nAt 1st level, you know three cantrips of your choice from the wizard spell list. You learn additional wizard cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Wizard table.\n\n!!! Spellbook\n\nAt 1st level, you have a spellbook containing six 1st-level wizard spells of your choice. Your spellbook is the repository of the wizard spells you know, except your cantrips, which are fixed in your mind.\nPreparing and Casting Spells\n\nThe Wizard table shows how many spell slots you have to cast your wizard spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nYou prepare the list of wizard spells that are available for you to cast. To do so, choose a number of wizard spells from your spellbook equal to your Intelligence modifier + your wizard level (minimum of one spell). The spells must be of a level for which you have spell slots.\n\nFor example, if you’re a 3rd-level wizard, you have four 1st-level and two 2nd-level spell slots. With an Intelligence of 16, your list of prepared spells can include six spells of 1st or 2nd level, in any combination, chosen from your spellbook. If you prepare the 1st-level spell [[Magic Missile]], you can cast it using a 1st-level or a 2nd-level slot. Casting the spell doesn’t remove it from your list of prepared spells.\n\nYou can change your list of prepared spells when you finish a long rest. Preparing a new list of wizard spells requires time spent studying your spellbook and memorizing the incantations and gestures you must make to cast the spell: at least 1 minute per spell level for each spell on your list.\n\n!!! Spellcasting Ability\n\nIntelligence is your spellcasting ability for your wizard spells, since you learn your spells through dedicated study and memorization. You use your Intelligence whenever a spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for a wizard spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Intelligence modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Intelligence modifier\n\n!!! Ritual Casting\n\nYou can cast a wizard spell as a ritual if that spell has the ritual tag and you have the spell in your spellbook. You don’t need to have the spell prepared.\n\n!!! Spellcasting Focus\n\nYou can use an [[arcane focus|Adventuring Gear]] as a spellcasting focus for your wizard spells.\n\n!!! Learning Spells of 1st Level and Higher\n\nEach time you gain a wizard level, you can add two wizard spells of your choice to your spellbook for free. Each of these spells must be of a level for which you have spell slots, as shown on the Wizard table. On your adventures, you might find other spells that you can add to your spellbook.\n\n!!! Your Spellbook\n\nThe spells that you add to your spellbook as you gain levels reflect the arcane research you conduct on your own, as well as intellectual breakthroughs you have had about the nature of the multiverse. You might find other spells during your adventures. You could discover a spell recorded on a scroll in an evil wizard’s chest, for example, or in a dusty tome in an ancient library.\n\n//''Copying a Spell into the Book.''// When you find a wizard spell of 1st level or higher, you can add it to your spellbook if it is of a spell level you can prepare and if you can spare the time to decipher and copy it.\n\nCopying that spell into your spellbook involves reproducing the basic form of the spell, then deciphering the unique system of notation used by the wizard who wrote it. You must practice the spell until you understand the sounds or gestures required, then transcribe it into your spellbook using your own notation.\n\nFor each level of the spell, the process takes 2 hours and costs 50 gp. The cost represents material components you expend as you experiment with the spell to master it, as well as the fine inks you need to record it. Once you have spent this time and money, you can prepare the spell just like your other spells.\n\n//''Replacing the Book.''// You can copy a spell from your own spellbook into another book—for example, if you want to make a backup copy of your spellbook. This is just like copying a new spell into your spellbook, but faster and easier, since you understand your own notation and already know how to cast the spell. You need spend only 1 hour and 10 gp for each level of the copied spell.\n\nIf you lose your spellbook, you can use the same procedure to transcribe the spells that you have prepared into a new spellbook. Filling out the remainder of your spellbook requires you to find new spells to do so, as normal. For this reason, many wizards keep backup spellbooks in a safe place.\n\n//''The Book’s Appearance.''// Your spellbook is a unique compilation of spells, with its own decorative flourishes and margin notes. It might be a plain, functional leather volume that you received as a gift from your master, a finely bound gilt-edged tome you found in an ancient library, or even a loose collection of notes scrounged together after you lost your previous spellbook in a mishap.\n\n!! Arcane Recovery\n\nYou have learned to regain some of your magical energy by studying your spellbook. Once per day when you finish a short rest, you can choose expended spell slots to recover. The spell slots can have a combined level that is equal to or less than half your wizard level (rounded up), and none of the slots can be 6th level or higher.\n\nFor example, if you’re a 4th-level wizard, you can recover up to two levels worth of spell slots. You can recover either a 2nd-level spell slot or two 1st-level spell slots.\n\n!! Arcane Tradition\n\nWhen you reach 2nd level, you choose an arcane tradition, shaping your practice of magic. Your choice grants you features at 2nd level and again at 6th, 10th, and 14th level. \n\n* [[School of Abjuration]]{{$:/PHB}} \n* [[School of Conjuration]]{{$:/PHB}} \n* [[School of Divination]]{{$:/PHB}} \n* [[School of Enchantment]]{{$:/PHB}} \n* [[School of Evocation]]{{$:/PHB}} \n* [[School of Illusion]]{{$:/PHB}} \n* [[School of Necromancy]]{{$:/PHB}} \n* [[School of Transmutation]]{{$:/PHB}} \n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Spell Mastery\n\nAt 18th level, you have achieved such mastery over certain spells that you can cast them at will. Choose a 1st-level wizard spell and a 2nd-level wizard spell that are in your spellbook. You can cast those spells at their lowest level without expending a spell slot when you have them prepared. If you want to cast either spell at a higher level, you must expend a spell slot as normal.\n\nBy spending 8 hours in study, you can exchange one or both of the spells you chose for different spells of the same levels.\n\n!! Signature Spells\n\nWhen you reach 20th level, you gain mastery over two powerful spells and can cast them with little effort. Choose two 3rd-level wizard spells in your spellbook as your signature spells. You always have these spells prepared, they don’t count against the number of spells you have prepared, and you can cast each of them once at 3rd level without expending a spell slot. When you do so, you can’t do so again until you finish a short or long rest.\n\nIf you want to cast either spell at a higher level, you must expend a spell slot as normal.","tags":"Class [[Player's Handbook]]","title":"Wizard","modified":"20260713093620090"},
{"created":"20260711165700046","text":"//Yuan-ti are serpentine creatures that mix some traits\nof humanoids with those of snakes, though the\nproportion varies from individual to individual.//\n\n//All yuan-ti can interbreed. Yuan-ti who give birth\ntypically lay clutches of eggs stored in a common\nhatchery, although live births aren’t rare. A mating\nbetween yuan-ti of different types almost always\nproduces eggs that hatch into yuan-ti with a mix of\nthe parents’ traits and physiologies. Yuan-ti are able\nto reproduce with humanoids of any type as well.//\n\n//Some assume that because yuan-ti are cold-blooded and reptilian that they must be emotionally\nstunted and alien in mindset. In truth, they have the\nsame range and depth of feeling as mammalian or\navian humanoids.//\n\n//Some yuan-ti can pass as human, and they can live\nincognito among humans if they wish. Indeed, some\nyuan-ti aren't even aware of their yuan-ti ancestry.//\n\n! Yuan-ti Traits\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Ophidian Magic (2 Points)\nYou know the [[Poison Spray]] cantrip. You can cast\nanimal friendship an unlimited number of times with\nthis trait, but you can target only snakes with it.\n\nYou can also cast these spells using any spell slots\nyou have of the appropriate level. Charisma is your\nspellcasting ability for these spells.\n\n!! Poison Resistance (4 Points)\nYou have resistance to poison damage.\n\n!! Venom Resistance (2 Points)\nYou have advantage on saving throws against being\npoisoned.","tags":"[[Elf & Orc 1]] Parentage","title":"Yuan-ti Parentage","modified":"20260711170438089"}
]</script><div id="storeArea" style="display:none;"></div>
