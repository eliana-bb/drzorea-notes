n divine magic through meditation and prayer to cast spells as a cleric does. See chapter 10 for the general rules of spellcasting and chapter 11 for the paladin spell list.\n\n!!! Preparing and Casting Spells\n\nThe Paladin table shows how many spell slots you have to cast your paladin spells. To cast one of your paladin spells of 1st level or higher, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nYou prepare the list of paladin spells that are available for you to cast, choosing from the paladin spell list. When you do so, choose a number of paladin spells equal to your Charisma modifier + half your paladin level, rounded down (minimum of one spell). The spells must be of a level for which you have spell slots.\n\nFor example, if you are a 5th-level paladin, you have four 1st-level and two 2nd-level spell slots. With a Charisma of 14, your list of prepared spells can include four spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell cure wounds, you can cast it using a 1st-level or a 2nd-level slot. Casting the spell doesn’t remove it from your list of prepared spells.\n\nYou can change your list of prepared spells when you finish a long rest. Preparing a new list of paladin spells requires time spent in prayer and meditation: at least 1 minute per spell level for each spell on your list.\n\n!!! Spellcasting Ability\n\nCharisma is your spellcasting ability for your paladin spells, since their power derives from the strength of your convictions. You use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a paladin spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Charisma modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Charisma modifier\n\n!!! Spellcasting Focus\n\nYou can use a holy symbol as a spellcasting focus for your paladin spells.\n\n!! Divine Smite\n\nStarting at 2nd level, when you hit a creature with a melee weapon attack, you can expend one spell slot to deal radiant damage to the target, in addition to the weapon’s damage. The extra damage is 2d8 for a 1st-level spell slot, plus 1d8 for each spell level higher than 1st, to a maximum of 5d8. The damage increases by 1d8 if the target is an undead or a fiend, to a maximum of 6d8.\n\n!! Divine Health\n\nBy 3rd level, the divine magic flowing through you makes you immune to disease.\n\n!! Sacred Oath\n\nWhen you reach 3rd level, you swear the oath that binds you as a paladin forever. Up to this time you have been in a preparatory stage, committed to the path but not yet sworn to it.\n\n* [[Oath of the Ancients]]{{$:/PHB}}\n* [[Oath of Devotion]]{{$:/PHB}}\n* [[Oath of Vengeance]]{{$:/PHB}}\n\nYour choice grants you features at 3rd level and again at 7th, 15th, and 20th level. Those features include oath spells and the Channel Divinity feature.\n\n!!! Oath Spells\n\nEach oath has a list of associated spells. You gain access to these spells at the levels specified in the oath description. Once you gain access to an oath spell, you always have it prepared. Oath spells don’t count against the number of spells you can prepare each day.\n\nIf you gain an oath spell that doesn’t appear on the paladin spell list, the spell is nonetheless a paladin spell for you.\n\n!!! Channel Divinity\n\nYour oath allows you to channel divine energy to fuel magical effects. Each Channel Divinity option provided by your oath explains how to use it.\n\nWhen you use your Channel Divinity, you choose which option to use. You must then finish a short or long rest to use your Channel Divinity again.\n\nSome Channel Divinity effects require saving throws. When you use such an effect from this class, the DC equals your paladin spell save DC.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat. \n\n!! Extra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Aura of Protection\n\nStarting at 6th level, whenever you or a friendly creature within 10 feet of you must make a saving throw, the creature gains a bonus to the saving throw equal to your Charisma modifier (with a minimum bonus of +1). You must be conscious to grant this bonus.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Aura of Courage\n\nStarting at 10th level, you and friendly creatures within 10 feet of you can’t be frightened while you are conscious.\n\nAt 18th level, the range of this aura increases to 30 feet.\n\n!! Improved Divine Smite\n\nBy 11th level, you are so suffused with righteous might that all your melee weapon strikes carry divine power with them. Whenever you hit a creature with a melee weapon, the creature takes an extra 1d8 radiant damage.\n\n!! Cleansing Touch\n\nBeginning at 14th level, you can use your action to end one spell on yourself or on one willing creature that you touch.\n\nYou can use this feature a number of times equal to your Charisma modifier (a minimum of once). You regain expended uses when you finish a long rest.","tags":"Classes [[Player's Handbook]]","title":"Paladin","modified":"20260709091746036"},
{"created":"20260506145300415","text":"//For some barbarians, rage is a means to an end – that end being violence. The Path of the Berserker is a path of untrammeled fury, slick with blood. As you enter the berserker's rage, you thrill in the chaos of battle, heedless of your own health or well-being.//\n\n!! Frenzy\n\nStarting when you choose this path at 3rd level, you can go into a frenzy when you rage. If you do so, for the duration of your rage you can make a single melee weapon attack as a bonus action on each of your turns after this one. When your rage ends, you suffer one level of exhaustion.\n\n!! Mindless Rage\n\nBeginning at 6th level, you can't be charmed or frightened while raging. If you are charmed or frightened when you enter your rage, the effect is suspended for the duration of the rage.\n\n!! Intimidating Presence\n\nBeginning at 10th level, you can use your action to frighten someone with your menacing presence. When you do so, choose one creature that you can see within 30 feet of you. If the creature can see or hear you, it must succeed on a Wisdom saving throw (DC equal to 8 + your proficiency bonus + your Charisma modifier) or be frightened of you until the end of your next turn. On subsequent turns, you can use your action to extend the duration of this effect on the frightened creature until the end of your next turn. This effect ends if the creature ends its turn out of line of sight or more than 60 feet away from you.\n\nIf the creature succeeds on its saving throw, you can't use this feature on that creature again for 24 hours.\n\n!! Retaliation\n\nStarting at 14th level, when you take damage from a creature that is within 5 feet of you, you can use your reaction to make a melee weapon attack against that creature.","title":"Path of the Berserker","modified":"20260707183542433","type":"","tags":"Subclasses Barbarian [[Player's Handbook]]"},
{"created":"20260506145541819","text":"//The Path of the Totem Warrior is a spiritual journey, as the barbarian accepts a spirit animal as guide, protector, and inspiration. In battle, your totem spirit fills you with supernatural might, adding magical fuel to your barbarian rage.//\n\n//Most barbarian tribes consider a totem animal to be kin to a particular clan. In such cases, it is unusual for an individual to have more than one totem animal spirit, though exceptions exist.//\n\n!! Spirit Seeker\n\nYours is a path that seeks attunement with the natural world, giving you a kinship with beasts. At 3rd level when you adopt this path, you gain the ability to cast the [[Beast Sense]] and [[Speak with Animals]] spells, but only as rituals.\n\n!! Totem Spirit\n\nAt 3rd level, when you adopt this path, you choose a totem spirit and gain its feature. You must make or acquire a physical totem object – an amulet or similar adornment – that incorporates fur or feathers, claws, teeth, or bones of the totem animal. At your option, you also gain minor physical attributes that are reminiscent of your totem spirit. For example, if you have a bear totem spirit, you might be unusually hairy and thick-skinned, or if your totem is the eagle, your eyes turn bright yellow.\n\nYour totem animal might be an animal related to those listed here but more appropriate to your homeland. For example, you could choose a hawk or vulture in place of an eagle.\n\n//''Bear.''// While raging, you have resistance to all damage except psychic damage. The spirit of the bear makes you tough enough to stand up to any punishment.\n\n//''Eagle.''// While you're raging and aren't wearing heavy armor, other creatures have disadvantage on opportunity attack rolls against you, and you can use the Dash action as a bonus action on your turn. The spirit of the eagle makes you into a predator who can weave through the fray with ease.\n\n//''Wolf.''// While you're raging, your friends have advantage on melee attack rolls against any creature within 5 feet of you that is hostile to you. The spirit of the wolf makes you a leader of hunters.\n\n!! Aspect of the Beast\n\nAt 6th level, you gain a magical benefit based on the totem animal of your choice. You can choose the same animal you selected at 3rd level or a different one.\n\n//''Bear.''// You gain the might of a bear. Your carrying capacity (including maximum load and maximum lift) is doubled, and you have advantage on Strength checks made to push, pull, lift, or break objects.\n\n//''Eagle.''// You gain the eyesight of an eagle. You can see up to 1 mile away with no difficulty, able to discern even fine details as though looking at something no more than 100 feet away from you. Additionally, dim light doesn't impose disadvantage on your Wisdom (Perception) checks.\n\n//''Wolf.''// You gain the hunting sensibilities of a wolf. You can track other creatures while traveling at a fast pace, and you can move stealthily while traveling at a normal pace.\n\n!! Spirit Walker\n\nAt 10th level, you can cast the [[Commune with Nature]] spell, but only as a ritual. When you do so, a spiritual version of one of the animals you chose for Totem Spirit or Aspect of the Beast appears to you to convey the information you seek.\n\n!! Totemic Attunement\n\nAt 14th level, you gain a magical benefit based on a totem animal of your choice. You can choose the same animal you selected previously or a different one.\n\n//''Bear.''// While you're raging, any creature within 5 feet of you that's hostile to you has disadvantage on attack rolls against targets other than you or another character with this feature. An enemy is immune to this effect if it can't see or hear you or if it can't be frightened.\n\n//''Eagle.''// While raging, you have a flying speed equal to your current walking speed. This benefit works only in short bursts; you fall if you end your turn in the air and nothing else is holding you aloft.\n\n//''Wolf.''// While you're raging, you can use a bonus action on your turn to knock a Large or smaller creature prone when you hit it with melee weapon attack.","tags":"Barbarian Subclasses [[Player's Handbook]]","title":"Path of the Totem Warrior","modified":"20260707183549942"},

{"created":"20260709094651363","text":"//Far from the bustle of cities and towns, past the hedges that shelter the most distant farms from the terrors of the wild, amid the dense-packed trees of trackless forests and across wide and empty plains, rangers keep their unending watch.//\n\n|noborder alternate|k\n|!Level|!PB|!Features |!Spells Known|!Spell Slots per Spell Level |\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|\n|  1st | +2 |Favored Enemy, Natural Explorer                   | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |Fighting Style, Spellcasting                      |  2  |  2  | --- | --- | --- | --- |\n|  3rd | +2 |Ranger Archetype, Primeval Awareness              |  3  |  3  | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement                         |  3  |  3  | --- | --- | --- | --- |\n|  5th | +3 |Extra Attack                                      |  4  |  4  |  2  | --- | --- | --- |\n|  6th | +3 |Favored Enemy and Natural Explorer Improvements   |  4  |  4  |  2  | --- | --- | --- |\n|  7th | +3 |Ranger Archetype Feature                          |  5  |  4  |  3  | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement, Land's Stride          |  5  |  4  |  3  | --- | --- | --- |\n|  9th | +4 |---                                               |  6  |  4  |  3  |  2  | --- | --- |\n| 10th | +4 |Natural Explorer Improvement, Hide in Plain Sight |  6  |  4  |  3  |  2  | --- | --- |\n| 11th | +4 |Ranger Archetype Feature                          |  7  |  4  |  3  |  3  | --- | --- |\n| 12th | +4 |Ability Score Improvement                         |  7  |  4  |  3  |  3  | --- | --- |\n| 13th | +5 |---                                               |  8  |  4  |  3  |  3  |  1  | --- |\n| 14th | +5 |Favored Enemy Improvement, Vanish                 |  8  |  4  |  3  |  3  |  1  | --- |\n| 15th | +5 |Ranger Archetype Feature                          |  9  |  4  |  3  |  3  |  2  | --- |\n| 16th | +5 |Ability Score Improvement                         |  9  |  4  |  3  |  3  |  2  | --- |\n| 17th | +6 |---                                               |  10 |  4  |  3  |  3  |  3  |  1  |\n| 18th | +6 |Feral Senses                                      |  10 |  4  |  3  |  3  |  3  |  1  |\n| 19th | +6 |Ability Score Improvement                         |  11 |  4  |  3  |  3  |  3  |  2  |\n| 20th | +6 |Foe Slayer                                        |  11 |  4  |  3  |  3  |  3  |  2  |\n\n! Class Features\n\nAs a ranger, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d10 per ranger level\n\n''Hit Points at 1st Level:'' 10 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d10 (or 6) + your Constitution modifier per ranger level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields\n\n''Weapons:'' Simple weapons, martial weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Strength, Dexterity\n\n''Skills:'' Choose three from Animal Handling, Athletics, Insight, Investigation, Nature, Perception, Stealth, and Survival\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) [[scale mail|Armor and Shields]] or (b) [[leather armor|Armor and Shields]]\n* (//a//) two [[shortswords|Weapons]] or (b) two [[simple melee weapons|Weapons]]\n* (//a//) a [[dungeoneer’s pack|Adventuring Gear]] or (b) an [[explorer’s pack|Adventuring Gear]]\n* A [[longbow|Weapons]] and a [[quiver|Adventuring Gear]] of 20 [[arrows|Adventuring Gear]]\n\n!! Favored Enemy\n\nBeginning at 1st level, you have significant experience studying, tracking, hunting, and even talking to a certain type of enemy.\n\nChoose a type of favored enemy: aberrations, beasts, celestials, constructs, dragons, elementals, fey, fiends, giants, monstrosities, oozes, plants, or undead. Alternatively, you can select two races of humanoid (such as gnolls and orcs) as favored enemies.\n\nYou have advantage on Wisdom (Survival) checks to track your favored enemies, as well as on Intelligence checks to recall information about them.\n\nWhen you gain this feature, you also learn one language of your choice that is spoken by your favored enemies, if they speak one at all.\n\nYou choose one additional favored enemy, as well as an associated language, at 6th and 14th level. As you gain levels, your choices should reflect the types of monsters you have encountered on your adventures.\n\n!! Natural Explorer\n\nYou are particularly familiar with one type of natural environment and are adept at traveling and surviving in such regions. Choose one type of favored terrain: arctic, coast, desert, forest, grassland, mountain, swamp, or the Underdark. When you make an Intelligence or Wisdom check related to your favored terrain, your proficiency bonus is doubled if you are using a skill that you’re proficient in.\n\nWhile traveling for an hour or more in your favored terrain, you gain the following benefits:\n\n* Difficult terrain doesn’t slow your group’s travel.\n* Your group can’t become lost except by magical means.\n* Even when you are engaged in another activity while traveling (such as foraging, navigating, or tracking), you remain alert to danger.\n* If you are traveling alone, you can move stealthily at a normal pace.\n* When you forage, you find twice as much food as you normally would.\n* While tracking other creatures, you also learn their exact number, their sizes, and how long ago they passed through the area.\n\nYou choose additional favored terrain types at 6th and 10th level.\n\n!! Fighting Style\n\nAt 2nd level, you adopt a particular style of fighting as your specialty. Choose one of the following options. You can’t take a Fighting Style option more than once, even if you later get to choose again.\n\n!!! Archery\n\nYou gain a +2 bonus to attack rolls you make with ranged weapons.\n\n!!! Defense\n\nWhile you are wearing armor, you gain a +1 bonus to AC.\n\n!!! Dueling\n\nWhen you are wielding a melee weapon in one hand and no other weapons, you gain a +2 bonus to damage rolls with that weapon.\n\n!!! Two-Weapon Fighting\n\nWhen you engage in two-weapon fighting, you can add your ability modifier to the damage of the second attack.\n\n!! Spellcasting\n\nBy the time you reach 2nd level, you have learned to use the magical essence of nature to cast spells, much as a druid does.\n\n!!! Spell Slots\n\nThe Ranger table shows how many spell slots you have to cast your ranger spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nFor example, if you know the 1st-level spell [[Animal Friendship]] and have a 1st-level and a 2nd-level spell slot available, you can cast [[Animal Friendship]] using either slot.\n\n!!! Spells Known of 1st Level and Higher\n\nYou know two 1st-level spells of your choice from the ranger spell list.\n\nThe Spells Known column of the Ranger table shows when you learn more ranger spells of your choice. Each of these spells must be of a level for which you have spell slots. For instance, when you reach 5th level in this class, you can learn one new spell of 1st or 2nd level.\n\nAdditionally, when you gain a level in this class, you can choose one of the ranger spells you know and replace it with another spell from the ranger spell list, which also must be of a level for which you have spell slots.\n\n!!! Spellcasting Ability\n\nWisdom is your spellcasting ability for your ranger spells, since your magic draws on your attunement to nature. You use your Wisdom whenever a spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a ranger spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Wisdom modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Wisdom modifier\n\n!! Ranger Archetype\n\nAt 3rd level, you choose an archetype that you strive to emulate. Your choice grants you features at 3rd level and again at 7th, 11th, and 15th level.\n\n* [[Hunter]]{{$:/PHB}}\n* [[Beast Master]]{{$:/PHB}}\n\n!! Primeval Awareness\n\nBeginning at 3rd level, you can use your action and expend one ranger spell slot to focus your awareness on the region around you. For 1 minute per level of the spell slot you expend, you can sense whether the following types of creatures are present within 1 mile of you (or within up to 6 miles if you are in your favored terrain): aberrations, celestials, dragons, elementals, fey, fiends, and undead. This feature doesn’t reveal the creatures’ location or number.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Extra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\nStarting at 8th level, moving through nonmagical difficult terrain costs you no extra movement. You can also pass through nonmagical plants without being slowed by them and without taking damage from them if they have thorns, spines, or a similar hazard.\n\nIn addition, you have advantage on saving throws against plants that are magically created or manipulated to impede movement, such those created by the [[Entangle]] spell.\n\n!! Hide in Plain Sight\n\nStarting at 10th level, you can spend 1 minute creating camouflage for yourself. You must have access to fresh mud, dirt, plants, soot, and other naturally occurring materials with which to create your camouflage.\n\nOnce you are camouflaged in this way, you can try to hide by pressing yourself up against a solid surface, such as a tree or wall, that is at least as tall and wide as you are. You gain a +10 bonus to Dexterity (Stealth) checks as long as you remain there without moving or taking actions. Once you move or take an action or a reaction, you must camouflage yourself again to gain this benefit.\n\n!! Vanish\n\nStarting at 14th level, you can use the Hide action as a bonus action on your turn. Also, you can’t be tracked by nonmagical means, unless you choose to leave a trail.\n\n!! Feral Senses\n\nAt 18th level, you gain preternatural senses that help you fight creatures you can’t see. When you attack a creature you can’t see, your inability to see it doesn’t impose disadvantage on your attack rolls against it.\n\nYou are also aware of the location of any invisible creature within 30 feet of you, provided that the creature isn’t hidden from you and you aren’t blinded or deafened.\n\n!! Foe Slayer\n\nAt 20th level, you become an unparalleled hunter of your enemies. Once on each of your turns, you can add your Wisdom modifier to the attack roll or the damage roll of an attack you make against one of your favored enemies. You can choose to use this feature before or after the roll, but before any effects of the roll are applied.","tags":"Classes [[Player's Handbook]]","title":"Ranger","modified":"20260709145506806"},
{"created":"20260709144901128","text":"//Rogues rely on skill, stealth, and their foes’ vulnerabilities to get the upper hand in any situation. They have a knack for finding the solution to just about any problem, demonstrating a resourcefulness and versatility that is the cornerstone of any successful adventuring party.//\n\n|noborder alternate|k\n|!Level|!PB|!Sneak Attack|!Features |\n|  1st | +2 |  1d6 |Expertise, Sneak Attack, Thieves' Cant |\n|  2nd | +2 |  1d6 |Cunning Action                         |\n|  3rd | +2 |  2d6 |Roguish Archetype                      |\n|  4th | +2 |  2d6 |Ability Score Improvement              |\n|  5th | +3 |  3d6 |Uncanny Dodge                          |\n|  6th | +3 |  3d6 |Expertise                              |\n|  7th | +3 |  4d6 |Evasion                                |\n|  8th | +3 |  4d6 |Ability Score Improvement              |\n|  9th | +4 |  5d6 |Roguish Archetype Feature              |\n| 10th | +4 |  5d6 |Ability Score Improvement              |\n| 11th | +4 |  6d6 |Reliable Talent                        |\n| 12th | +4 |  6d6 |Ability Score Improvement              |\n| 13th | +5 |  7d6 |Roguish Archetype Feature              |\n| 14th | +5 |  7d6 |Blindsense                             |\n| 15th | +5 |  8d6 |Slippery Mind                          |\n| 16th | +5 |  8d6 |Ability Score Improvement              |\n| 17th | +6 |  9d6 |Roguish Archetype Feature              |\n| 18th | +6 |  9d6 |Elusive                                |\n| 19th | +6 | 10d6 |Ability Score Improvement              |\n| 20th | +6 | 10d6 |Stroke of Luck                         |\n\n! Class Features\n\nAs a rogue, you have the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per rogue level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per rogue level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor\n\n''Weapons:'' Simple weapons, hand crossbows, longswords, rapiers, shortswords\n\n''Tools:'' Thieves’ tools\n\n''Saving Throws:'' Dexterity, Intelligence\n\n''Skills:'' Choose four from Acrobatics, Athletics, Deception, Insight, Intimidation, Investigation, Perception, Performance, Persuasion, Sleight of Hand, and Stealth\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (a) a [[rapier|Weapons]] or (b) a [[shortsword|Weapons]]\n* (a) a [[shortbow|Weapons]] and [[quiver|Adventuring Gear]] of 20 [[arrows|Adventuring Gear]] or (b) a [[shortsword|Weapons]]\n* (a) a [[burglar’s pack|Adventuring Gear]], (b) a [[dungeoneer’s pack|Adventuring Gear]], or (c) an [[explorer’s pack|Adventuring Gear]]\n* [[Leather armor|Armor and Shields]], two [[daggers|Weapons]], and [[thieves’ tools|Tools]]\n\n!! Expertise\n\nAt 1st level, choose two of your skill proficiencies, or one of your skill proficiencies and your proficiency with thieves’ tools. Your proficiency bonus is doubled for any ability check you make that uses either of the chosen proficiencies.\n\nAt 6th level, you can choose two more of your proficiencies (in skills or with thieves’ tools) to gain this benefit.\n\n!! Sneak Attack\n\nBeginning at 1st level, you know how to strike subtly and exploit a foe’s distraction. Once per turn, you can deal an extra 1d6 damage to one creature you hit with an attack if you have advantage on the attack roll. The attack must use a finesse or a ranged weapon.\n\nYou don’t need advantage on the attack roll if another enemy of the target is within 5 feet of it, that enemy isn’t incapacitated, and you don’t have disadvantage on the attack roll.\n\nThe amount of the extra damage increases as you gain levels in this class, as shown in the Sneak Attack column of the Rogue table.\n\n!! Thieves’ Cant\n\nDuring your rogue training you learned thieves’ cant, a secret mix of dialect, jargon, and code that allows you to hide messages in seemingly normal conversation. Only another creature that knows thieves’ cant understands such messages. It takes four times longer to convey such a message than it does to speak the same idea plainly.\n\nIn addition, you understand a set of secret signs and symbols used to convey short, simple messages, such as whether an area is dangerous or the territory of a thieves’ guild, whether loot is nearby, or whether the people in an area are easy marks or will provide a safe house for thieves on the run.\n\n!! Cunning Action\n\nStarting at 2nd level, your quick thinking and agility allow you to move and act quickly. You can take a bonus action on each of your turns in combat. This action can be used only to take the Dash, Disengage, or Hide action.\n\n!! Roguish Archetype\n\nAt 3rd level, you choose an archetype that you emulate in the exercise of your rogue abilities. Your archetype choice grants you features at 3rd level and then again at 9th, 13th, and 17th level.\n\n* [[Arcane Trickster]]{{$:/PHB}}\n* [[Assassin]]{{$:/PHB}}\n* [[Thief]]{{$:/PHB}}\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 10th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Uncanny Dodge\n\nStarting at 5th level, when an attacker that you can see hits you with an attack, you can use your reaction to halve the attack’s damage against you.\n\n!! Evasion\n\nBeginning at 7th level, you can nimbly dodge out of the way of certain area effects, such as a red dragon’s fiery breath or an [[Ice Storm]] spell. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.\n\n!! Reliable Talent\n\nBy 11th level, you have refined your chosen skills until they approach perfection. Whenever you make an ability check that lets you add your proficiency bonus, you can treat a d20 roll of 9 or lower as a 10.\n\n!! Blindsense\n\nStarting at 14th level, if you are able to hear, you are aware of the location of any hidden or invisible creature within 10 feet of you.\n\n!! Slippery Mind\n\nBy 15th level, you have acquired greater mental strength. You gain proficiency in Wisdom saving throws.\n\n!! Elusive\n\nBeginning at 18th level, you are so evasive that attackers rarely gain the upper hand against you. No attack roll has advantage against you while you aren’t incapacitated.\n\n!! Stroke of Luck\n\nAt 20th level, you have an uncanny knack for succeeding when you need to. If your attack misses a target within range, you can turn the miss into a hit. Alternatively, if you fail an ability check, you can treat the d20 roll as a 20.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.","tags":"Classes [[Player's Handbook]]","title":"Rogue","modified":"20260709150108022"},
{"created":"20260709181137966","text":"//Sorcerers carry a magical birthright conferred upon them by an exotic bloodline, some otherworldly influence, or exposure to unknown cosmic forces. One can’t study sorcery as one learns a language, any more than one can learn to live a legendary life. No one chooses sorcery; the power chooses the sorcerer.//\n\n|noborder alternate|k\n|!Level|!PB|!Sorcery Points|!Features |!Cantrips Known|!Spells Known|!Spell Slots per Spell Level|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|!6th|!7th|!8th|!9th|","tags":"Classes [[Player's Handbook]]","title":"Sorcerer","modified":"20260709181307264"},
{"created":"20260708090109437","text":"//Gods whose portfolios include the Tempest domain — including Talos, Umberlee, Kord, Zeboim, the Devourer, Zeus, and Thor — govern storms, sea, and sky. They include gods of lightning and thunder, gods of earthquakes, some fire gods, and certain gods of violence, physical strength, and courage. In some pantheons, a god of this domain rules over other deities and is known for swift justice delivered by thunderbolts. In the pantheons of seafaring people, gods of this domain are ocean deities and the patrons of sailors. Tempest gods send their clerics to inspire fear in the common folk, either to keep those folk on the path of righteousness or to encourage them to offer sacrifices of propitiation to ward off divine wrath.//\n\n!!! Tempest Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Fog Cloud]], [[Thunderwave]] |\n| 3rd |[[Gust of Wind]], [[Shatter]] |\n| 5th |[[Call Lightning]], [[Sleet Storm]] |\n| 7th |[[Control Water]], [[Ice Storm]] |\n| 9th |[[Destructive Wave]], [[Insect Plague]] |\n\n!! Bonus Proficiencies\n\nAt 1st level, you gain proficiency with martial weapons and heavy armor.\n\n!! Wrath of the Storm\n\nAlso at 1st level, you can thunderously rebuke attackers. When a creature within 5 feet of you that you can see hits you with an attack, you can use your reaction to cause the creature to make a Dexterity saving throw. The creature takes 2d8 lightning or thunder damage (your choice) on a failed saving throw, and half as much damage on a successful one.\n\nYou can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.\n\n!! Channel Divinity: Destructive Wrath\n\nStarting at 2nd level, you can use your Channel Divinity to wield the power of the storm with unchecked ferocity.\n\nWhen you roll lightning or thunder damage, you can use your Channel Divinity to deal maximum damage, instead of rolling.\n\n!! Thunderbolt Strike\n\nAt 6th level, when you deal lightning damage to a Large or smaller creature, you can also push it up to 10 feet away from you.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 thunder damage to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Stormborn\n\nAt 17th level, you have a flying speed equal to your current walking speed whenever you are not underground or indoors.","tags":"Cleric [[Player's Handbook]] Subclasses","title":"Tempest Domain","modified":"20260708090433802"},
{"created":"20260709150121338","text":"//You hone your skills in the larcenous arts. Burglars, bandits, cutpurses, and other criminals typically follow this archetype, but so do rogues who prefer to think of themselves as professional treasure seekers, explorers, delvers, and investigators. In addition to improving your agility and stealth, you learn skills useful for delving into ancient ruins, reading unfamiliar languages, and using magic items you normally couldn’t employ.//\n\n!! Fast Hands\n\nStarting at 3rd level, you can use the bonus action granted by your Cunning Action to make a Dexterity (Sleight of Hand) check, use your thieves’ tools to disarm a trap or open a lock, or take the Use an Object action.\n\n!! Second-Story Work\n\nWhen you choose this archetype at 3rd level, you gain the ability to climb faster than normal; climbing no longer costs you extra movement.\n\nIn addition, when you make a running jump, the distance you cover increases by a number of feet equal to your Dexterity modifier.\n\n!! Supreme Sneak\n\nStarting at 9th level, you have advantage on a Dexterity (Stealth) check if you move no more than half your speed on the same turn.\n\n!! Use Magic Device\n\nBy 13th level, you have learned enough about the workings of magic that you can improvise the use of items even when they are not intended for you. You ignore all class, race, and level requirements on the use of magic items.\n\n!! Thief’s Reflexes\n\nWhen you reach 17th level, you have become adept at laying ambushes and quickly escaping danger. You can take two turns during the first round of any combat. You take your first turn at your normal initiative and your second turn at your initiative minus 10. You can’t use this feature when you are surprised.","tags":"Rogue [[Player's Handbook]] Subclasses","title":"Thief","modified":"20260709150259950"},
{"created":"20260708090438144","text":"//Gods of trickery — such as Tymora, Beshaba, Olidammara, the Traveler, Garl Glittergold, and Loki — are mischief-makers and instigators who stand as a constant challenge to the accepted order among both gods and mortals. They’re patrons of thieves, scoundrels, gamblers, rebels, and liberators. Their clerics are a disruptive force in the world, puncturing pride, mocking tyrants, stealing from the rich, freeing captives, and flouting hollow traditions. They prefer subterfuge, pranks, deception, and theft rather than direct confrontation.//\n\n!!! Trickery Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Charm Person]], [[Disguise Self]] |\n| 3rd |[[Mirror Image]], [[Pass without Trace]] |\n| 5th |[[Blink]], [[Dispel Magic]] |\n| 7th |[[Dimension Door]], [[Polymorph]] |\n| 9th |[[Dominate Person]], [[Modify Memory]] |\n\n!! Blessing of the Trickster\n\nStarting when you choose this domain at 1st level, you can use your action to touch a willing creature other than yourself to give it advantage on Dexterity (Stealth) checks. This blessing lasts for 1 hour or until you use this feature again.\n\n!! Channel Divinity: Invoke Duplicity\n\nStarting at 2nd level, you can use your Channel Divinity to create an illusory duplicate of yourself.\n\nAs an action, you create a perfect illusion of yourself that lasts for 1 minute, or until you lose your concentration (as if you were concentrating on a spell). The illusion appears in an unoccupied space that you can see within 30 feet of you. As a bonus action on your turn, you can move the illusion up to 30 feet to a space you can see, but it must remain within 120 feet of you.\n\nFor the duration, you can cast spells as though you were in the illusion’s space, but you must use your own senses. Additionally, when both you and your illusion are within 5 feet of a creature that can see the illusion, you have advantage on attack rolls against that creature, given how distracting the illusion is to the target.\n\n!! Channel Divinity: Cloak of Shadows\n\nStarting at 6th level, you can use your Channel Divinity to vanish.\n\nAs an action, you become invisible until the end of your next turn. You become visible if you attack or cast a spell.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with poison — a gift from your deity. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 poison damage to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Improved Duplicity\n\nAt 17th level, you can create up to four duplicates of yourself, instead of one, when you use Invoke Duplicity. As a bonus action on your turn, you can move any number of them up to 30 feet, to a maximum range of 120 feet.","tags":"Cleric Subclasses [[Player's Handbook]]","title":"Trickery Domain","modified":"20260709092524980"},
{"created":"20260708090626956","text":"//War has many manifestations. It can make heroes of ordinary people. It can be desperate and horrific, with acts of cruelty and cowardice eclipsing instances of excellence and courage. In either case, the gods of war watch over warriors and reward them for their great deeds. The clerics of such gods excel in battle, inspiring others to fight the good fight or offering acts of violence as prayers. Gods of war include champions of honor and chivalry (such as Torm, Heironeous, and Kiri-Jolith) as well as gods of destruction and pillage (such as Erythnul, the Fury, Gruumsh, and Ares) and gods of conquest and domination (such as Bane, Hextor, and Maglubiyet). Other war gods (such as Tempus, Nike, and Nuada) take a more neutral stance, promoting war in all its manifestations and supporting warriors in any circumstance.//\n\n!!! War Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Divine Favor]], [[Shield of Faith]] |\n| 3rd |[[Magic Weapon]], [[Spiritual Weapon]] |\n| 5th |[[Crusader's Mantle]], [[Spirit Guardians]] |\n| 7th |[[Freedom of Movement]], [[Stoneskin]] |\n| 9th |[[Flame Strike]], [[Hold Monster]] |\n\n!! Bonus Proficiencies\n\nAt 1st level, you gain proficiency with martial weapons and heavy armor.\n\n!! War Priest\n\nFrom 1st level, your god delivers bolts of inspiration to you while you are engaged in battle. When you use the Attack action, you can make one weapon attack as a bonus action.\n\nYou can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.\n\n!! Channel Divinity: Guided Strike\n\nStarting at 2nd level, you can use your Channel Divinity to strike with supernatural accuracy. When you make an attack roll, you can use your Channel Divinity to gain a +10 bonus to the roll. You make this choice after you see the roll, but before the DM says whether the attack hits or misses.\n\n!! Channel Divinity: War God’s Blessing\n\nAt 6th level, when a creature within 30 feet of you makes an attack roll, you can use your reaction to grant that creature a +10 bonus to the roll, using your Channel Divinity. You make this choice after you see the roll, but before the DM says whether the attack hits or misses.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 damage of the same type dealt by the weapon to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Avatar of Battle\n\nAt 17th level, you gain resistance to bludgeoning, piercing, and slashing damage from nonmagical attacks.","tags":"Cleric Subclasses [[Player's Handbook]]","title":"War Domain","modified":"20260708090814478"},
{"created":"20260709082027912","text":"//Monks of the Way of Shadow follow a tradition that values stealth and subterfuge. These monks might be called ninjas or shadowdancers, and they serve as spies and assassins. Sometimes the members of a ninja monastery are family members, forming a clan sworn to secrecy about their arts and missions. Other monasteries are more like thieves’ guilds, hiring out their services to nobles, rich merchants, or anyone else who can pay their fees. Regardless of their methods, the heads of these monasteries expect the unquestioning obedience of their students.//\n\n!! Shadow Arts\n\nStarting when you choose this tradition at 3rd level, you can use your ki to duplicate the effects of certain spells. As an action, you can spend 2 ki points to cast [[Darkness]], [[Darkvision]], [[Pass without Trace]], or [[Silence]], without providing material components. Additionally, you gain the [[Minor Illusion]] cantrip if you don’t already know it.\n\n!! Shadow Step\n\nAt 6th level, you gain the ability to step from one shadow into another. When you are in dim light or darkness, as a bonus action you can teleport up to 60 feet to an unoccupied space you can see that is also in dim light or darkness. You then have advantage on the first melee attack you make before the end of the turn.\n\n!! Cloak of Shadows\n\nBy 11th level, you have learned to become one with the shadows. When you are in an area of dim light or darkness, you can use your action to become invisible. You remain invisible until you make an attack, cast a spell, or are in an area of bright light.\n\n!! Opportunist\n\nAt 17th level, you can exploit a creature’s momentary distraction when it is hit by an attack. Whenever a creature within 5 feet of you is hit by an attack made by a creature other than you, you can use your reaction to make a melee attack against that creature.","tags":"Monk Subclasses [[Player's Handbook]]","title":"Way of Shadow","modified":"20260709092540122"},
{"created":"20260709082225259","text":"//You follow a monastic tradition that teaches you to harness the elements. When you focus your ki, you can align yourself with the forces of creation and bend the four elements to your will, using them as an extension of your body. Some members of this tradition dedicate themselves to a single element, but others weave the elements together.\n\nMany monks of this tradition tattoo their bodies with representations of their ki powers, commonly imagined as coiling dragons, but also as phoenixes, fish, plants, mountains, and cresting waves.//\n\n!! Disciple of the Elements\n\nWhen you choose this tradition at 3rd level, you learn magical disciplines that harness the power of the four elements. A discipline requires you to spend ki points each time you use it.\n\nYou know the Elemental Attunement discipline and one other elemental discipline of your choice, which are detailed in the \"Elemental Disciplines\" section below. You learn one additional elemental discipline of your choice at 6th, 11th, and 17th level.\n\nWhenever you learn a new elemental discipline, you can also replace one elemental discipline that you already know with a different discipline.\n\n//''Casting Elemental Spells.''// Some elemental disciplines allow you to cast spells. See chapter 10 for the general rules of spellcasting. To cast one of these spells, you use its casting time and other rules, but you don’t need to provide material components for it.\n\nOnce you reach 5th level in this class, you can spend additional ki points to increase the level of an elemental discipline spell that you cast, provided that the spell has an enhanced effect at a higher level, as burning hands does. The spell’s level increases by 1 for each additional ki point you spend. For example, if you are a 5th-level monk and use Sweeping Cinder Strike to cast burning hands, you can spend 3 ki points to cast it as a 2nd-level spell (the discipline’s base cost of 2 ki points plus 1).\n\nThe maximum number of ki points you can spend to cast a spell in this way (including its base ki point cost and any additional ki points you spend to increase its level) is determined by your monk level, as shown in the Spells and Ki Points table.\n\n!!! Spells and Ki Points\n\n|noborder alternate|k\n| !Monk Levels | !Maximum Ki Points for a Spell |\n| 5th–8th | 3 |\n| 9th–12th | 4 |\n| 13th–16th | 5 |\n| 17th–20th | 6 |\n\n!! Elemental Disciplines\n\nThe elemental disciplines are presented in alphabetical order. If a discipline requires a level, you must be that level in this class to learn the discipline.\n\n//''Breath of Winter (17th Level Required)''//. You can spend 6 ki points to cast [[Cone of Cold]].\n\n//''Clench of the North Wind (6th Level Required)''//. You can spend 3 ki points to cast [[Hold Person]].\n\n//''Elemental Attunement.''// You can use your action to briefly control elemental forces within 30 feet of you, causing one of the following effects of your choice:\n\n* Create a harmless, instantaneous sensory effect related to air, earth, fire, or water, such as a shower of sparks, a puff of wind, a spray of light mist, or a gentle rumbling of stone.\n* Instantaneously light or snuff out a candle, a torch, or a small campfire.\n* Chill or warm up to 1 pound of nonliving material for up to 1 hour.\n* Cause earth, fire, water, or mist that can fit within a 1-foot cube to shape itself into a crude form you designate for 1 minute.\n\n//''Eternal Mountain Defense (17th Level Required)''//. You can spend 5 ki points to cast [[Stoneskin]], targeting yourself.\n\n\n//''Fist of Unbroken Air.''// You can create a blast of compressed air that strikes like a mighty fist. As an action, you can spend 2 ki points and choose a creature within 30 feet of you. That creature must make a Strength saving throw. On a failed save, the creature takes 3d10 bludgeoning damage, plus an extra 1d10 bludgeoning damage for each additional ki point you spend, and you can push the creature up to 20 feet away from you and knock it prone. On a successful save, the creature takes half as much damage, and you don’t push it or knock it prone.\n\n//''Flames of the Phoenix (11th Level Required).''// You can spend 4 ki points to cast [[Fireball]].\n\n//''Gong of the Summit (6th Level Required)''//. You can spend 3 ki points to cast [[Shatter]].\n\n//''Mist Stance (11th Level Required).''// You can spend 4 ki points to cast [[Gaseous Form]], targeting yourself.\n\n//''Ride the Wind (11th Level Required).''// You can spend 4 ki points to cast [[Fly]], targeting yourself.\n\n//''River of Hungry Flame (17th Level Required).''// You can spend 5 ki points to cast [[Wall of Fire]].\n\n//''Rush of the Gale Spirits.''// You can spend 2 ki points to cast [[Gust of Wind]].\n\n//''Shape the Flowing River.''// As an action, you can spend 1 ki point to choose an area of ice or water no larger than 30 feet on a side within 120 feet of you. You can change water to ice within the area and vice versa, and you can reshape ice in the area in any manner you choose. You can raise or lower the ice’s elevation, create or fill in a trench, erect or flatten a wall, or form a pillar. The extent of any such changes can’t exceed half the area’s largest dimension. For example, if you affect a 30-foot square, you can create a pillar up to 15 feet high, raise or lower the square’s elevation by up to 15 feet, dig a trench up to 15 feet deep, and so on. You can’t shape the ice to trap or damage a creature in the area.\n\n//''Sweeping Cinder Strike.''// You can spend 2 ki points to cast [[Burning Hands]].\n\n//''Water Whip.''// You can spend 2 ki points as an action to create a whip of water that shoves and pulls a creature to unbalance it. A creature that you can see that is within 30 feet of you must make a Dexterity saving throw. On a failed save, the creature takes 3d10 bludgeoning damage, plus an extra 1d10 bludgeoning damage for each additional ki point you spend, and you can either knock it prone or pull it up to 25 feet closer to you. On a successful save, the creature takes half as much damage, and you don’t pull it or knock it prone.\n\n//''Wave of Rolling Earth (17th Level Required).''// You can spend 6 ki points to cast [[Wall of Stone]].","title":"Way of the Four Elements","modified":"20260709083915617","type":"","tags":"Monk [[Player's Handbook]] Subclasses"},
{"created":"20260709081926912","text":"//Monks of the Way of the Open Hand are the ultimate masters of martial arts combat, whether armed or unarmed. They learn techniques to push and trip their opponents, manipulate ki to heal damage to their bodies, and practice advanced meditation that can protect them from harm.//\n\n!! Open Hand Technique\n\nStarting when you choose this tradition at 3rd level, you can manipulate your enemy’s ki when you harness your own. Whenever you hit a creature with one of the attacks granted by your Flurry of Blows, you can impose one of the following effects on that target:\n\n* It must succeed on a Dexterity saving throw or be knocked prone.\n* It must make a Strength saving throw. If it fails, you can push it up to 15 feet away from you.\n* It can’t take reactions until the end of your next turn.\n\n!! Wholeness of Body\n\nAt 6th level, you gain the ability to heal yourself. As an action, you can regain hit points equal to three times your monk level. You must finish a long rest before you can use this feature again.\n\n!! Tranquility\n\nBeginning at 11th level, you can enter a special meditation that surrounds you with an aura of peace. At the end of a long rest, you gain the effect of a [[Sanctuary]] spell that lasts until the start of your next long rest (the spell can end early as normal). The saving throw DC for the spell equals 8 + your Wisdom modifier + your proficiency bonus.\n\n!! Quivering Palm\n\nAt 17th level, you gain the ability to set up lethal vibrations in someone’s body. When you hit a creature with an unarmed strike, you can spend 3 ki points to start these imperceptible vibrations, which last for a number of days equal to your monk level. The vibrations are harmless unless you use your action to end them. To do so, you and the target must be on the same plane of existence. When you use this action, the creature must make a Constitution saving throw. If it fails, it is reduced to 0 hit points. If it succeeds, it takes 10d10 necrotic damage.\n\nYou can have only one creature under the effect of this feature at a time. You can choose to end the vibrations harmlessly without using an action.","tags":"Monk Subclasses [[Player's Handbook]]","title":"Way of the Open Hand","modified":"20260709082024603"},
{"created":"20260707184443517","text":"Your class grants proficiency in certain weapons, reflecting both the class’s focus and the tools you are most likely to use. Whether you favor a longsword or a longbow, your weapon and your ability to wield it effectively can mean the difference between life and death while adventuring.\n\nThe Weapons table shows the most common weapons used in the worlds of D&D, their price and weight, the damage they deal when they hit, and any special properties they possess. Every weapon is classified as either melee or ranged. A melee weapon is used to attack a target within 5 feet of you, whereas a ranged weapon is used to attack a target at a distance.\n\n!!! Simple Weapons\n\n|noborder alternate|k\n|!Weapon Name |\u003C| !Cost |!Damage         | !Weight |!Properties |\n|//Simple Melee Weapons//|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Club            |  1 sp |1d4 bludgeoning |  2 lb.  |Light                                    |\n| |Dagger          |  2 gp |1d4 piercing    |  1 lb.  |Finesse, light, thrown (20/60)           |\n| |Greatclub       |  2 sp |1d8 bludgeoning | 10 lb.  |Two-handed                               |\n| |Handaxe         |  5 gp |1d6 slashing    |  2 lb.  |Light, thrown (20/60)                    |\n| |Javelin         |  5 sp |1d6 piercing    |  2 lb.  |Thrown (30/120)                          |\n| |Light hammer    |  2 gp |1d4 bludgeoning |  2 lb.  |Light, thrown (20/60)                    |\n| |Mace            |  5 gp |1d6 bludgeoning |  4 lb.  |---                                      |\n| |Quarterstaff    |  2 sp |1d6 bludgeoning |  4 lb.  |Versatile (1d8)                          |\n| |Sickle          |  1 gp |1d4 slashing    |  2 lb.  |Light                                    |\n| |Spear           |  1 gp |1d6 piercing    |  3 lb.  |Thrown (20/60), versatile (1d8)          |\n|//Simple Ranged Weapons//|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Crossbow, light | 25 gp |1d8 piercing    |  5 lb.  |Ammunition (80/320), loading, two-handed |\n| |Dart            |  5 cp |1d4 piercing    | 1/4 lb. |Finesse, thrown (20/60)                  |\n| |Shortbow        | 25 gp |1d6 piercing    |  2 lb.  |Ammunition (80/320), two-handed          |\n| |Sling           |  1 sp |1d4 bludgeoning |   ---   |Ammunition (30/120)                      |\n\n!!! Martial Weapons\n\n|noborder alternate|k\n|!Weapon Name |\u003C| !Cost |!Damage          | !Weight |!Properties |\n|//Martial Melee Weapons//|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Battleaxe       | 10 gp |1d8 slashing    |  4 lb. |Versatile (1d10)                                 |\n| |Flail           | 10 gp |1d8 bludgeoning |  2 lb. |---                                              |\n| |Glaive          | 20 gp |1d10 slashing   |  6 lb. |Heavy, reach, two-handed                         |\n| |Greataxe        | 30 gp |1d12 slashing   |  7 lb. |Heavy, two-handed                                |\n| |Greatsword      | 50 gp |2d6 slashing    |  6 lb. |Heavy, two-handed                                |\n| |Halberd         | 20 gp |1d10 slashing   |  6 lb. |Heavy, reach, two-handed                         |\n| |Lance           | 10 gp |1d12 piercing   |  6 lb. |Reach, special                                   |\n| |Longsword       | 15 gp |1d8 slashing    |  3 lb. |Versatile (1d10)                                 |\n| |Maul            | 10 gp |2d6 bludgeoning | 10 lb. |Heavy, two-handed                                |\n| |Morningstar     | 15 gp |1d8 piercing    |  4 lb. |---                                              |\n| |Pike            |  5 gp |1d10 piercing   | 18 lb. |Heavy, reach, two-handed                         |\n| |Rapier          | 25 gp |1d8 piercing    |  2 lb. |Finesse                                          |\n| |Scimitar        | 25 gp |1d6 slashing    |  3 lb. |Finesse, light                                   |\n| |Shortsword      | 10 gp |1d6 piercing    |  2 lb. |Finesse, light                                   |\n| |Trident         |  5 gp |1d6 piercing    |  4 lb. |Thrown (20/60), versatile (1d8)                  |\n| |War pick        |  5 gp |1d8 piercing    |  2 lb. |---                                              |\n| |Warhammer       | 15 gp |1d8 bludgeoning |  2 lb. |Versatile (1d10)                                 |\n| |Whip            |  2 gp |1d4 slashing    |  3 lb. |Finesse, reach                                   |\n|//Martial Ranged Weapons//|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Blowgun         | 10 gp |1 piercing      |  1 lb. |Ammunition (25/100), loading                     |\n| |Crossbow, hand  | 75 gp |1d6 piercing    |  3 lb. |Ammunition (30/120), light, loading              |\n| |Crossbow, heavy | 50 gp |1d10 piercing   | 18 lb. |Ammunition (100/400), heavy, loading, two-handed |\n| |Longbow         | 50 gp |1d8 piercing    |  2 lb. |Ammunition (150/600), heavy, two-handed          |\n| |Net             |  1 gp |---             |  3 lb. |Special, thrown (5/15)                           |\n\n!! Weapon Proficiency\n\nYour race, class, and feats can grant you proficiency with certain weapons or categories of weapons. The two categories are simple and martial. Most people can use simple weapons with proficiency. These weapons include clubs, maces, and other weapons often found in the hands of commoners. Martial weapons, including swords, axes, and polearms, require more specialized training to use effectively. Most warriors use martial weapons because these weapons put their fighting style and training to best use.\n\nProficiency with a weapon allows you to add your proficiency bonus to the attack roll for any attack you make with that weapon. If you make an attack roll using a weapon with which you lack proficiency, you do not add your proficiency bonus to the attack roll.\n\n!! Weapon Properties\n\nMany weapons have special properties related to their use, as shown in the Weapons table.\n\n//''Ammunition.''// You can use a weapon that has the ammunition property to make a ranged attack only if you have ammunition to fire from the weapon. Each time you attack with the weapon, you expend one piece of ammunition. Drawing the ammunition from a quiver, case, or other container is part of the attack (you need a free hand to load a one-handed weapon). At the end of the battle, you can recover half your expended ammunition by taking a minute to search the battlefield.\n\nIf you use a weapon that has the ammunition property to make a melee attack, you treat the weapon as an improvised weapon. A sling must be loaded to deal any damage when used in this way.\n\n//''Finesse.''// When making an attack with a finesse weapon, you use your choice of your Strength or Dexterity modifier for the attack and damage rolls. You must use the same modifier for both rolls.\n\n//''Heavy.''// Creatures that are Small or Tiny have disadvantage on attack rolls with heavy weapons. A heavy weapon’s size and bulk make it too large for a Small or Tiny creature to use effectively.\n\n//''Light.''// A light weapon is small and easy to handle, making it ideal for use when fighting with two weapons.\n\n//''Loading.''// Because of the time required to load this weapon, you can fire only one piece of ammunition from it when you use an action, bonus action, or reaction to fire it, regardless of the number of attacks you can normally make.\n\n//''Range.''// A weapon that can be used to make a ranged attack has a range shown in parentheses after the ammunition or thrown property. The range lists two numbers. The first is the weapon’s normal range in feet, and the second indicates the weapon’s long range. When attacking a target beyond normal range, you have disadvantage on the attack roll. You can’t attack a target beyond the weapon’s long range.\n\n//''Reach.''// This weapon adds 5 feet to your reach when you attack with it, as well as when determining your reach for opportunity attacks with it.\n\n//''Special.''// A weapon with the special property has unusual rules governing its use, explained in the weapon’s description.\n\n//''Thrown.''// If a weapon has the thrown property, you can throw the weapon to make a ranged attack. If the weapon is a melee weapon, you use the same ability modifier for that attack roll and damage roll that you would use for a melee attack with the weapon. For example, if you throw a handaxe, you use your Strength, but if you throw a dagger, you can use either your Strength or your Dexterity, since the dagger has the finesse property.\n\n//''Two-Handed''//. This weapon requires two hands when you attack with it. This property is relevant only when you attack with the weapon, not when you simply hold it.\n\n//''Versatile.''// This weapon can be used with one or two hands. A damage value in parentheses appears with the property — the damage when the weapon is used with two hands to make a melee attack.\n\n!!! Improvised Weapons\n\nSometimes characters don’t have their weapons and have to attack with whatever is at hand. An improvised weapon includes any object you can wield in one or two hands, such as broken glass, a table leg, a frying pan, a wagon wheel, or a dead goblin.\n\nOften, an improvised weapon is similar to an actual weapon and can be treated as such. For example, a table leg is akin to a club. At the DM’s option, a character proficient with a weapon can use a similar object as if it were that weapon and use his or her proficiency bonus.\n\nAn object that bears no resemblance to a weapon deals 1d4 damage (the DM assigns a damage type appropriate to the object). If a character uses a ranged weapon to make a melee attack, or throws a melee weapon that does not have the thrown property, it also deals 1d4 damage. An improvised thrown weapon has a normal range of 20 feet and a long range of 60 feet.\n\n!!! Silvered Weapons\n\nSome monsters that have immunity or resistance to nonmagical weapons are susceptible to silver weapons, so cautious adventurers invest extra coin to plate their weapons with silver. You can silver a single weapon or ten pieces of ammunition for 100 gp. This cost represents not only the price of the silver, but the time and expertise needed to add silver to the weapon without making it less effective.\n\n!!! Special Weapons\n\nWeapons with special rules are described here.\n\n//''Lance.''// You have disadvantage when you use a lance to attack a target within 5 feet of you. Also, a lance requires two hands to wield when you aren’t mounted.\n\n//''Net.''// A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on creatures that are formless, or creatures that are Huge or larger. A creature can use its action to make a DC 10 Strength check, freeing itself or another creature within its reach on a success. Dealing 5 slashing damage to the net (AC 10) also frees the creature without harming it, ending the effect and destroying the net.\n\nWhen you use an action, bonus action, or reaction to attack with a net, you can make only one attack regardless of the number of attacks you can normally make.","title":"Weapons","modified":"20260708155936465","type":"","tags":"Equipment [[Player's Handbook]]"}
