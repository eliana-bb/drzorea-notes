i/vanilla/options/codewrapping\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/codewrapping\",\"text\":\"pre-wrap\"},\"$:/themes/tiddlywiki/vanilla/reset\":{\"title\":\"$:/themes/tiddlywiki/vanilla/reset\",\"type\":\"text/css\",\"text\":\"/*! modern-normalize v2.0.0 | MIT License | https://github.com/sindresorhus/modern-normalize */\\n\\n/*\\nDocument\\n========\\n*/\\n\\n/**\\nUse a better box model (opinionated).\\n*/\\n\\n*,\\n::before,\\n::after {\\n\\tbox-sizing: border-box;\\n}\\n\\nhtml {\\n\\t/* Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3) */\\n\\tfont-family:\\n\\t\\tsystem-ui,\\n\\t\\t'Segoe UI',\\n\\t\\tRoboto,\\n\\t\\tHelvetica,\\n\\t\\tArial,\\n\\t\\tsans-serif,\\n\\t\\t'Apple Color Emoji',\\n\\t\\t'Segoe UI Emoji';\\n\\tline-height: 1.15; /* 1. Correct the line height in all browsers. */\\n\\t-webkit-text-size-adjust: 100%; /* 2. Prevent adjustments of font size after orientation changes in iOS. */\\n\\t-moz-tab-size: 4; /* 3. Use a more readable tab size (opinionated). */\\n\\ttab-size: 4; /* 3 */\\n}\\n\\n/*\\nSections\\n========\\n*/\\n\\nbody {\\n\\tmargin: 0; /* Remove the margin in all browsers. */\\n}\\n\\n/*\\nGrouping content\\n================\\n*/\\n\\n/**\\n1. Add the correct height in Firefox.\\n2. Correct the inheritance of border color in Firefox. (https://bugzilla.mozilla.org/show_bug.cgi?id=190655)\\n*/\\n\\nhr {\\n\\theight: 0; /* 1 */\\n\\tcolor: inherit; /* 2 */\\n}\\n\\n/*\\nText-level semantics\\n====================\\n*/\\n\\n/**\\nAdd the correct text decoration in Chrome, Edge, and Safari.\\n*/\\n\\nabbr[title] {\\n\\ttext-decoration: underline dotted;\\n}\\n\\n/**\\nAdd the correct font weight in Edge and Safari.\\n*/\\n\\nb,\\nstrong {\\n\\tfont-weight: bolder;\\n}\\n\\n/**\\n1. Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3)\\n2. Correct the odd 'em' font sizing in all browsers.\\n*/\\n\\ncode,\\nkbd,\\nsamp,\\npre {\\n\\tfont-family:\\n\\t\\tui-monospace,\\n\\t\\tSFMono-Regular,\\n\\t\\tConsolas,\\n\\t\\t'Liberation Mono',\\n\\t\\tMenlo,\\n\\t\\tmonospace; /* 1 */\\n\\tfont-size: 1em; /* 2 */\\n}\\n\\n/**\\nAdd the correct font size in all browsers.\\n*/\\n\\nsmall {\\n\\tfont-size: 80%;\\n}\\n\\n/**\\nPrevent 'sub' and 'sup' elements from affecting the line height in all browsers.\\n*/\\n\\nsub,\\nsup {\\n\\tfont-size: 75%;\\n\\tline-height: 0;\\n\\tposition: relative;\\n\\tvertical-align: baseline;\\n}\\n\\nsub {\\n\\tbottom: -0.25em;\\n}\\n\\nsup {\\n\\ttop: -0.5em;\\n}\\n\\n/*\\nTabular data\\n============\\n*/\\n\\n/**\\n1. Remove text indentation from table contents in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=999088, https://bugs.webkit.org/show_bug.cgi?id=201297)\\n2. Correct table border color inheritance in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=935729, https://bugs.webkit.org/show_bug.cgi?id=195016)\\n*/\\n\\ntable {\\n\\ttext-indent: 0; /* 1 */\\n\\tborder-color: inherit; /* 2 */\\n}\\n\\n/*\\nForms\\n=====\\n*/\\n\\n/**\\n1. Change the font styles in all browsers.\\n2. Remove the margin in Firefox and Safari.\\n*/\\n\\nbutton,\\ninput,\\noptgroup,\\nselect,\\ntextarea {\\n\\tfont-family: inherit; /* 1 */\\n\\tfont-size: 100%; /* 1 */\\n\\tline-height: 1.15; /* 1 */\\n\\tmargin: 0; /* 2 */\\n}\\n\\n/**\\nRemove the inheritance of text transform in Edge and Firefox.\\n*/\\n\\nbutton,\\nselect {\\n\\ttext-transform: none;\\n}\\n\\n/**\\nCorrect the inability to style clickable types in iOS and Safari.\\n*/\\n\\nbutton,\\n[type='button'],\\n[type='reset'],\\n[type='submit'] {\\n\\t-webkit-appearance: button;\\n}\\n\\n/**\\nRemove the inner border and padding in Firefox.\\n*/\\n\\n::-moz-focus-inner {\\n\\tborder-style: none;\\n\\tpadding: 0;\\n}\\n\\n/**\\nRestore the focus styles unset by the previous rule.\\n*/\\n\\n:-moz-focusring {\\n\\toutline: 1px dotted ButtonText;\\n}\\n\\n/**\\nRemove the additional ':invalid' styles in Firefox.\\nSee: https://github.com/mozilla/gecko-dev/blob/2f9eacd9d3d995c937b4251a5557d95d494c9be1/layout/style/res/forms.css#L728-L737\\n*/\\n\\n:-moz-ui-invalid {\\n\\tbox-shadow: none;\\n}\\n\\n/**\\nRemove the padding so developers are not caught out when they zero out 'fieldset' elements in all browsers.\\n*/\\n\\nlegend {\\n\\tpadding: 0;\\n}\\n\\n/**\\nAdd the correct vertical alignment in Chrome and Firefox.\\n*/\\n\\nprogress {\\n\\tvertical-align: baseline;\\n}\\n\\n/**\\nCorrect the cursor style of increment and decrement buttons in Safari.\\n*/\\n\\n::-webkit-inner-spin-button,\\n::-webkit-outer-spin-button {\\n\\theight: auto;\\n}\\n\\n/**\\n1. Correct the odd appearance in Chrome and Safari.\\n2. Correct the outline style in Safari.\\n*/\\n\\n[type='search'] {\\n\\t-webkit-appearance: textfield; /* 1 */\\n\\toutline-offset: -2px; /* 2 */\\n}\\n\\n/**\\nRemove the inner padding in Chrome and Safari on macOS.\\n*/\\n\\n::-webkit-search-decoration {\\n\\t-webkit-appearance: none;\\n}\\n\\n/**\\n1. Correct the inability to style clickable types in iOS and Safari.\\n2. Change font properties to 'inherit' in Safari.\\n*/\\n\\n::-webkit-file-upload-button {\\n\\t-webkit-appearance: button; /* 1 */\\n\\tfont: inherit; /* 2 */\\n}\\n\\n/*\\nInteractive\\n===========\\n*/\\n\\n/*\\nAdd the correct display in Chrome and Safari.\\n*/\\n\\nsummary {\\n\\tdisplay: list-item;\\n}\\n\"},\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\",\"text\":\"-apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", \\\"Noto Sans\\\", sans-serif, Helvetica, Arial, \\\"Apple Color Emoji\\\", \\\"Segoe UI Emoji\\\"\"},\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\",\"text\":\"ui-monospace, \\\"SFMono-Regular\\\", \\\"SF Mono\\\", Menlo, Consolas, \\\"Liberation Mono\\\", monospace\"},\"$:/t lk (1 piece)              |     1 cp | --- |\n| |Chest                        |     5 gp | 25 lb. |\n| |Climber's kit                |    25 gp | 12 lb. |\n| |Clothes, common              |     5 sp | 3 lb. |\n| |Clothes, costume             |     5 gp | 4 lb. |\n| |Clothes, fine                |    15 gp | 6 lb. |\n| |Clothes, traveler's          |     2 gp | 4 lb. |\n| |Component pouch              |    25 gp | 2 lb. |\n| |Crowbar                      |     2 gp | 5 lb. |\n| |Fishing tackle               |     1 gp | 4 lb. |\n| |Flask or tankard             |     2 cp | 1 lb. |\n| |Grappling hook               |     2 gp | 4 lb. |\n| |Hammer                       |     1 gp | 3 lb. |\n| |Hammer, sledge               |     2 gp | 10 lb. |\n| |Healer's kit                 |     5 gp | 3 lb. |\n| |Holy water (flask)           |    25 gp | 1 lb. |\n| |Hourglass                    |    25 gp | 1 lb. |\n| |Hunting trap                 |     5 gp | 25 lb. |\n| |Ink (1 ounce bottle)         |    10 gp | --- |\n| |Ink pen                      |     2 cp | --- |\n| |Jug or pitcher               |     2 cp | 4 lb. |\n| |Ladder (10 foot)             |     1 sp | 25 lb. |\n| |Lamp                         |     5 gp | 1 lb. |\n| |Lantern, bullseye            |    10 gp | 2 lb. |\n| |Lantern, hooded              |     5 gp | 2 lb. |\n| |Lock                         |    10 gp | 1 lb. |\n| |Magnifying glass             |   100 gp | --- |\n| |Manacles                     |     2 gp | 6 lb. |\n| |Mess kit                     |     2 sp | 1 lb. |\n| |Mirror, steel                |     5 gp | 1/2 lb. |\n| |Oil (flask)                  |     1 sp | 1 lb. |\n| |Paper (one sheet)            |     2 sp | --- |\n| |Parchment (one sheet)        |     1 sp | --- |\n| |Perfume (vial)               |     5 gp | --- |\n| |Pick, miner's                |     2 gp | 10 lb. |\n| |Piton                        |     5 cp | 1/4 lb. |\n| |Poison, basic (vial)         |   100 gp | --- |\n| |Pole (10-foot)               |     5 cp | 7 lb. |\n| |Pot, iron                    |     2 gp | 10 lb. |\n| |Potion of healing            |    50 gp | 1/2 lb. |\n| |Pouch                        |     5 sp | 1 lb. |\n| |Quiver                       |     1 gp | 1 lb. |\n| |Ram, portable                |     4 gp | 35 lb. |\n| |Rations (1 day)              |     5 sp | 2 lb. |\n| |Robes                        |     1 gp | 4 lb. |\n| |Rope, hempen (50 feet)       |     1 gp | 10 lb. |\n| |Rope, silk (50 feet)         |    10 gp | 5 lb. |\n| |Sack                         |     1 cp | 1/2 lb. |\n| |Scale, merchant's            |     5 gp | 3 lb. |\n| |Sealing wax                  |     5 sp | --- |\n| |Shovel                       |     2 gp | 5 lb. |\n| |Signal whistle               |     5 cp | --- |\n| |Signet ring                  |     5 gp | --- |\n| |Soap                         |     2 cp | --- |\n| |Spellbook                    |    50 gp | 3 lb. |\n| |Spikes, iron (10)            |     1 gp | 5 lb. |\n| |Spyglass                     | 1,000 gp | 1 lb. |\n| |Tent, two-person             |     2 gp | 20 lb. |\n| |Tinderbox                    |     5 sp | 1 lb. |\n| |Torch                        |     1 cp | 1 lb. |\n| |Vial                         |     1 gp | --- |\n| |Waterskin                    |     2 sp | 5 lb. (full) |\n| |Whetstone                    |     1 cp | 1 lb. |\n\n//''Acid.''// As an action, you can splash the contents of this vial onto a creature within 5 feet of you or throw the vial up to 20 feet, shattering it on impact. In either case, make a ranged attack against a creature or object, treating the acid as an improvised weapon. On a hit, the target takes 2d6 acid damage.\n\n//''Alchemist’s Fire.''// This sticky, adhesive fluid ignites when exposed to air. As an action, you can throw this flask up to 20 feet, shattering it on impact. Make a ranged attack against a creature or object, treating the alchemist’s fire as an improvised weapon. On a hit, the target takes 1d4 fire damage at the start of each of its turns. A creature can end this damage by using its action to make a DC 10 Dexterity check to extinguish the flames.\n\n//''Antitoxin.''// A creature that drinks this vial of liquid gains advantage on saving throws against poison for 1 hour. It confers no benefit to undead or constructs.\n\n//''Arcane Focus.''// An arcane focus is a special item — an orb, a crystal, a rod, a specially constructed staff, a wand-like length of wood, or some similar item — designed to channel the power of arcane spells. A sorcerer, warlock, or wizard can use such an item as a spellcasting focus.\n\n//''Ball Bearings.''// As an action, you can spill these tiny metal balls from their pouch to cover a level, square area that is 10 feet on a side. A creature moving across the covered area must succeed on a DC 10 Dexterity saving throw or fall prone. A creature moving through the area at half speed doesn’t need to make the save.\n\n//''Block and Tackle.''// A set of pulleys with a cable threaded through them and a hook to attach to objects, a block and tackle allows you to hoist up to four times the weight you can normally lift.\n\n//''Book.''// A book might contain poetry, historical accounts, information pertaining to a particular field of lore, diagrams and notes on gnomish contraptions, or just about anything else that can be represented using text or pictures. A book of spells is a ''spellbook''.\n\n//''Caltrops.''// As an action, you can spread a bag of caltrops to cover a square area that is 5 feet on a side. Any creature that enters the area must succeed on a DC 15 Dexterity saving throw or stop moving this turn and take 1 piercing damage. Taking this damage reduces the creature’s walking speed by 10 feet until the creature regains at least 1 hit point. A creature moving through the area at half speed doesn’t need to make the save.\n\n//''Candle.''// For 1 hour, a candle sheds bright light in a 5-foot radius and dim light for an additional 5 feet.\n\n//''Case, Crossbow Bolt.''// This wooden case can hold up to twenty crossbow bolts.\n\n//''Case, Map or Scroll.''// This cylindrical leather case can hold up to ten rolled-up sheets of paper or five rolled-up sheets of parchment.\n\n//''Chain.''// A chain has 10 hit points. It can be burst with a successful DC 20 Strength check.\n\n//''Climber’s Kit.''// A climber’s kit includes special pitons, boot tips, gloves, and a harness. You can use the climber’s kit as an action to anchor yourself; when you do, you can’t fall more than 25 feet from the point where you anchored yourself, and you can’t climb more than 25 feet away from that point without undoing the anchor.\n\n//''Component Pouch.''// A component pouch is a small, watertight leather belt pouch that has compartments to hold all the material components and other special items you need to cast your spells, except for those components that have a specific cost (as indicated in a spell’s description).\n\n//''Crowbar.''// Using a crowbar grants advantage to Strength checks where the crowbar’s leverage can be applied.\n\n//''Druidic Focus.''// A druidic focus might be a sprig of mistletoe or holly, a wand or scepter made of yew or another special wood, a staff drawn whole out of a living tree, or a totem object incorporating feathers, fur, bones, and teeth from sacred animals. A druid can use such an object as a spellcasting focus.\n\n//''Fishing Tackle.''// This kit includes a wooden rod, silken line, corkwood bobbers, steel hooks, lead sinkers, velvet lures, and narrow netting.\n\n//''Healer’s Kit.''// This kit is a leather pouch containing bandages, salves, and splints. The kit has ten uses. As an action, you can expend one use of the kit to stabilize a creature that has 0 hit points, without needing to make a Wisdom (Medicine) check.\n\n//''Holy Symbol.''// A holy symbol is a representation of a god or pantheon. It might be an amulet depicting a symbol representing a deity, the same symbol carefully engraved or inlaid as an emblem on a shield, or a tiny box holding a fragment of a sacred relic. A cleric or paladin can use a holy symbol as a spellcasting focus. To use the symbol in this way, the caster must hold it in hand, wear it visibly, or bear it on a shield.\n\n//''Holy Water.''// As an action, you can splash the contents of this flask onto a creature within 5 feet of you or throw it up to 20 feet, shattering it on impact. In either case, make a ranged attack against a target creature, treating the holy water as an improvised weapon. If the target is a fiend or undead, it takes 2d6 radiant damage.\n\nA cleric or paladin may create holy water by performing a special ritual. The ritual takes 1 hour to perform, uses 25 gp worth of powdered silver, and requires the caster to expend a 1st-level spell slot.\n\n//''Hunting Trap.''// When you use your action to set it, this trap forms a saw-toothed steel ring that snaps shut when a creature steps on a pressure plate in the center. The trap is affixed by a heavy chain to an immobile object, such as a tree or a spike driven into the ground. A creature that steps on the plate must succeed on a DC 13 Dexterity saving throw or take 1d4 piercing damage and stop moving. Thereafter, until the creature breaks free of the trap, its movement is limited by the length of the chain (typically 3 feet long). A creature can use its action to make a DC 13 Strength check, freeing itself or another creature within its reach on a success. Each failed check deals 1 piercing damage to the trapped creature.\n\n//''Lamp.''// A lamp casts bright light in a 15-foot radius and dim light for an additional 30 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil.\n\n//''Lantern, Bullseye.''// A bullseye lantern casts bright light in a 60-foot cone and dim light for an additional 60 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil.\n\n//''Lantern, Hooded.''// A hooded lantern casts bright light in a 30-foot radius and dim light for an additional 30 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil. As an action, you can lower the hood, reducing the light to dim light in a 5-foot radius.\n\n//''Lock.''// A key is provided with the lock. Without the key, a creature proficient with thieves’ tools can pick this lock with a successful DC 15 Dexterity check. Your DM may decide that better locks are available for higher prices.\n\n//''Magnifying Glass.''// This lens allows a closer look at small objects. It is also useful as a substitute for flint and steel when starting fires. Lighting a fire with a magnifying glass requires light as bright as sunlight to focus, tinder to ignite, and about 5 minutes for the fire to ignite. A magnifying glass grants advantage on any ability check made to appraise or inspect an item that is small or highly detailed.\n\n//''Manacles.''// These metal restraints can bind a Small or Medium creature. Escaping the manacles requires a successful DC 20 Dexterity check. Breaking them requires a successful DC 20 Strength check. Each set of manacles comes with one key. Without the key, a creature proficient with thieves’ tools can pick the manacles’ lock with a successful DC 15 Dexterity check. Manacles have 15 hit points.\n\n//''Mess Kit.''// This tin box contains a cup and simple cutlery. The box clamps together, and one side can be used as a cooking pan and the other as a plate or shallow bowl.\n\n//''Oil.''// Oil usually comes in a clay flask that holds 1 pint. As an action, you can splash the oil in this flask onto a creature within 5 feet of you or throw it up to 20 feet, shattering it on impact. Make a ranged attack against a target creature or object, treating the oil as an improvised weapon. On a hit, the target is covered in oil. If the target takes any fire damage before the oil dries (after 1 minute), the target takes an additional 5 fire damage from the burning oil. You can also pour a flask of oil on the ground to cover a 5-foot-square area, provided that the surface is level. If lit, the oil burns for 2 rounds and deals 5 fire damage to any creature that enters the area or ends its turn in the area. A creature can take this damage only once per turn.\n\n//''Poison, Basic.''// You can use the poison in this vial to coat one slashing or piercing weapon or up to three pieces of ammunition. Applying the poison takes an action. A creature hit by the poisoned weapon or ammunition must succeed on a DC 10 Constitution saving throw or take 1d4 poison damage. Once applied, the poison retains potency for 1 minute before drying.\n\n//''Potion of Healing.''// A character who drinks the magical red fluid in this vial regains 2d4 + 2 hit points. Drinking or administering a potion takes an action.\n\n//''Pouch.''// A cloth or leather pouch can hold up to 20 sling bullets or 50 blowgun needles, among other things. A compartmentalized pouch for holding spell components is called a component pouch (described earlier in this section).\n\n//''Quiver.''// A quiver can hold up to 20 arrows.\n\n//''Ram, Portable.''// You can use a portable ram to break down doors. When doing so, you gain a +4 bonus on the Strength check. One other character can help you use the ram, giving you advantage on this check.\n\n//''Rations.''// Rations consist of dry foods suitable for extended travel, including jerky, dried fruit, hardtack, and nuts.\n\n//''Rope.''// Rope, whether made of hemp or silk, has 2 hit points and can be burst with a DC 17 Strength check.\n\n//''Scale, Merchant’s.''// A scale includes a small balance, pans, and a suitable assortment of weights up to 2 pounds. With it, you can measure the exact weight of small objects, such as raw precious metals or trade goods, to help determine their worth.\n\n//''Spellbook.''// Essential for wizards, a spellbook is a leather-bound tome with 100 blank vellum pages suitable for recording spells.\n\n//''Spyglass.''// Objects viewed through a spyglass are magnified to twice their size.\n\n//''Tent.''// A simple and portable canvas shelter, a tent sleeps two.\n\n//''Tinderbox.''// This small container holds flint, fire steel, and tinder (usually dry cloth soaked in light oil) used to kindle a fire. Using it to light a torch — or anything else with abundant, exposed fuel — takes an action. Lighting any other fire takes 1 minute.\n\n//''Torch.''// A torch burns for 1 hour, providing bright light in a 20-foot radius and dim light for an additional 20 feet. If you make a melee attack with a burning torch and hit, it deals 1 fire damage.\n\n!!! Container Capacity\n\n|noborder alternate|k\n|!Container |!Capacity |\n|Backpack* |1 cubic foot/30 pounds of gear |\n|Barrel |40 gallons liquid, 4 cubic feet solid |\n|Basket |2 cubic feet/40 pounds of gear |\n|Bottle |1 1/2 pints liquid |\n|Bucket |3 gallons liquid, 1/2 cubic food solid |\n|Chest |12 cubic feet/300 pounds gear |\n|Flask or tankard |1 pint liquid |\n|Jug or pitcher |1 gallon liquid |\n|Pot, iron |1 gallon liquid |\n|Pouch |1/5 cubic foot/6 pounds of gear |\n|Sack |1 cubic foot/30 pounds of gear |\n|Vial |4 ounces liquid |\n|Waterskin |4 pints liquid |\n\n\u003C$text text=\"*\" />You can also strap items, such as a bedroll or a coil of rope, to the outside of a backpack.\n\n!! Equipment Packs\n\nThe starting equipment you get from your class includes a collection of useful adventuring gear, put together in a pack. The contents of these packs are listed here. If you are buying your starting equipment, you can purchase a pack for the price shown, which might be cheaper than buying the items individually.\n\n//''Burglar’s Pack (16 gp).''// Includes a backpack, a bag of 1,000 ball bearings, 10 feet of string, a bell, 5 candles, a crowbar, a hammer, 10 pitons, a hooded lantern, 2 flasks of oil, 5 days rations, a tinderbox, and a waterskin. The pack also has 50 feet of hempen rope strapped to the side of it.\n\n//''Diplomat’s Pack (39 gp).''// Includes a chest, 2 cases for maps and scrolls, a set of fine clothes, a bottle of ink, an ink pen, a lamp, 2 flasks of oil, 5 sheets of paper, a vial of perfume, sealing wax, and soap.\n\n//''Dungeoneer’s Pack (12 gp).''// Includes a backpack, a crowbar, a hammer, 10 pitons, 10 torches, a tinderbox, 10 days of rations, and a waterskin. The pack also has 50 feet of hempen rope strapped to the side of it.\n\n//''Entertainer’s Pack (40 gp).''// Includes a backpack, a bedroll, 2 costumes, 5 candles, 5 days of rations, a waterskin, and a disguise kit.\n\n//''Explorer’s Pack (10 gp).''// Includes a backpack, a bedroll, a mess kit, a tinderbox, 10 torches, 10 days of rations, and a waterskin. The pack also has 50 feet of hempen rope strapped to the side of it.\n\n//''Priest’s Pack (19 gp).''// Includes a backpack, a blanket, 10 candles, a tinderbox, an alms box, 2 blocks of incense, a censer, vestments, 2 days of rations, and a waterskin.\n\n//''Scholar’s Pack (40 gp).''// Includes a backpack, a book of lore, a bottle of ink, an ink pen, 10 sheets of parchment, a little bag of sand, and a small knife.","tags":"[[Player's Handbook]] Equipment","title":"Adventuring Gear","modified":"20260708173309941"},
{"created":"20260709150305591","text":"//Some rogues enhance their fine-honed skills of stealth and agility with magic, learning tricks of enchantment and illusion. These rogues include pickpockets and burglars, but also pranksters, mischief-makers, and a significant number of adventurers.//\n\n!! Spellcasting\n\nWhen you reach 3rd level, you gain the ability to cast spells.\n\n|noborder alternate|k\n|!Rogue Level|!Cantrips Known|!Spells Known|!Spell Slots Per Level|\u003C|\u003C|\u003C|\n|~|~|~|!1st|!2nd|!3rd|!4th|\n|  3rd | 3 | 3  | 2 | --- | --- | --- |\n|  4th | 3 | 4  | 3 | --- | --- | --- |\n|  5th | 3 | 4  | 3 | --- | --- | --- |\n|  6th | 3 | 4  | 3 | --- | --- | --- |\n|  7th | 3 | 5  | 4 |  2  | --- | --- |\n|  8th | 3 | 6  | 4 |  2  | --- | --- |\n|  9th | 3 | 6  | 4 |  2  | --- | --- |\n| 10th | 4 | 7  | 4 |  3  | --- | --- |\n| 11th | 4 | 8  | 4 |  3  | --- | --- |\n| 12th | 4 | 8  | 4 |  3  | --- | --- |\n| 13th | 4 | 9  | 4 |  3  |  2  | --- |\n| 14th | 4 | 10 | 4 |  3  |  2  | --- |\n| 15th | 4 | 10 | 4 |  3  |  2  | --- |\n| 16th | 4 | 11 | 4 |  3  |  3  | --- |\n| 17th | 4 | 11 | 4 |  3  |  3  | --- |\n| 18th | 4 | 11 | 4 |  3  |  3  | --- |\n| 19th | 4 | 12 | 4 |  3  |  3  |  1  |\n| 20th | 4 | 13 | 4 |  3  |  3  |  1  |\n\n''//Cantrips.//'' You learn three cantrips: [[Mage Hand]] and two other cantrips of your choice from the wizard spell list. You learn another wizard cantrip of your choice at 10th level.\n\n//''Spell Slots.''// The Arcane Trickster Spellcasting table shows how many spell slots you have to cast your wizard spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nFor example, if you know the 1st-level spell [[Charm Person]] and have a 1st-level and a 2nd-level spell slot available, you can cast [[Charm Person]] using either slot.\n\n//''Spells Known of 1st-Level and Higher.''// You know three 1st-level wizard spells of your choice, two of which you must choose from the enchantment and illusion spells on the wizard spell list.\n\nThe Spells Known column of the Arcane Trickster Spellcasting table shows when you learn more wizard spells of 1st level or higher. Each of these spells must be an enchantment or illusion spell of your choice, and must be of a level for which you have spell slots. For instance, when you reach 7th level in this class, you can learn one new spell of 1st or 2nd level.\n\nThe spells you learn at 8th, 14th, and 20th level can come from any school of magic.\n\nWhenever you gain a level in this class, you can replace one of the wizard spells you know with another spell of your choice from the wizard spell list. The new spell must be of a level for which you have spell slots, and it must be an enchantment or illusion spell, unless you’re replacing the spell you gained at 3rd, 8th, 14th, or 20th level from any school of magic.\n\n//''Spellcasting Ability.''// Intelligence is your spellcasting ability for your wizard spells, since you learn your spells through dedicated study and memorization. You use your Intelligence whenever a spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for a wizard spell you cast and when making an attack roll with one.\n\n''Spell save DC'' = 8 + your proficiency bonus + your Intelligence modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Intelligence modifier\n\n!! Mage Hand Legerdemain\n\nStarting at 3rd level, when you cast [[Mage Hand]], you can make the spectral hand invisible, and you can perform the following additional tasks with it:\n\n* You can stow one object the hand is holding in a container worn or carried by another creature.\n* You can retrieve an object in a container worn or carried by another creature.\n* You can use thieves’ tools to pick locks and disarm traps at range.\n\nYou can perform one of these tasks without being noticed by a creature if you succeed on a Dexterity (Sleight of Hand) check contested by the creature’s Wisdom (Perception) check.\n\nIn addition, you can use the bonus action granted by your Cunning Action to control the hand.\n\n!! Magical Ambush\n\nStarting at 9th level, if you are hidden from a creature when you cast a spell on it, the creature has disadvantage on any saving throw it makes against the spell this turn.\n\n!! Versatile Trickster\n\nAt 13th level, you gain the ability to distract targets with your [[Mage Hand]]. As a bonus action on your turn, you can designate a creature within 5 feet of the spectral hand created by the spell. Doing so gives you advantage on attack rolls against that creature until the end of the turn.\n\n!! Spell Thief\n\nAt 17th level, you gain the ability to magically steal the knowledge of how to cast a spell from another spellcaster.\n\nImmediately after a creature casts a spell that targets you or includes you in its area of effect, you can use your reaction to force the creature to make a saving throw with its spellcasting ability modifier. The DC equals your spell save DC. On a failed save, you negate the spell’s effect against you, and you steal the knowledge of the spell if it is at least 1st level and of a level you can cast (it doesn’t need to be a wizard spell). For the next 8 hours, you know the spell and can cast it using your spell slots. The creature can’t cast that spell until the 8 hours have passed.\n\nOnce you use this feature, you can’t use it again until you finish a long rest.","tags":"Subclasses Rogue [[Player's Handbook]]","title":"Arcane Trickster","modified":"20260709150959832"},
{"created":"20260707181609258","text":"''Armor Proficiency.'' Anyone can put on a suit of armor or strap a shield to an arm. Only those proficient in the armor’s use know how to wear it effectively, however. Your class gives you proficiency with certain types of armor. If you wear armor that you lack proficiency with, you have disadvantage on any ability check, saving throw, or attack roll that involves Strength or Dexterity, and you can’t cast spells.\n\n''Armor Class (AC).'' Armor protects its wearer from attacks. The armor (and shield) you wear determines your base Armor Class.\n\n''Heavy Armor.'' Heavier armor interferes with the wearer’s ability to move quickly, stealthily, and freely. If the Armor table shows \"Str 13\" or \"Str 15\" in the Strength column for an armor type, the armor reduces the wearer’s speed by 10 feet unless the wearer has a Strength score equal to or higher than the listed score.\n\n''Stealth.'' If the Armor table shows \"Disadvantage\" in the Stealth column, the wearer has disadvantage on Dexterity (Stealth) checks.\n\n''Shields.'' A shield is made from wood or metal and is carried in one hand. Wielding a shield increases your Armor Class by 2. You can benefit from only one shield at a time.\n\n|noborder alternate|k\n|!Armor Name     |\u003C|  !Cost   |!Armor Class (AC)         | !Strength |!Stealth     | !Weight |\n|//Light Armor// |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Padded          |   5 gp   |11 + Dex modifier         |    ---    |Disadvantage |  8 lb.  |\n| |Leather         |  10 gp   |11 + Dex modifier         |    ---    |---          | 10 lb.  |\n| |Studded Leather |  45 gp   |12 + Dex modifier         |    ---    |---          | 13 lb.  |\n|//Medium Armor// |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Hide            |  10 gp   |12 + Dex modifier (max 2) |    ---    |---          | 12 lb.  |\n| |Chain shirt     |  50 gp   |13 + Dex modifier (max 2) |    ---    |---          | 20 lb.  |\n| |Scale mail      |  50 gp   |14 + Dex modifier (max 2) |    ---    |Disadvantage | 45 lb.  |\n| |Breastplate     |  400 gp  |14 + Dex modifier (max 2) |    ---    |---          | 25 lb.  |\n| |Half plate      |  750 gp  |15 + Dex modifier (max 2) |    ---    |Disadvantage | 40 lb.  |\n|//Heavy Armor// |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Ring mail       |  30 gp   |14                        |    ---    |Disadvantage | 40 lb.  |\n| |Chain mail      |  75 gp   |16                        |   Str 13  |Disadvantage | 55 lb.  |\n| |Splint          |  200 gp  |17                        |   Str 13  |Disadvantage | 60 lb.  |\n| |Plate           | 1,500 gp |18                        |   Str 15  |Disadvantage | 65 lb.  |\n|//Shield// |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n| |Shield          |  10 gp   |+2                        |    ---    |---          |  6 lb.  |\n\n!!! Light Armor\n\nMade from supple and thin materials, light armor favors agile adventurers since it offers some protection without sacrificing mobility. If you wear light armor, you add your Dexterity modifier to the base number from your armor type to determine your Armor Class.\n\n//''Padded.''// Padded armor consists of quilted layers of cloth and batting.\n\n//''Leather.''// The breastplate and shoulder protectors of this armor are made of leather that has been stiffened by being boiled in oil. The rest of the armor is made of softer and more flexible materials.\n\n//''Studded Leather.''// Made from tough but flexible leather, studded leather is reinforced with close-set rivets or spikes.\n\n!!! Medium Armor\n\nMedium armor offers more protection than light armor, but it also impairs movement more. If you wear medium armor, you add your Dexterity modifier, to a maximum of +2, to the base number from your armor type to determine your Armor Class.\n\n//''Hide.''// This crude armor consists of thick furs and pelts.\n\n//''Chain Shirt.''// Made of interlocking metal rings, a chain shirt is worn between layers of clothing or leather. This armor offers modest protection to the wearer’s upper body and allows the sound of the rings rubbing against one another to be muffled by outer layers.\n\n//''Scale Mail.''// This armor consists of a coat and leggings (and perhaps a separate skirt) of leather covered with overlapping pieces of metal, much like the scales of a fish. The suit includes gauntlets.\n\n//''Breastplate.''// This armor consists of a fitted metal chest piece worn with supple leather. Although it leaves the legs and arms relatively unprotected, this armor provides good protection for the wearer’s vital organs while leaving the wearer relatively unencumbered.\n\n//''Half Plate.''// Half plate consists of shaped metal plates that cover most of the wearer’s body. It does not include leg protection beyond simple greaves that are attached with leather straps.\n\n!!! Heavy Armor\n\nOf all the armor categories, heavy armor offers the best protection. These suits of armor cover the entire body and are designed to stop a wide range of attacks. Only proficient warriors can manage their weight and bulk.\n\nHeavy armor doesn’t let you add your Dexterity modifier to your Armor Class, but it also doesn’t penalize you if your Dexterity modifier is negative.\n\n//''Ring Mail.''// This armor is leather armor with heavy rings sewn into it. The rings help reinforce the armor against blows from swords and axes. Ring mail is inferior to chain mail, and it’s usually worn only by those who can’t afford better armor.\n\n//''Chain Mail.''// Made of interlocking metal rings, chain mail includes a layer of quilted fabric worn underneath the mail to prevent chafing and to cushion the impact of blows. The suit includes gauntlets.\n\n//''Splint.''// This armor is made of narrow vertical strips of metal riveted to a backing of leather that is worn over cloth padding. Flexible chain mail protects the joints.\n\n//''Plate.''// Plate consists of shaped, interlocking metal plates to cover the entire body. A suit of plate includes gauntlets, heavy leather boots, a visored helmet, and thick layers of padding underneath the armor. Buckles and straps distribute the weight over the body.\n\n!! Getting Into and Out of Armor\n\nThe time it takes to don or doff a type of armor or a shield is shown in the Donning and Doffing Armor table.\n\n//''Don.''// This is the time it takes to put on the item. You benefit from its AC only if you take the full time to don it.\n\n//''Doff.''// This is the time it takes to take off the item. If you have help removing armor, reduce this time by half.\n\n!!! Donning and Doffing Armor\n\n|noborder alternate|k\n|!Category    |!Don       |!Doff     |\n|Light Armor  |1 minute   |1 minute  |\n|Medium Armor |5 minutes  |1 minute  |\n|Heavy Armor  |10 minutes |5 minutes |\n|Shield       |1 action   |1 action  |","tags":"Equipment [[Player's Handbook]]","title":"Armor and Shields","modified":"20260707183448098"},
{"created":"20260709150153612","text":"//You focus your training on the grim art of death. Those who adhere to this archetype are diverse: hired killers, spies, bounty hunters, and even specially anointed priests trained to exterminate the enemies of their deity. Stealth, poison, and disguise help you eliminate your foes with deadly efficiency.//\n\n!! Bonus Proficiencies\n\nWhen you choose this archetype at 3rd level, you gain proficiency with the disguise kit and the poisoner’s kit.\n\n!! Assassinate\n\nStarting at 3rd level, you are at your deadliest when you get the drop on your enemies. You have advantage on attack rolls against any creature that hasn’t taken a turn in the combat yet. In addition, any hit you score against a creature that is surprised is a critical hit.\n\n!! Infiltration Expertise\n\nStarting at 9th level, you can unfailingly create false identities for yourself. You must spend seven days and 25 gp to establish the history, profession, and affiliations for an identity. You can’t establish an identity that belongs to someone else. For example, you might acquire appropriate clothing, letters of introduction, and official-looking certification to establish yourself as a member of a trading house from a remote city so you can insinuate yourself into the company of other wealthy merchants.\n\nThereafter, if you adopt the new identity as a disguise, other creatures believe you to be that person until given an obvious reason not to.\n\n!! Impostor\n\nAt 13th level, you gain the ability to unerringly mimic another person’s speech, writing, and behavior. You must spend at least three hours studying these three components of the person’s behavior, listening to speech, examining handwriting, and observing mannerisms.\n\nYour ruse is indiscernible to the casual observer. If a wary creature suspects something is amiss, you have advantage on any Charisma (Deception) check you make to avoid detection.\n\n!! Death Strike\n\nStarting at 17th level, you become a master of instant death. When you attack and hit a creature that is surprised, it must make a Constitution saving throw (DC 8 + your Dexterity modifier + your proficiency bonus). On a failed save, double the damage of your attack against the creature.","tags":"Subclasses Rogue [[Player's Handbook]]","title":"Assassin","modified":"20260709150237659"},
{"created":"20260706163603438","text":"//For some, their rage springs from a communion with fierce animal spirits. Others draw from a roiling reservoir of anger at a world full of pain. For every barbarian, rage is a power that fuels not just a battle frenzy but also uncanny reflexes, resilience, and feats of strength.//\n\n|noborder alternate|k\n|!Level| !PB |!Features                     |!Rages| !Rage Damage |\n| 1st  | +2  |Rage, Unarmored Defense       |  2   | +2 |\n| 2nd  | +2  |Reckless Attack, Danger Sense |  2   | +2 |\n| 3rd  | +2  |Primal Path                   |  3   | +2 |\n| 4th  | +2  |Ability Score Improvement     |  3   | +2 |\n| 5th  | +3  |Extra Attack, Fast Movement   |  3   | +2 |\n| 6th  | +3  |Path Feature                  |  4   | +2 |\n| 7th  | +3  |Feral Instinct                |  4   | +2 |\n| 8th  | +3  |Ability Score Improvement     |  4   | +2 |\n| 9th  | +4  |Brutal Critical (1 die)       |  4   | +3 |\n| 10th | +4  |Path Feature                  |  4   | +3 |\n| 11th | +4  |Relentless Rage               |  4   | +3 |\n| 12th | +4  |Ability Score Improvement     |  5   | +3 |\n| 13th | +5  |Brutal Critical (2 dice)      |  5   | +3 |\n| 14th | +5  |Path Feature                  |  5   | +3 |\n| 15th | +5  |Persistent Rage               |  5   | +3 |\n| 16th | +5  |Ability Score Improvement     |  5   | +4 |\n| 17th | +6  |Brutal Critical (3 dice)      |  6   | +4 |\n| 18th | +6  |Indomitable Might             |  6   | +4 |\n| 19th | +6  |Ability Score Improvement     |  6   | +4 |\n| 20th | +6  |Primal Champion               |Unlimited| +4 |\n\n! Class Features\n\nAs a barbarian, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d12 per barbarian level\n\n''Hit Points at 1st Level:'' 12 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d12 (or 7) + your Constitution modifier per barbarian level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields\n\n''Weapons:'' Simple weapons, martial weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Strength, Constitution\n\n''Skills:'' Choose two from Animal Handling, Athletics, Intimidation, Nature, Perception, and Survival\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[greataxe|Weapons]] or (//b//) any [[martial melee weapon|Weapons]]\n* (//a//) two [[handaxes|Weapons]] or (//b//) any [[simple weapon|Weapons]]\n* An [[explorer’s pack|Adventuring Gear]] and four [[javelins|Weapons]]\n\n!! Rage\n\nIn battle, you fight with primal ferocity. On your turn, you can enter a rage as a bonus action.\n\nWhile raging, you gain the following benefits if you aren’t wearing heavy armor:\n\n* You have advantage on Strength checks and Strength saving throws.\n* When you make a melee weapon attack using Strength, you gain a bonus to the damage roll that increases as you gain levels as a barbarian, as shown in the Rage Damage column of the Barbarian table.\n* You have resistance to bludgeoning, piercing, and slashing damage.\n\nIf you are able to cast spells, you can’t cast them or concentrate on them while raging.\n\nYour rage lasts for 1 minute. It ends early if you are knocked unconscious or if your turn ends and you haven’t attacked a hostile creature since your last turn or taken damage since then. You can also end your rage on your turn as a bonus action.\n\nOnce you have raged the number of times shown for your barbarian level in the Rages column of the Barbarian table, you must finish a long rest before you can rage again.\n\n!! Unarmored Defense\n\nWhile you are not wearing any armor, your Armor Class equals 10 + your Dexterity modifier + your Constitution modifier. You can use a shield and still gain this benefit.\n\n!! Reckless Attack\n\nStarting at 2nd level, you can throw aside all concern for defense to attack with fierce desperation. When you make your first attack on your turn, you can decide to attack recklessly. Doing so gives you advantage on melee weapon attack rolls using Strength during this turn, but attack rolls against you have advantage until your next turn.\n\n!! Danger Sense\n\nAt 2nd level, you gain an uncanny sense of when things nearby aren’t as they should be, giving you an edge when you dodge away from danger.\n\nYou have advantage on Dexterity saving throws against effects that you can see, such as traps and spells. To gain this benefit, you can’t be blinded, deafened, or incapacitated.\n\n!! Primal Path\n\nAt 3rd level, you choose a path that shapes the nature of your rage. Your choice grants you features at 3rd level and again at 6th, 10th, and 14th levels.\n\n* [[Path of the Berserker]]{{$:/PHB}}\n* [[Path of the Totem Warrior]]{{$:/PHB}}\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Extra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Fast Movement\n\nStarting at 5th level, your speed increases by 10 feet while you aren’t wearing heavy armor.\n\n!! Feral Instinct\n\nBy 7th level, your instincts are so honed that you have advantage on initiative rolls.\n\nAdditionally, if you are surprised at the beginning of combat and aren’t incapacitated, you can act normally on your first turn, but only if you enter your rage before doing anything else on that turn.\n\n!! Brutal Critical\n\nBeginning at 9th level, you can roll one additional weapon damage die when determining the extra damage for a critical hit with a melee attack.\n\nThis increases to two additional dice at 13th level and three additional dice at 17th level.\n\n!! Relentless Rage\n\nStarting at 11th level, your rage can keep you fighting despite grievous wounds. If you drop to 0 hit points while you’re raging and don’t die outright, you can make a DC 10 Constitution saving throw. If you succeed, you drop to 1 hit point instead.\n\nEach time you use this feature after the first, the DC increases by 5. When you finish a short or long rest, the DC resets to 10.\n\n!! Persistent Rage\n\nBeginning at 15th level, your rage is so fierce that it ends early only if you fall unconscious or if you choose to end it.\n\n!! Indomitable Might\n\nBeginning at 18th level, if your total for a Strength check is less than your Strength score, you can use that score in place of the total.\n\n!! Primal Champion\n\nAt 20th level, you embody the power of the wilds. Your Strength and Constitution scores increase by 4. Your maximum for those scores is now 24.","tags":"Classes [[Player's Handbook]]","title":"Barbarian","modified":"20260708075708780"},
{"created":"20260506145849119","text":"//Whether scholar, skald, or scoundrel, a bard weaves magic through words and music to inspire allies, demoralize foes, manipulate minds, create illusions, and even heal wounds.//\n\n|noborder alternate|k\n| !Level | !PB |!Features | !Cantrips Known | !Spells Known | !Spell Slots per Spell Level |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|!6th|!7th|!8th|!9th|\n|  1st | +2 |Spellcasting, Bardic Inspiration (d6)                | 2 |  4 | 2 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |Jack of All Trades, Song of Rest (d6)                | 2 |  5 | 3 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  3rd | +2 |Bard College, Expertise                              | 2 |  6 | 4 |  2  | --- | --- | --- | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement                            | 3 |  7 | 4 |  3  | --- | --- | --- | --- | --- | --- | --- |\n|  5th | +3 |Bardic Inspiration (d8), Font of Inspiration         | 3 |  8 | 4 |  3  |  2  | --- | --- | --- | --- | --- | --- |\n|  6th | +3 |Countercharm, Bard College Feature                   | 3 |  9 | 4 |  3  |  3  | --- | --- | --- | --- | --- | --- |\n|  7th | +3 |---                                                  | 3 | 10 | 4 |  3  |  3  |  1  | --- | --- | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement                            | 3 | 11 | 4 |  3  |  3  |  2  | --- | --- | --- | --- | --- |\n|  9th | +4 |Song of Rest (d8)                                    | 3 | 12 | 4 |  3  |  3  |  3  |  1  | --- | --- | --- | --- |\n| 10th | +4 |Bardic Inspiration (d10), Expertise, Magical Secrets | 4 | 14 | 4 |  3  |  3  |  3  |  2  | --- | --- | --- | --- |\n| 11th | +4 |---                                                  | 4 | 15 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 12th | +4 |Ability Score Improvement                            | 4 | 15 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 13th | +5 |Song of Rest (d10)                                   | 4 | 16 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 14th | +5 |Magical Secrets, Bard College Feature                | 4 | 18 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 15th | +5 |Bardic Inspiration (d12)                             | 4 | 19 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 16th | +5 |Ability Score Improvement                            | 4 | 19 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 17th | +6 |Song of Rest (d12)                                   | 4 | 20 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  |  1  |\n| 18th | +6 |Magical Secrets                                      | 4 | 22 | 4 |  3  |  3  |  3  |  3  |  1  |  1  |  1  |  1  |\n| 19th | +6 |Ability Score Improvement                            | 4 | 22 | 4 |  3  |  3  |  3  |  3  |  2  |  1  |  1  |  1  |\n| 20th | +6 |Superior Inspiration                                 | 4 | 22 | 4 |  3  |  3  |  3  |  3  |  2  |  2  |  1  |  1  |\n\n! Class Features\nAs a bard, you gain the following class features.\n\n!! Hit Points\n''Hit Dice:'' 1d8 per bard level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per bard level after 1st\n\n!! Proficiencies\n''Armor:'' Light armor\n\n''Weapons:'' Simple weapons, hand crossbows, longswords, rapiers, shortswords\n\n''Tools:'' Three musical instruments of your choice\n\n''Saving Throws:'' Dexterity, Charisma\n\n''Skills:'' Choose any three\n\n!! Equipment\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (a) a rapier, (b) a longsword, or (c) any simple weapon\n* (a) a diplomat’s pack or (b) an entertainer’s pack\n* (a) a lute or (b) any other musical instrument\n* Leather armor and a dagger\n\n!! Spellcasting\n\nYou have learned to untangle and reshape the fabric of reality in harmony with your wishes and music. Your spells are part of your vast repertoire, magic that you can tune to different situations.\n\n!!! Cantrips\n\nYou know two cantrips of your choice from the bard spell list. You learn additional bard cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Bard table.\n\n!!! Spell Slots\n\nThe Bard table shows how many spell slots you have to cast your bard spells of 1st level and higher. To cast one of these spells, you must expend a slot of the spell’s level or higher. You regain all expended spell slots when you finish a long rest.\n\nFor example, if you know the 1st-level spell [[Cure Wounds]] and have a 1st-level and a 2nd-level spell slot available, you can cast [[Cure Wounds]] using either slot.\n\n!!! Spells Known of 1st Level and Higher\n\nYou know four 1st-level spells of your choice from the bard spell list.\n\nThe Spells Known column of the Bard table shows when you learn more bard spells of your choice. Each of these spells must be of a level for which you have spell slots, as shown on the table. For instance, when you reach 3rd level in this class, you can learn one new spell of 1st or 2nd level.\n\nAdditionally, when you gain a level in this class, you can choose one of the bard spells you know and replace it with another spell from the bard spell list, which also must be of a level for which you have spell slots.\n\n!!! Spellcasting Ability\n\nCharisma is your spellcasting ability for your bard spells. Your magic comes from the heart and soul you pour into the performance of your music or oration. You use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a bard spell you cast and when making an attack roll with one.\n\n''Spell Save DC'' = 8 + your proficiency bonus + your Charisma modifier\n\n''Spell attack modifier'' = your proficiency bonus + your Charisma modifier\n\n!!! Ritual Casting\n\nYou can cast any bard spell you know as a ritual if that spell has the ritual tag.\n\n!!! Spellcasting Focus\n\nYou can use a musical instrument as a spellcasting focus for your bard spells.\n\n!! Bardic Inspiration\n\nYou can inspire others through stirring words or music. To do so, you use a bonus action on your turn to choose one creature other than yourself within 60 feet of you who can hear you. That creature gains one Bardic Inspiration die, a d6.\n\nOnce within the next 10 minutes, the creature can roll the die and add the number rolled to one ability check, attack roll, or saving throw it makes. The creature can wait until after it rolls the d20 before deciding to use the Bardic Inspiration die, but must decide before the DM says whether the roll succeeds or fails. Once the Bardic Inspiration die is rolled, it is lost. A creature can have only one Bardic Inspiration die at a time.\n\nYou can use this feature a number of times equal to your Charisma modifier (a minimum of once). You regain any expended uses when you finish a long rest.\n\nYour Bardic Inspiration die changes when you reach certain levels in this class. The die becomes a d8 at 5th level, a d10 at 10th level, and a d12 at 15th level.\n\n!! Jack of All Trades\n\nStarting at 2nd level, you can add half your proficiency bonus, rounded down, to any ability check you make that doesn’t already include your proficiency bonus\n\n!! Song of Rest\n\nBeginning at 2nd level, you can use soothing music or oration to help revitalize your wounded allies during a short rest. If you or any friendly creatures who can hear your performance regain hit points at the end of the short rest by spending one or more Hit Dice, each of those creatures regains an extra 1d6 hit points.\n\nThe extra hit points increase when you reach certain levels in this class: to 1d8 at 9th level, to 1d10 at 13th level, and to 1d12 at 17th level.\n\n!! Bard College\n\nAt 3rd level, you delve into the advanced techniques of a bard college of your choice. Your choice grants you features at 3rd level and again at 6th and 14th level.\n\n* [[College of Lore]]{{$:/PHB}}\n* [[College of Valor]]{{$:/PHB}}\n\n!! Expertise\n\nAt 3rd level, choose two of your skill proficiencies. Your proficiency bonus is doubled for any ability check you make that uses either of the chosen proficiencies.\n\nAt 10th level, you can choose another two skill proficiencies to gain this benefit.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Font of Inspiration\n\nBeginning when you reach 5th level, you regain all of your expended uses of Bardic Inspiration when you finish a short or long rest.\n\n!! Countercharm\n\nAt 6th level, you gain the ability to use musical notes or words of power to disrupt mind-influencing effects. As an action, you can start a performance that lasts until the end of your next turn. During that time, you and any friendly creatures within 30 feet of you have advantage on saving throws against being frightened or charmed. A creature must be able to hear you to gain this benefit. The performance ends early if you are incapacitated or silenced or if you voluntarily end it (no action required).\n\n!! Magical Secrets\n\nBy 10th level, you have plundered magical knowledge from a wide spectrum of disciplines. Choose two spells from any classes, including this one. A spell you choose must be of a level you can cast, as shown on the Bard table, or a cantrip.\n\nThe chosen spells count as bard spells for you and are included in the number in the Spells Known column of the Bard table.\n\nYou learn two additional spells from any classes at 14th level and again at 18th level.\n\n!! Superior Inspiration\n\nAt 20th level, when you roll initiative and have no uses of Bardic Inspiration left, you regain one use.","tags":"Classes [[Player's Handbook]]","title":"Bard","modified":"20260707184326474"},
{"created":"20260709065938014","text":"//Those who emulate the archetypal Battle Master employ martial techniques passed down through generations. To a Battle Master, combat is an academic field, sometimes including subjects beyond battle such as weaponsmithing and calligraphy. Not every fighter absorbs the lessons of history, theory, and artistry that are reflected in the Battle Master archetype, but those who do are well-rounded fighters of great skill and knowledge.//\n\n!! Combat Superiority\n\nWhen you choose this archetype at 3rd level, you learn maneuvers that are fueled by special dice called superiority dice.\n\n//''Maneuvers.''// You learn three maneuvers of your choice, which are detailed under “Maneuvers” below. Many maneuvers enhance an attack in some way. You can use only one maneuver per attack.\n\nYou learn two additional maneuvers of your choice at 7th, 10th, and 15th level. Each time you learn new maneuvers, you can also replace one maneuver you know with a different one.\n\n//''Superiority Dice.''// You have four superiority dice, which are d8s. A superiority die is expended when you use it. You regain all of your expended superiority dice when you finish a short or long rest.\n\nYou gain another superiority die at 7th level and one more at 15th level.\n\n//''Saving Throws.''// Some of your maneuvers require your target to make a saving throw to resist the maneuver’s effects. The saving throw DC is calculated as follows:\n\n''Maneuver save DC'' = 8 + your proficiency bonus + your Strength or Dexterity modifier (your choice)\n\n!! Student of War\n\nAt 3rd level, you gain proficiency with one type of artisan’s tools of your choice.\n\n!! Know Your Enemy\n\nStarting at 7th level, if you spend at least 1 minute observing or interacting with another creature outside combat, you can learn certain information about its capabilities compared to your own. The DM tells you if the creature is your equal, superior, or inferior in regard to two of the following characteristics of your choice:\n\n* Strength score\n* Dexterity score\n* Constitution score\n* Armor Class\n* Current hit points\n* Total class levels (if any)\n* Fighter class levels (if any)\n\n!! Improved Combat Superiority\n\nAt 10th level, your superiority dice turn into d10s. At 18th level, they turn into d12s.\n\n!! Relentless\n\nStarting at 15th level, when you roll initiative and have no superiority dice remaining, you regain one superiority die.\n\n!! Maneuvers\n\nThe maneuvers are presented in alphabetical order.\n\n//''Commander’s Strike.''// When you take the Attack action on your turn, you can forgo one of your attacks and use a bonus action to direct one of your companions to strike. When you do so, choose a friendly creature who can see or hear you and expend one superiority die. That creature can immediately use its reaction to make one weapon attack, adding the superiority die to the attack’s damage roll.\n\n//''Disarming Attack.''// When you hit a creature with a weapon attack, you can expend one superiority die to attempt to disarm the target, forcing it to drop one item of your choice that it’s holding. You add the superiority die to the attack’s damage roll, and the target must make a Strength saving throw. On a failed save, it drops the object you choose. The object lands at its feet.\n\n//''Distracting Strike.''// When you hit a creature with a weapon attack, you can expend one superiority die to distract the creature, giving your allies an opening. You add the superiority die to the attack’s damage roll. The next attack roll against the target by an attacker other than you has advantage if the attack is made before the start of your next turn.\n\n//''Evasive Footwork.''// When you move, you can expend one superiority die, rolling the die and adding the number rolled to your AC until you stop moving.\n\n//''Feinting Attack.''// You can expend one superiority die and use a bonus action on your turn to feint, choosing one creature within 5 feet of you as your target. You have advantage on your next attack roll against that creature this turn. If that attack hits, add the superiority die to the attack’s damage roll.\n\n//''Goading Attack.''// When you hit a creature with a weapon attack, you can expend one superiority die to attempt to goad the target into attacking you. You add the superiority die to the attack’s damage roll, and the target must make a Wisdom saving throw. On a failed save, the target has disadvantage on all attack rolls against targets other than you until the end of your next turn.\n\n//''Lunging Attack.''// When you make a melee weapon attack on your turn, you can expend one superiority die to increase your reach for that attack by 5 feet. If you hit, you add the superiority die to the attack’s damage roll.\n\n//''Maneuvering Attack.''// When you hit a creature with a weapon attack, you can expend one superiority die to maneuver one of your comrades into a more advantageous position. You add the superiority die to the attack’s damage roll, and you choose a friendly creature who can see or hear you. That creature can use its reaction to move up to half its speed without provoking opportunity attacks from the target of your attack.\n\n//''Menacing Attack.''// When you hit a creature with a weapon attack, you can expend one superiority die to attempt to frighten the target. You add the superiority die to the attack’s damage roll, and the target must make a Wisdom saving throw. On a failed save, it is frightened of you until the end of your next turn.\n\n//''Parry.''// When another creature damages you with a melee attack, you can use your reaction and expend one superiority die to reduce the damage by the number you roll on your superiority die + your Dexterity modifier.\n\n//''Precision Attack.''// When you make a weapon attack roll against a creature, you can expend one superiority die to add it to the roll. You can use this maneuver before or after making the attack roll, but before any effects of the attack are applied.\n\n//''Pushing Attack.''// When you hit a creature with a weapon attack, you can expend one superiority die to attempt to drive the target back. You add the superiority die to the attack’s damage roll, and if the target is Large or smaller, it must make a Strength saving throw. On a failed save, you push the target up to 15 feet away from you.\n\n//''Rally.''// On your turn, you can use a bonus action and expend one superiority die to bolster the resolve of one of your companions. When you do so, choose a friendly creature who can see or hear you. That creature gains temporary hit points equal to the superiority die roll + your Charisma modifier.\n\n//''Riposte.''// When a creature misses you with a melee attack, you can use your reaction and expend one superiority die to make a melee weapon attack against the creature. If you hit, you add the superiority die to the attack’s damage roll.\n\n//''Sweeping Attack.''// When you hit a creature with a melee weapon attack, you can expend one superiority die to attempt to damage another creature with the same attack. Choose another creature within 5 feet of the original target and within your reach. If the original attack roll would hit the second creature, it takes damage equal to the number you roll on your superiority die. The damage is of the same type dealt by the original attack.\n\n//''Trip Attack.''// When you hit a creature with a weapon attack, you can expend one superiority die to attempt to knock the target down. You add the superiority die to the attack’s damage roll, and if the target is Large or smaller, it must make a Strength saving throw. On a failed save, you knock the target prone.","title":"Battle Master","modified":"20260709145404634","type":"","tags":"Fighter [[Player's Handbook]] Subclasses"},
{"created":"20260709132731528","text":"//The Beast Master archetype embodies a friendship between the civilized races and the beasts of the wild. United in focus, beast and ranger fight the monsters that threaten civilization and the wilderness alike.//\n\n!! Ranger’s Companion\n\nAt 3rd level, you gain a beast companion that accompanies you on your adventures and is trained to fight alongside you. Choose a beast that is no larger than Medium and that has a challenge rating of 1/4 or lower. Add your proficiency bonus to the beast’s AC, attack rolls, and damage rolls, as well as to any saving throws and skills it is proficient in. Its hit point maximum equals the hit point number in its stat block or four times your ranger level, whichever is higher. Like any creature, it can spend Hit Dice during a short rest to regain hit points.\n\nThe beast obeys your commands as best as it can. It takes its turn on your initiative. On your turn, you can verbally command the beast where to move (no action required by you). You can use your action to verbally command it to take the Attack, Dash, Disengage, or Help action. If you don’t issue a command, the beast takes the Dodge action. Once you have the Extra Attack feature, you can make one weapon attack yourself when you command the beast to take the Attack action.\n\nIf you are incapacitated or absent, the beast acts on its own, focusing on protecting you and itself. The beast never requires your command to use its reaction, such as when making an opportunity attack.\n\nWhile traveling through your favored terrain with only the beast, you can move stealthily at a normal pace.\n\nIf the beast dies, you can obtain a new companion by spending 8 hours magically bonding with a beast that isn’t hostile to you and that meets the requirements.\n\n!! Exceptional Training\n\nBeginning at 7th level, on any of your turns when your beast companion doesn’t attack, you can use a bonus action to command the beast to take the Dash, Disengage, or Help action on its turn.\n\nIn addition, the beast’s attacks now count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.\n\n!! Bestial Fury\n\nStarting at 11th level, when you command your beast companion to take the Attack action, the beast can make two attacks, or it can take the Multiattack action if it has that action.\n\n!! Share Spells\n\nBeginning at 15th level, when you cast a spell targeting yourself, you can also affect your beast companion with the spell if the beast is within 30 feet of you.","tags":"Ranger [[Player's Handbook]] Subclasses","title":"Beast Master","modified":"20260709145451282"},
{"created":"20260709065852723","text":"//The archetypal Champion focuses on the development of raw physical power honed to deadly perfection. Those who model themselves on this archetype combine rigorous training with physical excellence to deal devastating blows.//\n\n!! Improved Critical\n\nBeginning when you choose this archetype at 3rd level, your weapon attacks score a critical hit on a roll of 19 or 20.\n\n!! Remarkable Athlete\n\nStarting at 7th level, you can add half your proficiency bonus (round up) to any Strength, Dexterity, or Constitution check you make that doesn’t already use your proficiency bonus.\n\nIn addition, when you make a running long jump, the distance you can cover increases by a number of feet equal to your Strength modifier.\n\n!! Additional Fighting Style\n\nAt 10th level, you can choose a second option from the Fighting Style class feature.\n\n!! Superior Critical\n\nStarting at 15th level, your weapon attacks score a critical hit on a roll of 18–20.\n\n!! Survivor\n\nAt 18th level, you attain the pinnacle of resilience in battle. At the start of each of your turns, you regain hit points equal to 5 + your Constitution modifier if you have no more than half of your hit points left. You don’t gain this benefit if you have 0 hit points.","title":"Champion","modified":"20260709145518145","type":"","tags":"[[Player's Handbook]] Fighter Subclasses"},
{"created":"20260708093920169","text":"//The Circle of the Land is made up of mystics and sages who safeguard ancient knowledge and rites through a vast oral tradition. These druids meet within sacred circles of trees or standing stones to whisper primal secrets in Druidic. The circle’s wisest members preside as the chief priests of communities that hold to the Old Faith and serve as advisors to the rulers of those folk. As a member of this circle, your magic is influenced by the land where you were initiated into the circle’s mysterious rites.//\n\n!! Bonus Cantrip\n\nWhen you choose this circle at 2nd level, you learn one additional druid cantrip of your choice. This cantrip doesn’t count against the number of druid cantrips you know.\n\n!! Natural Recovery\n\nStarting at 2nd level, you can regain some of your magical energy by sitting in meditation and communing with nature. During a short rest, you choose expended spell slots to recover. The spell slots can have a combined level that is equal to or less than half your druid level (rounded up), and none of the slots can be 6th level or higher. You can’t use this feature again until you finish a long rest.\n\nFor example, when you are a 4th-level druid, you can recover up to two levels worth of spell slots. You can recover either a 2nd-level slot or two 1st-level slots.\n\n!! Circle Spells\n\nYour mystical connection to the land infuses you with the ability to cast certain spells. At 3rd, 5th, 7th, and 9th level you gain access to circle spells connected to the land where you became a druid. Choose that land — arctic, coast, desert, forest, grassland, mountain, swamp, or Underdark — and consult the associated list of spells.\n\nOnce you gain access to a circle spell, you always have it prepared, and it doesn’t count against the number of spells you can prepare each day. If you gain access to a spell that doesn’t appear on the druid spell list, the spell is nonetheless a druid spell for you.\n\n!!! Arctic\n\n|noborder alternate|k\n|!Druid Level|!Spells |\n| 3rd |[[Hold Person]], [[Spike Growth]] |\n| 5th |[[Sleet Storm]], [[Slow]] |\n| 7th |[[Freedom of Movement]], [[Ice Storm]] |\n| 9th |[[Commune with Nature]], [[Cone of Cold]] |\n\n!!! Coast\n\n|noborder alternate|k\n|!Druid Level|!Spells |\n| 3rd |[[Mirror Image]], [[Misty Step]] |\n| 5th |[[Water Breathing]], [[Water Walk]] |\n| 7th |[[Control Water]], [[Freedom of Movement]] |\n| 9th |[[Conjure Elemental]], [[Scrying]] |\n\n!!! Desert\n\n|noborder alternate|k\n|!Druid Level|!Spells |\n| 3rd |[[Blur]], [[Silence]] |\n| 5th |[[Create Food and Water]], [[Protection from Energy]] |\n| 7th |[[Blight]], [[Hallucinatory Terrain]] |\n| 9th |[[Insect Plague]], [[Wall of Stone]] |\n\n!!! Forest\n\n|noborder alternate|k\n|!Druid Level|!Spells |\n| 3rd |[[Barkskin]], [[Spider Climb]] |\n| 5th |[[Call Lightning]], [[Plant Growth]] |\n| 7th |[[Divination]], [[Freedom of Movement]] |\n| 9th |[[Commune with Nature]], [[Tree Stride]] |\n\n!!! Grassland\n\n|noborder alternate|k\n|!Druid Level|!Spells |\n| 3rd |[[Invisibility]], [[Pass without Trace]] |\n| 5th |[[Daylight]], [[Haste]] |\n| 7th |[[Divination]], [[Freedom of Movement]] |\n| 9th |[[Dream]], [[Insect Plague]] |\n\n!!! Mountain\n\n|noborder alternate|k\n|!Druid Level|!Spells |\n| 3rd |[[Spider Climb]], [[Spike Growth]] |\n| 5th |[[Lightning Bolt]], [[Meld into Stone]] |\n| 7th |[[Stone Shape]], [[Stoneskin]] |\n| 9th |[[Passwall]], [[Wall of Stone]] |\n\n!!! Swamp\n\n|noborder alternate|k\n|!Druid Level|!Spells |\n| 3rd |[[Darkness]], [[Melf's Acid Arrow]] |\n| 5th |[[Water Walk]], [[Stinking Cloud]] |\n| 7th |[[Freedom of Movement]], [[Locate Creature]] |\n| 9th |[[Insect Plague]], [[Scrying]] |\n\n!!! Underdark\n\n|noborder alternate|k\n|!Druid Level|!Spells |\n| 3rd |[[Spider Climb]], [[Web]] |\n| 5th |[[Gaseous Form]], [[Stinking Cloud]] |\n| 7th |[[Greater Invisibility]], [[Stone Shape]] |\n| 9th |[[Cloudkill]], [[Insect Plague]] |\n\n!! Land’s Stride\n\nStarting at 6th level, moving through nonmagical difficult terrain costs you no extra movement. You can also pass through nonmagical plants without being slowed by them and without taking damage from them if they have thorns, spines, or a similar hazard.\n\nIn addition, you have advantage on saving throws against plants that are magically created or manipulated to impede movement, such those created by the [[Entangle]] spell.\n\n!! Nature's Ward\n\nWhen you reach 10th level, you can’t be charmed or frightened by elementals or fey, and you are immune to poison and disease.\n\n!! Nature's Sanctuary\n\nWhen you reach 14th level, creatures of the natural world sense your connection to nature and become hesitant to attack you. When a beast or plant creature attacks you, that creature must make a Wisdom saving throw against your druid spell save DC. On a failed save, the creature must choose a different target, or the attack automatically misses. On a successful save, the creature is immune to this effect for 24 hours.\n\nThe creature is aware of this effect before it makes its attack against you.","title":"Circle of the Land","modified":"20260709092501053","type":"","tags":"Druid Subclasses [[Player's Handbook]]"},
{"created":"20260708113235615","text":"//Druids of the Circle of the Moon are fierce guardians of the wilds. Their order gathers under the full moon to share news and trade warnings. They haunt the deepest parts of the wilderness, where they might go for weeks on end before crossing paths with another humanoid creature, let alone another druid.//\n\n//Changeable as the moon, a druid of this circle might prowl as a great cat one night, soar over the treetops as an eagle the next day, and crash through the undergrowth in bear form to drive off a trespassing monster. The wild is in the druid’s blood.//\n\n!! Combat Wild Shape\n\nWhen you choose this circle at 2nd level, you gain the ability to use Wild Shape on your turn as a bonus action, rather than as an action.\n\nAdditionally, while you are transformed by Wild Shape, you can use a bonus action to expend one spell slot to regain 1d8 hit points per level of the spell slot expended.\n\n!! Circle Forms\n\nThe rites of your circle grant you the ability to transform into more dangerous animal forms. Starting at 2nd level, you can use your Wild Shape to transform into a beast with a challenge rating as high as 1 (you ignore the Max. CR column of the Beast Shapes table, but must abide by the other limitations there).\n\nStarting at 6th level, you can transform into a beast with a challenge rating as high as your druid level divided by 3, rounded down.\n\n!! Primal Strike\n\nStarting at 6th level, your attacks in beast form count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.\n\n!! Elemental Wild Shape\n\nAt 10th level, you can expend two uses of Wild Shape at the same time to transform into an air elemental, an earth elemental, a fire elemental, or a water elemental.\n\n!! Thousand Forms\n\nBy 14th level, you have learned to use magic to alter your physical form in more subtle ways. You can cast the [[Alter Self]] spell at will.","title":"Circle of the Moon","modified":"20260708113852619","type":"","tags":"Druid Subclasses [[Player's Handbook]]"},

{"created":"20260706170436041","text":"//Clerics are intermediaries between the mortal world and the distant planes of the gods. As varied as the gods they serve, clerics strive to embody the handiwork of their deities. No ordinary priest, a cleric is imbued with divine magic.//\n\n|noborder alternate|k\n| !Level | !PB |!Features | !Cantrips Known | !Spell Slots per Spell Level |\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\u003C|\n|~|~|~|~|!1st|!2nd|!3rd|!4th|!5th|!6th|!7th|!8th|!9th|\n|  1st | +2 |Spellcasting, Divine Domain                                             | 3 | 2 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  2nd | +2 |Channel Divinity (1/rest), Divine Domain Feature                        | 3 | 3 | --- | --- | --- | --- | --- | --- | --- | --- |\n|  3rd | +2 |---                                                                     | 3 | 4 |  2  | --- | --- | --- | --- | --- | --- | --- |\n|  4th | +2 |Ability Score Improvement                                               | 4 | 4 |  3  | --- | --- | --- | --- | --- | --- | --- |\n|  5th | +3 |Destroy Undead (CR 1/2)                                                 | 4 | 4 |  3  |  2  | --- | --- | --- | --- | --- | --- |\n|  6th | +3 |Channel Divinity (2/rest), Divine Domain Feature                        | 4 | 4 |  3  |  3  | --- | --- | --- | --- | --- | --- |\n|  7th | +3 |---                                                                     | 4 | 4 |  3  |  3  |  1  | --- | --- | --- | --- | --- |\n|  8th | +3 |Ability Score Improvement, Destroy Undead (CR 1), Divine Domain Feature | 4 | 4 |  3  |  3  |  2  | --- | --- | --- | --- | --- |\n|  9th | +4 |---                                                                     | 4 | 4 |  3  |  3  |  3  |  1  | --- | --- | --- | --- |\n| 10th | +4 |Divine Intervention                                                     | 5 | 4 |  3  |  3  |  3  |  2  | --- | --- | --- | --- |\n| 11th | +4 |Destroy Undead (CR 2)                                                   | 5 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 12th | +4 |Ability Score Improvement                                               | 5 | 4 |  3  |  3  |  3  |  2  |  1  | --- | --- | --- |\n| 13th | +5 |---                                                                     | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 14th | +5 |Destroy Undead (CR 3)                                                   | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  | --- | --- |\n| 15th | +5 |---                                                                     | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 16th | +5 |Ability Score Improvement                                               | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  | --- |\n| 17th | +6 |Destroy Undead (CR 4), Divine Domain Feature                            | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  |  1  |\n| 18th | +6 |Channel Divinity (3/rest)                                               | 5 | 4 |  3  |  3  |  3  |  2  |  1  |  1  |  1  |  1  |\n| 19th | +6 |Ability Score Improvement                                               | 5 | 4 |  3  |  3  |  3  |  2  |  2  |  1  |  1  |  1  |\n| 20th | +6 |Divine Intervention Improvement                                         | 5 | 4 |  3  |  3  |  3  |  2  |  2  |  2  |  1  |  1  |\n\n! Class Features\n\nAs a cleric, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per cleric level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per cleric level after 1st\n\n!! Proficiencies\n\n''Armor:'' Light armor, medium armor, shields\n\n''Weapons:'' Simple weapons\n\n''Tools:'' None\n\n''Saving Throws:'' Wisdom, Charisma\n\n''Skills:'' Choose two from History, Insight, Medicine, Persuasion, and Religion\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment
