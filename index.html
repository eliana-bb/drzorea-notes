em. They will shield you from the law or anyone else searching for you, though they will not risk their lives for you.\n\n!! Suggested Characteristics\n\nA folk hero is one of the common people, for better or for worse. Most folk heroes look on their humble origins as a virtue, not a shortcoming, and their home communities remain very important to them.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I judge people by their actions, not their words. |\n| 2 |If someone is in trouble, I’m always ready to lend help. |\n| 3 |When I set my mind to something, I follow through no matter what gets in my way. |\n| 4 |I have a strong sense of fair play and always try to find the most equitable solution to arguments. |\n| 5 |I’m confident in my own abilities and do what I can to instill confidence in others. |\n| 6 |Thinking is for other people. I prefer action. |\n| 7 |I misuse long words in an attempt to sound smarter. |\n| 8 |I get bored easily. When am I going to get on with my destiny? |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Respect.'' People deserve to be treated with dignity and respect. (Good) |\n| 2 |''Fairness.'' No one should get preferential treatment before the law, and no one is above the law. (Lawful) |\n| 3 |''Freedom.'' Tyrants must not be allowed to oppress the people. (Chaotic) |\n| 4 |''Might.'' If I become strong, I can take what I want — what I deserve. (Evil) |\n| 5 |''Sincerity.'' There’s no good in pretending to be something I’m not. (Neutral) |\n| 6 |''Destiny.'' Nothing and no one can steer me away from my higher calling. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |I have a family, but I have no idea where they are. One day, I hope to see them again. |\n| 2 |I worked the land, I love the land, and I will protect the land. |\n| 3 |A proud noble once gave me a horrible beating, and I will take my revenge on any bully I encounter. |\n| 4 |My tools are symbols of my past life, and I carry them so that I will never forget my roots. |\n| 5 |I protect those who cannot protect themselves. |\n| 6 |I wish my childhood sweetheart had come with me to pursue my destiny. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |The tyrant who rules my land will stop at nothing to see me killed. |\n| 2 |I’m convinced of the significance of my destiny, and blind to my shortcomings and the risk of failure. |\n| 3 |The people who knew me when I was young know my shameful secret, so I can never go home again. |\n| 4 |I have a weakness for the vices of the city, especially hard drink. |\n| 5 |Secretly, I believe that things would be better if I were a tyrant lording over the land. |\n| 6 |I have trouble trusting in my allies. |","tags":"Background [[Player's Handbook]]","title":"Folk Hero","modified":"20260710132936152"},
{"created":"20260711131100629","text":"//No one knows who the gith were originally. The\nlegend is that gith spent millennia in bondage to the\nillithids. Awash in the psionic energy of their\noppressors, gith stole this rare form of magic for\nthemselves. Over time, they were able to revolt\nagainst the mind flayers and strike out on their own.\nWhatever their true origin, the gith now known as\ngithyanki went to the Astral Plane and learned to\nsurvive in that ageless dimension. Other gith, now\nknown as githzerai, went to the Plane of Limbo and\nwrested the chaotic elements there into enough\nsemblance of order to survive.//\n\n//Gith are taller and leaner than humans, with most\na slender 6 feet in height. Lean and muscular, gith\nhave skin in different yellow or green hues, mottled\nwith brown or black spots or lines. Their ears\nresemble those of elves, and their limbs and digits\nare lanky and long.//\n\n//The gith lay and hatch from eggs, often alongside\nseveral other broodmates who hatch all at the same\ntime. Gith are expected to live about a century, but\nthe gith who still live in the Astral Plane have an\nunnaturally long life since time doesn't pass in their\nhome.//\n\n//Though the Astral Plane and Limbo are the\nancestral homes of gith, they and their offspring are\npresent in small numbers almost anywhere in the\nmultiverse.//\n\n! Gith Traits\n\n!! Githyanki Psionics (6 Points)\nYou know the [[Mage Hand]] cantrip, and the hand is\ninvisible when you cast the cantrip with this trait.\n\nWhen you reach 3rd level, you can cast the [[Jump]]\nspell once with this trait, and you regain the ability to\ndo so when you finish a long rest. When you reach\n5th level, you can cast the [[Misty Step]] spell once with\nthis trait, and you regain the ability to do so when\nyou finish a long rest.\n\nYou can also cast these spells using any spell slots\nyou have of the appropriate level. Intelligence is your\nspellcasting ability for these spells. When you cast\nthem with this trait, they don’t require components.\n\n!! Githzerai Psionics (6 Points)\nYou know the mage hand cantrip, and the hand is\ninvisible when you cast the cantrip with this trait.\n\nWhen you reach 3rd level, you can cast the [[Shield]]\nspell once with this trait, and you regain the ability to\ndo so when you finish a long rest. When you reach\n5th level, you can cast the [[Detect Thoughts]] spell once\nwith this trait, and you regain the ability to do so\nwhen you finish a long rest.\n\nYou can also cast these spells using any spell slots\nyou have of the appropriate level. Wisdom is your\nspellcasting ability for these spells. When you cast\nthem with this trait, they don’t require components.\n\n!! Kinship (2 Points)\nYou can speak telepathically to any creature of the\ngith subtype you can see. You don’t need to share a\nlanguage with the other gith for it to understand your\ntelepathic utterances, but the gith must be able to\nunderstand at least one language.\n\n!! Thralldom Resistance (4 Points)\nYou have advantage on saving throws against being\ncharmed, and you have resistance to psychic damage.","tags":"Parentage [[Elf & Orc 1]]","title":"Gith Parentage","modified":"20260711131301952"},
{"created":"20260711131309102","text":"//A gnome’s restless and boundless energy shines\nthrough every inch of their tiny body. Their faces are\ntan, brown, gray, or black, and their eyes gleam\nbrightly. Their fair or brightly colored hair is difficult\nto tame. Some gnomes can grow beards, which may\nor may not be the same color as their hair. The one\nexception is deep gnomes, which are almost entirely\nhairless.//\n\n//Gnomes average slightly over 3 feet tall and weigh\n40 to 45 pounds. Because of their short legs, they\ncannot walk as fast as humans. But all gnomes are\ninnately resistant to magic to some degree, much like\nwater off a duck’s back, and they can see in the dark.//\n\n//Gnomes are best explained by their long lifespans\ncoupled with their restless minds and bodies. It\nmight seem they have all the time in the world, but it\nseldom feels that way to a gnome.//\n\n//Gnomes are versatile and have adapted to various\nenvironments. As their names suggest, deep gnomes\nevolved deep underground, forest gnomes adapted to\nliving among tree roots and hollows, and rock\ngnomes to warrens just under the surface.//\n\n! Gnomish Traits\n\n!! Darkvision (4 Points)\nYou have superior vision in dark and dim conditions.\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Gnome Cunning (4 Points)\nYou have advantage on all Intelligence and Charisma\nsaving throws against magic.\n\n!! Improved Gnome Cunning (5 Points)\nYou have advantage on all Wisdom saving throws\nagainst magic.\n\n!! Little (–2 Points)\nYour base speed reduces to 25 feet. In addition, if\nyou inherit this trait from your other birth parent\nalso, your size is Small.\n\n!! Long-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively long.\n\n!! Natural Illusionist (2 Points)\nYou know the [[Minor Illusion]] cantrip. Intelligence is\nyour spellcasting ability for it.\n\n!! Restless (3 Points)\nWhen taking a long rest, you need only 2 hours of\nsleep and can spend the other 6 hours performing\nlight activity.\n\n!! Superior Darkvision (2 Points)\nIf you inherit darkvision from your other birth parent,\nincrease your darkvision’s range by 60 feet.","tags":"Parentage [[Elf & Orc 1]]","title":"Gnomish Parentage","modified":"20260711131550927"},
{"created":"20260711131552999","text":"//Goblinoids are three peoples with shared ancestry.\nAs a result, they have certain physical features in\ncommon, but also differences between them that\nmake each one unique.//\n\n//All goblinoids have a thin coat of tawny, brown,\ngreen, dark orange, or red-orange fur. Goblins have\nthe thinnest coat of fur covering their bodies, while\nbugbears have the thickest. They all have black claws\non their feet and hands, a mouth full of sharp teeth,\npointed ears, and leonine noses. Their eyes are\nyellow, dark brown, or black in color.//\n\n//Despite these similarities, there are noticeable\ndifferences. The most obvious one is that goblins are\nmuch shorter and lighter than their bugbear and\nhobgoblin cousins. And bugbears sport what might\nalmost be called a dark mane.//\n\n//Some people mistakenly assume that goblinoids\nare inherently evil, allegedly because they worship\nthe god Maglubiyet. This is incorrect for two reasons.\nFirst, like all sentient humanoids, goblinoids are free\nto think, believe, and choose. They and their mixed\ngoblinoid offspring are no more likely to be evil than\nhumans are. And, two, not all goblinoids worship the\nsame gods or in the same way. Their ability to choose\nextends to matters of faith and devotion as well.//\n\n! Goblinoid Traits\n\n!! Ability Score Increase (4 Points)\nYour Dexterity or Constitution score increases by 1.\nYou can’t increase an ability score above 17 using\nthis trait.\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Little (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your size is Small.\n\n!! Long-Limbed (6 Points)\nWhen you make a melee attack on your turn, your\nreach for it is 5 feet greater than normal.\n\n!! Nimble Escape (8 Points)\nYou can take the Disengage action as a bonus action\non each of your turns.\n\n!! Powerful Build (1 Point)\nYou count as one size larger when determining your\ncarrying capacity and the weight you can push, drag,\nor lift.\n\n!! Reserves of Strength (7 Points)\nWhen you hit with a Strength-based melee weapon\non your turn, you deal extra damage equal to your\ncharacter level.\n\n!! Short-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively short.","tags":"Parentage [[Elf & Orc 1]]","title":"Goblinoid Parentage","modified":"20260711131719768"},
{"created":"20260711131723572","text":"//Though they can live anywhere, goliaths are well\nsuited to live on the highest mountain peaks—far\nabove the slopes where trees grow and where the air\nis thin and the frigid winds howl. The ancestors of\ntoday’s goliaths wandered a bleak realm of rock,\nwind, and cold.//\n\n//Goliaths are camouflaged to look as if they are\ncarved from mountain stone. Their bodies can safely\nbreathe thin air and dwell at high altitudes. Though\nthey have little to no body hair, they can tolerate cold\ntemperatures, and they have great physical power.\nGoliaths tower over most other humanoids. They\nstand between 7 and 8 feet tall and weigh between\n280 and 340 pounds. Goliaths live about as long as\nhumans do, and have a natural ability that allows\nthem to shrug off injury.//\n\n//Depending on their upbringing and personal\nproclivities, a goliath or mixed goliath can be dutiful\nand honor-bound, urbane and sophisticated, bookish\nand cowardly, or anything else. Parentage is not\ndestiny, after all.//\n\n! Goliath Traits\n\n!! Mountain Adaptation (5 Points)\nYou’re acclimated to high altitude, including\nelevations above 20,000 feet. You’re also naturally\nadapted to cold climates, as described in chapter 5 of\nthe Dungeon Master’s Guide.\n\nIn addition, you are resistant to cold damage.\n\n!! Natural Athlete (2 Points)\nYou have proficiency in the Athletics skill.\n\n!! Powerful Build (1 Point)\nYou count as one size larger when determining your\ncarrying capacity and the weight you can push, drag,\nor lift.\n\n!! Stone’s Endurance (7 Points)\nYou can focus yourself to occasionally shrug off\ninjury. When you take damage, you can use your\nreaction to roll a d12. Add your Constitution modifier\nto the number rolled, and reduce the damage by that\ntotal. After you use this trait, you can’t use it again\nuntil you finish a short or long rest.","tags":"Parentage [[Elf & Orc 1]]","title":"Goliath Parentage","modified":"20260711132308841"},
{"created":"20260711132337040","text":"//Grungs are froglike humanoids adapted to life in\nrainforests and tropical jungles. Their ancestors lived\nin trees and shade, which explains much about their\nphysiology.//\n\n//Grungs are amphibians and live the first phase of\ntheir lives as tadpoles. A grung hatchery is usually a\nground-level pool. About three months after hatching,\na grung tadpole takes on the shape of an adult. It\ntakes another six to nine months for a grung juvenile\nto reach maturity.//\n\n//All grungs are a dull greenish gray when they are\nborn, but each individual takes on a new color as it\ngrows to adulthood: red, orange, green, blue, or\npurple. Color doesn't appear to be inherited from\nbirth parents but has to do with the environment.//\n\n//Grungs secrete a substance that is harmless to\nthem but poisonous to other creatures. A grung can\nalso use their venom to poison their weapons.//\n\n! Grung Traits\n\n!! Amphibious (1 Point)\nYou can breathe air and water.\n\n!! Climb (3 Points)\nYou have a climbing speed of 25 feet.\n\n!! Little (–2 Points)\nYour base speed reduces to 25 feet. In addition, if\nyou inherit this trait from your other birth parent\nalso, your size is Small.\n\n!! Poison Dart (6 Points)\nAs an action, you can apply the poison of your skin to\nany piercing weapon. On a hit, the target must\nsucceed on a DC 12 Constitution saving throw or\ntake 2d4 poison damage.\n\n!! Poisonous Skin (12 Points)\nAny creature that grapples you or otherwise comes\ninto direct contact with your skin must succeed on a\nDC 12 Constitution saving throw or become\npoisoned for 1 minute. A poisoned creature no\nlonger in direct contact with you can repeat the\nsaving throw at the end of each of its turns, ending\nthe effect on itself on a success.\n\nOther grung are immune to this trait.\n\n!! Standing Leap (2 Points)\nYour long jump is up to 25 feet and your high jump is\nup to 15 feet, with or without a running start.\n\n!! Water Dependency (–3 Points)\nIf you fail to immerse yourself in water for at least 1\nhour during a day, you suffer one level of exhaustion\nat the end of that day. You can only recover from this\nexhaustion through magic or by immersing yourself\nin water for at least 1 hour.","tags":"Parentage [[Elf & Orc 1]]","title":"Grung Parentage","modified":"20260711132712597"},
{"created":"20260710133318347","text":"You are a member of an artisan’s guild, skilled in a particular field and closely associated with other artisans. You are a well-established part of the mercantile world, freed by talent and wealth from the constraints of a feudal social order. You learned your skills as an apprentice to a master artisan, under the sponsorship of your guild, until you became a master in your own right.\n\n''Skill Proficiencies:'' Insight, Persuasion\n\n''Tool Proficiencies:'' One type of artisan’s tools\n\n''Languages:'' One of your choice\n\n''Equipment:'' A set of artisan’s tools (one of your choice), a letter of introduction from your guild, a set of [[traveler’s clothes|Adventuring Gear]], and a [[pouch|Adventuring Gear]] containing 15 gp\n\n!! Guild Business\n\nGuilds are generally found in cities large enough to support several artisans practicing the same trade. However, your guild might instead be a loose network of artisans who each work in a different village within a larger realm. Work with your DM to determine the nature of your guild. You can select your guild business from the Guild Business table or roll randomly.\n\n|noborder alternate|k\n|!d20|!Guild Business|\n| 1  |Alchemists and apothecaries |\n| 2  |Armorers, locksmiths, and finesmiths |\n| 3  |Brewers, distillers, and vintners |\n| 4  |Calligraphers, scribes, and scriveners |\n| 5  |Carpenters, roofers, and plasterers |\n| 6  |Cartographers, surveyors, and chart-makers |\n| 7  |Cobblers and shoemakers |\n| 8  |Cooks and bakers |\n| 9  |Glassblowers and glaziers |\n| 10 |Jewelers and gem cutters |\n| 11 |Leatherworkers, skinners, and tanners |\n| 12 |Masons and stonecutters |\n| 13 |Painters, limners, and sign-makers |\n| 14 |Potters and tile-makers |\n| 15 |Shipwrights and sailmakers |\n| 16 |Smiths and metal-forgers |\n| 17 |Tinkers, pewterers, and casters |\n| 18 |Wagon-makers and wheelwrights |\n| 19 |Weavers and dyers |\n| 20 |Woodcarvers, coopers, and bowyers |\n\nAs a member of your guild, you know the skills needed to create finished items from raw materials (reflected in your proficiency with a certain kind of artisan’s tools), as well as the principles of trade and good business practices. The question now is whether you abandon your trade for adventure, or take on the extra effort to weave adventuring and trade together.\n\n!! Feature: Guild Membership\n\nAs an established and respected member of a guild, you can rely on certain benefits that membership provides. Your fellow guild members will provide you with lodging and food if necessary, and pay for your funeral if needed. In some cities and towns, a guildhall offers a central place to meet other members of your profession, which can be a good place to meet potential patrons, allies, or hirelings.\n\nGuilds often wield tremendous political power. If you are accused of a crime, your guild will support you if a good case can be made for your innocence or the crime is justifiable. You can also gain access to powerful political figures through the guild, if you are a member in good standing. Such connections might require the donation of money or magic items to the guild’s coffers.\n\nYou must pay dues of 5 gp per month to the guild. If you miss payments, you must make up back dues to remain in the guild’s good graces.\n\n!! Suggested Characteristics\n\nA folk hero is one of the common people, for better or for worse. Most folk heroes look on their humble origins as a virtue, not a shortcoming, and their home communities remain very important to them.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I believe that anything worth doing is worth doing right. I can’t help it — I’m a perfectionist. |\n| 2 |I’m a snob who looks down on those who can’t appreciate fine art. |\n| 3 |I always want to know how things work and what makes people tick. |\n| 4 |I’m full of witty aphorisms and have a proverb for every occasion. |\n| 5 |I’m rude to people who lack my commitment to hard work and fair play. |\n| 6 |I like to talk at length about my profession. |\n| 7 |I don’t part with my money easily and will haggle tirelessly to get the best deal possible. |\n| 8 |I’m well known for my work, and I want to make sure everyone appreciates it. I’m always taken aback when people haven’t heard of me. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Community.'' It is the duty of all people to strengthen the bonds and security of communities. (Lawful) |\n| 2 |''Generosity.'' My talents were given to me so that I could use them to benefit the world. (Good) |\n| 3 |''Freedom.'' Everyone should be free to pursue his or her own livelihood. (Chaotic) |\n| 4 |''Greed.'' I’m only in it for the money. (Evil) |\n| 5 |''People.'' I’m committed to the people I care about, not to ideals. (Neutral) |\n| 6 |''Aspiration.'' I work hard to be the best there is at my craft. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |The workshop where I learned my trade is the most important place in the world to me. |\n| 2 |I created a great work for someone, and then found them unworthy to receive it. I’m still looking for someone worthy. |\n| 3 |I owe my guild a great debt for forging me into the person I am today. |\n| 4 |I pursue wealth to secure someone’s love. |\n| 5 |One day I will return to my guild and prove that I am the greatest artisan of them all. |\n| 6 |I will get revenge on the evil forces that destroyed my place of business and ruined my livelihood. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |I’ll do anything to get my hands on something rare or priceless. |\n| 2 |I’m quick to assume that someone is trying to cheat me. |\n| 3 |No one must ever learn that I once stole money from guild coffers. |\n| 4 |I’m never satisfied with what I have — I always want more. |\n| 5 |I would kill to acquire a noble title. |\n| 6 |I’m horribly jealous of anyone who can outshine my handiwork. Everywhere I go, I’m surrounded by rivals. |\n\n!! Variant Guild Artisan: Guild Merchant\n\nInstead of an artisans’ guild, you might belong to a guild of traders, caravan masters, or shopkeepers. You don’t craft items yourself but earn a living by buying and selling the works of others (or the raw materials artisans need to practice their craft). Your guild might be a large merchant consortium (or family) with interests across the region. Perhaps you transported goods from one place to another, by ship, wagon, or caravan, or bought them from traveling traders and sold them in your own little shop. In some ways, the traveling merchant’s life lends itself to adventure far more than the life of an artisan.\n\nRather than proficiency with artisan’s tools, you might be proficient with navigator’s tools or an additional language. And instead of artisan’s tools, you can start with a mule and a cart.","tags":"Background [[Player's Handbook]]","title":"Guild Artisan","modified":"20260710134138742"},
{"created":"20260711132720002","text":"//The diminutive halflings survive and even thrive in a\nworld full of mostly larger creatures. Standing about\n3 feet tall, halflings may appear relatively harmless,\nbut many have proven that assumption wrong.//\n\n//Halflings are inclined to be stout, weighing\nbetween 40 and 45 pounds. Halflings’ skin ranges\nfrom black to pale with a ruddy cast, and their hair is\nusually black, brown, or sandy brown and wavy. They\nhave dark or hazel eyes. Halflings often sport long\nsideburns, but beards are rare among them and\nmustaches even more so.//\n\n//Halflings call themselves hin, but have\nreappropriated the term \"halfling\" for themselves.\nThe term came about because halflings are only half\nthe size of many other humanoid peoples, appearing\nto be only children to them from a distance.//\n\n//Historically, halflings have freely mingled with\nother humanoids. From these interactions rose three\nkinds of halflings. The ancestors of the ghostwise\nhalflings ventured deep into the forests and grew\nadapted to life there and mingled with the elves and\nfey creatures they found. The stout halflings\nintermarried some with dwarves in the distant past.\nFinally, the lightfoot halflings kept mostly to\nthemselves.//\n\n! Halfling Traits\n\n!! Childlike Appearance (2 Points)\nYou have advantage on Deception or Persuasion skill\nchecks (your choice) against creatures of Medium\nsize or larger.\n\n!! Climb (2 Points)\nYou have a climbing speed of 20 feet.\n\n!! Halfling Nimbleness (2 Points)\nYou can move through the space of any creature that\nis of a size larger than yours.\n\n!! Little (–2 Points)\nYour base speed reduces to 25 feet. In addition, your\nsize is Small.\n\n!! Lucky (4 Points)\nWhen you roll a 1 on the d20 for an attack roll, ability\ncheck, or saving throw, you can reroll the die and\nmust use the new roll.\n\n!! Naturally Stealthy (6 Points)\nYou can attempt to hide even when you are obscured\nonly by a creature that is at least one size larger than\nyou.\n\n!! Silent Speech (4 Points)\nYou can speak telepathically to any creatures of your\nchoice within 60 feet of you. A creature understands\nyou only if the two of you share a language.\n\n!! Stocky (–1 Points)\nYour base speed reduces to 25 feet. Your speed is not\nfurther reduced by wearing heavy armor.\n\n!! Stout Resilience (5 Points)\nYou have advantage on saving throws against poison,\nand you have resistance against poison damage.","tags":"Parentage [[Elf & Orc 1]]","title":"Halfling Parentage","modified":"20260711132902554"},
{"created":"20260710135206410","text":"You lived in seclusion — either in a sheltered community such as a monastery, or entirely alone — for a formative part of your life. In your time apart from the clamor of society, you found quiet, solitude, and perhaps some of the answers you were looking for.\n\n''Skill Proficiencies:'' Medicine, Religion\n\n''Tool Proficiencies:'' Herbalism kit\n\n''Languages:'' One of your choice\n\n''Equipment:'' A [[scroll case|Adventuring Gear]] stuffed full of notes from your studies or prayers, a winter [[blanket|Adventuring Gear]], a set of [[common clothes|Adventuring Gear]], an [[herbalism kit|Tools]], and 5 gp\n\n!! Life of Seclusion\n\nWhat was the reason for your isolation, and what changed to allow you to end your solitude? You can work with your DM to determine the exact nature of your seclusion, or you can choose or roll on the table below to determine the reason behind your seclusion.\n\n|noborder alternate|k\n|!d8|!Life of Seclusion |\n| 1 |I was searching for spiritual enlightenment. |\n| 2 |I was partaking of communal living in accordance with the dictates of a religious order. |\n| 3 |I was exiled for a crime I didn’t commit. |\n| 4 |I retreated from society after a life-altering event. |\n| 5 |I needed a quiet place to work on my art, literature, music, or manifesto. |\n| 6 |I needed to commune with nature, far from civilization. |\n| 7 |I was the caretaker of an ancient ruin or relic. |\n| 8 |I was a pilgrim in search of a person, place, or relic of spiritual significance. |\n\n!! Feature: Discovery\n\nThe quiet seclusion of your extended hermitage gave you access to a unique and powerful discovery. The exact nature of this revelation depends on the nature of your seclusion. It might be a great truth about the cosmos, the deities, the powerful beings of the outer planes, or the forces of nature. It could be a site that no one else has ever seen. You might have uncovered a fact that has long been forgotten, or unearthed some relic of the past that could rewrite history. It might be information that would be damaging to the people who consigned you to exile, and hence the reason for your return to society.\n\nWork with your DM to determine the details of your discovery and its impact on the campaign.\n\n!! Suggested Characteristics\n\nSome hermits are well suited to a life of seclusion, whereas others chafe against it and long for company. Whether they embrace solitude or long to escape it, the solitary life shapes their attitudes and ideals.\n\n|noborder alternate|k\n|!d8|!Personality Trait |\n| 1 |I’ve been isolated for so long that I rarely speak, preferring gestures and the occasional grunt. |\n| 2 |I am utterly serene, even in the face of disaster. |\n| 3 |The leader of my community had something wise to say on every topic, and I am eager to share that wisdom. |\n| 4 |I feel tremendous empathy for all who suffer. |\n| 5 |I’m oblivious to etiquette and social expectations. |\n| 6 |I connect everything that happens to me to a grand, cosmic plan. |\n| 7 |I often get lost in my own thoughts and contemplation, becoming oblivious to my surroundings. |\n| 8 |I am working on a grand philosophical theory and love sharing my ideas. |\n\n|noborder alternate|k\n|!d6|!Ideal |\n| 1 |''Greater Good.'' My gifts are meant to be shared with all, not used for my own benefit. (Good)|\n| 2 |''Logic.'' Emotions must not cloud our sense of what is right and true, or our logical thinking. (Lawful) |\n| 3 |''Free Thinking.'' Inquiry and curiosity are the pillars of progress. (Chaotic) |\n| 4 |''Power.'' Solitude and contemplation are paths toward mystical or magical power. (Evil) |\n| 5 |''Live and Let Live.'' Meddling in the affairs of others only causes trouble. (Neutral) |\n| 6 |''Self-Knowledge.'' If you know yourself, there’s nothing left to know. (Any) |\n\n|noborder alternate|k\n|!d6|!Bond |\n| 1 |Nothing is more important than the other members of my hermitage, order, or association. |\n| 2 |I entered seclusion to hide from the ones who might still be hunting me. I must someday confront them. |\n| 3 |I’m still seeking the enlightenment I pursued in my seclusion, and it still eludes me. |\n| 4 |I entered seclusion because I loved someone I could not have. |\n| 5 |Should my discovery come to light, it could bring ruin to the world. |\n| 6 |My isolation gave me great insight into a great evil that only I can destroy. |\n\n|noborder alternate|k\n|!d6|!Flaw |\n| 1 |Now that I’ve returned to the world, I enjoy its delights a little too much. |\n| 2 |I harbor bloodthirsty thoughts that my isolation and meditation failed to quell. |\n| 3 |I am dogmatic in my thoughts and philosophy. |\n| 4 |I let my need to win arguments overshadow friendships and harmony. |\n| 5 |I’d risk too much to uncover a lost bit of knowledge. |\n| 6 |I like keeping secrets and won’t share them with anyone. |\n\n!! Other Hermits\n\nThis hermit background assumes a contemplative sort of seclusion that allows room for study and prayer. If you want to play a rugged wilderness recluse who lives off the land while shunning the company of other people, look at the outlander background. On the other hand, if you want to go in a more religious direction, the acolyte might be what you’re looking for. Or you could even be a charlatan, posing as a wise and holy person and letting pious fools support you.","tags":"Background [[Player's Handbook]]","title":"Hermit","modified":"20260710140348259"},
{"created":"20260711132904526","text":"//There is no typical human. An individual can stand\nfrom 5 feet to a little over 6 feet tall and typically\nweighs from 125 to 300 pounds. Human skin shades\nrange from nearly black to very pale, and hair colors\nfrom black to blond (curly, kinky, or straight); some\nmay sport facial hair that is sparse or thick.//\n\n//Many humans are mixed, evincing traces of elven,\norc, or other ancestries. Humans reach adulthood in\ntheir late teens and rarely live even a single century.//\n\n//Though many humans see themselves as the\nnorm, other humanoids disagree, some more\nforcefully than others. To bugbears, human arms are\nstubby. To halflings, humans are giants. To goliaths\nand firbolgs, humans are short. To elves, humans are\nstocky, even while dwarves describe humans as elfin.//\n\n//Like all sentient humanoids, humans are a mix of\ntemperaments, morals, faiths, and cultures. Their\ndestiny is determined by their choices, though the\noutcome may be difficult to predict accurately!//\n\n! Human Traits\n\n!! Ability Score Increase (6 Points)\nChoose three ability scores that do not benefit from\nan Ability Score Increase due to upbringing. These\nthree scores each increase by 1.\n\n!! Feat (16 Points)\nYou gain one feat of your choice.\n\n!! Relentless Endurance (6 Points)\nWhen you are reduced to 0 hit points but not killed\noutright, you can drop to 1 hit point instead. You can’t\nuse this feature again until you finish a long rest.\n\nIf you already have the Relentless Endurance trait\ninherited from your other birth parent, immediately\nafter using this trait, you can use your reaction to\ntake an action.","tags":"Parentage [[Elf & Orc 1]]","title":"Human Parentage","modified":"20260711133044298"},
{"created":"20260709132457914","text":"//Emulating the Hunter archetype means accepting your place as a bulwark between the people you protect and the terrors of the wilderness. As you walk the Hunter’s path, you learn specialized techniques for fighting the threats you face, from rampaging ogres to towering giants and terrifying dragons.//\n\n!! Hunter’s Prey\n\nAt 3rd level, you gain one of the following features of your choice.\n\n//''Colossus Slayer.''// Your tenacity can wear down the most potent foes. When you hit a creature with a weapon attack, the creature takes an extra 1d8 damage if it’s below its hit point maximum. You can deal this extra damage only once per turn.\n\n//''Giant Killer.''// When a Large or larger creature within 5 feet of you hits or misses you with an attack, you can use your reaction to attack that creature immediately after its attack, provided that you can see the creature.\n\n//''Horde Breaker.''// Once on each of your turns when you make a weapon attack, you can make another attack with the same weapon against a different creature that is within 5 feet of the original target and within range of your weapon.\n\n!! Defensive Tactics\n\nAt 7th level, you gain one of the following features of your choice.\n\n//''Escape the Horde.''// Opportunity attacks against you are made with disadvantage.\n\n//''Multiattack Defense.''// When a creature hits you with an attack, you gain a +4 bonus to AC against all subsequent attacks made by that creature for the rest of the turn.\n\n//''Steel Will.''// You have advantage on saving throws against being frightened.\n\n!! Multiattack\n\nAt 11th level, you gain one of the following features of your choice.\n\n//''Volley.''// You can use your action to make a ranged attack against any number of creatures within 10 feet of a point you can see within your weapon’s range. You must have ammunition for each target, as normal, and you make a separate attack roll for each target.\n\n//''Whirlwind Attack.''// You can use your action to make a melee attack against any number of creatures within 5 feet of you, with a separate attack roll for each target.\n\n!! Superior Hunter’s Defense\n\nAt 15th level, you gain one of the following features of your choice.\n\n//''Evasion.''// When you are subjected to an effect, such as a red dragon’s fiery breath or a [[Lightning Bolt]] spell, that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.\n\n//''Stand Against the Tide.''// When a hostile creature misses you with a melee attack, you can use your reaction to force that creature to repeat the same attack against another creature (other than itself) of your choice.\n\n//''Uncanny Dodge.''// When an attacker that you can see hits you with an attack, you can use your reaction to halve the attack’s damage against you.","tags":"Subclasses Ranger [[Player's Handbook]]","title":"Hunter","modified":"20260709145441257"},
{"created":"20260711133051328","text":"//Devils are denizens of the Nine Hells and are tyranny\nincarnate. Devils are confined to the Lower Planes,\nbut they can travel beyond those planes by way of\nportals or powerful summoning magic.//\n\n//They love to strike bargains with mortals seeking\nto gain some benefit or prize, but a mortal making\nsuch a bargain must be wary. Devils are crafty\nnegotiators and positively ruthless at enforcing the\nterms of an agreement. Any mortal creature that\nbreaks such a contract instantly forfeits its soul,\nwhich is spirited away to the Nine Hells.//\n\n//Every interaction is an opportunity for a devil to\ndisplay its power, and all devils have a keen\nunderstanding of how to use and misuse their power.\nDevils use their understanding of mortal nature to\nlead them into temptation and darkness.//\n\n! Infernal Traits\n\n!! Darkvision (4 Points)\nYou have superior vision in dark and dim conditions.\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Hellish Resistance (3 Points)\nYou have resistance to fire damage.\n\n!! Winged (6 Points)\nYou have bat-like wings sprouting from your shoulder\nblades. You have a flying speed of 20 feet while you\naren’t wearing medium or heavy armor.","tags":"Parentage [[Elf & Orc 1]]","title":"Infernal Parentage","modified":"20260711133142687"},
{"created":"20260711133144912","text":"//The kalashtar are a compound people created from\nthe union of humanoids and renegade spirits from\nthe plane of dreams—spirits called quori. There is an\nunmistakable otherworldly quality to the kalashtar,\nas they are haunted by their spirits’ conflicts.//\n\n//Every kalashtar has a connection to a spirit of\nlight, shared by other members of their bloodline.\nKalashtar are unassuming, but the spiritual\nconnection affects them in a variety of ways.\nKalashtar have symmetrical, slightly angular\nfeatures. The eyes of a kalashtar often glow when\nthey are focused on a task or feeling strong\nemotions.//\n\n//The kalashtar can’t directly communicate with\ntheir quori spirits. A kalashtar might experience this\nrelationship as a sense of instinct and inspiration,\ndrawing on the memories of the spirit when they\ndream—this connection grants kalashtar minor\npsionic abilities and protection from psychic attacks.//\n\n//Some of these dream-spirits are warriors, and\nothers are more contemplative. Typically, a kalashtar\nknows the name and nature of their spirit, but some\n—for instance, an orphan kalashtar raised among\noutsiders—may know nothing of their spirit or the\nsource of their psychic gifts.//\n\n! Kalashtar Traits\n\n!! Dual Mind (5 Points)\nYou have advantage on all Wisdom saving throws.\n\n!! Mental Discipline (2 Points)\nYou have resistance to psychic damage.\n\n!! Mind Link (5 Points)\nYou can speak telepathically to any creature you can\nsee, provided the creature is within a number of feet\nof you equal to 10 times your level. You don’t need to\nshare a language with the creature for it to\nunderstand your telepathic utterances, but the\ncreature must be able to understand at least one\nlanguage.\n\nWhen you’re using this trait to speak telepathically\nto a creature, you can use your action to give that\ncreature the ability to speak telepathically with you\nfor 1 hour or until you end this effect as an action. To\nuse this ability, the creature must be able to see you\nand must be within this trait’s range. You can give\nthis ability to only one creature at a time; giving it to\na creature takes it away from another creature who\nhas it.\n\n!! Severed from Dreams (1 Point)\nYou sleep, but you don’t connect to the plane of\ndreams as other creatures do. Instead, your minds\ndraw from the memories of your otherworldly spirit\nwhile you sleep. As such, you are immune to spells\nand other magical effects that require you to dream,\nlike the dream spell, but not to spells and other\nmagical effects that put you to sleep, like the sleep\nspell.","tags":"Parentage [[Elf & Orc 1]]","title":"Kalashtar Parentage","modified":"20260711133809044"},
{"created":"20260711133816876","text":"//Kenku are avian humanoids that stand around 5 feet\ntall and weigh between 90 and 120 pounds. Soft,\nsleek, dark feathers cover their bodies. They tread\nlightly when they walk, on talons made for grasping\nthe branches of trees and seizing prey from the lofty\nskies.//\n\n//Indeed, kenku were not always flightless folk.\nSometime in the not-too-distant past, the kenku had\nwings. Vestiges of this heritage are evident in their\nhollow bones, light frames, and flight-honed\ninstincts. Legends abound about how the kenku lost\ntheir wings, but everyone has a different theory.//\n\n//Another defining aspect of kenku is their ability to\nremember everything they see and hear perfectly.\nSome kenku even train themselves to repeat back in\nthe same voice in which the words were uttered.//\n\n! Kenku Traits\n\n!! Instinctive Flight (1 Point)\nYou have advantage on checks made to use air\nvehicles and magic items that grant the ability to fly,\nsuch as brooms of flying or carpets of flying, as well\nas on checks to maintain concentration on a [[Fly]] spell\nyou have cast.\n\n!! Kenku Reflexes (4 Points)\nYou are proficient in the Acrobatics and Stealth\nskills.\n\n!! Perfect Memory (2 Points)\nYou can accurately recall anything you have seen or\nheard within the past year.\n\n!! Slow Fall (2 Points)\nWhile falling, you can slow the speed at which you\ndescend and halve the bludgeoning damage taken at\nthe end of the fall.\n\n!! Talons (2 Points)\nYour talons are natural weapons, which you can use\nto make unarmed strikes. If you hit with them, you\ndeal slashing damage equal to 1d4 + your Strength\nmodifier, instead of the bludgeoning damage normal\nfor an unarmed strike.\n","tags":"Parentage [[Elf & Orc 1]]","title":"Kenku Parentage","modified":"20260711134027701"},
{"created":"20260707183956606","text":"//The gods of knowledge — including Oghma, Boccob, Gilean, Aureon, and Thoth — value learning and understanding above all. Some teach that knowledge is to be gathered and shared in libraries and universities, or promote the practical knowledge of craft and invention. Some deities hoard knowledge and keep its secrets to themselves. And some promise their followers that they will gain tremendous power if they unlock the secrets of the multiverse. Followers of these gods study esoteric lore, collect old tomes, delve into the secret places of the earth, and learn all they can. Some gods of knowledge promote the practical knowledge of craft and invention, including smith deities like Gond, Reorx, Onatar, Moradin, Hephaestus, and Goibhniu.//\n\n!!! Knowledge Domain Spells\n\n|noborder alternate|k\n|!Cleric Level |!Spells |\n| 1st |[[Command]], [[Identify]] |\n| 3rd |[[Augury]], [[Suggestion]] |\n| 5th |[[Nondetection]], [[Speak with Dead]] |\n| 7th |[[Arcane Eye]], [[Confusion]] |\n| 9th |[[Legend Lore]], [[Scrying]] |\n\n!! Blessings of Knowledge\n\nAt 1st level, you learn two languages of your choice. You also become proficient in your choice of two of the following skills: Arcana, History, Nature, or Religion.\n\nYour proficiency bonus is doubled for any ability check you make that uses either of those skills.\n\n!! Channel Divinity: Knowledge of the Ages\n\nStarting at 2nd level, you can use your Channel Divinity to tap into a divine well of knowledge. As an action, you choose one skill or tool. For 10 minutes, you have proficiency with the chosen skill or tool.\n\n!! Channel Divinity: Read Thoughts\n\nAt 6th level, you can use your Channel Divinity to read a creature’s thoughts. You can then use your access to the creature’s mind to command it.\n\nAs an action, choose one creature that you can see within 60 feet of you. That creature must make a Wisdom saving throw. If the creature succeeds on the saving throw, you can’t use this feature on it again until you finish a long rest.\n\nIf the creature fails its save, you can read its surface thoughts (those foremost in its mind, reflecting its current emotions and what it is actively thinking about) when it is within 60 feet of you. This effect lasts for 1 minute.\n\nDuring that time, you can use your action to end this effect and cast the [[Suggestion]] spell on the creature without expending a spell slot. The target automatically fails its saving throw against the spell.\n\n!! Potent Spellcasting\n\nStarting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.\n\n!! Visions of the Past\n\nStarting at 17th level, you can call up visions of the past that relate to an object you hold or your immediate surroundings. You spend at least 1 minute in meditation and prayer, then receive dreamlike, shadowy glimpses of recent events. You can meditate in this way for a number of minutes equal to your Wisdom score and must maintain concentration during that time, as if you were casting a spell.\n\nOnce you use this feature, you can’t use it again until you finish a short or long rest.\n\n//''Object Reading.''// Holding an object as you meditate, you can see visions of the object’s previous owner. After meditating for 1 minute, you learn how the owner acquired and lost the object, as well as the most recent significant event involving the object and that owner. If the object was owned by another creature in the recent past (within a number of days equal to your Wisdom score), you can spend 1 additional minute for each owner to learn the same information about that creature.\n\n//''Area Reading.''// As you meditate, you see visions of recent events in your immediate vicinity (a room, street, tunnel, clearing, or the like, up to a 50-foot cube), going back a number of days equal to your Wisdom score. For each minute you meditate, you learn about one significant event, beginning with the most recent. Significant events typically involve powerful emotions, such as battles and betrayals, marriages and murders, births and funerals. However, they might also include more mundane events that are nevertheless important in your current situation.","title":"Knowledge Domain","modified":"20260708090217919","type":"","tags":"[[Player's Handbook]] Subclasses Cleric"},
{"created":"20260711134030895","text":"//Kobolds are egg-laying reptilian humanoids. Kobolds\ngrow and mature much more swiftly than members\nof other humanoids. At six years old a kobold is\nconsidered an adult. A kobold can live for up to 120\nyears—longevity many attribute to being distantly\nrelated to dragons.//\n\n//A kobold can lay up to six eggs per year, and an\negg matures for two to three months before it\nhatches. Because they lay eggs, and the eggs don’t\nrequire much tending, kobolds are free to pursue\nother interests.//\n\n//Furthermore, kobolds can choose to naturally\nchange sex over the course of several months.\nPerhaps because of this fact, kobolds typically don’t\nhave assigned gender roles for young or adults.//\n\n!!! Urds\n\n//Winged kobolds, known as urds, hatch seemingly at\nrandom from kobold eggs, even if neither birth\nparent is an urd.//\n\n! Kobold Traits\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Dragon’s Magic (6 Points)\nYou know the [[Fire Bolt]] cantrip. When you reach 3rd\nlevel, you can cast the [[Chromatic Orb]] spell as a 2nd-\nlevel spell once with this trait and regain the ability to\ndo so when you finish a long rest. When you reach\n5th level, you can cast the [[Scorching Ray]] spell once\nwith this trait and regain the ability to do so when\nyou finish a long rest.\n\nYou can also cast these spells using any spell slots\nyou have of the appropriate level. Charisma is your\nspellcasting ability for these spells.\n\n!! Dragon’s Resistance (3 Points)\nYou have resistance to a type of damage based on a\ncolor of chromatic dragon (choose or roll a d10): 1–2,\nacid (black); 3–4, cold (white); 5–6, fire (red); 7–8,\nlightning (blue); 9–10, poison (green).\n\n!! Keen Senses (2 Points)\nYou have proficiency in the Perception skill.\n\n!! Little (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your size is Small.\n\n!! Restless (3 Points)\nWhen taking a long rest, you need only 2 hours of\nsleep and can spend the other 6 hours performing\nlight activity.\n\n!! Sunlight Sensitivity (–6 Points)\nYou have disadvantage on attack rolls and on\nWisdom (Perception) checks that rely on sight when\nyou, the target of your attack, or whatever you are\ntrying to perceive is in direct sunlight.\n\n!! Wings (14 Points)\nYou have a pair of draconic wings. You have a flying\nspeed of 30 feet. To use this speed, you can’t be\nwearing heavy armor.\n","tags":"Parentage [[Elf & Orc 1]]","title":"Kobold Parentage","modified":"20260711134347130"},
{"created":"20260711134350181","text":"//Leonin tend to be tall compared to humans. Tawny\nfur covers leonin bodies, and some grow thick manes\nranging in shades from gold to black.//\n\n//While their hands prove as nimble as those of\nother humanoids, leonin have retractable claws,\nwhich they can extend instantly. Their claws, along\nwith their ability to produce bone-shaking roars, give\nmost leonin an air that readily shifts between regal\nand fearsome.//\n\n//Leonin are adapted to living in tropical and\nsubtropical grasslands, but they can make their\nhomes anywhere. They are also adapted to living in\nfamily groups, but leonin can strike out on their own\nor adopt a new family.//\n\n! Leonin Traits\n\n!! Claws (1 Point)\nYour claws are natural weapons, which you can use\nto make unarmed strikes. If you hit with them, you\ncan deal slashing damage equal to 1d4 + your\nStrength modifier, instead of the bludgeoning\ndamage normal for an unarmed strike.\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Daunting Roar (4 Points)\nAs a bonus action, you can let out an especially\nmenacing roar. Creatures of your choice within 10\nfeet of you that can hear you must succeed on a\nWisdom saving throw or become frightened of you\nuntil the end of your next turn. The DC of the save\nequals 8 + your proficiency bonus + your\nConstitution modifier. Once you use this trait, you\ncan’t use it again until you finish a short or long rest.\n\n!! Pounce (3 Points)\nWhen you move at least 20 feet straight toward a\ncreature and then hit it with a claw attack on the\nsame turn, the target must make a Strength saving\nthrow against a DC equal to 8 + your proficiency\nbonus + your Strength modifier or be knocked prone.\n\n!! Sprint (2 Points)\nYour base speed increases by 5 feet.\n","tags":"Parentage [[Elf & Orc 1]]","title":"Leonin Parentage","modified":"20260711134907668"},
{"created":"20260708084859699","text":"//The Life domain focuses on the vibrant positive energy — one of the fundamental forces of the universe — that sustains all life. The gods of life promote vitality and health through healing the sick and wounded, caring for those in need, and driving away the forces of death and undeath. Almost any non-evil deity can claim influence over this domain, particularly agricultural deities (such as Chauntea, Arawai, and Demeter), sun gods (such as Lathander, Pelor, and Re-Horakhty), gods of healing or endurance (such as Ilmater, Mishakal, Apollo, and Diancecht), and gods of home and community (such as Hestia, Hathor, and Boldrei).//\n\n!!! Life Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Bless]], [[Cure Wounds]] |\n| 3rd |[[Lesser Restoration]], [[Spiritual Weapon]] |\n| 5th |[[Beacon of Hope]], [[Revivify]] |\n| 7th |[[Death Ward]], [[Guardian of Faith]] |\n| 9th |[[Mass Cure Wounds]], [[Raise Dead]] |\n\n!! Bonus Proficiency\n\nWhen you choose this domain at 1st level, you gain proficiency with heavy armor.\n\n!! Disciple of Life\n\nAlso starting at 1st level, your healing spells are more effective. Whenever you use a spell of 1st level or higher to restore hit points to a creature, the creature regains additional hit points equal to 2 + the spell’s level.\n\n!! Channel Divinity: Preserve Life\n\nStarting at 2nd level, you can use your Channel Divinity to heal the badly injured.\n\nAs an action, you present your holy symbol and evoke healing energy that can restore a number of hit points equal to five times your cleric level. Choose any creatures within 30 feet of you, and divide those hit points among them. This feature can restore a creature to no more than half of its hit point maximum. You can’t use this feature on an undead or a construct.\n\n!! Blessed Healer\n\nBeginning at 6th level, the healing spells you cast on others heal you as well. When you cast a spell of 1st level or higher that restores hit points to a creature other than you, you regain hit points equal to 2 + the spell’s level.\n\n!! Divine Strike\n\nAt 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra 1d8 radiant damage to the target. When you reach 14th level, the extra damage increases to 2d8.\n\n!! Supreme Healing\n\nStarting at 17th level, when you would normally roll one or more dice to restore hit points with a spell, you instead use the highest number possible for each die. For example, instead of restoring 2d6 hit points to a creature, you restore 12.","tags":"Cleric [[Player's Handbook]] Subclasses","title":"Life Domain","modified":"20260708090235382"},
{"created":"20260708085208961","text":"//Gods of light — including Helm, Lathander, Pholtus, Branchala, the Silver Flame, Belenus, Apollo, and Re-Horakhty — promote the ideals of rebirth and renewal, truth, vigilance, and beauty, often using the symbol of the sun. Some of these gods are portrayed as the sun itself or as a charioteer who guides the sun across the sky. Others are tireless sentinels whose eyes pierce every shadow and see through every deception. Some are deities of beauty and artistry, who teach that art is a vehicle for the soul’s improvement. Clerics of a god of light are enlightened souls infused with radiance and the power of their gods’ discerning vision, charged with chasing away lies and burning away darkness.//\n\n!!! Light Domain Spells\n\n|noborder alternate|k\n| !Cleric Level |!Spells |\n| 1st |[[Burning Hands]], [[Faerie Fire]] |\n| 3rd |[[Flaming Sphere]], [[Scorching Ray]] |\n| 5th |[[Daylight]], [[Fireball]] |\n| 7th |[[Guardian of Faith]], [[Wall of Fire]] |\n| 9th |[[Flame Strike]], [[Scrying]] |\n\n!! Bonus Cantrip\n\nWhen you choose this domain at 1st level, you gain the [[Light]] cantrip if you don’t already know it. This cantrip doesn’t count against the number of cleric cantrips you know.\n\n!! Warding Flare\n\nAlso at 1st level, you can interpose divine light between yourself and an attacking enemy. When you are attacked by a creature within 30 feet of you that you can see, you can use your reaction to impose disadvantage on the attack roll, causing light to flare before the attacker before it hits or misses. An attacker that can’t be blinded is immune to this feature.\n\nYou can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.\n\n!! Channel Divinity: Radiance of the Dawn\n\nStarting at 2nd level, you can use your Channel Divinity to harness sunlight, banishing darkness and dealing radiant damage to your foes.\n\nAs an action, you present your holy symbol, and any magical darkness within 30 feet of you is dispelled. Additionally, each hostile creature within 30 feet of you must make a Constitution saving throw. A creature takes radiant damage equal to 2d10 + your cleric level on a failed saving throw, and half as much damage on a successful one. A creature that has total cover from you is not affected.\n\n!! Improved Flare\n\nStarting at 6th level, you can also use your Warding Flare feature when a creature that you can see within 30 feet of you attacks a creature other than you.\n\n!! Potent Spellcasting\n\nStarting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.\n\n!! Corona of Light\n\nStarting at 17th level, you can use your action to activate an aura of sunlight that lasts for 1 minute or until you dismiss it using another action. You emit bright light in a 60-foot radius and dim light 30 feet beyond that. Your enemies in the bright light have disadvantage on saving throws against any spell that deals fire or radiant damage.","tags":"Cleric [[Player's Handbook]] Subclasses","title":"Light Domain","modified":"20260708090250142"},
{"created":"20260711134919493","text":"//Lizardfolk are scaly humanoids adapted to swampy\nenvironments with its staggering variety of threats.\nLizardfolk are a little bulkier and taller than humans,\nand their colorful frills make them appear even\nlarger.//\n\n//Their physical shape notwithstanding, lizardfolk\nhave more in common physiologically with iguanas\nor dragons than they do with humans, dwarves, or\nelves. They are cold-blooded, and their body provides\nan array of natural armor and weapons few other\nhumanoids possess.//\n\n//Some assume that because lizardfolk are cold-\nblooded and reptilian that they must be emotionally\nstunted and alien in mindset. In truth, they have the\nsame range and depth of feeling as mammalian or\navian humanoids.//\n\n//Their cold-bloodedness is physiologically\nsignificant, but not emotionally or mentally so.\nLizardfolk do enjoy basking in the sun and seem to\nbe dead while resting, but they can spring into action\nat a moment’s notice.//\n\n! Lizardfolk Traits\n\n!! Bite (3 Points)\nYour fanged maw is a natural weapon, which you can\nuse to make unarmed strikes. If you hit with it, you\ndeal piercing damage equal to 1d6 + your Strength\nmodifier, instead of the bludgeoning damage normal\nfor an unarmed strike.\n\n!! Hold Breath (1 Point)\nYou can hold your breath for up to 15 minutes at a\ntime.\n\n!! Hungry Jaws (5 Points)\nAs a bonus action, you can make a special attack\nwith your bite. If the attack hits, it deals its normal\ndamage, and you gain temporary hit points\n(minimum of 1) equal to your Constitution modifier,\nand you can’t use this trait again until you finish a\nshort or long rest.\n\n!! Natural Armor (4 Points)\nYou have tough, scaly skin. When you aren’t wearing\narmor, your AC is 13 + your Dexterity modifier. You\ncan use your natural armor to determine your AC if\nthe armor you wear would leave you with a lower AC.\nA shield’s benefits apply as normal while you use\nyour natural armor.\n\n!! Swim (2 Points)\n\nYou have a swimming speed of\n30 feet.\n","tags":"Parentage [[Elf & Orc 1]]","title":"Lizardfolk Parentage","modified":"20260711135033588"},
{"created":"20260711135041073","text":"//Locathah are fish-folk who are adapted to life just\nbelow the water’s surface along sea coasts. All\nlocathah are covered in fine scales that usually range\nfrom olive green to ochre in color, except for their\nbellies that range from sea green to pale yellow. But\nseveral other color variations exist.//\n\n//The locathah have strong tails for propulsion\nthrough the water, webbed flippers and hands for\nmaneuvering, and a spiny crest that starts at the top\nof the head and extends the length of the spine.\nLocathah eyes are usually all white or all black,\nthough again, other colorations exist.//\n\n//Being fish-folk, locathah are entirely hairless. Also,\nthey do not have teeth, but tear a mouthful of food at\na time with their beak-like mouths and swallow it\nwhole.//\n\n//Locathah can lay dozens or hundreds of eggs at a\ntime, which is why some locathah communities\ndesignate a single volunteer as the one who lays all\nthe eggs.//\n\n//The locathah are particularly adapted to eating\nkelp and seaweed. Many are vegetarians, but their\npalettes expand if marine vegetation isn't available\nand the locathah is required to become a more\nopportunistic feeder.//\n\n! Locathath Traits\n\n!! Amphibious (1 Point)\nYou can breathe air and water.\n\n!! Leviathan Nerves (4 Points)\nYou have advantage on saving throws against being\nparalyzed or stunned.\n\n!! Leviathan Will (7 Points)\nYou have advantage on saving throws against being\ncharmed, frightened, poisoned, or put to sleep.\n\n!! Natural Armor (2 Points)\nYou have tough, scaly skin. When you aren’t wearing\narmor, your AC is 12 + your Dexterity modifier. You\ncan use your natural armor to determine your AC if\nthe armor you wear would leave you with a lower AC.\nA shield’s benefits apply as normal while you use\nyour natural armor.\n\n!! Swim (2 Points)\nYou have a swimming speed of 30 feet.\n\n!! Water Dependency (–3 Points)\nYou need to be submerged at least once every 4\nhours to avoid suffocating.\n","tags":"Parentage [[Elf & Orc 1]]","title":"Locathah Parentage","modified":"20260711135213330"},
{"created":"20260711135223634","text":"//Loxodons tower above most other humanoids,\nstanding over seven feet tall. They have the heads—\ntrunks, tusks, ears, and faces—of elephants, and\nhulking bipedal bodies.//\n\n//Each of their hands has four thick digits. Their feet\nare the flat-bottomed, oval-shaped feet of elephants.\nAnd their bodies are covered in thick, leathery skin\nthat serves as a natural defense.//\n\n//Like that of an elephant, a loxodon’s trunk is a\nuseful appendage. In addition to providing a keen\nsense of smell, the trunk can be used to lift and carry\neven heavy objects. The trunk can be used to carry\nboth food and liquid to the mouth and can even act\nas a snorkel.//\n\n! Loxodon Traits\n\n!! Keen Smell (6 Points)\nThanks to your sensitive trunk, you have advantage\non Wisdom (Perception), Wisdom (Survival), and\nIntelligence (Investigation) checks that involve smell.\n\n!! Long-Lived (0 Points)\nIf you inherit this trait from your other birth parent\nalso, your lifespan is relatively long.\n\n!! Loxodon Serenity (4 Points)\nYou have advantage on saving throws against being\ncharmed or frightened.\n\n!! Natural Armor (2 Points)\nYou have thick, leathery skin. When you aren’t\nwearing armor, your AC is 12 + your Constitution\nmodifier. You can use your natural armor to\ndetermine your AC if the armor you wear would\nleave you with a lower AC. A shield’s benefits apply\nas normal while you use your natural armor.\n\n!! Trunk (1 Point)\nYou can grasp things with your trunk, and you can\nuse it as a snorkel. It has a reach of 5 feet, and it can\nlift a number of pounds equal to five times your\nStrength score. You can use it to do the following\nsimple tasks: lift, drop, hold, push, or pull an object\nor a creature; open or close a door or a container;\ngrapple someone; or make an unarmed strike. Your\nDM might allow other simple tasks to be added to\nthat list of options.\n\nYour trunk can’t wield weapons or shields or do\nanything that requires manual precision, such as\nusing tools or magic items or performing the\nsomatic components of a spell.\n","tags":"Parentage [[Elf & Orc 1]]","title":"Loxodon Parentage","modified":"20260711135326333"},
{"created":"20260711135330515","text":"//Minotaurs are barrel-chested humanoids with heads\nresembling those of bulls. They average six feet in\nheight, and their horns range in size from about one\nfoot long to great, curling weapons easily three times\nthat length.//\n\n//Thick hair extends down minotaurs’ necks and\npowerful backs, and some have long patches of hair\non their chins and cheeks. Their legs end in heavy,\ncloven hooves, and they have long, tufted tails.//\n\n//Minotaurs have an unfortunate resemblance to\ngoristro demons and the demon lord Baphomet, but\nminotaurs have no greater propensity for evil than\nany other sentient humanoid, no matter what the\nmyths say. Furthermore, minotaurs can see in the\ndark but have no other innate ability that helps\nnavigate a shadowy maze.//\n\n//Though minotaurs look bovine, they can adapt to a\ncarnivorous, omnivorous, or herbivorous diet, as\ndesired or as necessity requires.//\n\n! Minotaur Traits\n\n!! Darkvision (4 Points)\nYou can see in dim light within 60 feet of you as if it\nwere bright light, and in darkness as if it were dim\nlight. You can’t discern color in darkness, only shades\nof gray.\n\n!! Goring Rush (3 Points)\nImmediately after you use the Dash action on your\nturn and move at least 20 feet, you can make one\nunarmed strike with your horns as a bonus action.\n\n!! Hammering Horns (2 Points)\nImmediately after you hit a creature with a\nmelee attack as part of the Attack action on\nyour turn, you can use a bonus action to\nattempt to shove that target with your horns.\nThe target must be within 5 feet of you and no\nmore than one size larger than you. Unless it\nsucceeds on a Strength saving throw against a DC\nequal to 8 + your proficiency bonus + your Strength\nmodifier, you push it up to 10 feet away from you.\n\n!! Horns (2 Points)\nYour horns are natural melee weapons, which you\ncan use to make unarmed strikes. If you hit with\nthem, you deal piercing damage equal to 1d6 + your\nStrength modifier, instead of the bludgeoning\ndamage normal for an unarmed strike.","tags":"Parentage [[Elf & Orc 1]]","title":"Minotaur Parentage","modified":"20260711135515633"},
{"created":"20260709071144527","text":"//Whatever their discipline, monks are united in their ability to magically harness the energy that flows in their bodies. Whether channeled as a striking display of combat prowess or a subtler focus of defensive ability and speed, this energy infuses all that a monk does.//\n\n|noborder alternate|k\n| !Level | !PB | !Martial Arts | !Ki Points | !Unarmored Movement |!Features |\n|  1st | +2 | 1d4  | --- |   ---   |Unarmored Defense, Martial Arts |\n|  2nd | +2 | 1d4  |  2  | +10 ft. |Ki, Unarmored Movement |\n|  3rd | +2 | 1d4  |  3  | +10 ft. |Monastic Tradition, Deflect Missiles |\n|  4th | +2 | 1d4  |  4  | +10 ft. |Ability Score Improvement |\n|  5th | +3 | 1d4  |  5  | +10 ft. |Extra Attack, Stunning Strike |\n|  6th | +3 | 1d6  |  6  | +15 ft. |Ki-Empowered Strikes, Monastic Tradition Feature |\n|  7th | +3 | 1d6  |  7  | +15 ft. |Evasion, Stillness of Mind |\n|  8th | +3 | 1d6  |  8  | +15 ft. |Ability Score Improvement |\n|  9th | +4 | 1d6  |  9  | +15 ft. |Unarmored Movement Improvement |\n| 10th | +4 | 1d6  | 10  | +20 ft. |Purity of Body |\n| 11th | +4 | 1d8  | 11  | +20 ft. |Monastic Tradition Feature |\n| 12th | +4 | 1d8  | 12  | +20 ft. |Ability Score Improvement |\n| 13th | +5 | 1d8  | 13  | +20 ft. |Tongue of the Sun and Moon |\n| 14th | +5 | 1d8  | 14  | +25 ft. |Diamond Soul |\n| 15th | +5 | 1d8  | 15  | +25 ft. |Timeless Body |\n| 16th | +5 | 1d8  | 16  | +25 ft. |Ability Score Improvement |\n| 17th | +6 | 1d10 | 17  | +25 ft. |Monastic Tradition Feature |\n| 18th | +6 | 1d10 | 18  | +30 ft. |Empty Body |\n| 19th | +6 | 1d10 | 19  | +30 ft. |Ability Score Improvement |\n| 20th | +6 | 1d10 | 20  | +30 ft. |Perfect Self |\n\n! Class Features\n\nAs a monk, you gain the following class features.\n\n!! Hit Points\n\n''Hit Dice:'' 1d8 per monk level\n\n''Hit Points at 1st Level:'' 8 + your Constitution modifier\n\n''Hit Points at Higher Levels:'' 1d8 (or 5) + your Constitution modifier per monk level after 1st\n\n!! Proficiencies\n\n''Armor:'' None\n\n''Weapons:'' Simple weapons, shortswords\n\n''Tools:'' Choose one type of artisan’s tools or one musical instrument\n\n''Saving Throws:'' Strength, Dexterity\n\n''Skills:'' Choose two from Acrobatics, Athletics, History, Insight, Religion, and Stealth\n\n!! Equipment\n\nYou start with the following equipment, in addition to the equipment granted by your background:\n\n* (//a//) a [[shortsword|Weapons]] or (//b//) any [[simple weapon|Weapons]]\n* (//a//) a [[dungeoneer’s pack|Adventuring Gear]] or (//b//) an [[explorer’s pack|Adventuring Gear]]\n* 10 [[darts|Adventuring Gear]]\n\nAlternatively, you may start with 5d4 gp to buy your equipment.\n\n!! Unarmored Defense\n\nBeginning at 1st level, while you are wearing no armor and not wielding a shield, your AC equals 10 + your Dexterity modifier + your Wisdom modifier.\n\n!! Martial Arts\n\nAt 1st level, your practice of martial arts gives you mastery of combat styles that use unarmed strikes and monk weapons, which are shortswords and any simple melee weapons that don’t have the two-handed or heavy property.\n\nYou gain the following benefits while you are unarmed or wielding only monk weapons and you aren’t wearing armor or wielding a shield:\n\n* You can use Dexterity instead of Strength for the attack and damage rolls of your unarmed strikes and monk weapons.\n* You can roll a d4 in place of the normal damage of your unarmed strike or monk weapon. This die changes as you gain monk levels, as shown in the Martial Arts column of the Monk table.\n* When you use the Attack action with an unarmed strike or a monk weapon on your turn, you can make one unarmed strike as a bonus action. For example, if you take the Attack action and attack with a quarterstaff, you can also make an unarmed strike as a bonus action, assuming you haven’t already taken a bonus action this turn.\n\nCertain monasteries use specialized forms of the monk weapons. For example, you might use a club that is two lengths of wood connected by a short chain (called a nunchaku) or a sickle with a shorter, straighter blade (called a kama). Whatever name you use for a monk weapon, you can use the game statistics normal for the weapon.\n\n!! Ki\n\nStarting at 2nd level, your training allows you to harness the mystic energy of ki. Your access to this energy is represented by a number of ki points. Your monk level determines the number of points you have, as shown in the Ki Points column of the Monk table.\n\nYou can spend these points to fuel various ki features. You start knowing three such features: Flurry of Blows, Patient Defense, and Step of the Wind. You learn more ki features as you gain levels in this class.\n\nWhen you spend a ki point, it is unavailable until you finish a short or long rest, at the end of which you draw all of your expended ki back into yourself. You must spend at least 30 minutes of the rest meditating to regain your ki points.\n\nSome of your ki features require your target to make a saving throw to resist the feature’s effects. The saving throw DC is calculated as follows:\n\n''Ki save DC'' = 8 + your proficiency bonus + your Wisdom modifier\n\n!!! Flurry of Blows\n\nImmediately after you take the Attack action on your turn, you can spend 1 ki point to make two unarmed strikes as a bonus action.\n\n!!! Patient Defense\n\nYou can spend 1 ki point to take the Dodge action as a bonus action on your turn.\n\n!!! Step of the Wind\n\nYou can spend 1 ki point to take the Disengage or Dash action as a bonus action on your turn, and your jump distance is doubled for the turn.\n\n!! Unarmored Movement\n\nStarting at 2nd level, your speed increases by 10 feet while you are not wearing armor or wielding a shield. This bonus increases when you reach certain monk levels, as shown in the Monk table.\n\nAt 9th level, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the move.\n\n!! Monastic Tradition\n\nWhen you reach 3rd level, you commit yourself to a monastic tradition. Your tradition grants you features at 3rd level and again at 6th, 11th, and 17th level.\n\n* [[Way of the Four Elements]]{{$:/PHB}}\n* [[Way of the Open Hand]]{{$:/PHB}}\n* [[Way of Shadow]]{{$:/PHB}}\n\n!! Deflect Missiles\n\nStarting at 3rd level, you can use your reaction to deflect or catch the missile when you are hit by a ranged weapon attack. When you do so, the damage you take from the attack is reduced by 1d10 + your Dexterity modifier + your monk level.\n\nIf you reduce the damage to 0, you can catch the missile if it is small enough for you to hold in one hand and you have at least one hand free. If you catch a missile in this way, you can spend 1 ki point to make a ranged attack with the weapon or piece of ammunition you just caught, as part of the same reaction. You make this attack with proficiency, regardless of your weapon proficiencies, and the missile counts as a monk weapon for the attack, which has a normal range of 20 feet and a long range of 60 feet.\n\n!! Ability Score Improvement\n\nWhen you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can’t increase an ability score above 20 using this feature.\n\nAlternatively, you may select a feat.\n\n!! Slow Fall\n\nBeginning at 4th level, you can use your reaction when you fall to reduce any falling damage you take by an amount equal to five times your monk level.\nExtra Attack\n\nBeginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.\n\n!! Stunning Strike\n\nStarting at 5th level, you can interfere with the flow of ki in an opponent’s body. When you hit another creature with a melee weapon attack, you can spend 1 ki point to attempt a stunning strike. The target must succeed on a Constitution saving throw or be stunned until the end of your next turn.\n\n!! Ki-Empowered Strikes\n\nStarting at 6th level, your unarmed strikes count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.\n\n!! Evasion\n\nAt 7th level, your instinctive agility lets you dodge out of the way of certain area effects, such as a blue dragon’s lightning breath or a fireball spell. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.\n\n!! Stillness of Mind\n\nStarting at 7th level, you can use your action to end one effect on yourself that is causing you to be charmed or frightened.\n\n!! Purity of Body\n\nAt 10th level, your mastery of the ki flowing through you makes you immune to disease and poison.\n\n!! Tongue of the Sun and Moon\n\nStarting at 13th level, you learn to touch the ki of other minds so that you understand all spoken languages. Moreover, any creature that can understand a language can understand what you say.\n\n!! Diamond Soul\n\nBeginning at 14th level, your mastery of ki grants you proficiency in all saving throws.\n\nAdditionally, whenever you make a saving throw and fail, you can spend 1 ki point to reroll it and take the second result.\n\n!! Timeless Body\n\nAt 15th level, your ki sustains you so that you suffer none of the frailty of old age, and you can’t be aged magically. You can still die of old age, however. In addition, you no longer need food or water.\n\n!! Empty Body\n\nBeginning at 18th level, you can use your action to spend 4 ki points to become invisible for 1 minute. During that time, you also have resistance to all damage but force damage.\n\nAdditionally, you can spend 8 ki points to cast the [[Astral Projection]] spell, without needing material components. When you do so, you can’t take any other creatures with you.\n\n!! Perfect Self\n\nAt 20th level, when you roll for initiative and have no ki points remaining, you regain 4 ki points.","tags":"Classes [[Player's Handbook]]","title":"Monk","modified":"20260713093324894"},
{"created":"20260714041736894","text":"A good mount can help you move more quickly through the wilderness, but its primary purpose is to carry the gear that would otherwise slow you down. The Mounts and Other Animals table shows each animal’s speed and base carrying capacity.\n\nAn animal pulling a carriage, cart, chariot, sled, or wagon can move weight up to five times its base carrying capacity, including the weight of the vehicle. If multiple animals pull the same vehicle, they can add their carrying capacity together.\n\nMounts other than those listed here are available in the worlds of D&D, but they are rare and not normally available for purchase. These include flying mounts (pegasi, griffons, hippogriffs, and similar animals) and even aquatic mounts (giant sea horses, for example). Acquiring such a mount often means securing an egg and raising the creature yourself, making a bargain with a powerful entity, or negotiating with the mount itself.\n\nBarding. Barding is armor designed to protect an animal’s head, neck, chest, and body. Any type of armor shown on the Armor table in this chapter can be purchased as barding. The cost is four times the equivalent armor made for humanoids, and it weighs twice as much.\n\nSaddles. A military saddle braces the rider, helping you keep your seat on an active mount in battle. It gives you advantage on any check you make to remain mounted. An exotic saddle is required for riding any aquatic or flying mount.\n\nVehicle Proficiency. If you have proficiency with a certain kind of vehicle (land or water), you can add your proficiency bonus to any check you make to control that kind of vehicle in difficult circumstances.\n\nRowed Vessels. Keelboats and rowboats are used on lakes and rivers. If going downstream, add the speed of the current (typically 3 miles per hour) to the speed of the vehicle. These vehicles can’t be rowed against any significant current, but they can be pulled upstream by draft animals on the shores. A rowboat weighs 100 pounds, in case adventurers carry it over land.\n\n!!! Mounts and Other Animals\n\n|noborder alternate|k\n|!Item |!Cost|!Speed|!Carrying Capacity|\n|Camel          | 50 gp  | 50 ft. | 480 lb. |\n|Donkey or mule | 8 gp   | 40 ft. | 420 lb. |\n|Draft horse    | 50 gp  | 40 ft. | 540 lb. |\n|Elephant       | 200 gp | 40 ft. | 1,320 lb. |\n|Mastiff        | 25 gp  | 40 ft. | 195 lb. |\n|Pony           | 30 gp  | 40 ft. | 225 lb. |\n|Riding horse   | 75 gp  | 60 ft. | 480 lb. |\n|Warhorse       | 400 gp | 60 ft. | 540 lb. |\n\n!!! Tack, Harness, and Drawn Vehicles\n\n|noborder alternate|k\n|!Item |\u003C|!Cost|!Weight|\n|Barding              |   x4   | x2 |\n|Bit and bridle       | 2 gp   | 1 lb. |\n|Carriage             | 100 gp | 600 lb. |\n|Cart                 | 15 gp  | 200 lb. |\n|Chariot              | 250 gp | 100 lb. |\n|Feed (per day)       | 5 cp   | 10 lb. |\n|//Saddle//         |\u003C|\u003C|\u003C|\n| |Exotic             | 60 gp  | 40 lb. |\n| |Military           | 20 gp  | 30 lb. |\n| |Pack               | 5 gp   | 15 lb. |\n| |Riding             | 10 gp  | 25 lb. |\n|Saddlebags         |\u003C| 4 gp   | 8 lb.  |\n|Sled               |\u003C| 20 gp  | 300 lb. |\n|Stabling (per day) |\u003C| 5 sp   | ---\n|Wagon                | 35 gp  | 400 lb. |\n\n!!! Waterborne Vehicles\n\n|noborder alternate|k\n|!Item |!Cost|!Speed|\n|Galley       | 30,000 gp | 4 mph     |\n|Keelboat     | 3,000 gp  | 1 mph     |\n|Longship     | 10,000 gp | 3 mph     |\n|Rowboat      | 50 gp     | 1 1/2 mph |\n|Sailing ship | 10,000 gp | 2 mph     |\n|Warship      | 25,000 gp | 2 1/2 mph |","title":"Mounts and Vehicles","modified":"20260714070751722","type":"","tags":"Equipment [[Player's Handbook]]"},
